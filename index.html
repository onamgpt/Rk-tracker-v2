        const kComm=F.reduce((s,o)=>s+((o.officer===AGENT2)?(Number(o.total)||0)*AGENT2_RATE:0),0);
        const kOut=F.reduce((s,o)=>s+Math.max(0,(Number(o.total)||0)-(Number(o.received)||0)),0);
        const kNet=kGP-kTrans-kComm;
        const kPct=kSales?Math.round(kGP/kSales*10000)/100:0;
        const kAvg=F.length?kSales/F.length:0;

        // Salesman-wise (SAP: Sales Analysis by Employee)
        const byOff = OFFICERS.map(off=>{
          const os=F.filter(o=>o.officer===off);
          const sales=os.reduce((s,o)=>s+(Number(o.total)||0),0);
          const gp=os.reduce((s,o)=>s+(Number(o.gpTotal)||0),0);
          const out=os.reduce((s,o)=>s+Math.max(0,(Number(o.total)||0)-(Number(o.received)||0)),0);
          const exp=parseFloat(String(expenses[off]||"").replace(/[^0-9.]/g,""))||0;
          return {off,orders:os.length,sales,gp,pct:sales?Math.round(gp/sales*10000)/100:0,exp,net:gp-exp,out};
        }).filter(r=>r.orders>0).sort((a,b)=>b.gp-a.gp);

        // Product-wise (SAP: Material Analysis) — fast & slow movers
        const pMap={};
        F.forEach(o=>(o.lines||[]).forEach(l=>{
          const key=l.name||"?";
          if(!pMap[key])pMap[key]={name:key,sku:l.sku,doz:0,gp:0};
          pMap[key].doz+=Number(l.doz)||0; pMap[key].gp+=Number(l.gp)||0;
        }));
        const prods=Object.values(pMap).map(p=>{
          const m=master.find(x=>x.sku===p.sku)||master.find(x=>x.name===p.name);
          const rev=m?m.sp*p.doz:0;
          return {...p, rev, pct:rev?Math.round(p.gp/rev*10000)/100:0};
        }).sort((a,b)=>b.gp-a.gp);

        // Customer-wise (SAP: Customer Analysis)
        const cMap={};
        F.forEach(o=>{
          const key=o.customer||"—";
          if(!cMap[key])cMap[key]={cust:key,orders:0,sales:0,gp:0,out:0};
          cMap[key].orders++; cMap[key].sales+=Number(o.total)||0; cMap[key].gp+=Number(o.gpTotal)||0;
          cMap[key].out+=Math.max(0,(Number(o.total)||0)-(Number(o.received)||0));
        });
        const custs=Object.values(cMap).sort((a,b)=>b.sales-a.sales);

        // Door-opener analysis: do An3f-carrying customers buy more profitable (non-An3f) business?
        const A3RE=/all new 3 fragrance|an3f|3 fragrance 10 stick|3 fragrances 10/i;
        const dmap={};
        F.forEach(o=>{
          const key=o.customer||"—";
          if(!dmap[key])dmap[key]={cust:key,an3fDoz:0,otherGP:0,otherDoz:0,orders:0,total:0};
          dmap[key].orders++; dmap[key].total+=Number(o.total)||0;
          (o.lines||[]).forEach(l=>{
            if(A3RE.test(l.name||"")) dmap[key].an3fDoz+=Number(l.doz)||0;
            else { dmap[key].otherGP+=Number(l.gp)||0; dmap[key].otherDoz+=Number(l.doz)||0; }
          });
        });
        const dArr=Object.values(dmap);
        const buyers=dArr.filter(d=>d.an3fDoz>0);
        const nonb=dArr.filter(d=>d.an3fDoz<=0);
        const avgF=(arr,f)=>arr.length?arr.reduce((s,d)=>s+f(d),0)/arr.length:0;
        const buyersAvgOther=avgF(buyers,d=>d.otherGP);
        const nonbAvgOther=avgF(nonb,d=>d.otherGP);
        const doorRatio=nonbAvgOther?buyersAvgOther/nonbAvgOther:0;
        buyers.sort((a,b)=>b.otherGP-a.otherGP);

        // Monthly trend — last 6 months (always from ALL orders)
        const tMap={};
        orders.forEach(o=>{ const k=mKey(o.date); if(!k)return; if(!tMap[k])tMap[k]={sales:0,gp:0}; tMap[k].sales+=Number(o.total)||0; tMap[k].gp+=Number(o.gpTotal)||0; });
        const trend=Object.entries(tMap).sort((a,b)=>a[0]<b[0]?1:-1).slice(0,6).reverse();
        const tMax=Math.max(1,...trend.map(([,v])=>v.sales));

        // Receivables aging (SAP: FBL5N ageing)
        const now=Date.now();
        const aging={a30:0,a60:0,a90:0};
        const agingRows=[];
        F.forEach(o=>{
          const due=Math.max(0,(Number(o.total)||0)-(Number(o.received)||0));
          if(due<=0.5)return;
          const dt=new Date(o.date); const days=isNaN(dt)?0:Math.floor((now-dt.getTime())/86400000);
          if(days<=30)aging.a30+=due; else if(days<=60)aging.a60+=due; else aging.a90+=due;
          agingRows.push({cust:o.customer||"—",off:o.officer,date:o.date,days,due});
        });
        agingRows.sort((a,b)=>b.days-a.days);

        // Discount / margin leakage check — orders whose realised GP% falls below master expectation
        const leaks=F.map(o=>{
          const expGP=(o.lines||[]).reduce((s,l)=>{const m=master.find(x=>x.sku===l.sku);return s+(m?m.gp*(l.doz||0):0);},0);
          const actGP=Number(o.gpTotal)||0;
          return {o, expGP, diff:expGP-actGP};
        }).filter(x=>x.diff>1).sort((a,b)=>b.diff-a.diff).slice(0,5);

        // Loss-item watch (An3f etc) — money averted by same-invoice bundling
        const tBE = Number(beTransport)||0;
        const pdz = sku => { const m=master.find(x=>x.sku===sku); return m?m.gp:0; };
        let liLoss=0, liAverted=0, liUncovered=0, liInv=0, liUncInv=0;
        const liProd={}; const liWorst=[];
        F.forEach(o=>{
          let oLoss=0, oProfit=0, hasLoss=false;
          (o.lines||[]).forEach(l=>{
            const g=pdz(l.sku)-tBE; const val=(l.doz||0)*g;
            if(g<0){ oLoss+=(-val); hasLoss=true; if(!liProd[l.name])liProd[l.name]={name:l.name,doz:0,loss:0}; liProd[l.name].doz+=l.doz||0; liProd[l.name].loss+=(-val); }
            else if(g>0){ oProfit+=val; }
          });
          if(!hasLoss)return;
          liInv++;
          const av=Math.min(oProfit,oLoss), unc=Math.max(0,oLoss-oProfit);
          liLoss+=oLoss; liAverted+=av; liUncovered+=unc;
          if(unc>0){ liUncInv++; liWorst.push({cust:o.customer||"—",off:o.officer,date:o.date,loss:oLoss,unc}); }
        });
        liWorst.sort((a,b)=>b.unc-a.unc);
        const liProdArr=Object.values(liProd).sort((a,b)=>b.loss-a.loss);

        const exportCSV=()=>{
          let csv="SPECTRUM SALES INTELLIGENCE — "+(repPeriod==="all"?"All time":mLabel(repPeriod))+"\n\n";
          csv+="KPI,Value\nSales,"+kSales+"\nGross Profit,"+kGP+"\nGP %,"+kPct+"\nOrders,"+F.length+"\nAvg Order,"+Math.round(kAvg)+"\nTransport,"+kTrans+"\nCommission,"+kComm+"\nNet Profit,"+kNet+"\nOutstanding,"+kOut+"\n\n";
          csv+="SALESMAN,ORDERS,SALES,GROSS PROFIT,GP %,MONTHLY COST,NET,OUTSTANDING\n";
          byOff.forEach(r=>{csv+=[r.off,r.orders,r.sales,r.gp,r.pct+"%",r.exp,r.net,r.out].join(",")+"\n";});
          csv+="\nPRODUCT,DOZENS,REVENUE,GROSS PROFIT,GP %\n";
          prods.forEach(p=>{csv+=['"'+p.name+'"',Math.round(p.doz*100)/100,Math.round(p.rev),p.gp,p.pct+"%"].join(",")+"\n";});
          csv+="\nCUSTOMER,ORDERS,SALES,GROSS PROFIT,OUTSTANDING\n";
          custs.forEach(c=>{csv+=['"'+c.cust+'"',c.orders,c.sales,c.gp,c.out].join(",")+"\n";});
          csv+="\nRECEIVABLES AGING\n0-30 days,"+aging.a30+"\n31-60 days,"+aging.a60+"\n60+ days,"+aging.a90+"\n";
          csv+="\nLOSS-ITEM WATCH (transport assumed "+tBE+"/doz)\nLoss shipped,"+Math.round(liLoss)+"\nAverted by bundling,"+Math.round(liAverted)+"\nStill leaked,"+Math.round(liUncovered)+"\nInvoices with loss item,"+liInv+"\nUncovered invoices,"+liUncInv+"\n";
          liProdArr.forEach(p=>{csv+=['"'+p.name+'"',Math.round(p.doz*10)/10+" doz",Math.round(p.loss)+" loss"].join(",")+"\n";});
          const blob=new Blob([csv],{type:"text/csv"});
          const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
          a.download="spectrum-report-"+(repPeriod==="all"?"all":repPeriod)+".csv"; a.click();
        };

        const th={textAlign:"left",padding:"5px 6px",fontSize:10,color:"#7a6a9a",fontWeight:800,textTransform:"uppercase",letterSpacing:".04em",borderBottom:"2px solid #d8c8f0"};
        const td={padding:"6px",fontSize:11.5,borderBottom:"1px solid #efeaf8",color:"#333"};
        const sec={fontSize:12.5,fontWeight:800,color:"#3a2a6a",margin:"16px 0 6px",display:"flex",justifyContent:"space-between",alignItems:"center"};

        return <div>
          {/* Period + export */}
          <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center"}}>
            <select value={repPeriod} onChange={e=>setRepPeriod(e.target.value)} style={{flex:1,padding:"7px",borderRadius:6,border:"1px solid #ccd",fontSize:12,fontWeight:700,color:"#3a2a6a"}}>
              <option value="all">📅 All time</option>
              {months.map(m=><option key={m} value={m}>{mLabel(m)}</option>)}
            </select>
            <button onClick={exportCSV} style={{padding:"7px 14px",borderRadius:6,border:"none",background:"#5a3a9a",color:"#fff",fontWeight:700,fontSize:11.5,cursor:"pointer"}}>⬇ Export CSV</button>
          </div>

          {/* KPI strip */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:4}}>
            {[["Sales",fmt(kSales),"#3a2a6a"],["Gross Profit",fmt(kGP),"#1a7a3a"],["GP %",kPct+"%","#1a7a3a"],
              ["Orders",F.length,"#3a2a6a"],["Avg Order",fmt(kAvg),"#3a2a6a"],["Outstanding",fmt(kOut),kOut>0?"#c33":"#1a7a3a"],
              ["Transport",fmt(kTrans),"#8a5a1a"],["Commission",fmt(kComm),"#8a5a1a"],["NET PROFIT",fmt(kNet),kNet>=0?"#1a7a3a":"#c33"]].map(([l,v,c],i)=>(
              <div key={i} style={{background:"#faf8ff",border:"1px solid #e5e0f0",borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
                <div style={{fontSize:8.5,color:"#8a7aaa",fontWeight:800,letterSpacing:".05em"}}>{l.toUpperCase()}</div>
                <div style={{fontSize:14,fontWeight:800,color:c,marginTop:2}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Watchdog detail */}
          {(()=>{
            const w=computeWatch();
            return <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:12.5,fontWeight:800,color:w.count?"#c33":"#2a6a3a"}}>{w.count?"⚠ Watchdog — "+w.count+" in loss":"✓ Watchdog — all clear"}</span>
                <span style={{fontSize:10.5,color:"#888"}}>alert if month &lt; <input type="number" value={alertFloor} onChange={e=>persistAlertFloor(Number(e.target.value)||0)} style={{width:44,padding:"3px",borderRadius:5,border:"1px solid #ccd",fontSize:11,textAlign:"center"}}/>%</span>
              </div>
              {w.channel && <div style={{background:"#fdeeee",border:"1px solid #e8c8c8",borderRadius:8,padding:"7px 9px",marginBottom:6,fontSize:11.5,color:"#c33"}}>
                📉 This month running at <b>{w.channel.pct}%</b> contribution ({fmt(w.channel.gp)} on {fmt(w.channel.sales)}) — below your {w.channel.floor}% floor.
              </div>}
              {w.brand.map((b,i)=>(
                <div key={"b"+i} style={{display:"flex",justifyContent:"space-between",fontSize:11.5,padding:"5px 9px",background:"#fff6f0",border:"1px solid #eddac8",borderRadius:7,marginBottom:5}}>
                  <span style={{color:"#a34a00"}}>🔻 <b>{b.name}</b> net {b.net}/doz</span>
                  {b.annual!=null && <b style={{color:"#c33"}}>{fmt(b.annual)}/yr</b>}
                </div>
              ))}
              {w.invoice.length>0 && <div style={{fontSize:10,color:"#a5804a",fontWeight:800,margin:"4px 0 3px"}}>Recent invoices netting below zero:</div>}
              {w.invoice.map((v,i)=>(
                <div key={"i"+i} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"4px 9px",borderBottom:"1px solid #f3ece4"}}>
                  <span style={{color:"#555"}}>{v.cust} · <span style={{color:"#5a3a9a"}}>{v.off}</span> · {v.date}</span>
                  <b style={{color:"#c33"}}>{fmt(v.net)}</b>
                </div>
              ))}
              {!w.count && <div style={{fontSize:11,color:"#2a6a3a",background:"#eef7ef",border:"1px solid #bfe0c5",borderRadius:8,padding:"8px 10px"}}>Every costed brand, recent invoice, and this month are profitable. The watchdog re-checks each time the app opens.</div>}
            </div>;
          })()}

          {/* Loss-item Watch */}
          {liInv>0 && <div>
            <div style={sec}><span>🎯 Loss-item Watch — money averted</span></div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:8}}>
              {[["Loss shipped",fmt(liLoss),"#c33",liInv+" invoice"+(liInv===1?"":"s")],
                ["Averted by bundling",fmt(liAverted),"#1a7a3a","same-invoice profit"],
                ["Still leaked",fmt(liUncovered),liUncovered>0?"#c33":"#1a7a3a",liUncInv+" uncovered"]].map(([l,v,c,sub],i)=>(
                <div key={i} style={{background:"#fff6ef",border:"1px solid #e8c8a8",borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
                  <div style={{fontSize:8.5,color:"#a5804a",fontWeight:800}}>{l.toUpperCase()}</div>
                  <div style={{fontSize:13.5,fontWeight:800,color:c,marginTop:2}}>{v}</div>
                  <div style={{fontSize:8,color:"#b89",marginTop:1}}>{sub}</div>
                </div>
              ))}
            </div>
            {liProdArr.map((p,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11.5,padding:"4px 2px",borderBottom:"1px solid #f0e6da"}}>
                <span style={{color:"#a34a00"}}>{p.name} <span style={{color:"#999"}}>({Math.round(p.doz*10)/10} doz)</span></span>
                <b style={{color:"#c33"}}>−{fmt(p.loss)}</b>
              </div>
            ))}
            {liWorst.length>0 && <div style={{marginTop:6}}>
              <div style={{fontSize:10,color:"#a5804a",fontWeight:800,marginBottom:2}}>Invoices where the loss was NOT covered (real leak):</div>
              {liWorst.slice(0,6).map((w,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 2px",borderBottom:"1px solid #f5eee4"}}>
                  <span style={{color:"#555"}}>{w.cust} · <span style={{color:"#5a3a9a"}}>{w.off}</span> · {w.date}</span>
                  <b style={{color:"#c33"}}>leak {fmt(w.unc)}</b>
                </div>
              ))}
            </div>}
            <div style={{fontSize:9.5,color:"#b89",marginTop:5,fontStyle:"italic"}}>Transport & other assumed ₹{tBE}/doz (from the Upload tab box; set from master tomorrow). "Averted" = loss cancelled out by profitable items on the same invoice. "Leaked" = loss that nothing on the invoice covered.</div>
          </div>}

          {/* Salesman-wise */}
          <div style={sec}><span>👥 Salesman-wise Sales Analysis</span></div>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:430}}>
            <thead><tr><th style={th}>Salesman</th><th style={th}>Ord</th><th style={th}>Sales</th><th style={th}>GP</th><th style={th}>GP%</th><th style={th}>Net</th><th style={th}>O/S</th></tr></thead>
            <tbody>{byOff.map((r,i)=>(
              <tr key={i} style={{background:i===0?"#f5fbf5":"#fff"}}>
                <td style={{...td,fontWeight:700,color:"#5a3a9a"}}>{i===0?"🏆 ":""}{r.off}</td>
                <td style={td}>{r.orders}</td><td style={td}>{fmt(r.sales)}</td>
                <td style={{...td,fontWeight:700,color:"#1a7a3a"}}>{fmt(r.gp)}</td>
                <td style={td}>{r.pct}%</td>
                <td style={{...td,fontWeight:700,color:r.net>=0?"#1a7a3a":"#c33"}}>{fmt(r.net)}</td>
                <td style={{...td,color:r.out>0?"#c33":"#999"}}>{r.out>0?fmt(r.out):"—"}</td>
              </tr>))}
              {!byOff.length && <tr><td colSpan="7" style={{...td,textAlign:"center",color:"#999",fontStyle:"italic"}}>No orders in this period.</td></tr>}
            </tbody>
          </table></div>

          {/* Product-wise */}
          <div style={sec}><span>📦 Product-wise Analysis (fast → slow movers)</span></div>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:430}}>
            <thead><tr><th style={th}>Product</th><th style={th}>Doz</th><th style={th}>Revenue</th><th style={th}>GP</th><th style={th}>GP%</th></tr></thead>
            <tbody>{prods.map((p,i)=>(
              <tr key={i}>
                <td style={{...td,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i===0?"🔥 ":""}{p.name}</td>
                <td style={td}>{Math.round(p.doz*10)/10}</td><td style={td}>{fmt(p.rev)}</td>
                <td style={{...td,fontWeight:700,color:"#1a7a3a"}}>{fmt(p.gp)}</td>
                <td style={{...td,color:p.pct<25?"#c33":"#333"}}>{p.pct}%{p.pct<25&&p.rev>0?" ⚠":""}</td>
              </tr>))}
              {!prods.length && <tr><td colSpan="5" style={{...td,textAlign:"center",color:"#999",fontStyle:"italic"}}>No product lines in this period.</td></tr>}
            </tbody>
          </table></div>

          {/* Customer-wise */}
          <div style={sec}><span>🏪 Customer-wise Analysis (top by value)</span></div>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:430}}>
            <thead><tr><th style={th}>Customer</th><th style={th}>Ord</th><th style={th}>Sales</th><th style={th}>GP</th><th style={th}>O/S</th></tr></thead>
            <tbody>{custs.slice(0,12).map((c,i)=>(
              <tr key={i}>
                <td style={{...td,fontWeight:600,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.cust}</td>
                <td style={td}>{c.orders}</td><td style={td}>{fmt(c.sales)}</td>
                <td style={{...td,color:"#1a7a3a",fontWeight:700}}>{fmt(c.gp)}</td>
                <td style={{...td,color:c.out>0?"#c33":"#999"}}>{c.out>0?fmt(c.out):"✓"}</td>
              </tr>))}
              {!custs.length && <tr><td colSpan="5" style={{...td,textAlign:"center",color:"#999",fontStyle:"italic"}}>No customers in this period.</td></tr>}
            </tbody>
          </table></div>

          {/* Door-opener analysis */}
          {buyers.length>0 && <div>
            <div style={sec}><span>🚪 An3f Door-opener Analysis</span></div>
            <div style={{fontSize:10.5,color:"#778",marginBottom:6}}>Do customers who carry An3f buy more profitable (non-An3f) business than those who don't? "Other GP" = gross profit from everything except An3f.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
              <div style={{background:"#eef4fb",border:"1px solid #c8d8ee",borderRadius:8,padding:"8px 9px",textAlign:"center"}}>
                <div style={{fontSize:8.5,color:"#5a6a8a",fontWeight:800}}>CARRY An3f · {buyers.length}</div>
                <div style={{fontSize:15,fontWeight:800,color:"#1a5a9a"}}>{fmt(buyersAvgOther)}</div>
                <div style={{fontSize:8.5,color:"#889"}}>avg other-GP / customer</div>
              </div>
              <div style={{background:"#f6f6f9",border:"1px solid #ddd",borderRadius:8,padding:"8px 9px",textAlign:"center"}}>
                <div style={{fontSize:8.5,color:"#889",fontWeight:800}}>NO An3f · {nonb.length}</div>
                <div style={{fontSize:15,fontWeight:800,color:"#555"}}>{fmt(nonbAvgOther)}</div>
                <div style={{fontSize:8.5,color:"#889"}}>avg GP / customer</div>
              </div>
            </div>
            <div style={{background:doorRatio>=1.15?"#eef7ef":(doorRatio>0&&doorRatio<0.9?"#fdeeee":"#fff8ef"),border:"1px solid "+(doorRatio>=1.15?"#bfe0c5":(doorRatio>0&&doorRatio<0.9?"#e8c8c8":"#e8d8b8")),borderRadius:8,padding:"8px 10px",marginBottom:8,fontSize:11.5}}>
              {nonb.length===0 ? <span style={{color:"#8a5a1a"}}>Every customer here carries An3f — no comparison group yet. Need some non-An3f customers to measure the door effect.</span>
               : doorRatio>=1.15 ? <span style={{color:"#1a7a3a",fontWeight:700}}>✓ Door-opener effect: An3f customers buy {doorRatio.toFixed(1)}× the profitable business of non-An3f customers. The volume is earning its keep.</span>
               : doorRatio>0&&doorRatio<0.9 ? <span style={{color:"#c33",fontWeight:700}}>⚠ No door effect: An3f customers buy {doorRatio.toFixed(1)}× — actually less premium than non-An3f customers. The cheap volume isn't pulling the good stuff.</span>
               : <span style={{color:"#8a5a1a",fontWeight:700}}>≈ Neutral: An3f customers buy about the same ({doorRatio.toFixed(1)}×) — An3f isn't clearly pulling extra premium.</span>}
            </div>
            <div style={{fontSize:9.5,color:"#889",fontWeight:800,marginBottom:2}}>An3f customers — who pulls premium (🚪) vs who just takes the cheap line (⚠):</div>
            <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:420}}>
              <thead><tr><th style={th}>Customer</th><th style={th}>An3f doz</th><th style={th}>Other GP</th><th style={th}>Read</th></tr></thead>
              <tbody>{buyers.slice(0,14).map((d,i)=>{
                const strong=d.otherGP>=buyersAvgOther*1.0;
                return <tr key={i} style={{background:strong?"#f5fbf5":(d.otherGP<=0?"#fdf3f3":"#fff")}}>
                  <td style={{...td,maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.cust}</td>
                  <td style={td}>{Math.round(d.an3fDoz)}</td>
                  <td style={{...td,fontWeight:700,color:d.otherGP>0?"#1a7a3a":"#c33"}}>{fmt(d.otherGP)}</td>
                  <td style={{...td,fontWeight:700,color:strong?"#1a7a3a":"#c33"}}>{strong?"🚪 door-opener":(d.otherGP<=0?"⚠ pure freeload":"low pull")}</td>
                </tr>;
              })}</tbody>
            </table></div>
          </div>}

          {/* Monthly trend */}
          <div style={sec}><span>📈 Monthly Trend (sales vs gross profit)</span></div>
          {trend.map(([k,v])=>(
            <div key={k} style={{marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10.5,color:"#666",marginBottom:2}}>
                <b>{mLabel(k)}</b><span>{fmt(v.sales)} · GP {fmt(v.gp)}</span>
              </div>
              <div style={{background:"#efeaf8",borderRadius:4,height:14,position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",left:0,top:0,bottom:0,width:(v.sales/tMax*100)+"%",background:"linear-gradient(90deg,#8a6aca,#5a3a9a)",borderRadius:4}}></div>
                <div style={{position:"absolute",left:0,top:0,bottom:0,width:(v.gp/tMax*100)+"%",background:"#1a7a3a",borderRadius:4,opacity:.85}}></div>
              </div>
            </div>
          ))}
          {!trend.length && <div style={{fontSize:11,color:"#999",fontStyle:"italic"}}>No dated orders yet.</div>}

          {/* Receivables aging */}
          <div style={sec}><span>⏰ Receivables Aging</span></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:8}}>
            {[["0–30 days",aging.a30,"#1a7a3a"],["31–60 days",aging.a60,"#c8860a"],["60+ days",aging.a90,"#c33"]].map(([l,v,c],i)=>(
              <div key={i} style={{background:"#faf8ff",border:"1px solid #e5e0f0",borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#8a7aaa",fontWeight:800}}>{l}</div>
                <div style={{fontSize:13.5,fontWeight:800,color:c}}>{fmt(v)}</div>
              </div>
            ))}
          </div>
          {agingRows.slice(0,8).map((r,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"4px 2px",borderBottom:"1px solid #f0ecf8"}}>
              <span style={{color:r.days>60?"#c33":"#555"}}>{r.cust} · <span style={{color:"#5a3a9a"}}>{r.off}</span> · {r.days}d</span>
              <b style={{color:r.days>60?"#c33":"#8a5a1a"}}>{fmt(r.due)}</b>
            </div>
          ))}

          {/* Margin leakage */}
          {leaks.length>0 && <div>
            <div style={sec}><span>🚨 Margin Leakage (GP below master expectation)</span></div>
            {leaks.map((x,i)=>(
              <div key={i} style={{background:"#fdf3f3",border:"1px solid #e8c8c8",borderRadius:8,padding:"7px 9px",marginBottom:6,fontSize:11}}>
                <b>{x.o.customer||"Order"}</b> · {x.o.officer} · {x.o.date}
                <div style={{color:"#c33",fontWeight:700,marginTop:2}}>Expected GP {fmt(x.expGP)} → recorded {fmt(x.o.gpTotal)} · leak {fmt(x.diff)}</div>
              </div>
            ))}
          </div>}
        </div>;
      })()}

          const custs=scans*((sm.convRate||0)/100);

          const value=custs*(sm.ltv||0);
          const roi=totalCost?value/totalCost:0;
          const good=roi>=1.5, bad=totalCost>0&&roi<1;
          return <div key={i} style={{border:"1px solid "+(bad?"#e0a0a0":"#dde5dd"),borderRadius:10,padding:12,marginBottom:10,background:bad?"#fdf3f3":"#fff"}}>

              <button onClick={()=>delSample(i)} style={{border:"none",background:"#f6eef0",color:"#c33",borderRadius:6,padding:"0 10px",cursor:"pointer",fontSize:16}}>×</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:6}}>
              <div><label style={lab}>Type</label><input value={sm.type} onChange={e=>updSample(i,"type",e.target.value)} style={{...ci,textAlign:"left",fontSize:10.5}}/></div>
              <div><label style={lab}>Samples out</label><input type="number" value={sm.out||""} onChange={e=>updSample(i,"out",e.target.value)} style={ci}/></div>

              <div><label style={lab}>Scan rate %</label><input type="number" value={sm.scanRate||""} onChange={e=>updSample(i,"scanRate",e.target.value)} style={ci}/></div>
              <div><label style={lab}>Scan→cust %</label><input type="number" value={sm.convRate||""} onChange={e=>updSample(i,"convRate",e.target.value)} style={ci}/></div>
              <div><label style={lab}>Cust value ₹/yr</label><input type="number" value={sm.ltv||""} onChange={e=>updSample(i,"ltv",e.target.value)} style={ci}/></div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
              <label style={{fontSize:9,color:"#889",fontWeight:800}}>OFFICER</label>

                <option value="">Unassigned / general</option>

              </select>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
              <label style={{fontSize:9,color:"#889",fontWeight:800}}>CHANNEL RISK</label>
              <select value={sm.risk||"open"} onChange={e=>updSample(i,"risk",e.target.value)} style={{flex:1,padding:"5px",borderRadius:6,border:"1px solid "+(sm.risk==="contract"?"#e0a0a0":"#ccd"),fontSize:11,fontWeight:700,color:sm.risk==="contract"?"#c33":"#1a7a3a",background:sm.risk==="contract"?"#fdf3f3":"#f5fdf7"}}>
                <option value="open">🟢 Open — no contract, sample freely</option>

            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
              <div style={{background:"#f7f7fa",borderRadius:7,padding:"6px",textAlign:"center"}}><div style={{fontSize:8,color:"#889",fontWeight:800}}>CUSTOMERS</div><div style={{fontSize:14,fontWeight:800,color:"#333"}}>{Math.round(custs)}</div></div>
              <div style={{background:cpa&&cpa<(sm.ltv||0)?"#eef7ef":"#fdeeee",borderRadius:7,padding:"6px",textAlign:"center"}}><div style={{fontSize:8,color:"#889",fontWeight:800}}>CPA</div><div style={{fontSize:14,fontWeight:800,color:cpa&&cpa<(sm.ltv||0)?"#1a7a3a":"#c33"}}>{fmt(Math.round(cpa))}</div></div>
              <div style={{background:good?"#eef7ef":(bad?"#fdeeee":"#fff8ef"),borderRadius:7,padding:"6px",textAlign:"center"}}><div style={{fontSize:8,color:"#889",fontWeight:800}}>ROI</div><div style={{fontSize:14,fontWeight:800,color:good?"#1a7a3a":(bad?"#c33":"#8a5a1a")}}>{roi.toFixed(1)}×</div></div>
            </div>
            <div style={{fontSize:10.5,marginTop:6,padding:"5px 8px",borderRadius:6,background:good?"#eef7ef":(bad?"#fdeeee":"#fff8ef"),color:good?"#1a7a3a":(bad?"#c33":"#8a5a1a"),fontWeight:700}}>
              {totalCost===0?"Enter numbers to score this channel."
               :good?"✓ Scale this channel — every ₹1 of sampling returns ₹"+roi.toFixed(1)+"."
               :bad?"✂ Not converting — CPA above customer value. Fix the QR offer or drop this channel."
               :"Marginal — improve scan rate (better offer) or conversion before scaling."}
            </div>
          </div>;
        })}
        {samples.length>0 && (()=>{
          const agg=(keyFn)=>{
            const m={};
            samples.forEach(sm=>{
              const k=keyFn(sm); if(!k) return;
              const cost=(sm.out||0)*(sm.costPer||0);
              const cust=(sm.out||0)*((sm.scanRate||0)/100)*((sm.convRate||0)/100);
              if(!m[k])m[k]={out:0,cost:0,cust:0};
              m[k].out+=(sm.out||0); m[k].cost+=cost; m[k].cust+=cust;
            });
            return Object.entries(m).map(([k,v])=>({k,...v,cpa:v.cust?v.cost/v.cust:0})).sort((a,b)=>b.cust-a.cust);
          };
          const byOff=agg(sm=>sm.officer||"");
          const byChan=agg(sm=>sm.type||"");
          const row=(x)=>(<div key={x.k} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"4px 8px",borderBottom:"1px solid #f0eef6"}}>
            <span style={{fontWeight:700,color:"#3a2a6a",maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.k}</span>
            <span style={{color:"#667"}}>{Math.round(x.out).toLocaleString("en-IN")} out · <b style={{color:"#1a7a3a"}}>{Math.round(x.cust)}</b> cust · CPA <b style={{color:x.cpa&&x.cpa<1200?"#1a7a3a":"#c33"}}>{fmt(Math.round(x.cpa))}</b></span>
          </div>);
          return <div style={{display:"grid",gridTemplateColumns:"1fr",gap:8,marginBottom:10}}>
            {byOff.length>0 && <div style={{background:"#f5f2fb",border:"1px solid #d8c8f0",borderRadius:8,padding:"8px 10px"}}>
              <div style={{fontSize:11,fontWeight:800,color:"#5a3a9a",marginBottom:4}}>👤 By officer — objective field-effort proof</div>
              {byOff.map(row)}
              <div style={{fontSize:9,color:"#a58",fontStyle:"italic",marginTop:4}}>The scan is the referee — who actually distributed and converted, not who says they did.</div>
            </div>}
            {byChan.length>0 && <div style={{background:"#eef7ef",border:"1px solid #bfe0c5",borderRadius:8,padding:"8px 10px"}}>
              <div style={{fontSize:11,fontWeight:800,color:"#1a7a3a",marginBottom:4}}>🎯 By channel — which sampling place converts</div>
              {byChan.map(row)}
            </div>}
          </div>;
        })()}
        <button onClick={addSample} style={{padding:"9px 16px",borderRadius:8,border:"1px dashed #4a9a5a",background:"#f5fdf7",color:"#1a7a3a",fontWeight:700,cursor:"pointer",fontSize:12.5,width:"100%",marginBottom:10}}>+ Add a sampling channel</button>
        </div>;
      })()}

      <div style={{fontSize:10,color:"#999",marginTop:12,fontStyle:"italic"}}>
        Data stays in your own database. Profit = (SP − COGS) per dozen × dozens ordered. Update the 5 pending SKUs to improve auto-matching.
      </div>
    </div>
  );
}

function CFOBrief({ entries, onClose }) {
  const [loading, setLoading] = useState(false);
  const [brief, setBrief] = useState(null);
  const [mode, setMode] = useState("weekly"); // weekly | daily
  const [err, setErr] = useState("");

  // Build a compact financial snapshot from tracker entries (no heavy data sent)
  function buildSnapshot() {
    const money = e => { const n = parseFloat(String(e.amount||"").replace(/[^0-9.]/g,"")); return isNaN(n)?0:n; };
    const isPending = e => /pending|due|asked|partial|overdue/i.test(e.paymentStatus||"") || (e.tags||[]).some(t=>/pending|due/i.test(t));
    const isPaid = e => /paid|completed|received/i.test(e.paymentStatus||"");
    const today = new Date();
    const daysAgo = d => { const t=Date.parse(d); return isNaN(t)?9999:Math.floor((today-t)/86400000); };

    const fin = entries.filter(e => money(e) > 0 || /purchase|sales|payment|finance|receipt/i.test(e.category||""));
    let receivablesTotal=0, payablesTotal=0, pendingCount=0;
    const overdue=[]; const recentSales=[]; const recentPurch=[];
    entries.forEach(e => {
      const amt = money(e);
      const cat = (e.category||"").toLowerCase();
      const pend = isPending(e);
      if (pend && amt>0) { pendingCount++;
        if (/sales|receiv/i.test(cat) || /sales/i.test(e.taskType||"")) receivablesTotal += amt;
        else payablesTotal += amt;
        const age = daysAgo(e.date);
        if (age>0 && age<9999) overdue.push({ who:e.vendor||e.person||e.title||"?", amt, age, status:e.paymentStatus||"", cat });
      }
      if (/sales/i.test(cat) && amt>0) recentSales.push({who:e.vendor||e.person||e.title,amt,date:e.date});
      if (/purchase/i.test(cat) && amt>0) recentPurch.push({who:e.vendor||e.person||e.title,amt,date:e.date});
    });
    overdue.sort((a,b)=>b.amt-a.amt);
    return {
      totalEntries: entries.length,
      receivablesTotal: Math.round(receivablesTotal),
      payablesTotal: Math.round(payablesTotal),
      pendingCount,
      topOverdue: overdue.slice(0,12),
      salesCount: recentSales.length,
      purchaseCount: recentPurch.length,
    };
  }

  const run = async () => {
    setLoading(true); setErr(""); setBrief(null);
    try {
      const snap = buildSnapshot();
      const period = mode==="daily" ? "today / this working day" : "this week";
      const prompt =
"You are an experienced Chief Financial Officer preparing a concise "+(mode)+" executive brief for the business owner of Onam Agarbathi (a century-old incense manufacturer, ~Rs 10 crore turnover, exports + domestic). "+
"You are NOT doing bookkeeping or recalculating figures. You interpret the financial snapshot below into executive insight and clear ACTIONS the owner can take on the go.\n\n"+
"FINANCIAL SNAPSHOT (from the owner's tracker, "+period+"):\n"+
JSON.stringify(snap, null, 2)+"\n\n"+
"Write a brief with these sections, short and punchy (owner reads on phone):\n"+
"1. HEADLINE - one line on overall financial health right now.\n"+
"2. CASH & RECEIVABLES - what's owed to the business, what it owes, and the risk.\n"+
"3. TOP ATTENTION - the 3-5 specific accounts/items to chase or act on first (name them, with amounts and how overdue).\n"+
"4. RISKS - any concerning patterns (concentration, ageing, cash gaps).\n"+
"5. CFO ACTIONS - a numbered list of 3-6 concrete actions the owner should take this "+(mode==='daily'?'day':'week')+".\n\n"+
"Be direct and practical, like a seasoned CFO. Use Rs for amounts. If data is thin, say so honestly and note what to track better. Do not invent numbers not in the snapshot.";
      const txt = await claudeAPI(prompt, "You are a sharp, honest CFO. Be concise and action-oriented. Plain text with clear section headers.", "", "", "");
      setBrief(txt || "No brief generated.");
    } catch(e) { setErr("Couldn't generate the brief: "+(e.message||e)); }
    setLoading(false);
  };

  // Click-to-chat: opens WhatsApp with the reminder pre-filled (works today, uses your own WhatsApp)
  const chatReminder = (name, entryList) => {
    const phone = contacts[name.trim().toLowerCase()];
    const total = entryList.reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.]/g, "")) || 0), 0);
    const isSales = payType==="sales";
    // Build itemized invoice reference lines
    const itemLines = entryList.map(e=>{
      const amt = fmt(parseFloat(String(e.amount).replace(/[^\d.]/g,""))||0);
      const inv = e.orderNo || e.invoiceNo || (e.title||"").replace(/\s+/g," ").slice(0,40) || "Invoice";
      const dt = e.date ? (" ("+e.date+")") : "";
      return "• "+inv+dt+" — "+amt;
    }).join("\n");
    const msg = isSales
      ? ("Dear "+name+",\n\nThis is a gentle reminder regarding the following pending payment(s) with Onam Agarbathi Pvt. Ltd.:\n\n"+itemLines+"\n\nTotal: "+fmt(total)+"\n\nKindly arrange payment at your earliest convenience. Thank you.")
      : ("Dear "+name+",\n\nRegarding the following pending payable(s):\n\n"+itemLines+"\n\nTotal: "+fmt(total)+"\n\nWe will arrange payment shortly. Thank you.");
    const num = phone ? phone.replace(/[^\d]/g,"") : "";
    const waNum = num ? ((num.length===10?"91":"")+num) : "";
    // If a number is saved, go straight to that chat; otherwise open WhatsApp with the message
    // pre-filled so you can PICK the contact yourself (your preferred flow).
    const url = waNum
      ? ("https://wa.me/"+waNum+"?text="+encodeURIComponent(msg))
      : ("https://api.whatsapp.com/send?text="+encodeURIComponent(msg));
    let win=null;
    try{ win = window.open(url, "_blank"); }catch(e){}
    if(!win || win.closed || typeof win.closed==="undefined"){
      // popup blocked (common on desktop) — copy message + navigate so nothing is lost
      try{ if(navigator.clipboard) navigator.clipboard.writeText(msg); }catch(e){}
      window.location.href = url;
    }
    const updated = { ...sentIds, [name]: new Date().toISOString() };
    setSentIds(updated); localStorage.setItem("waReminderSent", JSON.stringify(updated));
  };

  // Build the full filled-in reminder message (invoice details + amounts + total)
  const buildMessage = (name, entryList) => {
    const total = entryList.reduce((s,e)=>s+(parseFloat(String(e.amount).replace(/[^\d.]/g,""))||0),0);
    const isSales = payType==="sales";
    const itemLines = entryList.map(e=>{
      const amt = fmt(parseFloat(String(e.amount).replace(/[^\d.]/g,""))||0);
      const inv = e.orderNo || e.invoiceNo || (e.title||"").replace(/\s+/g," ").slice(0,40) || "Invoice";
      const dt = e.date ? (" ("+e.date+")") : "";
      return "• "+inv+dt+" — "+amt;
    }).join("\n");
    return isSales
      ? ("Dear "+name+",\n\nThis is a gentle reminder regarding your pending payment(s) with Onam Agarbathi Pvt. Ltd.:\n\n"+itemLines+"\n\nTotal: "+fmt(total)+"\n\nKindly arrange payment at your earliest convenience. Thank you.")
      : ("Dear "+name+",\n\nRegarding our pending payable(s):\n\n"+itemLines+"\n\nTotal: "+fmt(total)+"\n\nWe will arrange payment shortly. Thank you.");
  };

  const copyMessage = async (name, entryList) => {
    const text = buildMessage(name, entryList);
    setStatusMsg("Copying "+name+"…");
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(text); }
      else{ const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); }
      setCopiedName(name); setTimeout(()=>setCopiedName(""),2500);
    }catch(e){
      // Fallback: show it so they can select manually
      setPreviewText(text); setPreviewName(name);
    }
  };


  // Mark a dealer's pending items as Paid/Settled — removes them from the list
  const markPaid = async (name, entryList) => {
    setStatusMsg("Mark Paid clicked for "+name+"…");
    if(!onSaveEntry){ setStatusMsg("⚠️ Can't update — save function unavailable. Reload the app."); return; }
    if(!window.confirm("Mark all "+entryList.length+" pending item(s) for "+name+" as PAID/settled?")) return;
    setBusyPaid(name);
    let done=0, failed=0;
    for(const e of entryList){
      try{
        const upd=Object.assign({},e,{ paymentStatus: (payType==="sales"?"Paid":"Settled"),
          tags:(e.tags||[]).filter(t=>t!=="Payment Due").concat([payType==="sales"?"Payment Received":"Paid Out"]) });
        await onSaveEntry(upd);
        done++;
      }catch(err){ failed++; console.error("markPaid error:", err); }
    }
    if(failed===0) setStatusMsg("✓ Marked "+done+" item(s) as "+(payType==="sales"?"paid":"settled")+" for "+name);
    else setStatusMsg("Marked "+done+", but "+failed+" failed. "+(failed?"Check console / try again.":""));
    setBusyPaid("");
    setTimeout(()=>setStatusMsg(""),3000);
  };

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
        <span style={{ fontSize:28 }}>📈</span>
        <div>
          <h2 style={{ margin:0, fontSize:18, color:"#1a3a2a" }}>CFO Brief</h2>
          <div style={{ fontSize:11, color:"#6a7a6a" }}>Your finances, read like a CFO &mdash; with actions to take now</div>
        </div>
      </div>

      <AvailableFunds />

      <div style={{ display:"flex", gap:8, marginBottom:12 }}>
        <button onClick={()=>setMode("daily")} style={{ flex:1, padding:"9px", borderRadius:8, border: mode==="daily"?"2px solid #1a7a4a":"1px solid #ccc", background: mode==="daily"?"#eafaf0":"#fff", color:"#1a5a3a", fontWeight:700, cursor:"pointer", fontSize:13 }}>Daily</button>
        <button onClick={()=>setMode("weekly")} style={{ flex:1, padding:"9px", borderRadius:8, border: mode==="weekly"?"2px solid #1a7a4a":"1px solid #ccc", background: mode==="weekly"?"#eafaf0":"#fff", color:"#1a5a3a", fontWeight:700, cursor:"pointer", fontSize:13 }}>Weekly</button>
      </div>

      <button onClick={run} disabled={loading} style={{ width:"100%", padding:"12px", borderRadius:10, border:"none", background:"linear-gradient(135deg,#1a7a4a,#0a5a2a)", color:"#fff", fontWeight:700, fontSize:15, cursor:"pointer", marginBottom:12 }}>
        {loading ? "⏳ Analyzing your finances…" : "📈 Generate "+(mode==="daily"?"Daily":"Weekly")+" CFO Brief"}
      </button>

      {err && <div style={{ color:"#a33", fontSize:12, marginBottom:10 }}>{err}</div>}

      {brief && (
        <div style={{ background:"#f7faf7", border:"1px solid #cfe0cf", borderRadius:10, padding:14, whiteSpace:"pre-wrap", fontSize:13.5, lineHeight:1.6, color:"#233", maxHeight:"55vh", overflowY:"auto" }}>
          {brief}
        </div>
      )}

      <div style={{ fontSize:10, color:"#8a9a8a", marginTop:10, fontStyle:"italic" }}>
        Based on the financial entries in your tracker. Once Tally is connected, this brief will read directly from your live accounts. This is an executive interpretation, not a substitute for your auditor.
      </div>
    </div>
  );
}

function GymLog({ entries, onSaveEntry, onClose }) {
  const [text, setText] = useState("");
  const [busy, setBusy] = useState(false);
  const [parsed, setParsed] = useState(null);
  const [msg, setMsg] = useState("");

  const analyze = async () => {
    if (!text.trim()) return;
    setBusy(true); setMsg("");
    try {
      const prompt =
"Parse this gym/workout note into structured data. Estimate calories burned roughly if possible.\n\n\"" + text + "\"\n\n" +
"Return ONLY valid JSON: {\"summary\":\"short workout name\",\"exercises\":[{\"name\":\"\",\"sets\":<number or 0>,\"reps\":<number or 0>,\"weightKg\":<number or 0>}],\"durationMin\":<number or 0>,\"caloriesBurned\":<rough number or 0>,\"note\":\"one-line caveat that estimates are approximate\"}";
      const txt = await claudeAPI(prompt, "You log workouts. Estimates are rough. Return ONLY valid JSON.", "", "", "");
      const clean = String(txt||"").replace(/```json/g,"").replace(/```/g,"").trim();
      const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
      setParsed(JSON.parse(s>=0?clean.substring(s,e+1):clean));
    } catch(e) { setMsg("Couldn't read that — try simpler wording."); }
    setBusy(false);
  };

  const save = async () => {
    if (!parsed) return;
    setBusy(true);
    const ex = (parsed.exercises||[]).map(x =>
      x.name + (x.sets?(" "+x.sets+"x"+(x.reps||"")):"") + (x.weightKg?(" @"+x.weightKg+"kg"):"")
    ).join(", ");
    const entry = {
      id: genId(),
      title: "Gym — " + (parsed.summary || "Workout"),
      date: new Date().toISOString().slice(0,10),
      category: "Health",
      taskType: "Gym",
      notes: ex + (parsed.durationMin?(" | "+parsed.durationMin+" min"):"") + (parsed.caloriesBurned?(" | ≈"+parsed.caloriesBurned+" kcal burned"):"") + " | " + (parsed.note||"approximate"),
      caloriesBurned: parsed.caloriesBurned || 0,
      durationMin: parsed.durationMin || 0,
      tags: ["Gym"],
      createdAt: new Date().toISOString()
    };
    try { await onSaveEntry(entry); setMsg("✓ Workout logged"); setText(""); setParsed(null); setTimeout(()=>onClose&&onClose(), 900); }
    catch(e) { setMsg("Save failed."); }
    setBusy(false);
  };

  const inp = { width:"100%", padding:"10px", borderRadius:8, border:"1.5px solid #cfd8cf", fontSize:14, marginBottom:10 };

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
        <span style={{ fontSize:26 }}>🏋️</span>
        <div><h2 style={{ margin:0, fontSize:18, color:"#2a5a8a" }}>Gym Log</h2>
        <div style={{ fontSize:11, color:"#6a7a8a" }}>Just type your workout naturally</div></div>
      </div>

      <textarea value={text} onChange={e=>setText(e.target.value)} rows={3}
        placeholder='e.g. "Bench press 3 sets of 10 at 60kg, squats 4x8 80kg, 20 min treadmill"'
        style={{...inp, resize:"vertical"}}/>

      {!parsed && <button onClick={analyze} disabled={busy||!text.trim()} style={{ width:"100%", padding:"12px", borderRadius:10, border:"none", background:"linear-gradient(135deg,#2a5a8a,#1a3a6a)", color:"#fff", fontWeight:700, fontSize:15, cursor:"pointer" }}>
        {busy ? "⏳ Reading…" : "🧠 Analyze & Review"}
      </button>}

      {msg && <div style={{ fontSize:12.5, color: msg[0]==="✓"?"#1a7a3a":"#a33", marginTop:8, textAlign:"center" }}>{msg}</div>}

      {parsed && <div style={{ background:"#f5f8fc", border:"1.5px solid #a8c8e0", borderRadius:10, padding:12, marginTop:10 }}>
        <div style={{ fontSize:13, fontWeight:700, color:"#2a5a8a", marginBottom:6 }}>{parsed.summary || "Workout"}</div>
        {(parsed.exercises||[]).map((x,i)=>(
          <div key={i} style={{ fontSize:12.5, color:"#334", padding:"2px 0" }}>
            • {x.name}{x.sets?(" — "+x.sets+" x "+(x.reps||"?")):""}{x.weightKg?(" @ "+x.weightKg+" kg"):""}
          </div>
        ))}
        <div style={{ marginTop:8, display:"flex", gap:8, flexWrap:"wrap" }}>
          {parsed.durationMin>0 && <span style={{ background:"#e8f0fa", border:"1px solid #a8c8e0", borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:700, color:"#2a5a8a" }}>⏱ {parsed.durationMin} min</span>}
          {parsed.caloriesBurned>0 && <span style={{ background:"#fff4e8", border:"1px solid #d09a4a", borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:700, color:"#8a5a1a" }}>🔥 ≈ {parsed.caloriesBurned} kcal burned</span>}
        </div>
        <div style={{ display:"flex", gap:8, marginTop:12 }}>
          <button onClick={()=>{setParsed(null);}} style={{ flex:1, padding:"10px", borderRadius:8, border:"1px solid #ccc", background:"#fff", cursor:"pointer", fontSize:13 }}>✕ Redo</button>
          <button onClick={save} disabled={busy} style={{ flex:2, padding:"10px", borderRadius:8, border:"none", background:"#2a5a8a", color:"#fff", fontWeight:700, cursor:"pointer", fontSize:14 }}>✅ Save workout</button>
        </div>
      </div>}

      <div style={{ fontSize:10, color:"#8a9a9a", marginTop:10, fontStyle:"italic" }}>
        Calories burned are a rough estimate — for your own pattern-tracking, not medical use.
      </div>
    </div>
  );
}

function FastingTimer({ entries }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 30000); return () => clearInterval(t); }, []);

  // Find the most recent saved meal (by createdAt)
  const meals = (entries || []).filter(e => e && e.category === "Health" && (e.tags || []).indexOf("Meal") > -1 && e.createdAt);
  meals.sort((a, b) => Date.parse(b.createdAt) - Date.parse(a.createdAt));
  const last = meals[0];

  if (!last) return (
    <div style={{ background:"#f6f6f6", border:"1px solid #ddd", borderRadius:10, padding:"10px 12px", marginBottom:12, fontSize:12, color:"#777" }}>
      ⏱ Fasting timer — starts once you log a meal
    </div>
  );

  const ms = now - Date.parse(last.createdAt);
  const hrs = ms / 3600000;
  const h = Math.floor(hrs);
  const m = Math.floor((hrs - h) * 60);
  const under2 = hrs < 2;

  return (
    <div style={{
      background: under2 ? "#fff4f0" : "#eef8ee",
      border: "1.5px solid " + (under2 ? "#d08a70" : "#4a9a5a"),
      borderRadius: 10, padding: "10px 12px", marginBottom: 12
    }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: under2 ? "#8a3a1a" : "#0a5a2a" }}>
        ⏱ {h}h {m}m since last meal
      </div>
      <div style={{ fontSize: 11, color: under2 ? "#8a5a4a" : "#4a7a5a", marginTop: 2 }}>
        {under2
          ? "Under 2 hours — hold off if you're spacing meals"
          : "2+ hours since eating"}
      </div>
    </div>
  );
}

function HealthFamilyQuick({ onClose, onSaveEntry, mode, entries }) {

    const f = ev.target.files && ev.target.files[0];

    const reader = new FileReader();
    reader.onload = () => setMealPhoto({ dataUrl: reader.result, type: f.type || "image/jpeg" });

Return ONLY valid JSON:
{"type":"Meal","summary":"short meal name","foods":["item1","item2"],"proteinGrams":<number, your best rough estimate>,"note":"one-line caveat that this is approximate"}`;

            🔥 ≈ {parsed.calories} kcal
          </span>}
          {(parsed.calories>0) && <div style={{ marginTop:6, marginLeft:6, display:"inline-block", background:"#fff4e8", border:"1px solid #d09a4a", borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:700, color:"#8a5a1a" }}>
            🔥 ≈ {parsed.calories} kcal <span style={{fontWeight:400,fontSize:10,color:"#a08050"}}>(approx)</span>
          </div>}
          {parsed.severity && <div style={{ fontSize:10, color:"#8a6a2a", marginTop:4 }}>Severity: {parsed.severity}</div>}
        </div>
      )}

      {isHealth ? (
        !parsed ? (
          <button onClick={analyze} disabled={loading||!text.trim()} className="bg" style={{ width:"100%" }}>
            {loading ? "⏳ Analyzing…" : "🧠 Analyze & Review"}
          </button>
        ) : (
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setParsed(null)} className="bgh" style={{ flex:1 }}>✕ Redo</button>
            <button onClick={saveHealth} disabled={loading} className="bg" style={{ flex:2 }}>
              {loading ? "⏳ Saving…" : "✅ Save Entry"}
            </button>
          </div>
        )
      ) : (
        <button onClick={saveDirect} disabled={loading||!text.trim()} className="bg" style={{ width:"100%" }}>
          {loading ? "⏳ Saving…" : "✅ Save to Family Log"}
        </button>
      )}

      <div style={{ fontSize:10, color:"#aaa", marginTop:14, textAlign:"center" }}>
        {isHealth && "This logs patterns for your own awareness — not medical advice. Consult a doctor for any health concerns."}
      </div>
    </div>
  );
}



// ── PaymentReminders — dealer contact book + WhatsApp payment reminders ──
function PaymentReminders({ onClose, entries, onSaveEntry, onFocusDealer }) {
  const [view, setView] = useState("pending"); // pending | contacts
  const [payType, setPayType] = useState("sales"); // sales(receivable) | purchase(payable)
  const [busyPaid,setBusyPaid]=useState("");
  const [copiedName,setCopiedName]=useState("");
  const [previewText,setPreviewText]=useState("");
  const [previewName,setPreviewName]=useState("");
  const [contacts, setContacts] = useState({}); // name(lower) -> phone
  const [loading, setLoading] = useState(false);
  const [statusMsg, setStatusMsg] = useState("");
  const [sentIds, setSentIds] = useState(() => {
    try { return JSON.parse(localStorage.getItem("waReminderSent") || "{}"); } catch(e) { return {}; }
  });
  const [editingContact, setEditingContact] = useState(null);
  const [newPhone, setNewPhone] = useState("");

  // Load saved contacts from localStorage on mount
  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("dealerContacts") || "{}");
      setContacts(saved);
    } catch(e) {}
    // durable load from Supabase (overrides cache if present)
    (async()=>{ try{ const r=await sheetsAPI("getPortfolio",{key:"dealer_contacts",user:"main"}); if(r&&r.data&&typeof r.data==="object"){ setContacts(r.data); localStorage.setItem("dealerContacts", JSON.stringify(r.data)); } }catch(e){} })();
  }, []);

  const saveContact = async (name, phone) => {
    const key = name.trim().toLowerCase();
    const updated = { ...contacts, [key]: phone.replace(/[^\d]/g, "") };
    setContacts(updated);
    localStorage.setItem("dealerContacts", JSON.stringify(updated));   // fast cache
    try{ await sheetsAPI("savePortfolio",{key:"dealer_contacts",user:"main",data:updated}); }catch(e){}  // durable
    setEditingContact(null);
    setNewPhone("");
  };

  // Sales officers are staff, not dealers — never show them as pending payments
  const SALES_OFFICERS_EXCL = ["sooraj","sunil","biju","murugan","sebi","sugeesh","satish","sadasivan","vinod","prakash","staff1","staff2","staff3","staff4"];
  const isOfficer = (e) => {
    const nm = (e.person||e.vendor||"").trim().toLowerCase();
    if(SALES_OFFICERS_EXCL.indexOf(nm)>-1) return true;
    const tags=(e.tags||[]).join(" ").toLowerCase();
    if(/field report|officer:/.test(tags)) return true;
    if(/field report|sales - visit/i.test((e.category||"")+" "+(e.title||""))) return true;
    return false;
  };
  // Pending payment entries — overdue or payment due (excluding staff/officers)
  const pendingEntries = (entries || []).filter(e =>
    (e.paymentStatus === "Payment Pending" || e.paymentStatus === "Asked Payment" ||
     e.paymentStatus === "Overdue" || (e.tags || []).includes("Payment Due")) &&
    e.amount && parseFloat(String(e.amount).replace(/[^\d.]/g, "")) > 0 &&
    !isOfficer(e)
  ).slice(0, 100);

  // Classify each entry: SALES (they owe us) vs PURCHASE (we owe them)
  const daysOld = (d) => { const t=Date.parse(d); return isNaN(t)?0:Math.floor((Date.now()-t)/86400000); };
  const classify = (e) => {
    const cat=(e.category||"").toLowerCase();
    const tags=(e.tags||[]).join(" ").toLowerCase();
    if(/purchase|payable|vendor bill|buy/.test(cat)||/payable/.test(tags)) return "purchase";
    if(/sales|receiv|invoice|order/.test(cat)||/receivable|sales/.test(tags)) return "sales";
    // default: money we asked for = sales(receivable)
    return "sales";
  };
  // Group by person/vendor within the selected payType
  const grouped = {};
  pendingEntries.filter(e=>classify(e)===payType).forEach(e => {
    const name = e.person || e.vendor || "Unknown";
    if (!grouped[name]) grouped[name] = [];
    grouped[name].push(e);
  });

  const fmt = n => !n ? "—" : "₹" + Number(String(n).replace(/[^\d.]/g, "")).toLocaleString("en-IN");

  const sendReminder = async (name, entryList) => {
    // Open WhatsApp with the full reminder pre-filled — you pick the chat and hit send.
    // (No Business API / template needed — always works, no Meta approval required.)
    const phone = contacts[name.trim().toLowerCase()];
    const msg = buildMessage(name, entryList);
    const total = entryList.reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.]/g, "")) || 0), 0);
    const num = phone ? String(phone).replace(/[^\d]/g,"") : "";
    const waNum = num ? ((num.length===10?"91":"")+num) : "";
    const url = waNum
      ? ("https://wa.me/"+waNum+"?text="+encodeURIComponent(msg))
      : ("https://api.whatsapp.com/send?text="+encodeURIComponent(msg));
    let win=null;
    try{ win = window.open(url, "_blank"); }catch(e){}
    if(!win || win.closed || typeof win.closed==="undefined"){
      try{ if(navigator.clipboard) navigator.clipboard.writeText(msg); }catch(e){}
      window.location.href = url;
    }
    const updated = { ...sentIds, [name]: new Date().toISOString() };
    setSentIds(updated);
    localStorage.setItem("waReminderSent", JSON.stringify(updated));
    setStatusMsg("✅ WhatsApp opened for " + name + " (" + fmt(total) + ") — pick the chat and press send.");
  };

  return (
    <div style={{ padding: 16, maxWidth: 600, margin: "0 auto" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
        <span style={{ fontSize: 28 }}>💬</span>
        <div>
          <h2 style={{ margin: 0, fontSize: 17, color: "#1a1a2a" }}>Payment Reminders</h2>
          <div style={{ fontSize: 11, color: "#6a6a8a" }}>Copy a reminder message, or mark payments as received</div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {[["pending", "💰 Pending (" + Object.keys(grouped).length + ")"], ["contacts", "📇 Contacts"]].map(([v, l]) =>
          <button key={v} onClick={() => setView(v)} style={{
            flex: 1, padding: "8px 4px", borderRadius: 8, border: "none", fontSize: 12, fontWeight: 700,
            background: view === v ? "#1a1a4a" : "#e8e8f0", color: view === v ? "#fff" : "#1a1a4a", cursor: "pointer"
          }}>{l}</button>
        )}
      </div>

      {previewText && <div style={{ background:"#fff", border:"2px solid #5a3a9a", borderRadius:10, padding:12, marginBottom:12 }}>
        <div style={{ fontSize:12, fontWeight:700, color:"#3a2a6a", marginBottom:6 }}>Message for {previewName} — select all & copy:</div>
        <textarea readOnly value={previewText} onClick={e=>e.target.select()} style={{ width:"100%", height:130, fontSize:12, padding:8, borderRadius:6, border:"1px solid #ccd" }}/>
        <button onClick={()=>{setPreviewText("");setPreviewName("");}} style={{ marginTop:6, fontSize:11, padding:"5px 12px", borderRadius:6, border:"none", background:"#eee", cursor:"pointer" }}>Close</button>
      </div>}
      {view === "pending" && <div style={{ display:"flex", gap:6, marginBottom:12 }}>
        <button onClick={()=>setPayType("sales")} style={{ flex:1, padding:"7px", borderRadius:8, border:payType==="sales"?"2px solid #1a7a4a":"1px solid #ccc", background:payType==="sales"?"#eafaf0":"#fff", color:"#1a5a3a", fontWeight:700, fontSize:12, cursor:"pointer" }}>📥 Sales (they owe me)</button>
        <button onClick={()=>setPayType("purchase")} style={{ flex:1, padding:"7px", borderRadius:8, border:payType==="purchase"?"2px solid #a35a1a":"1px solid #ccc", background:payType==="purchase"?"#fdf2e8":"#fff", color:"#8a4a1a", fontWeight:700, fontSize:12, cursor:"pointer" }}>📤 Purchases (I owe)</button>
      </div>}

      {statusMsg && <div style={{
        fontSize: 12, padding: "8px 12px", borderRadius: 8, marginBottom: 10,
        background: statusMsg.startsWith("❌") ? "#fff0f0" : statusMsg.startsWith("⚠️") ? "#fff8e7" : "#f0fff0",
        color: statusMsg.startsWith("❌") ? "#8b0000" : statusMsg.startsWith("⚠️") ? "#8a6a00" : "#1a5a1a"
      }}>{statusMsg}</div>}

      {view === "pending" && <>
        

        {Object.keys(grouped).length === 0 && (
          <div style={{ textAlign: "center", padding: "24px 16px", color: "#999", fontSize: 12, background: "#fafafa", borderRadius: 10 }}>
            No pending payments found. 🎉
          </div>
        )}

        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {Object.entries(grouped).map(([name, list]) => {
            const total = list.reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.]/g, "")) || 0), 0);
            const hasPhone = !!contacts[name.trim().toLowerCase()];
            const lastSent = sentIds[name];
            return (
              <div key={name} style={{ background: "#f8f8fc", borderRadius: 10, border: "1px solid #e0e0f0", padding: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div onClick={()=>{ if(onFocusDealer) onFocusDealer(name); }} style={{ fontSize: 13, fontWeight: 700, color: "#1a3a7a", cursor:"pointer", textDecoration:"underline" }}>{name} ›</div>
                    <div style={{ fontSize: 11, color: "#888" }}>{list.length} invoice(s) · {fmt(total)} pending</div>
                    {(() => { const oldest=Math.max(...list.map(e=>daysOld(e.date))); return oldest>=60
                      ? <div style={{ fontSize:10, color:"#fff", background:"#c33", display:"inline-block", padding:"1px 7px", borderRadius:10, marginTop:3, fontWeight:700 }}>⚠ {oldest} days overdue</div>
                      : <div style={{ fontSize:10, color:"#888", marginTop:2 }}>{oldest} days old</div>; })()}
                    {lastSent && <div style={{ fontSize: 10, color: "#2a8a2a", marginTop: 2 }}>✅ Reminded {new Date(lastSent).toLocaleDateString("en-IN")}</div>}
                    {!hasPhone && <div style={{ fontSize: 10, color: "#c08a00", marginTop: 2 }}>⚠️ No phone number saved</div>}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                    <button
                      type="button"
                      onClick={()=>{ if(onFocusDealer) onFocusDealer(name); }}
                      style={{ fontSize: 10.5, padding: "8px 14px", borderRadius: 8, border: "1px solid #2a5a9a",
                        background: "#e8f0fc", color: "#1a3a7a", fontWeight: 700,
                        cursor: "pointer", whiteSpace: "nowrap" }}
                    >📂 View in list ›</button>
                    <button
                      type="button"
                      onClick={()=>{ markPaid(name, list); }}
                      style={{ fontSize: 10.5, padding: "8px 14px", borderRadius: 8, border: "1px solid #1a7a4a",
                        background: busyPaid===name?"#cfe8d8":"#eafaf0", color: "#1a5a3a", fontWeight: 700,
                        cursor: "pointer", whiteSpace: "nowrap", pointerEvents:"auto" }}
                    >{busyPaid===name?"…":"✓ Mark Paid"}</button>
                    <button
                      type="button"
                      onClick={()=>{ setPreviewText(buildMessage(name, list)); setPreviewName(name); }}
                      style={{ fontSize: 10.5, padding: "8px 14px", borderRadius: 8, border: "1px solid #5a3a9a",
                        background: "#f0eafa", color: "#3a2a6a", fontWeight: 700,
                        cursor: "pointer", whiteSpace: "nowrap", pointerEvents:"auto" }}
                    >📋 Copy message</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </>}

      {view === "contacts" && <>
        <div style={{ background: "#f0f8ff", borderRadius: 10, padding: 10, marginBottom: 12, fontSize: 11, color: "#2a4a6a" }}>
          Save dealer/vendor WhatsApp numbers here once — they're reused for all future reminders.
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {Object.keys(grouped).length === 0 && Object.keys(contacts).length === 0 && (
            <div style={{ textAlign: "center", padding: "20px", color: "#999", fontSize: 12 }}>No contacts yet.</div>
          )}
          {Array.from(new Set([...Object.keys(grouped), ...Object.keys(contacts).map(k => k)])).map(name => {
            const displayName = grouped[name] ? name : name; // best effort
            const key = displayName.trim().toLowerCase();
            const phone = contacts[key] || "";
            const isEditing = editingContact === displayName;
            return (
              <div key={displayName} style={{ display: "flex", alignItems: "center", gap: 8, background: "#f8f8fc", borderRadius: 8, padding: "8px 10px" }}>
                <div style={{ flex: 1, fontSize: 12, fontWeight: 600, color: "#1a1a2a" }}>{displayName}</div>
                {isEditing ? (
                  <>
                    <input
                      type="tel"
                      value={newPhone}
                      onChange={e => setNewPhone(e.target.value)}
                      placeholder="10-digit number"
                      style={{ width: 140, padding: "5px 8px", borderRadius: 6, border: "1px solid #ccc", fontSize: 12 }}
                    />
                    <button onClick={() => saveContact(displayName, newPhone)} style={{ fontSize: 11, padding: "5px 10px", borderRadius: 6, border: "none", background: "#1a8a4a", color: "#fff", cursor: "pointer" }}>Save</button>
                  </>
                ) : (
                  <>
                    <span style={{ fontSize: 12, color: phone ? "#1a5a1a" : "#999" }}>{phone ? "+91 " + phone : "no number"}</span>
                    <button onClick={() => { setEditingContact(displayName); setNewPhone(phone); }} style={{ fontSize: 11, padding: "5px 10px", borderRadius: 6, border: "1px solid #ccc", background: "#fff", cursor: "pointer" }}>Edit</button>

        </div>

        <div style={{ marginTop: 14, padding: 10, background: "#f8f5f0", borderRadius: 8 }}>

            <input id="newContactPhone" placeholder="Phone" style={{ width: 120, padding: "6px 8px", borderRadius: 6, border: "1px solid #ccc", fontSize: 12 }} />

              const n = document.getElementById("newContactName").value;
