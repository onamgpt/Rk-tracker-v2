function sanitizeEntry(e){
  if(!e||typeof e!=="object"||!e.id)return null;
  var out={};
  ["id","title","date","month","category","taskType","person","vendor","account",
   "financialType","paymentStatus","property","chemical","amount","notes",
   "reminder","reminderNote","link","createdAt","loggedBy","loggedByName"].forEach(function(k){
    out[k]=(e[k]===null||e[k]===undefined)?"":String(e[k]);
  });
  if(Array.isArray(e.tags))out.tags=e.tags;
  else if(typeof e.tags==="string"&&e.tags)out.tags=e.tags.split(",").map(function(t){return t.trim();}).filter(Boolean);
  else out.tags=[];
  out.attachments=Array.isArray(e.attachments)?e.attachments:[];
  out.hidden=!!e.hidden;
  out.recurring=!!e.recurring;
  if(!out.title)return null;
  return out;
}

// ── GOOGLE SHEETS API ─────────────────────────────────────────────────────────
async function sheetsAPI(action,data={}){
  try{
    const r=await fetch("/.netlify/functions/sheets",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action,...data})
    });
    if(!r.ok) throw new Error("Sheets error: "+r.status);
    const text=await r.text();
    try{return JSON.parse(text);}
    catch(e){return {error:"Invalid response"};}
  }catch(e){
    console.error("Sheets:",e);
    return {error:e.message};
  }
}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function claudeAPI(prompt,system,imageBase64,imageType){
  // Route through Netlify function to avoid CORS on iPhone Safari
  try{
    const r=await fetch("/.netlify/functions/claude",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt,system,imageBase64,imageType})
    });
    if(!r.ok) throw new Error("Server error: "+r.status);
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    return d.text||"";
  }catch(e){
    throw new Error(e.message);
  }
}

  return sheetsAPI("uploadFile",{file:{name:att.name,type:att.type,data:att.data}}).then(function(r){

  }).catch(function(){return att;});
}

function fileToB64(f){
  return new Promise((res,rej)=>{
    if(f.type.startsWith("image/")){
      const r=new FileReader();
      r.onload=e=>{
        const img=new Image();
        img.onload=()=>{
          const MAX=1200;let w=img.width,h=img.height;
          if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
          const c=document.createElement("canvas");c.width=w;c.height=h;
          c.getContext("2d").drawImage(img,0,0,w,h);
          const data=c.toDataURL("image/jpeg",.85);
          res({name:f.name,type:"image/jpeg",data,base64:data.split(",")[1]});
        };
        img.onerror=rej;img.src=e.target.result;
      };r.onerror=rej;r.readAsDataURL(f);
    }else{
      const r=new FileReader();
      r.onload=()=>{
        const result=r.result;
        res({name:f.name,type:f.type,data:result,base64:result.split(",")[1]});
      };
      r.onerror=rej;r.readAsDataURL(f);
    }
  });
}

async function scanBill(imageBase64,imageType){
  const system=`You are an OCR and data extraction assistant for Onam Agarbathi Pvt. Ltd., a Bangalore incense manufacturer.
Extract invoice/bill data and return ONLY valid JSON with these exact fields:
{
  "title": "short description",

  "notes": "key items summary, quantities, rates",
  "tags": ["Pending"],
  "chemical": "chemical/fragrance name if applicable"
}
Return ONLY the JSON object, no other text.`;

  const system=`You are a data entry assistant for Onam Agarbathi Pvt. Ltd. 
The user speaks naturally and you extract structured data.
Available categories: ${dropdowns.categories.join(", ")}
Available persons: ${dropdowns.persons.join(", ")}
Available accounts: ${dropdowns.accounts.join(", ")}
Available task types: ${dropdowns.taskTypes.join(", ")}
Available payment statuses: ${dropdowns.paymentStatuses.join(", ")}

Return ONLY valid JSON:
{
  "title": "entry title",
  "date": "today or extracted date in YYYY-MM-DD",
  "category": "matched category",
  "taskType": "matched task type or empty",
  "person": "matched person or empty",
  "account": "matched account or empty",
  "amount": "amount with ₹ or empty",
  "paymentStatus": "matched status or empty",
  "notes": "additional context",
  "reminder": "ISO datetime if mentioned or empty",

  try{

async function getAIInsights(entries,question){
  const system=`You are a business intelligence assistant for Onam Agarbathi Pvt. Ltd., a 100+ year old Bangalore incense manufacturer (Vaishak brand). 
You know: CSD/CPC orders, raw materials (Jasmine ASP, Sandal, Rose, bamboo sticks, jigat), compliance (GST, ESI, EPF, PT, TDS 194), 
accounts (Kotak, IDBI, ICICI, Zerodha, HDFC), people (Prakash, Satish auditor, Maadhu, Virupaksha, Gopal Reddy).
Analyse ALL data deeply including document contents in notes. Be specific with amounts, dates, names.
Flag risks, overdue items, action items. Use ₹ formatting with lakhs/crores notation.`;

  // Include full notes (which may contain extracted document text)
  const summary=entries.slice(0,150).map(e=>{
    const notesFull=(e.notes||"").slice(0,200); // More notes for deeper analysis
    const hasAtt=(e.attachments||[]).length>0?"[HAS ATTACHMENTS]":"";

    system

function Thumb({att,small}){
  const s=small?30:50;
  const b={width:s,height:s,borderRadius:6,border:"1.5px solid #e2d9c8",cursor:"pointer",flexShrink:0,objectFit:"cover",display:"block"};
  const openAtt=()=>{
    if(!att.data)return;
    // Create blob URL and open
    try{
      const byteStr=atob(att.data.split(",")[1]||att.data);
      const ab=new ArrayBuffer(byteStr.length);
      const ia=new Uint8Array(ab);
      for(let i=0;i<byteStr.length;i++)ia[i]=byteStr.charCodeAt(i);
      const blob=new Blob([ab],{type:att.type||"application/octet-stream"});
      const url=URL.createObjectURL(blob);
      window.open(url,"_blank");
    }catch(e){
      // Fallback: open data URL directly
      const w=window.open("","_blank");
      if(w){w.document.write(`<img src="${att.data}" style="max-width:100%" />`);w.document.close();}
    }
  };
  if(att.type?.startsWith("image/"))return<div onClick={openAtt} style={{...b,overflow:"hidden",cursor:"zoom-in"}}><img src={att.data} alt={att.name||"image"} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>;
  const p=att.type==="application/pdf";
  return<div onClick={openAtt} style={{...b,background:p?"#fff0f0":"#f0f4ff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:small?9:11,color:p?"#b00":"#339",fontWeight:700,flexDirection:"column",gap:1}}>
    <span style={{fontSize:small?14:18}}>{p?"📄":"📎"}</span>
    <span>{p?"PDF":"FILE"}</span>
  </div>;
}

function Combo({label,value,onChange,options,placeholder,onAddNew}){

  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  const canAdd=q&&!options.find(o=>o.toLowerCase()===q.toLowerCase());

// ── VOICE INPUT COMPONENT ─────────────────────────────────────────────────────
function VoiceInput({onResult,dropdowns}){
  const [listening,setListening]=useState(false);
  const [transcript,setTranscript]=useState("");
  const [processing,setProcessing]=useState(false);
  const recognRef=useRef(null);

  const start=()=>{
    if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
      alert("Voice input not supported in this browser. Use Chrome or Safari.");return;
    }
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR();
    r.lang="en-IN";r.continuous=false;r.interimResults=true;
    r.onstart=()=>setListening(true);
    r.onresult=e=>{
      const t=Array.from(e.results).map(r=>r[0].transcript).join("");
      setTranscript(t);
    };
    r.onend=async()=>{
      setListening(false);
      if(transcript){
        setProcessing(true);
        const data=await processVoice(transcript,dropdowns);
        onResult(data);
        setProcessing(false);
        setTranscript("");
      }
    };
    r.onerror=()=>setListening(false);
    recognRef.current=r;
    r.start();
  };

  const stop=()=>{if(recognRef.current)recognRef.current.stop();};

  return<div style={{background:"#e8f4fb",border:"1.5px solid #b0d8f0",borderRadius:10,padding:13,marginBottom:12}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
      <button onClick={listening?stop:start} disabled={processing}
        className={listening?"voice-btn listening":"voice-btn"}
        style={{fontSize:18,padding:"10px 16px"}}>
        {processing?"⏳":listening?"⏹ Stop":"🎤 Speak"}
      </button>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:700,color:"#006aaa"}}>
          {processing?"AI processing…":listening?"Listening…":"Voice Input"}
        </div>
        <div style={{fontSize:11,color:"#5a8aaa"}}>
          {listening?"Speak naturally — title, amount, person, reminder…":"Tap and speak your entry"}
        </div>
      </div>
    </div>
    {transcript&&<div style={{background:"rgba(0,0,0,.06)",borderRadius:7,padding:"7px 11px",fontSize:12,color:"#003a5a",fontStyle:"italic"}}>"{transcript}"</div>}
    <div style={{fontSize:10,color:"#7a9ab0",marginTop:6}}>
      Example: "Prakash payment pending fifty thousand remind me tomorrow 10am"
    </div>
  </div>;
}

// ── SCAN BILL COMPONENT ───────────────────────────────────────────────────────
function ScanBill({onResult,onMultiResult}){
  const [scanning,setScanning]=useState(false);
  const [scanMsg,setScanMsg]=useState("");
  const [progress,setProgress]=useState({current:0,total:0});

  const processFile=async(file)=>{
    if(!file)return;
    setScanning(true);setScanMsg("Reading bill...");
    try{
      const att=await fileToB64(file);
      setScanMsg("Analysing with AI...");
      const txt=await claudeAPI(
        "Extract all data from this bill/invoice. Return ONLY valid JSON: {title, date (YYYY-MM-DD), vendor, amount (with ₹), invoiceNo, gstin, category, paymentStatus, notes, tags (array)}",
        "You are an OCR assistant for Onam Agarbathi. Return only valid JSON, no markdown backticks.",
        att.base64, att.type
      );
      let parsed={title:"Scanned bill",date:today(),tags:["Pending"],category:"Business - Purchase",paymentStatus:"Payment Pending"};
      try{parsed={...parsed,...JSON.parse(txt.replace(/```json|```/g,"").trim())};}
      catch(ex){parsed.notes=txt.slice(0,300);}
      onResult({...parsed,attachments:[att],id:genId(),createdAt:new Date().toISOString()});
      setScanMsg("✅ Done!");
    }catch(e){alert("Scan error: "+e.message);}
    setScanning(false);
    setTimeout(()=>setScanMsg(""),2000);
  };

  const processMultiple=async(files)=>{
    if(!files||files.length===0)return;
    const arr=Array.from(files);
    setScanning(true);
    setProgress({current:0,total:arr.length});
    const results=[];
    for(let i=0;i<arr.length;i++){
      setScanMsg(`Scanning ${i+1} of ${arr.length}...`);
      setProgress({current:i+1,total:arr.length});
      try{
        const att=await fileToB64(arr[i]);
        const txt=await claudeAPI(
          "Extract all data from this bill/invoice. Return ONLY valid JSON: {title, date (YYYY-MM-DD), vendor, amount (with ₹), invoiceNo, gstin, category, paymentStatus, notes, tags (array)}",
          "You are an OCR assistant for Onam Agarbathi. Return only valid JSON, no markdown.",
          att.base64, att.type
        );
        let parsed={title:`Bill ${i+1}`,date:today(),tags:["Pending"],category:"Business - Purchase",paymentStatus:"Payment Pending"};
        try{parsed={...parsed,...JSON.parse(txt.replace(/```json|```/g,"").trim())};}
        catch(ex){parsed.notes=txt.slice(0,300);}
        results.push({...parsed,attachments:[att],id:genId(),createdAt:new Date().toISOString()});
      }catch(e){
        results.push({title:`Bill ${i+1} (scan failed)`,date:today(),tags:["Pending"],notes:e.message,id:genId(),createdAt:new Date().toISOString()});
      }
    }
    setScanMsg(`✅ ${results.length} bills scanned!`);
    setScanning(false);
    setProgress({current:0,total:0});
    if(onMultiResult) onMultiResult(results);
    else results.forEach(r=>onResult(r));
    setTimeout(()=>setScanMsg(""),3000);
  };

  const openCamera=()=>{
    const i=document.createElement("input");
    i.type="file";i.accept="image/*";i.capture="environment";
    i.onchange=e=>{if(e.target.files[0])processFile(e.target.files[0]);};
    i.click();
  };
  const openGallery=()=>{
    const i=document.createElement("input");
    i.type="file";i.accept="image/*,application/pdf,.pdf";
    i.onchange=e=>{if(e.target.files[0])processFile(e.target.files[0]);};
    i.click();
  };
  const openMulti=()=>{
    const i=document.createElement("input");
    i.type="file";i.accept="image/*,application/pdf,.pdf";
    i.multiple=true;
    i.onchange=e=>{if(e.target.files.length>0)processMultiple(e.target.files);};
    i.click();
  };

  return<div style={{background:"#edfaed",border:"1.5px solid #a8d8a8",borderRadius:10,padding:13,marginBottom:12}}>
    <div style={{fontWeight:700,fontSize:12,color:"#1a5a1a",marginBottom:8}}>📸 Scan Bill / Invoice → Auto-fill</div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:6}}>
      <button onClick={openCamera} disabled={scanning} className="scan-btn" style={{fontSize:12,padding:"8px 12px"}}>
        {scanning?"⏳":"📷"} Camera
      </button>
      <button onClick={openGallery} disabled={scanning} className="scan-btn" style={{background:"linear-gradient(135deg,#5a6a2a,#3a4a1a)",fontSize:12,padding:"8px 12px"}}>
        {scanning?"⏳":"🖼"} Gallery
      </button>
      <button onClick={openMulti} disabled={scanning} className="scan-btn" style={{background:"linear-gradient(135deg,#1a5a7a,#0a3a5a)",fontSize:12,padding:"8px 12px"}}>
        {scanning?"⏳":"📚"} Multi Bills
      </button>
    </div>
    {scanMsg&&<div style={{fontSize:12,color:"#1a5a1a",fontWeight:600,marginBottom:4}}>{scanMsg}</div>}
    {progress.total>0&&<div style={{background:"#c8e8c8",borderRadius:20,height:6,marginBottom:6}}>
      <div style={{background:"#1a7a1a",borderRadius:20,height:6,width:`${(progress.current/progress.total)*100}%`,transition:"width .3s"}}/>
    </div>}
    <div style={{fontSize:10,color:"#5a8a5a"}}>📚 Multi Bills: select up to 10 photos at once → all auto-filled</div>
  </div>;
}

// ── DROPDOWN MANAGER ──────────────────────────────────────────────────────────
function DropdownManager({dropdowns,onSave,onClose}){
  const [dd,setDd]=useState(JSON.parse(JSON.stringify(dropdowns)));
  const [active,setActive]=useState("taskTypes");
  const [newVal,setNewVal]=useState("");
  const KEYS={taskTypes:"Task Types",persons:"People",accounts:"Accounts",financials:"Financial",vendors:"Vendors",properties:"Properties",paymentStatuses:"Payment Status",chemicals:"Chemicals",categories:"Categories"};
  const addItem=()=>{const v=newVal.trim();if(!v)return;if(!dd[active].includes(v))setDd(p=>({...p,[active]:[...p[active],v]}));setNewVal("");};
  const removeItem=i=>setDd(p=>({...p,[active]:p[active].filter((_,j)=>j!==i)}));
  return<div>
    <h2 style={{margin:"0 0 12px",fontSize:18}}>⚙️ Manage Dropdowns</h2>
    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
      {Object.entries(KEYS).map(([k,l])=><button key={k} onClick={()=>setActive(k)} style={{padding:"4px 11px",borderRadius:20,border:`1.5px solid ${active===k?"#c8a060":"#e0d0b8"}`,background:active===k?"#fff3d8":"#fffdf7",color:active===k?"#7a4800":"#7a6a52",cursor:"pointer",fontSize:12,fontWeight:active===k?700:400}}>{l}</button>)}
    </div>
    <div style={{background:"#fffdf5",border:"1px solid #e8dcc8",borderRadius:10,padding:10,marginBottom:10,maxHeight:200,overflowY:"auto"}}>
      {dd[active].map((item,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 8px",borderBottom:"1px solid #f0e8d8"}}>
        <span style={{fontSize:13}}>{item}</span>
        <button onClick={()=>removeItem(i)} style={{background:"none",border:"none",color:"#c00",cursor:"pointer",fontSize:16}}>×</button>
      </div>)}
    </div>
    <div style={{display:"flex",gap:8,marginBottom:12}}>
      <input className="inp" value={newVal} placeholder={`Add to ${KEYS[active]}…`} onChange={e=>setNewVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()}/>

      <button className="bgh" onClick={onClose}>Cancel</button>
      <button className="bg" onClick={()=>{onSave(dd);onClose();}}>Save All</button>
    </div>
  </div>;
}

// ── SHARE INDIVIDUAL ENTRY ────────────────────────────────────────────────────
function shareEntry(entry){
  const lines=[];
  lines.push("📋 *"+entry.title+"*");
  lines.push("📅 "+fmtDate(entry.date)+(entry.month?" · "+entry.month:""));
  if(entry.taskType) lines.push("📌 "+entry.taskType);
  if(entry.person)   lines.push("👤 "+entry.person);
  if(entry.vendor)   lines.push("🏭 "+entry.vendor);
  if(entry.account)  lines.push("🏦 "+entry.account);
  if(entry.amount)   lines.push("💰 "+entry.amount);
  if(entry.paymentStatus) lines.push("💳 "+entry.paymentStatus);
  if(entry.property) lines.push("🏠 "+entry.property);
  if(entry.chemical) lines.push("🧪 "+entry.chemical);
  if(entry.tags?.length) lines.push("🏷 "+entry.tags.join(", "));
  if(entry.notes)    lines.push("\n📝 "+entry.notes);
  if(entry.reminder) lines.push("⏰ "+fmtDT(entry.reminder)+(entry.reminderNote?" — "+entry.reminderNote:""));
  if(entry.link)     lines.push("🔗 "+(entry.linkLabel||entry.link)+": "+entry.link);
  lines.push("\n🌿 Onam Agarbathi · RK Life Tracker");
  const text=lines.join("\n");

  // Try native share API first (works on iPhone)
  if(navigator.share){
    navigator.share({
      title:entry.title,
      text:text,
      url:entry.link||window.location.href
    }).catch(()=>{});
  } else {
    // Fallback: copy to clipboard
    navigator.clipboard.writeText(text).then(()=>{
      alert("Entry copied to clipboard! Paste in WhatsApp or Gmail.");
    }).catch(()=>{
      // Last resort: show in prompt
      prompt("Copy this and share:",text);
    });
  }
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  if(IS_VIEW_MODE) return<ShareableView/>;

  const [entries,setEntries]=useState(loadCache);
  const [dropdowns,setDropdowns]=useState(loadDD);
  const [loading,setLoading]=useState(false);
  const [saving,setSaving]=useState(false);
  const [syncStatus,setSyncStatus]=useState("");
  const [showForm,setShowForm]=useState(false);
  const [editE,setEditE]=useState(null);
  const [viewE,setViewE]=useState(null);
  const [showDupes,setShowDupes]=useState(false);
  const [showAI,setShowAI]=useState(false);
  const [showDD,setShowDD]=useState(false);
  const [showShare,setShowShare]=useState(false);
  const [search,setSearch]=useState("");
  const [filterCat,setFilterCat]=useState("All");
  const [filterTag,setFilterTag]=useState("");
  const [filterPerson,setFilterPerson]=useState("");
  const [filterAccount,setFilterAccount]=useState("");
  const [filterVendor,setFilterVendor]=useState("");
  const [filterStatus,setFilterStatus]=useState("");
  const [hideDone,setHideDone]=useState(false);
  const [showHidden,setShowHidden]=useState(false);
  const [sort,setSort]=useState("date_desc");
  const [selIds,setSelIds]=useState([]);

  useEffect(()=>{saveDD(dropdowns);},[dropdowns]);

  // BULLETPROOF: localStorage is master, Sheets is backup only
  useEffect(()=>{
    const cached=loadCache();
    setEntries(cached);
    setLoading(false);
    setSyncStatus(cached.length>0?"📱 "+cached.length+" entries loaded":"📱 Ready — tap + New to start");
    // Push local to sheets silently
    if(cached.length>0){
      sheetsAPI("getAll").then(r=>{
        if(r.error||!r.entries){setSyncStatus("📴 Offline · "+cached.length+" entries safe");return;}
        // LOCAL IS MASTER. Never replace local entries. Two add-only directions:
        const localIds=new Set(cached.map(e=>e.id));
        const sheetIds=new Set(r.entries.map(e=>e.id));
        // a) push local entries missing in Sheets
        const toPush=cached.filter(e=>!sheetIds.has(e.id));
        toPush.forEach(e=>sheetsAPI("save",{entry:e}).catch(()=>{}));
        // b) ADD (never replace) Sheets entries missing locally, sanitized
        const toAdd=r.entries.filter(e=>e&&e.id&&!localIds.has(e.id)&&loadTombstones().indexOf(e.id)===-1).map(sanitizeEntry).filter(Boolean);
        if(toAdd.length>0){
          const merged=cached.concat(toAdd);
          merged.sort((a,b)=>String(b.createdAt||b.date||"").localeCompare(String(a.createdAt||a.date||"")));
          setEntries(merged);saveCache(merged);
          setSyncStatus("✅ "+merged.length+" entries · "+toAdd.length+" from Sheets"+(toPush.length>0?" · "+toPush.length+" backed up":""));
        } else {
          setSyncStatus("✅ "+cached.length+" entries"+(toPush.length>0?" · "+toPush.length+" backed up":" · all in Sheets"));
        }
      }).catch(()=>setSyncStatus("📴 Offline · "+cached.length+" entries safe"));
    }
    sheetsAPI("getDropdowns").then(r=>{if(r.dropdowns)setDropdowns(p=>({...p,...r.dropdowns}));}).catch(()=>{});
  },[]);

  const saveEntry=async(entry)=>{
    setSaving(true);
    // Upload any base64 attachments to Google Drive first
    var finalEntry=Object.assign({},entry);
    if(entry.attachments&&entry.attachments.length>0&&url){
      try{
        var uploaded=await Promise.all(entry.attachments.map(function(a){
          if(a&&a.data&&a.data.length>100&&a.type!=="drive"){
            return uploadToDrive(a);
          }
          return Promise.resolve(a);
        }));
        finalEntry=Object.assign({},entry,{attachments:uploaded});
        // Set link to first Drive URL if link field is empty
        var firstDrive=uploaded.find(function(a){return a&&a.type==="drive";});
        if(firstDrive&&!finalEntry.link){
          finalEntry.link=firstDrive.data;
          finalEntry.linkLabel="📎 Photo";
        }
      }catch(e){}
    }
    setEntries(p=>{const ex=p.find(x=>x.id===finalEntry.id);const updated=ex?p.map(x=>x.id===finalEntry.id?finalEntry:x):[finalEntry,...p];saveCache(updated);return updated;});
    sheetsAPI("save",{entry:finalEntry}).then(r=>{
      setSyncStatus(r.error?"📱 Saved locally · syncing...":"✅ Saved · backed up to Sheets");
    }).catch(()=>setSyncStatus("📱 Saved locally"));
    if(entry.person&&!dropdowns.persons.includes(entry.person))addToDropdown("persons",entry.person);
    if(entry.vendor&&!dropdowns.vendors.includes(entry.vendor))addToDropdown("vendors",entry.vendor);
    if(entry.account&&!dropdowns.accounts.includes(entry.account))addToDropdown("accounts",entry.account);
    setSaving(false);setShowForm(false);setEditE(null);
  };

  const delEntry=async(id)=>{
    if(!window.confirm("Delete this entry?"))return;
    if(!window.confirm("⚠️ Cannot be undone. Delete permanently?"))return;
    addTombstones([id]);
    setEntries(p=>{const u=p.filter(e=>e.id!==id);saveCache(u);return u;});
    setViewE(null);
    await sheetsAPI("delete",{id});
  };

  const toggleSel=(id)=>{setSelIds(p=>p.indexOf(id)>-1?p.filter(x=>x!==id):p.concat([id]));};
  const bulkDelete=async()=>{
    if(selIds.length===0)return;
    if(!window.confirm("Delete "+selIds.length+" selected entries?"))return;
    if(!window.confirm("⚠️ Cannot be undone. Delete "+selIds.length+" entries permanently?"))return;
    const ids=selIds.slice();
    addTombstones(ids);
    setEntries(p=>{const u=p.filter(e=>ids.indexOf(e.id)===-1);saveCache(u);return u;});
    setSelIds([]);
    ids.forEach(id=>{sheetsAPI("delete",{id}).catch(()=>{});});
  };

  const markDone=async(id)=>{
    const updated=entries.map(e=>e.id===id?{...e,tags:[...new Set([...e.tags||[],"Done"])]}:e);
    setEntries(updated);saveCache(updated);setViewE(null);
    const entry=updated.find(e=>e.id===id);
    if(entry)await sheetsAPI("save",{entry});
  };
  const hideEntry=async(id)=>{
    const updated=entries.map(e=>e.id===id?{...e,hidden:true}:e);
    setEntries(updated);saveCache(updated);setViewE(null);
    const entry=updated.find(e=>e.id===id);
    if(entry)sheetsAPI("save",{entry});
  };
  const unhideEntry=async(id)=>{
    const updated=entries.map(e=>e.id===id?{...e,hidden:false}:e);
    setEntries(updated);saveCache(updated);
    const entry=updated.find(e=>e.id===id);
    if(entry)sheetsAPI("save",{entry});
  };

  const addToDropdown=(list,val)=>{
    setDropdowns(p=>{if(p[list]?.includes(val))return p;const u={...p,[list]:[...p[list],val]};sheetsAPI("saveDropdowns",{dropdowns:u}).catch(()=>{});return u;});
  };

  const saveDropdowns=async(dd)=>{
    setDropdowns(dd);saveDD(dd);
    await sheetsAPI("saveDropdowns",{dropdowns:dd});
  };

  const refresh=async()=>{
    // Two-way ADD-ONLY sync. Local is master: nothing local is ever replaced or removed.
    setLoading(true);setSyncStatus("📤 Syncing...");
    const cached=loadCache();
    try{
      const r=await sheetsAPI("getAll");
      if(r.error||!r.entries){setSyncStatus("📴 Offline — "+cached.length+" entries safe locally");setLoading(false);return;}
      const localIds=new Set(cached.map(e=>e.id));
      const sheetIds=new Set(r.entries.map(e=>e.id));
      // push local-only entries to Sheets
      const toPush=cached.filter(e=>!sheetIds.has(e.id));
      if(toPush.length>0)await Promise.all(toPush.map(e=>sheetsAPI("save",{entry:e}).catch(()=>{})));
      // add Sheets-only entries locally (sanitized), never replacing existing
      const toAdd=r.entries.filter(e=>e&&e.id&&!localIds.has(e.id)&&loadTombstones().indexOf(e.id)===-1).map(sanitizeEntry).filter(Boolean);
      if(toAdd.length>0){
        const merged=cached.concat(toAdd);
        merged.sort((a,b)=>String(b.createdAt||b.date||"").localeCompare(String(a.createdAt||a.date||"")));
        setEntries(merged);saveCache(merged);
        setSyncStatus("✅ "+merged.length+" entries · ↓"+toAdd.length+" added · ↑"+toPush.length+" backed up · "+new Date().toLocaleTimeString("en-IN"));
      } else {
        setSyncStatus("✅ "+cached.length+" entries · ↑"+toPush.length+" backed up · "+new Date().toLocaleTimeString("en-IN"));
      }
    }catch(e){
      setSyncStatus("📴 Offline — "+cached.length+" entries safe locally");
    }
    setLoading(false);
  };

  const allPersons=[...new Set([...dropdowns.persons,...entries.map(e=>e.person).filter(Boolean)])];
  const allAccounts=[...new Set([...dropdowns.accounts,...entries.map(e=>e.account).filter(Boolean)])];
  const allVendors=[...new Set([...dropdowns.vendors,...entries.map(e=>e.vendor).filter(Boolean)])];

  const filtered=useMemo(()=>entries.filter(e=>{
    if(e.hidden&&!showHidden)return false;
    if(hideDone&&e.tags?.includes("Done"))return false;
    if(filterCat!=="All"&&e.category!==filterCat)return false;
    if(filterTag&&!e.tags?.includes(filterTag))return false;
    if(filterPerson&&e.person!==filterPerson)return false;
    if(filterAccount&&e.account!==filterAccount)return false;
    if(filterVendor&&e.vendor!==filterVendor)return false;
    if(filterStatus&&e.paymentStatus!==filterStatus)return false;
    if(search){const q=search.toLowerCase();return["title","notes","person","vendor","amount","taskType","chemical","account","financialType","property"].some(k=>(e[k]||"").toLowerCase().includes(q));}
    return true;
  }).sort((a,b)=>{
    if(sort==="date_desc")return(b.date||"").localeCompare(a.date||"");
    if(sort==="date_asc") return(a.date||"").localeCompare(b.date||"");
    return(a.title||"").localeCompare(b.title||"");
  }),[entries,hideDone,filterCat,filterTag,filterPerson,filterAccount,filterVendor,filterStatus,search,sort]);

  const overdueN=entries.filter(e=>isOverdue(e.reminder)&&!e.tags?.includes("Done")).length;
  const superN=entries.filter(e=>e.tags?.includes("Super Pending")).length;
  const dupeN=useMemo(()=>{const s={};entries.forEach(e=>{const k=(e.title||"").toLowerCase().trim();if(k)s[k]=(s[k]||0)+1;});return Object.values(s).filter(n=>n>1).length;},[entries]);

  const getRowBg=e=>{
    const t=e.tags||[];
    if(t.includes("Done"))return"#f4fbf4";
    if(t.includes("Super Pending"))return"#ffe8e8";
    if(t.includes("Overdue")||isOverdue(e.reminder))return"#fff6f6";
    if(t.includes("Urgent"))return"#fff8f0";
    if(t.includes("GOVT"))return"#f0f4ff";
    if(t.includes("Paid"))return"#f4fbf4";
    if(t.includes("Payment Due"))return"#fffbf0";
    return"#fffdf7";
  };

  const fSel={padding:"6px 10px",borderRadius:8,border:"1px solid #7a5a20",background:"rgba(255,255,255,.12)",color:"#f5e8c0",fontSize:12,cursor:"pointer",outline:"none"};
  const ALL_CATS=["All",...dropdowns.categories];

  // Share panel
  const SharePanel=()=>{
    const [copied,setCopied]=useState("");
    const base=window.location.origin+window.location.pathname;
    const persons=[...new Set(entries.map(e=>e.person).filter(Boolean))];
    const accounts=[...new Set(entries.map(e=>e.account).filter(Boolean))];
    const tags=[...new Set(entries.flatMap(e=>e.tags||[]).filter(t=>t!=="Done"))];
    const copy=(url,key)=>{navigator.clipboard.writeText(url).then(()=>{setCopied(key);setTimeout(()=>setCopied(""),2000);});};
    const Row=({label,url,k})=><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",background:"#fffdf5",borderRadius:8,marginBottom:5,gap:8}}>
      <div><div style={{fontSize:13,fontWeight:600,color:"#3a2800"}}>{label}</div><div style={{fontSize:10,color:"#9a8060",wordBreak:"break-all"}}>{url}</div></div>
      <button onClick={()=>copy(url,k)} style={{padding:"5px 12px",borderRadius:7,border:"none",background:copied===k?"#2a7a2a":"linear-gradient(135deg,#c8860a,#a06010)",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}>{copied===k?"✓ Copied":"Copy"}</button>
    </div>;
    return<div>
      <h2 style={{margin:"0 0 4px",fontSize:18}}>🔗 Share View Links</h2>
      <p style={{fontSize:12,color:"#9a8060",marginBottom:12}}>Read-only filtered view — recipient can't edit</p>
      {persons.length>0&&<div style={{marginBottom:12}}><div className="lbl" style={{marginBottom:6}}>👤 By Person</div>{persons.map(p=><Row key={p} label={p} url={`${base}?person=${encodeURIComponent(p)}`} k={p}/>)}</div>}
      {tags.length>0&&<div style={{marginBottom:12}}><div className="lbl" style={{marginBottom:6}}>🏷 By Tag</div>{tags.slice(0,6).map(t=><Row key={t} label={t} url={`${base}?tag=${encodeURIComponent(t)}`} k={t}/>)}</div>}
      {accounts.length>0&&<div style={{marginBottom:12}}><div className="lbl" style={{marginBottom:6}}>🏦 By Account</div>{accounts.slice(0,5).map(a=><Row key={a} label={a} url={`${base}?account=${encodeURIComponent(a)}`} k={a}/>)}</div>}
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}><button className="bgh" onClick={()=>setShowShare(false)}>Close</button></div>
    </div>;
  };

  return<div style={{minHeight:"100vh",background:"linear-gradient(160deg,#fdf8ef,#f8f2e4 50%,#fdf5e6)",paddingBottom:52}}>

    {/* SYNC BAR */}
    <div style={{background:syncStatus.includes("✅")?"#1a5a1a":syncStatus.includes("⚠️")?"#7a5800":"#1a3a5a",padding:"4px 14px",fontSize:11,color:"#c8f0c8",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
      <span style={{flex:1}}>{syncStatus||"📊 Google Sheets connected"}</span>
      <button onClick={()=>{
        // Emergency recovery — restore from backup
        try{
          const backup=JSON.parse(localStorage.getItem(LS_CACHE+"_backup")||"null");
          if(backup&&backup.entries&&backup.entries.length>0){
            setEntries(backup.entries);
            saveCache(backup.entries);
            setSyncStatus("✅ Recovered "+backup.entries.length+" entries from backup ("+backup.savedAt?.slice(0,10)+")");
          } else {
            // Try today's backup
            const todayKey=LS_CACHE+"_"+new Date().toISOString().slice(0,10);
            const todayBackup=JSON.parse(localStorage.getItem(todayKey)||"null");
            if(todayBackup&&todayBackup.entries){
              setEntries(todayBackup.entries);
              saveCache(todayBackup.entries);
              setSyncStatus("✅ Recovered "+todayBackup.entries.length+" entries");
            } else {
              setSyncStatus("⚠️ No backup found");
            }
          }
        }catch(e){setSyncStatus("⚠️ Recovery failed: "+e.message);}
      }} style={{background:"rgba(255,150,50,.3)",border:"1px solid rgba(255,150,50,.5)",color:"#ffcc88",borderRadius:6,padding:"2px 10px",cursor:"pointer",fontSize:10,whiteSpace:"nowrap"}}>🔄 Recover</button>
      <button onClick={refresh} disabled={loading} style={{background:"transparent",border:"1px solid rgba(255,255,255,.3)",color:"inherit",borderRadius:6,padding:"2px 10px",cursor:"pointer",fontSize:10}}>{loading?"…":"↻ Sync"}</button>
    </div>

    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,#2a1800,#5a3800 50%,#3a2000)",padding:"12px 12px 10px",boxShadow:"0 4px 24px rgba(0,0,0,.3)",position:"sticky",top:0,zIndex:50}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:10}}>
        <div>
          <h1 style={{margin:0,fontSize:19,fontWeight:700,color:"#f5d890"}}>
            📋 RK Life Tracker
            {URL_USER!=="main"&&<span style={{fontSize:12,marginLeft:8,background:CURRENT_USER.bg,color:CURRENT_USER.color,borderRadius:20,padding:"2px 10px",fontWeight:700}}>{CURRENT_USER.name}</span>}
          </h1>
          <div style={{fontSize:10,color:"#c8a860",marginTop:2,display:"flex",flexWrap:"wrap",gap:5,alignItems:"center"}}>
            <span>{entries.length} total · {filtered.length} shown</span>
            {overdueN>0&&<span style={{background:"#c00",color:"#fff",borderRadius:20,padding:"1px 7px",fontSize:9,fontWeight:700}}>⏰ {overdueN}</span>}
            {superN>0&&<span style={{background:"#8B0000",color:"#fff",borderRadius:20,padding:"1px 7px",fontSize:9,fontWeight:700}}>🔴 {superN}</span>}
            {dupeN>0&&<span onClick={()=>setShowDupes(true)} style={{background:"#7a5800",color:"#fff",borderRadius:20,padding:"1px 7px",fontSize:9,fontWeight:700,cursor:"pointer"}}>🔍 {dupeN} dupes</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <button onClick={()=>setShowAI(true)} className="ai-btn" style={{fontSize:11,padding:"6px 11px"}}>🧠 AI</button>
          <button onClick={()=>setShowShare(true)} style={{...fSel,border:"1.5px solid #c8a060",background:"rgba(255,255,255,.08)",color:"#f0cc80",fontSize:11,fontWeight:600}}>🔗 Share</button>
          <button onClick={()=>setShowDD(true)} style={{...fSel,border:"1.5px solid #c8a060",background:"rgba(255,255,255,.08)",color:"#f0cc80",fontSize:11,fontWeight:600}}>⚙️</button>
          <button onClick={()=>setHideDone(h=>!h)} style={{...fSel,background:hideDone?"rgba(200,255,200,.15)":"rgba(255,255,255,.08)",color:hideDone?"#90f090":"#f0cc80",border:"1.5px solid "+(hideDone?"#4a9a4a":"#c8a060"),fontSize:11,fontWeight:600}}>{hideDone?"All":"Hide✅"}</button>
          <button onClick={()=>setShowHidden(h=>!h)} style={{...fSel,background:showHidden?"rgba(255,200,100,.15)":"rgba(255,255,255,.08)",color:showHidden?"#ffcc88":"#f0cc80",fontSize:11}}>👁</button>
          <button onClick={()=>{const l=filterPerson||filterTag||filterAccount||filterVendor||filterStatus||(filterCat!=="All"?filterCat:"")||"All Tasks";exportPDF(filtered,l);}} style={{...fSel,border:"1.5px solid #c8a060",background:"rgba(255,255,255,.08)",color:"#f0cc80",fontSize:11,fontWeight:600}}>↓PDF({filtered.length})</button>
          <button onClick={()=>exportCSV(entries)} style={{...fSel,border:"1.5px solid #c8a060",background:"rgba(255,255,255,.08)",color:"#f0cc80",fontSize:11,fontWeight:600}}>↓CSV</button>
          {URL_USER==="main"&&[
            {l:"💰 Prakash",c:"Finance - Bank",t:"Payment Collected",p:"Prakash"},
            {l:"💍 Wedding",c:"Personal - Wedding",t:"Wedding Planning"},
          ].map(q=><button key={q.l} onClick={()=>{setEditE({category:q.c,taskType:q.t,person:q.p||""});setShowForm(true);}} style={{padding:"6px 12px",borderRadius:8,border:"none",background:q.l.includes("Prakash")?"#1a5a8a":"#c8006a",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700}}>{q.l}</button>)}
          {IS_FAMILY&&[
            {l:"💍",c:"Personal - Wedding",t:"Wedding Planning"},
            {l:"💰",c:"Personal - Expense",t:"Expense"},
            {l:"💭",c:"Personal - Thoughts",t:"Thoughts"},
            {l:"⏰",c:"Reminders",t:"Reminder / Task"},
          ].map(q=><button key={q.l} onClick={()=>{setEditE({category:q.c,taskType:q.t});setShowForm(true);}} style={{padding:"7px 10px",borderRadius:8,border:"none",background:"rgba(255,255,255,.15)",color:"#f5d890",cursor:"pointer",fontSize:16}}>{q.l}</button>)}
          {IS_SALES&&[
            {l:"📦",c:"Sales - Order",t:"Orders Received"},
            {l:"💰",c:"Sales - Payment",t:"Payment Collected"},
            {l:"🚶",c:"Sales - Visit",t:"Customer Visit"},
            {l:"🧾",c:"Sales - Expense",t:"Expense - Travel"},
            {l:"😟",c:"Sales - Complaint",t:"Complaint Received"},
            {l:"🏷",c:"Intelligence - Competitor",t:"Competitor Spotted"},
          ].map(q=><button key={q.l} onClick={()=>{setEditE({category:q.c,taskType:q.t});setShowForm(true);}} style={{padding:"7px 10px",borderRadius:8,border:"none",background:"rgba(255,255,255,.15)",color:"#f5d890",cursor:"pointer",fontSize:16}}>{q.l}</button>)}
          <button onClick={()=>{setEditE(null);setShowForm(true);}} style={{padding:"7px 14px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#e8a020,#c07010)",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,boxShadow:"0 4px 14px rgba(200,120,0,.35)"}}>+ New</button>
        </div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search all fields…" style={{...fSel,background:"rgba(255,255,255,.1)",width:150}}/>
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={fSel}>{ALL_CATS.map(c=><option key={c} value={c} style={{background:"#3a2000"}}>{c}</option>)}</select>
        <select value={filterTag} onChange={e=>setFilterTag(e.target.value)} style={fSel}><option value="" style={{background:"#3a2000"}}>All Tags</option>{STATUS_TAGS.map(t=><option key={t} value={t} style={{background:"#3a2000"}}>{t}</option>)}</select>
        <select value={filterPerson} onChange={e=>setFilterPerson(e.target.value)} style={fSel}><option value="" style={{background:"#3a2000"}}>All People</option>{allPersons.map(p=><option key={p} value={p} style={{background:"#3a2000"}}>{p}</option>)}</select>
        <select value={filterVendor} onChange={e=>setFilterVendor(e.target.value)} style={fSel}><option value="" style={{background:"#3a2000"}}>All Vendors</option>{allVendors.map(v=><option key={v} value={v} style={{background:"#3a2000"}}>{v}</option>)}</select>
        <select value={filterAccount} onChange={e=>setFilterAccount(e.target.value)} style={fSel}><option value="" style={{background:"#3a2000"}}>All Accounts</option>{allAccounts.map(a=><option key={a} value={a} style={{background:"#3a2000"}}>{a}</option>)}</select>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={fSel}><option value="" style={{background:"#3a2000"}}>All Status</option>{dropdowns.paymentStatuses.map(s=><option key={s} value={s} style={{background:"#3a2000"}}>{s}</option>)}</select>
        <select value={sort} onChange={e=>setSort(e.target.value)} style={fSel}><option value="date_desc" style={{background:"#3a2000"}}>Newest</option><option value="date_asc" style={{background:"#3a2000"}}>Oldest</option><option value="title" style={{background:"#3a2000"}}>A–Z</option></select>
        {(filterCat!=="All"||filterTag||filterPerson||filterAccount||filterVendor||filterStatus||search)&&<button onClick={()=>{setFilterCat("All");setFilterTag("");setFilterPerson("");setFilterAccount("");setFilterVendor("");setFilterStatus("");setSearch("");}} style={{...fSel,background:"rgba(255,100,100,.2)",color:"#ffb0b0",border:"1px solid #ff8888",fontSize:11}}>✕ Clear</button>}
      </div>
    </div>

    {/* TABLE */}
    <div style={{padding:"10px 8px 40px",overflowX:"auto"}}>
      {loading&&entries.length===0?<div style={{textAlign:"center",padding:"50px",color:"#b0966a"}}><div style={{fontSize:30,marginBottom:10}}>⏳</div><div>Loading from Google Sheets…</div></div>:
      filtered.length===0?<div style={{textAlign:"center",padding:"50px",color:"#b0966a"}}>
        <div style={{fontSize:40,marginBottom:10}}>📋</div>
        <div style={{fontSize:15,fontWeight:700}}>{entries.length===0?"No entries yet":"No matches"}</div>
        <div style={{fontSize:12,marginTop:5,color:"#c0a880"}}>{entries.length===0?"Tap + New or 🎤 Speak to start":"Try clearing filters"}</div>
      </div>:(
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:640}}>
          <thead>
            <tr style={{background:"linear-gradient(135deg,#4a2e00,#6a4010)",color:"#f5d890"}}>
              {["#","Date","Title & Notes","Type · Person","Account · ₹","Tags","Remind","Files",""].map(h=><th key={h} style={{padding:"7px 8px",textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",borderRight:"1px solid rgba(255,255,255,.07)",whiteSpace:"nowrap"}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {filtered.map((e,idx)=>{
              const ov=isOverdue(e.reminder)&&!e.tags?.includes("Done");
              const isDone=e.tags?.includes("Done");
              const isSP=e.tags?.includes("Super Pending");
              return<tr key={e.id} className="rh" style={{background:getRowBg(e),borderBottom:"1px solid #f0e8d8",opacity:isDone?.72:1,outline:isSP?"2px solid #8B0000":"none"}}>
                <td style={{padding:"7px 8px",fontSize:11,color:"#b09060"}}>{isSP?"🔴":idx+1}</td>
                <td style={{padding:"7px 8px",fontSize:11,whiteSpace:"nowrap",color:"#5a3800"}}>{fmtDate(e.date)}{e.month&&<div style={{fontSize:9,color:"#9a7040"}}>{e.month}</div>}</td>
                <td style={{padding:"7px 8px",minWidth:140,maxWidth:200}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#2a1600",cursor:"pointer",textDecoration:isDone?"line-through":"none"}} onClick={()=>setViewE(e)}>{e.title}</div>
                  {e.chemical&&<div style={{fontSize:10,color:"#5a3a7a",marginTop:1}}>🧪 {e.chemical}</div>}
                  {e.notes&&<div style={{fontSize:10,color:"#7a6040",lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",marginTop:1}}>{e.notes}</div>}
                  {e.link&&<a href={e.link} target="_blank" rel="noreferrer" style={{fontSize:10,color:"#0057b0",display:"block",marginTop:1}} onClick={ev=>ev.stopPropagation()}>🔗 {e.linkLabel||"Link"}</a>}
                </td>
                <td style={{padding:"7px 8px",fontSize:11,minWidth:90}}>
                  {e.taskType&&<div style={{color:"#5a3800",fontWeight:600,fontSize:10,marginBottom:1}}>{e.taskType}</div>}
                  {e.person&&<div style={{color:"#3a5a8a",fontSize:10}}>👤 {e.person}</div>}
                  {e.vendor&&<div style={{color:"#5a3a8a",fontSize:10}}>🏭 {e.vendor}</div>}
                  {e.property&&<div style={{color:"#5a3a5a",fontSize:9}}>🏠 {e.property}</div>}
                </td>
                <td style={{padding:"7px 8px",fontSize:11,minWidth:85}}>
                  {e.account&&<div style={{color:"#3a6000",fontWeight:600,fontSize:10,marginBottom:1}}>🏦 {e.account}</div>}
                  {e.amount&&<div style={{color:"#1a5a00",fontWeight:700,fontSize:12}}>{e.amount}</div>}
                  {e.financialType&&<div style={{fontSize:9,color:"#5a7a00"}}>{e.financialType}</div>}
                  {e.paymentStatus&&<span style={{fontSize:9,display:"inline-block",marginTop:1,background:e.paymentStatus==="Paid"?"#d4edda":e.paymentStatus==="Overdue"?"#f8d7da":e.paymentStatus==="Payment Pending"?"#fff3cd":"#e8e8e8",color:e.paymentStatus==="Paid"?"#155724":e.paymentStatus==="Overdue"?"#721c24":e.paymentStatus==="Payment Pending"?"#856404":"#444",padding:"1px 6px",borderRadius:10,fontWeight:700,whiteSpace:"nowrap"}}>{e.paymentStatus}</span>}
                </td>
                <td style={{padding:"7px 8px",minWidth:90}}><div style={{display:"flex",flexWrap:"wrap",gap:2}}>{e.tags?.map(t=><TagBadge key={t} tag={t}/>)}</div></td>
                <td style={{padding:"7px 8px",fontSize:10,whiteSpace:"nowrap"}}>
                  {e.reminder?<span style={{color:ov?"#c00":"#006aaa",fontWeight:ov?700:500}}>{ov?"🔴":"📲"} {fmtDate(e.reminder.slice(0,10))}{e.isRecurring&&<span style={{display:"block",color:"#5a8a30",fontSize:9}}>🔁</span>}</span>:<span style={{color:"#d0c0a0"}}>—</span>}
                </td>
                <td style={{padding:"7px 8px"}}>{(e.attachments||[]).length>0?<div style={{display:"flex",gap:2}}>{e.attachments.slice(0,2).map((a,i)=><Thumb key={i} att={a} small/>)}{e.attachments.length>2&&<span style={{fontSize:9,color:"#9a8060",alignSelf:"center"}}>+{e.attachments.length-2}</span>}</div>:<span style={{color:"#d0c0a0",fontSize:10}}>—</span>}</td>
                <td style={{padding:"7px 6px",whiteSpace:"nowrap"}}>
                  <button onClick={()=>toggleSel(e.id)} style={{padding:"3px 7px",borderRadius:6,border:selIds.indexOf(e.id)>-1?"2px solid #c01818":"1px solid #ccc",background:selIds.indexOf(e.id)>-1?"#ffe5e5":"#fff",cursor:"pointer",fontSize:11,marginRight:3}}>{selIds.indexOf(e.id)>-1?"☑️":"⬜"}</button><button onClick={()=>setViewE(e)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #d0b880",background:"#fff8ee",color:"#8a5800",cursor:"pointer",fontSize:10,marginRight:3}}>View</button>
                  <button onClick={()=>shareEntry(e)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #0088cc",background:"#e8f4fb",color:"#006aaa",cursor:"pointer",fontSize:10,marginRight:3}}>📤</button>
                  {!isDone&&<button onClick={()=>markDone(e.id)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #88cc88",background:"#edfaed",color:"#1a5a1a",cursor:"pointer",fontSize:10,marginRight:3}}>✅</button>}
                  {!e.hidden&&<button onClick={()=>hideEntry(e.id)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #ccc",background:"#f5f5f5",color:"#666",cursor:"pointer",fontSize:10}}>Hide</button>}
                  {e.hidden&&<button onClick={()=>unhideEntry(e.id)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #c8a060",background:"#fff8ee",color:"#8a5800",cursor:"pointer",fontSize:10}}>Show</button>}
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      )}
    </div>

    {/* BOTTOM BAR */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"linear-gradient(135deg,#2a1800,#4a2e00)",borderTop:"1px solid #7a5020",padding:"5px 12px",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",zIndex:100}}>
      {STATUS_TAGS.slice(0,5).map(t=>{const n=entries.filter(e=>e.tags?.includes(t)).length;return n>0?<span key={t} onClick={()=>setFilterTag(filterTag===t?"":t)} style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}><TagBadge tag={t}/><span style={{fontSize:10,color:"#d0a060"}}>{n}</span></span>:null;})}
      <span style={{fontSize:9,color:"#9a7040",marginLeft:"auto"}}>📊 Google Sheets</span>
    </div>

    {/* VIEW MODAL */}
    <Modal open={!!viewE} onClose={()=>setViewE(null)}>
      {viewE&&<div>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          <div><div style={{fontSize:11,color:"#9a8060",fontWeight:600,marginBottom:3}}>{fmtDate(viewE.date)}{viewE.month?" · "+viewE.month:""}</div>
            <h2 style={{margin:0,fontSize:18,color:"#2a1a00"}}>{viewE.title}</h2></div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {!viewE.tags?.includes("Done")&&<button onClick={()=>markDone(viewE.id)} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #88cc88",background:"#edfaed",color:"#1a5a1a",cursor:"pointer",fontSize:12,fontWeight:700}}>✅ Done</button>}
            <button onClick={()=>shareEntry(viewE)} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #0088cc",background:"#e8f4fb",color:"#006aaa",cursor:"pointer",fontSize:12,fontWeight:700}}>📤 Share</button>
            <button onClick={()=>shareEntryHTML(viewE)} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #5a3a8a",background:"#f5eeff",color:"#5a1a8a",cursor:"pointer",fontSize:12}}>🖼 Card</button>
            <button onClick={()=>{setEditE(viewE);setViewE(null);setShowForm(true);}} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #c8a060",background:"#fff8ee",color:"#8a5a00",cursor:"pointer",fontSize:12}}>✏️</button>
            <button onClick={()=>hideEntry(viewE.id)} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #ccc",background:"#f5f5f5",color:"#555",cursor:"pointer",fontSize:12}}>👁 Hide</button>
            <button onClick={()=>delEntry(viewE.id)} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #f5a8ab",background:"#fff5f5",color:"#c00",cursor:"pointer",fontSize:12}}>🗑</button>
          </div>
        </div>
        {viewE.tags?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>{viewE.tags.map(t=><TagBadge key={t} tag={t}/>)}</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
          {[["taskType","Task"],["person","Person"],["vendor","Vendor"],["account","Account"],["financialType","Financial"],["paymentStatus","Status"],["property","Property"],["chemical","Chemical"],["amount","Amount"],["month","Month"]].filter(([k])=>viewE[k]).map(([k,l])=><span key={k} style={{background:"#f9f3e8",border:"1px solid #e8dcc0",borderRadius:8,padding:"3px 11px",fontSize:12,color:"#5a3800"}}><span style={{color:"#9a7040",fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:.4,marginRight:4}}>{l}</span>{viewE[k]}</span>)}
        </div>
        {viewE.notes&&<div style={{marginBottom:12}}><div className="lbl" style={{marginBottom:5}}>Notes</div><div style={{background:"#fffdf5",border:"1px solid #e8dcc8",borderRadius:8,padding:"9px 13px",fontSize:13,whiteSpace:"pre-wrap",lineHeight:1.6}}>{viewE.notes}</div></div>}
        {viewE.link&&<div style={{marginBottom:12}}><div className="lbl" style={{marginBottom:4}}>Link</div><a href={viewE.link} target="_blank" rel="noreferrer" style={{color:"#0057b0",fontSize:13,wordBreak:"break-all"}}>{viewE.linkLabel||viewE.link}</a></div>}
        {viewE.reminder&&<div style={{background:isOverdue(viewE.reminder)?"#fff0f0":"#e8f4fb",border:`1.5px solid ${isOverdue(viewE.reminder)?"#f5a8ab":"#b0d8f0"}`,borderRadius:9,padding:"9px 13px",marginBottom:12}}>
          <span style={{fontSize:13,fontWeight:700,color:isOverdue(viewE.reminder)?"#c00":"#006aaa"}}>📲 {isOverdue(viewE.reminder)?"OVERDUE · ":""}{fmtDT(viewE.reminder)}{viewE.isRecurring&&<span style={{marginLeft:8,fontSize:11,color:"#5a8a30"}}>🔁 Monthly</span>}</span>
          {viewE.reminderNote&&<div style={{fontSize:12,color:"#005a8a",marginTop:3}}>{viewE.reminderNote}</div>}
        </div>}
        {viewE.attachments?.length>0&&<div><div className="lbl" style={{marginBottom:6}}>Attachments</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{viewE.attachments.map((a,i)=><Thumb key={i} att={a}/>)}</div></div>}
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}><button className="bgh" onClick={()=>setViewE(null)}>Close</button></div>
      </div>}
    </Modal>

    {/* MODALS */}
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditE(null);}} wide>
      <EntryForm initial={editE} onSave={saveEntry} onClose={()=>{setShowForm(false);setEditE(null);}} dropdowns={dropdowns} onAddToDropdown={addToDropdown} saving={saving}/>
    </Modal>
    {selIds.length>0&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:"#7a1010",padding:"10px 14px",zIndex:999,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 -2px 12px rgba(0,0,0,.3)"}}>
      <span style={{color:"#fff",fontWeight:700,fontSize:14}}>{selIds.length} selected</span>
      <div>
        <button onClick={()=>setSelIds(filtered.map(e=>e.id))} style={{padding:"8px 10px",borderRadius:8,border:"1px solid #fff",background:"transparent",color:"#fff",marginRight:8,fontSize:13,cursor:"pointer"}}>☑️ All Shown</button><button onClick={()=>setSelIds([])} style={{padding:"8px 14px",borderRadius:8,border:"1px solid #fff",background:"transparent",color:"#fff",marginRight:8,fontSize:13,cursor:"pointer"}}>Clear</button>
        <button onClick={bulkDelete} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#fff",color:"#7a1010",fontWeight:800,fontSize:13,cursor:"pointer"}}>🗑 Delete All</button>
      </div>
    </div>}
    <Modal open={showDupes} onClose={()=>setShowDupes(false)}><DupeFinder entries={entries} onDelete={delEntry} onClose={()=>setShowDupes(false)}/></Modal>
    <Modal open={showAI} onClose={()=>setShowAI(false)} wide><AIPanel entries={entries} onClose={()=>setShowAI(false)}/></Modal>
    <Modal open={showDD} onClose={()=>setShowDD(false)} wide><DropdownManager dropdowns={dropdowns} onSave={saveDropdowns} onClose={()=>setShowDD(false)}/></Modal>
    <Modal open={showShare} onClose={()=>setShowShare(false)} wide><SharePanel/></Modal>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
