    if (entry.paymentStatus) L.push("💳 " + entry.paymentStatus);
    if (entry.notes) L.push("\n📝 " + String(entry.notes).slice(0, 300));
    setText(L.join("\n"));
  }, [entry]);

  useEffect(() => { (async () => {
    try { const r = await sheetsAPI("getPortfolio", { key: "tg_contacts" }); if (r && r.data && Array.isArray(r.data)) setContacts(r.data); } catch(e) {}
  })(); }, []);

  const toggle = (id) => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);

  const sendNow = async () => {
    if (!selected.length) { setMsg("Pick at least one person."); return; }
    setBusy(true); setMsg("📤 Sending…");
    try {
      const r = await fetch("/.netlify/functions/telegram", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "send", message: text, chatIds: selected })
      });
      const d = await r.json();
      if (d && d.ok) { setMsg("✓ Sent to " + d.sent); setTimeout(() => onClose && onClose(), 1200); }
      else setMsg("Failed: " + (d.error || "unknown"));
    } catch(e) { setMsg("Error: " + e.message); }
    setBusy(false);
  };

  const schedule = async () => {
    if (!selected.length) { setMsg("Pick at least one person."); return; }
    if (!when) { setMsg("Pick a date & time."); return; }
    setBusy(true);
    try {
      const cur = await sheetsAPI("getPortfolio", { key: "tg_scheduled" });
      const list = (cur && cur.data && Array.isArray(cur.data.scheduled)) ? cur.data.scheduled : [];
      list.push({ id: "tg_" + Date.now(), text, chatIds: [...selected], when: new Date(when).toISOString(), repeat: "once", created: new Date().toISOString() });
      await sheetsAPI("savePortfolio", { key: "tg_scheduled", data: { scheduled: list } });
      setMsg("✓ Scheduled"); setTimeout(() => onClose && onClose(), 1200);
    } catch(e) { setMsg("Couldn't schedule: " + e.message); }
    setBusy(false);
  };

  // Quick presets for chasing payment
  const preset = (days) => {
    const d = new Date(); d.setDate(d.getDate() + days); d.setHours(10, 0, 0, 0);
    const pad = n => String(n).padStart(2, "0");
    setWhen(d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()) + "T" + pad(d.getHours()) + ":" + pad(d.getMinutes()));
    setMode("schedule");
  };

  const inp = { width: "100%", padding: "9px", borderRadius: 8, border: "1px solid #ccd", fontSize: 13, marginBottom: 8 };
  if (!entry) return null;

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <span style={{ fontSize: 24 }}>✈️</span>
        <div><h2 style={{ margin: 0, fontSize: 17, color: "#0088cc" }}>Send via Telegram</h2>
        <div style={{ fontSize: 11, color: "#6a8a9a" }}>Now, or schedule it for later</div></div>
      </div>

      <label style={{ fontSize: 12, fontWeight: 700, color: "#0a5a7a" }}>Message (edit as you like)</label>
      <textarea value={text} onChange={e => setText(e.target.value)} rows={6} style={{ ...inp, resize: "vertical", fontFamily: "inherit" }} />

      <label style={{ fontSize: 12, fontWeight: 700, color: "#0a5a7a" }}>Send to ({selected.length})</label>
      <div style={{ maxHeight: 110, overflowY: "auto", border: "1px solid #dde", borderRadius: 8, padding: 6, marginBottom: 10 }}>
        {contacts.length === 0 && <div style={{ fontSize: 11, color: "#999", fontStyle: "italic", padding: 4 }}>No contacts yet — sync them in Menu → Telegram.</div>}
        {contacts.map(c => (
          <label key={c.chatId} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 2px", fontSize: 12.5, cursor: "pointer" }}>
            <input type="checkbox" checked={selected.includes(c.chatId)} onChange={() => toggle(c.chatId)} />
            {c.label || c.name}
          </label>
        ))}
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
        <button onClick={() => setMode("now")} style={{ flex: 1, padding: "8px", borderRadius: 8, border: mode === "now" ? "2px solid #0088cc" : "1px solid #ccc", background: mode === "now" ? "#e8f5fc" : "#fff", color: "#0a5a7a", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>📤 Send now</button>
        <button onClick={() => setMode("schedule")} style={{ flex: 1, padding: "8px", borderRadius: 8, border: mode === "schedule" ? "2px solid #0088cc" : "1px solid #ccc", background: mode === "schedule" ? "#e8f5fc" : "#fff", color: "#0a5a7a", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>⏰ Schedule</button>
      </div>

      {mode === "schedule" && (
        <div style={{ marginBottom: 10 }}>
          <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
            <span style={{ fontSize: 11, color: "#666", alignSelf: "center" }}>Remind in:</span>
            {[3, 7, 15, 30, 60].map(d => (
              <button key={d} onClick={() => preset(d)} style={{ fontSize: 11, padding: "4px 10px", borderRadius: 20, border: "1px solid #0088cc", background: "#fff", color: "#0088cc", cursor: "pointer" }}>{d}d</button>
            ))}
          </div>
          <input type="datetime-local" value={when} onChange={e => setWhen(e.target.value)} style={inp} />
        </div>
      )}

      {msg && <div style={{ fontSize: 12, color: msg[0] === "✓" ? "#1a7a3a" : "#a33", marginBottom: 8 }}>{msg}</div>}

      <button onClick={mode === "now" ? sendNow : schedule} disabled={busy} style={{ width: "100%", padding: "12px", borderRadius: 10, border: "none", background: "linear-gradient(135deg,#0088cc,#005f8f)", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
        {busy ? "Working…" : (mode === "now" ? "📤 Send now" : "⏰ Schedule it")}
      </button>
    </div>
  );
}


function TelegramTeam({ onClose }) {
  const [tab, setTab] = useState("send"); // send | scheduled | team

  const [scheduled, setScheduled] = useState([]);

  useEffect(() => { (async () => {
    try { const r = await sheetsAPI("getPortfolio", { key: "tg_contacts" }); if (r && r.data && Array.isArray(r.data)) setContacts(r.data); } catch(e) {}
    try { const s = await sheetsAPI("getPortfolio", { key: "tg_scheduled" }); if (s && s.data && Array.isArray(s.data.scheduled)) setScheduled(s.data.scheduled); } catch(e) {}
  })(); }, []);

  const saveContacts = async (c) => { setContacts(c); try { await sheetsAPI("savePortfolio", { key: "tg_contacts", data: c }); } catch(e) {} };
  const saveScheduled = async (s) => { setScheduled(s); try { await sheetsAPI("savePortfolio", { key: "tg_scheduled", data: { scheduled: s } }); } catch(e) {} };

  // Pull anyone who has messaged the bot
  const syncContacts = async () => {
    setBusy(true); setMsg("🔄 Looking for people who messaged the bot…");
    try {
      const r = await fetch("/.netlify/functions/telegram", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "contacts" })
      });
      const d = await r.json();
      if (d && d.ok && Array.isArray(d.contacts)) {
        const merged = [...contacts];
        let added = 0;
        d.contacts.forEach(c => {
          if (!merged.find(x => x.chatId === c.chatId)) { merged.push({ chatId: c.chatId, name: c.name, label: c.name }); added++; }
        });
        await saveContacts(merged);
        setMsg(added ? ("✓ Found " + added + " new contact(s)") : "No new contacts. Ask them to send any message to the bot first.");
      } else { setMsg("Couldn't fetch contacts. Is TELEGRAM_BOT_TOKEN set in Netlify?"); }
    } catch(e) { setMsg("Error: " + e.message); }
    setBusy(false);
  };

  const sendNow = async () => {
    if (!text.trim()) { setMsg("Type a message first."); return; }
    if (!selected.length) { setMsg("Pick at least one person."); return; }
    setBusy(true); setMsg("📤 Sending…");
    try {
      const r = await fetch("/.netlify/functions/telegram", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "send", message: text, chatIds: selected })
      });
      const d = await r.json();
      setMsg(d && d.ok ? ("✓ Sent to " + d.sent + " of " + d.total) : ("Failed: " + (d.error || "unknown")));
      if (d && d.ok) setText("");
    } catch(e) { setMsg("Error: " + e.message); }
    setBusy(false);
  };

  const scheduleMsg = async () => {

    if (!selected.length) { setMsg("Pick at least one person."); return; }
    if (!when) { setMsg("Pick a date & time."); return; }
    const item = { id: "tg_" + Date.now(), text, chatIds: [...selected], when: new Date(when).toISOString(), repeat, created: new Date().toISOString() };
    await saveScheduled([...scheduled, item]);
    setText(""); setWhen(""); setRepeat("once");
    setMsg("✓ Scheduled");
    setTimeout(() => setMsg(""), 2500);
  };

  const delScheduled = async (id) => { await saveScheduled(scheduled.filter(s => s.id !== id)); };
  const toggle = (id) => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const renameContact = async (chatId, label) => { await saveContacts(contacts.map(c => c.chatId === chatId ? { ...c, label } : c)); };
  const delContact = async (chatId) => { await saveContacts(contacts.filter(c => c.chatId !== chatId)); setSelected(s => s.filter(x => x !== chatId)); };

  const inp = { width: "100%", padding: "9px", borderRadius: 8, border: "1px solid #ccd", fontSize: 13, marginBottom: 8 };

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <span style={{ fontSize: 26 }}>✈️</span>
        <div><h2 style={{ margin: 0, fontSize: 18, color: "#0088cc" }}>Telegram Team</h2>
        <div style={{ fontSize: 11, color: "#6a8a9a" }}>Message your team — now or scheduled</div></div>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        {[["send", "📤 Send"], ["scheduled", "⏰ Scheduled"], ["team", "👥 Team"]].map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)} style={{ flex: 1, padding: "8px", borderRadius: 8, border: tab === k ? "2px solid #0088cc" : "1px solid #ccc", background: tab === k ? "#e8f5fc" : "#fff", color: "#0a5a7a", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>{l}</button>
        ))}
      </div>

      {msg && <div style={{ fontSize: 12, color: msg[0] === "✓" ? "#1a7a3a" : "#a33", marginBottom: 8 }}>{msg}</div>}

      {(tab === "send" || tab === "scheduled") && (
        <div>
          <label style={{ fontSize: 12, fontWeight: 700, color: "#0a5a7a" }}>Message</label>
          <textarea value={text} onChange={e => setText(e.target.value)} rows={3} placeholder="Type your message to the team…" style={{ ...inp, resize: "vertical" }} />

          <label style={{ fontSize: 12, fontWeight: 700, color: "#0a5a7a" }}>Send to ({selected.length} selected)</label>
          <div style={{ maxHeight: 130, overflowY: "auto", border: "1px solid #dde", borderRadius: 8, padding: 6, marginBottom: 8 }}>
            {contacts.length === 0 && <div style={{ fontSize: 11, color: "#999", fontStyle: "italic", padding: 4 }}>No contacts yet — go to 👥 Team and tap Sync.</div>}
            {contacts.map(c => (
              <label key={c.chatId} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 2px", fontSize: 12.5, cursor: "pointer" }}>

            {contacts.length > 1 && <button onClick={() => setSelected(selected.length === contacts.length ? [] : contacts.map(c => c.chatId))} style={{ fontSize: 11, marginTop: 4, border: "none", background: "none", color: "#0088cc", cursor: "pointer", textDecoration: "underline" }}>
              {selected.length === contacts.length ? "Clear all" : "Select everyone"}
            </button>}
          </div>

          {tab === "scheduled" && (
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <div style={{ flex: 2 }}>
                <label style={{ fontSize: 11, color: "#555" }}>When</label>
                <input type="datetime-local" value={when} onChange={e => setWhen(e.target.value)} style={inp} />
              </div>
              <div style={{ flex: 1 }}>
                <label style={{ fontSize: 11, color: "#555" }}>Repeat</label>

            {busy ? "Working…" : (tab === "send" ? "📤 Send now" : "⏰ Schedule it")}
          </button>

          {tab === "scheduled" && scheduled.length > 0 && (
            <div style={{ marginTop: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#0a5a7a", marginBottom: 6 }}>Upcoming ({scheduled.length})</div>
              {scheduled.map(s => (
                <div key={s.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8, padding: "7px 8px", borderBottom: "1px solid #eee", fontSize: 12 }}>

          <button onClick={syncContacts} disabled={busy} style={{ width: "100%", padding: "11px", borderRadius: 10, border: "none", background: "#0088cc", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer", marginBottom: 12 }}>
            {busy ? "Syncing…" : "🔄 Sync contacts from bot"}

          <div style={{ fontSize: 12, fontWeight: 700, color: "#0a5a7a", marginBottom: 6 }}>Team ({contacts.length})</div>
          {contacts.length === 0 && <div style={{ fontSize: 11, color: "#999", fontStyle: "italic" }}>Nobody yet.</div>}
          {contacts.map(c => (

              <span style={{ fontSize: 10, color: "#aaa" }}>{c.chatId}</span>

  );

function RulesEngine({ entries, onSaveEntry, onClose }) {
  const [rules, setRules] = useState([]);
  const [newRule, setNewRule] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [running, setRunning] = useState(false);
  const [proposals, setProposals] = useState(null); // [{id,title,current,change,ruleApplied,accept}]
  const [msg, setMsg] = useState("");
  const [editIdx, setEditIdx] = useState(-1);
  const [editText, setEditText] = useState("");

  useEffect(() => { (async () => {
    try { const r = await sheetsAPI("getPortfolio", { key: "rules" }); if (r && r.data && Array.isArray(r.data.rules)) setRules(r.data.rules); } catch(e) {}
    setLoaded(true);
  })(); }, []);
  const persist = async (rs) => { try { await sheetsAPI("savePortfolio", { key: "rules", data: { rules: rs } }); } catch(e) {} };

  const addRule = async () => {
    const t = newRule.trim(); if (!t) return;
    const rs = [...rules, { id: "rule_" + Date.now(), text: t, active: true }];
    setRules(rs); setNewRule(""); await persist(rs);
  };
  const delRule = async (id) => { const rs = rules.filter(r => r.id !== id); setRules(rs); await persist(rs); };
  const toggleRule = async (id) => { const rs = rules.map(r => r.id===id?{...r,active:!r.active}:r); setRules(rs); await persist(rs); };
  const saveEdit = async (id) => { const rs = rules.map(r => r.id===id?{...r,text:editText}:r); setRules(rs); setEditIdx(-1); await persist(rs); };

  const runRules = async () => {
    const active = rules.filter(r => r.active);
    if (!active.length) { setMsg("Add at least one active rule first."); return; }
    setRunning(true); setMsg("⚖️ Applying your rules to entries…"); setProposals(null);
    try {
      // Send a compact view of entries (only fields that matter) to keep it light
      const slim = entries.slice(0, 400).map(e => ({
        id: e.id, title: e.title, category: e.category, person: e.person, vendor: e.vendor,
        amount: e.amount, date: e.date, paymentStatus: e.paymentStatus, tags: e.tags, notes: (e.notes||"").slice(0,120)
      }));
      const prompt =
"You are a rules engine for a business tracker. The owner has written rules in plain English. Apply them to the entries and propose changes.\\n\\n" +
"RULES:\\n" + active.map((r,i)=>((i+1)+". "+r.text)).join("\\n") + "\\n\\n" +
"ENTRIES (JSON):\\n" + JSON.stringify(slim) + "\\n\\n" +
"For each entry that a rule applies to, propose a change. Possible changes: add a tag, set a reminder in N days (reminderDays), set paymentStatus, or set a due note. " +
"Return ONLY JSON: {\\\"proposals\\\":[{\\\"id\\\":\\\"<entry id>\\\",\\\"title\\\":\\\"<entry title>\\\",\\\"rule\\\":\\\"<which rule, short>\\\",\\\"addTag\\\":\\\"<tag or empty>\\\",\\\"reminderDays\\\":<number or 0>,\\\"note\\\":\\\"<short note or empty>\\\"}]}. " +
"Only include entries that genuinely match a rule. Be precise, don't over-match. If nothing matches, return {\\\"proposals\\\":[]}.";
      const txt = await claudeAPI(prompt, "You are a precise rules engine. Return ONLY valid JSON, no prose.", "", "", "");
      const clean = String(txt||"").replace(/```json/g,"").replace(/```/g,"").trim();
      const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
      const obj = JSON.parse(s>=0 ? clean.substring(s,e+1) : clean);
      const props = (obj.proposals||[]).map(p => ({ ...p, accept: true }));
      if (!props.length) { setMsg("No entries matched your rules right now."); setRunning(false); return; }
      setProposals(props); setMsg("");
    } catch(e) { setMsg("Couldn't apply rules: " + (e.message||e)); }
    setRunning(false);
  };

  const applyAccepted = async () => {
    const accepted = (proposals||[]).filter(p => p.accept);
    if (!accepted.length) { setMsg("Nothing selected to apply."); return; }
    setRunning(true); setMsg("Saving changes…");
    let done = 0;
    for (const p of accepted) {
      const e = entries.find(x => x.id === p.id); if (!e) continue;
      const upd = { ...e };
      if (p.addTag) upd.tags = Array.from(new Set([...(e.tags||[]), p.addTag]));
      if (p.reminderDays && p.reminderDays > 0) { upd.reminderDays = p.reminderDays; upd.reminderActive = true; }
      if (p.note) upd.notes = (e.notes ? e.notes + " | " : "") + p.note;
      try { await onSaveEntry(upd); done++; } catch(err) {}
    }
    setMsg("✓ Applied to " + done + " entr" + (done===1?"y":"ies") + "."); setProposals(null); setRunning(false);
    setTimeout(()=>setMsg(""), 3000);
  };

  const inp = { width:"100%", padding:"9px", borderRadius:8, border:"1px solid #ccd", fontSize:13 };
  if (!loaded) return <div style={{padding:20,textAlign:"center",color:"#888"}}>Loading rules…</div>;

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
        <span style={{ fontSize:26 }}>⚖️</span>
        <div><h2 style={{ margin:0, fontSize:18, color:"#3a2a6a" }}>Rules</h2>
        <div style={{ fontSize:11, color:"#7a6a9a" }}>Write rules in plain English. AI applies them — you confirm.</div></div>
      </div>

      {/* Add a rule */}
      <div style={{ background:"#f7f5fc", borderRadius:10, padding:10, marginBottom:12 }}>
        <textarea value={newRule} onChange={e=>setNewRule(e.target.value)} rows={2}
          placeholder='e.g. "Customers given a cash discount — remind me to collect in 7 days" or "Institutional orders (CRPF, KPKB, CPC) are 120-day payment"'
          style={{...inp, resize:"vertical"}}/>
        <button onClick={addRule} style={{ marginTop:8, padding:"8px 16px", borderRadius:8, border:"none", background:"#5a3a9a", color:"#fff", fontWeight:700, cursor:"pointer", fontSize:13 }}>➕ Add rule</button>
      </div>

      {/* Rules list */}
      <div style={{ marginBottom:12 }}>
        <div style={{ fontSize:12, fontWeight:700, color:"#3a2a6a", marginBottom:6 }}>My rules ({rules.length})</div>
        {rules.length===0 && <div style={{ fontSize:11, color:"#999", fontStyle:"italic" }}>No rules yet. Add one above.</div>}
        {rules.map((r, i) => (
          <div key={r.id} style={{ display:"flex", alignItems:"flex-start", gap:8, padding:"8px", borderBottom:"1px solid #eee", background: r.active?"#fff":"#f6f6f6", borderRadius:6, marginBottom:4 }}>
            <input type="checkbox" checked={r.active} onChange={()=>toggleRule(r.id)} title="active" style={{ marginTop:3 }}/>
            {editIdx===i
              ? <div style={{ flex:1 }}>
                  <textarea value={editText} onChange={e=>setEditText(e.target.value)} rows={2} style={inp}/>
                  <button onClick={()=>saveEdit(r.id)} style={{ marginTop:4, fontSize:11, padding:"4px 10px", borderRadius:6, border:"none", background:"#1a7a4a", color:"#fff", cursor:"pointer" }}>Save</button>
                </div>
              : <div style={{ flex:1, fontSize:12.5, color: r.active?"#233":"#999" }}>{r.text}</div>}

            <button onClick={()=>delRule(r.id)} style={{ border:"none", background:"none", color:"#c33", cursor:"pointer", fontSize:15 }}>🗑️</button>
          </div>
        ))}
      </div>

      {/* Run */}
      <button onClick={runRules} disabled={running} style={{ width:"100%", padding:"12px", borderRadius:10, border:"none", background:"linear-gradient(135deg,#5a3a9a,#3a2a6a)", color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer", marginBottom:10 }}>
        {running ? "⏳ Working…" : "▶️ Apply rules to my entries"}
      </button>
      {msg && <div style={{ fontSize:12, color: msg[0]==="✓"?"#1a7a3a":"#a33", marginBottom:8 }}>{msg}</div>}

      {/* Proposals — confirm before applying */}
      {proposals && proposals.length>0 && <div style={{ background:"#f9f9ff", border:"1px solid #d8d0f0", borderRadius:10, padding:12 }}>
        <div style={{ fontSize:12.5, fontWeight:700, color:"#3a2a6a", marginBottom:8 }}>Proposed changes — review, then apply:</div>
        {proposals.map((p, i) => (
          <div key={i} style={{ display:"flex", gap:8, alignItems:"flex-start", padding:"6px 0", borderBottom:"1px solid #eee" }}>
            <input type="checkbox" checked={p.accept} onChange={()=>setProposals(ps=>ps.map((x,j)=>j===i?{...x,accept:!x.accept}:x))} style={{ marginTop:3 }}/>
            <div style={{ flex:1, fontSize:12 }}>
              <div style={{ fontWeight:600, color:"#233" }}>{p.title||p.id}</div>
              <div style={{ color:"#666", fontSize:11 }}>
                Rule: {p.rule}
                {p.addTag ? " · +tag: "+p.addTag : ""}
                {p.reminderDays ? " · remind in "+p.reminderDays+"d" : ""}
                {p.note ? " · "+p.note : ""}
              </div>
            </div>
          </div>
        ))}
        <button onClick={applyAccepted} disabled={running} style={{ marginTop:10, width:"100%", padding:"11px", borderRadius:8, border:"none", background:"#1a7a4a", color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>
          ✓ Apply selected changes
        </button>
      </div>}

      <div style={{ fontSize:10, color:"#999", marginTop:12, fontStyle:"italic" }}>
        Rules are yours — add, edit, deactivate (uncheck), or delete anytime. The AI only proposes; nothing changes until you tap "Apply selected changes". Stored in your own database.
      </div>
    </div>
  );
}

function CSDPayments({ orders, onUpdateDepot, onClose }) {
  const [photo, setPhoto] = useState(null);
  const [busy, setBusy] = useState(false);
  const [pending, setPending] = useState(null);   // parsed statement lines awaiting confirm
  const [msg, setMsg] = useState("");
  const [statements, setStatements] = useState([]);
  const fileRef = useRef(null);

  useEffect(() => { (async () => {
    try { const r = await sheetsAPI("getPortfolio", { key: "csd_payments" }); if (r && r.data && Array.isArray(r.data.statements)) setStatements(r.data.statements); } catch(e) {}
  })(); }, []);
  const persist = async (s) => { try { await sheetsAPI("savePortfolio", { key: "csd_payments", data: { statements: s } }); } catch(e) {} };

  const fmt = n => "₹" + Math.round(Number(n)||0).toLocaleString("en-IN");

  const onPick = ev => {
    const f = ev.target.files && ev.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => setPhoto({ dataUrl: r.result, type: f.type || "image/jpeg" });
    r.readAsDataURL(f);
    setPending(null); setMsg("");
  };

  const scan = async () => {
    if (!photo) return;
    setBusy(true); setMsg("📄 Reading the CSD payment statement…");
    try {
      const b64 = String(photo.dataUrl).split(",")[1];
      const shape = '{"period":"Jan-Feb 2026","bills":[{"billNo":"2025-26/698","billDate":"2025-10-30","billAmt":28479,"crNoteAmt":0,"dbNoteAmt":0,"tdsAmt":-28,"depot":"BDB","docType":"BILL","utr":"PUNBN620260114545899","utrDate":"2026-01-14"}],"totals":{"billAmt":9361908,"crNoteAmt":0,"dbNoteAmt":-34081,"tdsAmt":-8965,"paidAmt":9318862}}';
      const prompt =
        "This is a CSD (Canteen Stores Department) official payment/realisation statement, listing bills grouped under UTR numbers, with bill amount, CR note, DB note (debit note), TDS, and depot code for each line, then a grand total at the end.\\n" +
        "Return ONLY JSON in exactly this shape (example values):\\n" + shape + "\\n" +
        "Include every bill/debit line across all UTR groups in one flat 'bills' array, each carrying its own utr and utrDate. Use the final grand-total block for 'totals'. Dates as YYYY-MM-DD.";
      const txt = await claudeAPI(prompt, "Return ONLY valid JSON. Read every line of every UTR block, do not skip any.", b64, photo.type, "");
      const clean = String(txt||"").replace(/```json/g,"").replace(/```/g,"").trim();
      const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
      const obj = JSON.parse(s>=0 ? clean.substring(s,e+1) : clean);
      setPending(obj); setMsg("");
    } catch(e) { setMsg("❌ Couldn't read it clearly — try a sharper image, or split into fewer pages per upload."); }
    setBusy(false);
  };

  // try to auto-match a debit/bill line to a depot row on an open PO, by depot code + rough amount
  const tryAutoMatch = (line) => {
    for (const o of (orders||[])) {
      for (const d of (o.depots||[])) {
        const depotCode = String(d.depot||"").slice(0,3).toUpperCase();
        if (depotCode && line.depot && depotCode === String(line.depot).toUpperCase()) {
          return { poId: o.id, depot: d.depot };
        }
      }
    }
    return null;
  };

  const confirmStatement = async () => {
    if (!pending) return;
    setBusy(true);
    const bills = pending.bills || [];
    let matched = 0, debitTotal = 0;
    bills.forEach(b => {
      if (Number(b.dbNoteAmt) < 0) debitTotal += Math.abs(Number(b.dbNoteAmt));
      const m = tryAutoMatch(b);
      if (m && onUpdateDepot) {
        matched++;
        // mark that depot as paid, add a note — doesn't overwrite received figure blindly
        onUpdateDepot(m.poId, m.depot, {
          stage: "paid",
          reconciled: true,
          reconcileNote: "CSD statement " + (pending.period||"") + " · bill " + (b.billNo||"") + (b.dbNoteAmt<0 ? (" · debit note " + fmt(Math.abs(b.dbNoteAmt))) : "")
        });
      }
    });
    const rec = {
      id: "stmt_" + Date.now(),
      period: pending.period || "",
      uploaded: new Date().toISOString().slice(0,10),
      billCount: bills.length,
      totals: pending.totals || {},
      matched, debitTotal,
      bills
    };
    const ns = [rec, ...statements];
    setStatements(ns); setPending(null); setPhoto(null);
    setMsg("✓ Statement saved — " + bills.length + " lines, " + matched + " auto-matched to depots" + (debitTotal>0 ? (", " + fmt(debitTotal) + " in debit notes flagged") : ""));
    await persist(ns);
    setBusy(false);
    setTimeout(()=>setMsg(""), 4000);
  };

  const delStatement = async id => { const ns = statements.filter(s=>s.id!==id); setStatements(ns); await persist(ns); };

  const inp = { padding:"9px", borderRadius:8, border:"1px solid #ccd", fontSize:13 };

  // rollup across all saved statements
  const grand = statements.reduce((acc,s) => {
    const t = s.totals||{};
    acc.bill += Number(t.billAmt)||0;
    acc.debit += Number(t.dbNoteAmt)||0;
    acc.tds += Number(t.tdsAmt)||0;
    acc.paid += Number(t.paidAmt)||0;
    return acc;
  }, { bill:0, debit:0, tds:0, paid:0 });

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
        <span style={{ fontSize:24 }}>🧾</span>
        <div><h2 style={{ margin:0, fontSize:17, color:"#2a4a7a" }}>CSD Payment Statements</h2>
        <div style={{ fontSize:11, color:"#6a7a9a" }}>CSD's own realisation statement — proof of what actually landed</div></div>
      </div>

      {statements.length>0 && <div style={{ background:"#f2f6fc", border:"1px solid #d8e0f0", borderRadius:10, padding:"10px 14px", marginBottom:12 }}>
        <div style={{ fontSize:11, color:"#777" }}>ACROSS {statements.length} STATEMENT{statements.length===1?"":"S"} UPLOADED</div>
        <div style={{ fontSize:20, fontWeight:800, color:"#2a4a7a" }}>{fmt(grand.paid)} received</div>
        <div style={{ fontSize:11, color:"#888", marginTop:2 }}>
          billed {fmt(grand.bill)} · debit notes {fmt(Math.abs(grand.debit))} · TDS {fmt(Math.abs(grand.tds))}
        </div>
      </div>}

      <input ref={fileRef} type="file" accept="image/*,application/pdf" onChange={onPick} style={{ display:"none" }}/>
      <button onClick={()=>fileRef.current && fileRef.current.click()} style={{ width:"100%", padding:"11px", borderRadius:10, border:"1.5px dashed #2a4a7a", background:"#f3f7fd", color:"#2a4a7a", fontWeight:700, fontSize:14, cursor:"pointer", marginBottom:10 }}>
        📄 Upload CSD payment statement
      </button>

      {photo && <div style={{ textAlign:"center", marginBottom:10 }}>
        <img src={photo.dataUrl} alt="statement" style={{ maxWidth:"100%", maxHeight:160, borderRadius:8, border:"1px solid #ddd" }}/>
        <button onClick={scan} disabled={busy} style={{ width:"100%", marginTop:8, padding:"11px", borderRadius:10, border:"none", background:"#2a4a7a", color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>
          {busy ? "⏳ Reading…" : "🔍 Read the statement"}
        </button>
      </div>}

      {pending && <div style={{ background:"#f7faff", border:"1px solid #c8d8f0", borderRadius:10, padding:12, marginBottom:12 }}>
        <div style={{ fontSize:13, fontWeight:700, color:"#2a4a7a" }}>{pending.period || "Statement"}</div>
        <div style={{ fontSize:11.5, color:"#666", marginBottom:6 }}>{(pending.bills||[]).length} lines read</div>
        {pending.totals && <div style={{ fontSize:11.5, color:"#334", marginBottom:8 }}>
          Billed {fmt(pending.totals.billAmt)} · Debit notes {fmt(Math.abs(pending.totals.dbNoteAmt||0))} · TDS {fmt(Math.abs(pending.totals.tdsAmt||0))} · <b>Paid {fmt(pending.totals.paidAmt)}</b>
        </div>}
        <button onClick={confirmStatement} disabled={busy} style={{ width:"100%", padding:"11px", borderRadius:10, border:"none", background:"#1a7a4a", color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>
          ✓ Save &amp; reconcile against open depots
        </button>
      </div>}

      {msg && <div style={{ fontSize:12, color: msg[0]==="✓"?"#1a7a3a":"#a33", marginBottom:10 }}>{msg}</div>}

      <div style={{ fontSize:12, fontWeight:700, color:"#2a4a7a", marginBottom:6 }}>Statements on file ({statements.length})</div>
      {statements.length===0 && <div style={{ fontSize:11.5, color:"#999", fontStyle:"italic" }}>None yet. Upload CSD's payment statement as they send it.</div>}
      {statements.map(s => (
        <div key={s.id} style={{ border:"1px solid #e0e6f0", borderRadius:8, padding:10, marginBottom:7 }}>
          <div style={{ display:"flex", justifyContent:"space-between" }}>
            <span style={{ fontWeight:700, fontSize:13, color:"#233" }}>{s.period || "Statement"}</span>
            <span style={{ fontSize:10.5, color:"#999" }}>{s.uploaded}</span>
          </div>
          <div style={{ fontSize:11.5, color:"#555", marginTop:3 }}>
            {s.billCount} lines · {s.matched||0} auto-matched to depots
            {s.debitTotal>0 && <span style={{ color:"#c33" }}> · {fmt(s.debitTotal)} debit notes</span>}
          </div>
          {s.totals && <div style={{ fontSize:11, color:"#1a5a3a", fontWeight:700, marginTop:2 }}>Paid {fmt(s.totals.paidAmt)}</div>}
          <button onClick={()=>delStatement(s.id)} style={{ marginTop:5, fontSize:10.5, border:"none", background:"none", color:"#c33", cursor:"pointer", padding:0 }}>Delete</button>
        </div>
      ))}

      <div style={{ fontSize:10, color:"#999", marginTop:12, fontStyle:"italic" }}>
        Auto-match works by depot code. Unmatched lines are still saved and counted in totals — nothing is lost, matching improves as more POs and statements accumulate.
      </div>
    </div>
  );
}

  const [fcPending, setFcPending] = useState(null);
  const [orders, setOrders] = useState([]);  // [{id, poNo, poDate, deliveryFrom, deliveryTo, lines:[{index,name,casePack,rate,cases}], depots:[{depot, cases:{index:qty}, stage, invoiceNo, lr, transport, received}]}]
  const [photo, setPhoto] = useState(null);
  const [busy, setBusy] = useState(false);
  const [pending, setPending] = useState(null);
  const [msg, setMsg] = useState("");
  const [openPO, setOpenPO] = useState(null);
  const [intel, setIntel] = useState("");
  const fileRef = useRef(null);

  useEffect(() => { (async () => {
    try {
      const r = await sheetsAPI("getPortfolio", { key: "csd" });
      if (r && r.data) {
        if (Array.isArray(r.data.orders)) setOrders(r.data.orders);
        if (Array.isArray(r.data.forecasts)) setForecasts(r.data.forecasts);
      }
    } catch(e) {}
  })(); }, []);
  const persist = async (o, f) => {
    try { await sheetsAPI("savePortfolio", { key: "csd", data: { orders: o !== undefined ? o : orders, forecasts: f !== undefined ? f : forecasts } }); } catch(e) {}
  };

  const fmt = n => "₹" + Math.round(Number(n)||0).toLocaleString("en-IN");
  const num = v => { const n = parseFloat(String(v??"").replace(/[^0-9.]/g,"")); return isNaN(n)?0:n; };

  const onPick = ev => {
    const f = ev.target.files && ev.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => setPhoto({ dataUrl: r.result, type: f.type || "image/jpeg" });
    r.readAsDataURL(f);
    setPending(null); setMsg("");
  };

  const scan = async () => {
    if (!photo) return;
    setBusy(true); setMsg("📄 Reading the CSD order / allocation…");
    try {
      const b64 = String(photo.dataUrl).split(",")[1];
      const shape = '{"poNo":"","poDate":"","deliveryFrom":"","deliveryTo":"","lines":[{"index":"13130","name":"","casePack":240,"rate":7999.2,"cases":178}],"allocation":[{"depot":"CHENNAI","cases":{"13130":20,"13132":11}}]}';
      const prompt =
        "This is a Canteen Stores Department (CSD, Ministry of Defence) purchase order and/or its depot-wise allocation sheet. Extract everything.\n" +
        "Return ONLY JSON in exactly this shape (this is an example, use the real values):\n" + shape + "\n" +
        "The allocation table lists depot names down the left, and one column of case counts per index number. Map each depot to its cases for each index. A blank cell means zero - omit it.\n" +
        "Dates as YYYY-MM-DD.";
      const txt = await claudeAPI(prompt, "Return ONLY valid JSON. Read the depot allocation table carefully, column by column.", b64, photo.type, "");
      const clean = String(txt||"").replace(/```json/g,"").replace(/```/g,"").trim();
      const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
      const obj = JSON.parse(s>=0 ? clean.substring(s,e+1) : clean);
      setPending(obj); setMsg("");
    } catch(e) { setMsg("❌ Couldn't read it clearly — try a sharper image."); }
    setBusy(false);
  };

  const confirmPO = async () => {
    if (!pending) return;
    const depots = (pending.allocation||[]).map(a => ({
      depot: a.depot, cases: a.cases||{}, stage: "pending",
      invoiceNo: "", lr: "", transport: 0, received: 0
    }));
    const o = {
      id: "csd_" + Date.now(),
      poNo: pending.poNo || "", poDate: pending.poDate || "",
      deliveryFrom: pending.deliveryFrom || "", deliveryTo: pending.deliveryTo || "",
      lines: pending.lines || [], depots
    };
    const no = [o, ...orders];
    setOrders(no); setPending(null); setPhoto(null);
    setMsg("✓ PO " + (o.poNo||"") + " saved with " + depots.length + " depots");
    await persist(no);
    setTimeout(()=>setMsg(""), 3000);
  };

  // ---- tentative / forecast allocation ----
  const scanForecast = async () => {
    if (!photo) return;
    setBusy(true); setMsg("🔮 Reading the tentative allocation…");
    try {
      const b64 = String(photo.dataUrl).split(",")[1];
      const fshape = '{"period":"Aug-26","rows":[{"depot":"CHENNAI","cases":{"13094":29,"13095":9,"13130":16,"13132":12}}]}';
      const fprompt =
        "This is a TENTATIVE order quantity sheet from the Canteen Stores Department (CSD) — depots down the left, product index numbers across the top (13094, 13095, 13130, 13132), case counts in the cells.\n" +
        "Return ONLY JSON in exactly this shape (example values):\n" + fshape + "\n" +
        "Include every depot row. Zeros are fine. Ignore the Grand Total row. 'period' is the month it is for.";
      const txt = await claudeAPI(fprompt, "Return ONLY valid JSON. Read the table cell by cell, carefully.", b64, photo.type, "");
      const clean = String(txt||"").replace(/```json/g,"").replace(/```/g,"").trim();
      const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
      const obj = JSON.parse(s>=0 ? clean.substring(s,e+1) : clean);
      setFcPending(obj); setMsg("");
    } catch(e) { setMsg("❌ Couldn't read the sheet clearly."); }
    setBusy(false);
  };

  const confirmForecast = async () => {
    if (!fcPending) return;
    const f = {
      id: "fc_" + Date.now(),
      period: fcPending.period || "",
      uploaded: new Date().toISOString().slice(0,10),
      rows: fcPending.rows || []
    };
    const nf = [f, ...forecasts];
    setForecasts(nf); setFcPending(null); setPhoto(null);
    setMsg("✓ Forecast for " + (f.period||"") + " saved — " + f.rows.length + " depots");
    await persist(undefined, nf);
    setTimeout(()=>setMsg(""), 3000);
  };
  const delForecast = async id => { const nf = forecasts.filter(f=>f.id!==id); setForecasts(nf); await persist(undefined, nf); };

  function forecastTotals(f) {
    const t = {};
    (f.rows||[]).forEach(r => Object.entries(r.cases||{}).forEach(([k,v]) => { t[k] = (t[k]||0) + (Number(v)||0); }));
    return t;
  }
  function forecastValue(f) {
    const t = forecastTotals(f);
    return CSD_PRODUCTS.reduce((s,p) => s + (t[p.index]||0) * p.rate, 0);
  }

  const updDepot = async (poId, depotName, patch) => {
    const no = orders.map(o => o.id!==poId ? o : {
      ...o, depots: o.depots.map(d => d.depot!==depotName ? d : { ...d, ...patch })
    });
    setOrders(no); await persist(no);
  };
  const delPO = async id => { const no = orders.filter(o=>o.id!==id); setOrders(no); await persist(no); };

  // ---- rollups ----
  function poValue(o) {
    return (o.depots||[]).reduce((sum,d) => sum + depotValue(o,d), 0);
  }
  function depotValue(o, d) {
    let v = 0;
    (o.lines||[]).forEach(l => {
      const c = num((d.cases||{})[l.index]);
      if (c > 0) v += c * num(l.rate);
    });
    return v;
  }
  function depotCases(o, d) {
    return (o.lines||[]).reduce((s,l) => s + num((d.cases||{})[l.index]), 0);
  }
  function daysLeft(o) {
    if (!o.deliveryTo) return null;
    const t = Date.parse(o.deliveryTo);
    if (isNaN(t)) return null;
    return Math.ceil((t - Date.now()) / 86400000);
  }

  const askIntel = async () => {
    setBusy(true); setIntel(""); setMsg("");
    try {
      const snap = orders.map(o => ({
        poNo: o.poNo, deliveryTo: o.deliveryTo, daysLeft: daysLeft(o),
        totalValue: Math.round(poValue(o)),
        depots: (o.depots||[]).map(d => ({
          depot: d.depot, cases: depotCases(o,d), value: Math.round(depotValue(o,d)),
          stage: d.stage, transport: num(d.transport), received: num(d.received)
        }))
      }));
      const fsnap = forecasts.map(f => ({ period: f.period, totals: forecastTotals(f), depots: (f.rows||[]).length }));
      const prompt =
"You are analysing Canteen Stores Department (CSD, Ministry of Defence) supply performance for an incense manufacturer.\\n\\n" +
"DATA:\\n" + JSON.stringify(snap, null, 2) + "\n\nTENTATIVE FORECASTS (not yet committed):\n" + JSON.stringify(fsnap, null, 2) + "\\n\\n" +
"Commission to the agent is 14.5% of invoice value, payable only once payment is received.\\n" +
"Delivery windows are strict — CSD accepts NO extension.\\n\\n" +
"Give a short, direct briefing for the owner:\\n" +
"1. DISPATCH RISK — which depots are still not dispatched, and how many days remain. Name them.\\n" +
"2. MONEY — total invoiced, total received, total outstanding, commission accruing.\\n" +
"3. TRANSPORT — anything unusual in freight cost per depot.\\n" +
"4. WHAT TO DO TODAY — 3 concrete actions.\\n\\n" +
"Be blunt. Use ₹. If data is thin, say so rather than inventing.";
      const txt = await claudeAPI(prompt, "You are a sharp operations analyst. Be concise and specific.", "", "", "");
      setIntel(txt || "No briefing generated.");
    } catch(e) { setMsg("Couldn't generate: " + (e.message||e)); }
    setBusy(false);
  };

  const inp = { padding:"6px 8px", borderRadius:6, border:"1px solid #ccd", fontSize:12 };
  const STAGES = ["pending","invoiced","dispatched","delivered","paid"];

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
        <span style={{ fontSize:26 }}>🛡️</span>
        <div><h2 style={{ margin:0, fontSize:18, color:"#2a4a7a" }}>CSD</h2>
        <div style={{ fontSize:11, color:"#6a7a9a" }}>Canteen Stores Department · depot-wise dispatch & payment</div></div>
      </div>

      <div style={{ display:"flex", gap:6, marginBottom:12 }}>
        {[["board","📋 Board"],["forecast","🔮 Forecast"],["upload","📤 Upload"],["payments","🧾 Payments"],["products","📦 Products"],["intel","🧠 Intel"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{ flex:1, padding:"8px 4px", borderRadius:8, border: tab===k?"2px solid #2a4a7a":"1px solid #ccc", background: tab===k?"#e8eefa":"#fff", color:"#2a4a7a", fontWeight:700, cursor:"pointer", fontSize:11.5 }}>{l}</button>
        ))}
      </div>

      {msg && <div style={{ fontSize:12, color: msg[0]==="✓"?"#1a7a3a":"#a33", marginBottom:8 }}>{msg}</div>}

      {/* ---------- BOARD ---------- */}
      {tab==="board" && <div>
        {orders.length===0 && <div style={{ fontSize:12, color:"#999", fontStyle:"italic" }}>No CSD orders yet. Upload a purchase order and its allocation sheet.</div>}
        {orders.map(o => {
          const dl = daysLeft(o);
          const dispatched = (o.depots||[]).filter(d=>["dispatched","delivered","paid"].indexOf(d.stage)>-1).length;
          const totalDepots = (o.depots||[]).length;
          const val = poValue(o);
          const recd = (o.depots||[]).reduce((s,d)=>s+num(d.received),0);
          const transport = (o.depots||[]).reduce((s,d)=>s+num(d.transport),0);
          const commission = val * AGENT1_RATE;
          const isOpen = openPO===o.id;
          return (
            <div key={o.id} style={{ border:"1px solid #d8e0f0", borderRadius:10, marginBottom:10, overflow:"hidden" }}>
              <div onClick={()=>setOpenPO(isOpen?null:o.id)} style={{ background:"#f2f6fc", padding:"10px 12px", cursor:"pointer" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontWeight:800, color:"#2a4a7a", fontSize:14 }}>PO {o.poNo||"—"}</span>
                  <span style={{ fontSize:11, color:"#666" }}>{isOpen?"▾":"▸"} {totalDepots} depots</span>
                </div>
                <div style={{ fontSize:11.5, color:"#555", marginTop:3 }}>
                  {fmt(val)} · dispatched {dispatched}/{totalDepots}
                  {dl!==null && <span style={{ color: dl<7 ? "#c33" : dl<15 ? "#8a5a1a" : "#1a7a3a", fontWeight:700 }}>
                    {" · "}{dl<0 ? ("OVERDUE by "+Math.abs(dl)+"d") : (dl+" days left")}
                  </span>}
                </div>
                <div style={{ fontSize:10.5, color:"#777", marginTop:2 }}>
                  Received {fmt(recd)} · outstanding {fmt(val-recd)} · transport {fmt(transport)} · agent 14.5% = {fmt(commission)}
                </div>
              </div>

              {isOpen && <div style={{ padding:"6px 8px" }}>
                {(o.depots||[]).map(d => {
                  const dv = depotValue(o,d);
                  const dc = depotCases(o,d);
                  const isUP = UP_DEPOTS.indexOf(String(d.depot).toUpperCase())>-1;
                  return (
                    <div key={d.depot} style={{ borderBottom:"1px solid #eee", padding:"7px 4px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ fontWeight:700, fontSize:12.5, color:"#233" }}>
                          {d.depot} {isUP && <span title="Halal-certified products must NOT be supplied to UP depots" style={{ fontSize:9, background:"#fff0e0", color:"#8a4a00", border:"1px solid #d0a060", borderRadius:8, padding:"1px 5px", marginLeft:4 }}>⚠ UP · Halal check</span>}
                        </span>
                        <span style={{ fontSize:11, color:"#555" }}>{dc} cases · {fmt(dv)}</span>
                      </div>
                      <div style={{ display:"flex", gap:3, marginTop:5 }}>
                        {STAGES.map(s=>{
                          const done = STAGES.indexOf(d.stage||"pending") >= STAGES.indexOf(s);
                          return <button key={s} onClick={()=>updDepot(o.id,d.depot,{stage:s})}
                            style={{ flex:1, padding:"4px 1px", borderRadius:5, fontSize:8.5, fontWeight:700, cursor:"pointer",
                              border:"1px solid "+(done?"#2a4a7a":"#ddd"), background:done?"#2a4a7a":"#fff", color:done?"#fff":"#aaa" }}>
                            {s==="pending"?"⏳":s==="invoiced"?"📄":s==="dispatched"?"🚚":s==="delivered"?"📦":"💰"} {s}
                          </button>;
                        })}
                      </div>
                      <div style={{ display:"flex", gap:5, marginTop:5, flexWrap:"wrap", alignItems:"center" }}>
                        <input value={d.invoiceNo||""} onChange={e=>updDepot(o.id,d.depot,{invoiceNo:e.target.value})} placeholder="invoice no" style={{...inp, width:95}}/>
                        <input value={d.lr||""} onChange={e=>updDepot(o.id,d.depot,{lr:e.target.value})} placeholder="LR no" style={{...inp, width:85}}/>
                        <input type="number" value={d.transport||""} onChange={e=>updDepot(o.id,d.depot,{transport:Number(e.target.value)||0})} placeholder="freight ₹" style={{...inp, width:80}}/>
                        <input type="number" value={d.received||""} onChange={e=>updDepot(o.id,d.depot,{received:Number(e.target.value)||0})} placeholder="received ₹" style={{...inp, width:90}}/>
                        <button onClick={()=>updDepot(o.id,d.depot,{received:Math.round(dv), stage:"paid"})} style={{ fontSize:10, padding:"4px 8px", borderRadius:12, border:"1px solid #1a7a4a", background:"#fff", color:"#1a7a4a", cursor:"pointer" }}>Paid in full</button>
                      </div>
                    </div>
                  );
                })}
                <button onClick={()=>delPO(o.id)} style={{ marginTop:8, fontSize:11, border:"none", background:"none", color:"#c33", cursor:"pointer" }}>Delete this PO</button>
              </div>}
            </div>
          );
        })}
      </div>}

      {/* ---------- FORECAST ---------- */}
      {tab==="forecast" && <div>
        <div style={{ background:"#f5f0fc", border:"1px solid #d8c8f0", borderRadius:8, padding:10, marginBottom:10, fontSize:11.5, color:"#4a2a8a" }}>
          Tentative quantities CSD sends ahead of the formal PO. Use it to plan production — but it is <b>not committed business</b> until the PO arrives.
        </div>
        {forecasts.length===0 && <div style={{ fontSize:12, color:"#999", fontStyle:"italic" }}>No forecasts yet. Upload a tentative order sheet from the Upload tab.</div>}
        {forecasts.map(f => {
          const t = forecastTotals(f);
          const val = forecastValue(f);
          const totalCases = Object.values(t).reduce((s,v)=>s+v,0);
          // did a real PO land for this period?
          const matched = orders.filter(o => {
            const tot = {};
            (o.depots||[]).forEach(d => Object.entries(d.cases||{}).forEach(([k,v]) => { tot[k]=(tot[k]||0)+(Number(v)||0); }));
            return Object.keys(tot).length>0;
          });
          return (
            <div key={f.id} style={{ border:"1px solid #ddd", borderRadius:10, padding:11, marginBottom:9, background:"#fdfcff" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ fontWeight:800, color:"#4a2a8a", fontSize:14 }}>🔮 {f.period || "Tentative"}</span>
                <span style={{ fontSize:11, color:"#777" }}>{(f.rows||[]).length} depots</span>
              </div>
              <div style={{ fontSize:12, color:"#555", marginTop:4 }}>
                <b>{totalCases} cases</b> · approx {fmt(val)} at current rates
              </div>
              <div style={{ marginTop:7 }}>
                {CSD_PRODUCTS.map(p => (
                  <div key={p.index} style={{ display:"flex", justifyContent:"space-between", fontSize:11.5, padding:"2px 0", color:"#334" }}>
                    <span>{p.index} — {p.name.replace('ONAM ','').replace(' (100 Sticks)','')}</span>
                    <span style={{ fontWeight:700 }}>{t[p.index]||0} cases</span>
                  </div>
                ))}
              </div>
              <details style={{ marginTop:7 }}>
                <summary style={{ fontSize:11, color:"#4a2a8a", cursor:"pointer" }}>Depot breakdown</summary>
                <div style={{ marginTop:5, maxHeight:180, overflowY:"auto" }}>
                  {(f.rows||[]).map((r,i)=>{
                    const rc = Object.values(r.cases||{}).reduce((s,v)=>s+(Number(v)||0),0);
                    const zero = rc===0;
                    return (
                      <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:11, padding:"3px 2px", borderBottom:"1px solid #f0f0f0", color: zero?"#bbb":"#334" }}>
                        <span>{r.depot}{zero && <span style={{ fontSize:9, marginLeft:5, color:"#c88" }}>— nothing ordered</span>}</span>
                        <span>{CSD_PRODUCTS.map(p=>(r.cases||{})[p.index]||0).join(" · ")}</span>
                      </div>
                    );
                  })}
                </div>
              </details>
              <button onClick={()=>delForecast(f.id)} style={{ marginTop:7, fontSize:10.5, border:"none", background:"none", color:"#c33", cursor:"pointer", padding:0 }}>Delete</button>
            </div>
          );
        })}
      </div>}

      {/* ---------- UPLOAD ---------- */}
      {tab==="upload" && <div>
        <div style={{ background:"#eef3fb", border:"1px solid #c8d8f0", borderRadius:8, padding:10, marginBottom:10, fontSize:11.5, color:"#2a4a7a" }}>
          Upload the CSD purchase order <b>and</b> its depot-wise allocation sheet. The allocation creates one dispatch row per depot.
        </div>
        <input ref={fileRef} type="file" accept="image/*,application/pdf" onChange={onPick} style={{ display:"none" }}/>
        <button onClick={()=>fileRef.current && fileRef.current.click()} style={{ width:"100%", padding:"11px", borderRadius:10, border:"1.5px dashed #2a4a7a", background:"#f3f7fd", color:"#2a4a7a", fontWeight:700, fontSize:14, cursor:"pointer", marginBottom:10 }}>
          📄 Upload PO / allocation
        </button>
        {photo && <div style={{ textAlign:"center", marginBottom:10 }}>
          <img src={photo.dataUrl} alt="po" style={{ maxWidth:"100%", maxHeight:170, borderRadius:8, border:"1px solid #ddd" }}/>
          <div style={{ display:"flex", gap:8, marginTop:8 }}>
            <button onClick={scan} disabled={busy} style={{ flex:1, padding:"11px 6px", borderRadius:10, border:"none", background:"#2a4a7a", color:"#fff", fontWeight:700, fontSize:12.5, cursor:"pointer" }}>
              {busy ? "⏳…" : "📄 Read as PO"}
            </button>
            <button onClick={scanForecast} disabled={busy} style={{ flex:1, padding:"11px 6px", borderRadius:10, border:"none", background:"#5a3a9a", color:"#fff", fontWeight:700, fontSize:12.5, cursor:"pointer" }}>
              {busy ? "⏳…" : "🔮 Read as forecast"}
            </button>
          </div>
          <div style={{ fontSize:10, color:"#999", marginTop:5, fontStyle:"italic" }}>
            A formal purchase order creates the dispatch board. A tentative sheet is saved as a forecast only.
          </div>
        </div>}

        {fcPending && <div style={{ background:"#faf7ff", border:"1px solid #d8c8f0", borderRadius:10, padding:12, marginTop:10 }}>
          <div style={{ fontSize:13, fontWeight:700, color:"#4a2a8a" }}>🔮 Tentative — {fcPending.period || "period?"}</div>
          <div style={{ fontSize:11.5, color:"#555", marginTop:3 }}>{(fcPending.rows||[]).length} depots read</div>
          <button onClick={confirmForecast} style={{ width:"100%", marginTop:10, padding:"11px", borderRadius:10, border:"none", background:"#5a3a9a", color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>
            ✓ Save as forecast
          </button>
        </div>}

        {pending && <div style={{ background:"#f7faff", border:"1px solid #c8d8f0", borderRadius:10, padding:12 }}>
          <div style={{ fontSize:13, fontWeight:700, color:"#2a4a7a" }}>PO {pending.poNo||"—"} · {pending.poDate||""}</div>
          <div style={{ fontSize:11, color:"#666", marginBottom:6 }}>Delivery {pending.deliveryFrom||"?"} to {pending.deliveryTo||"?"}</div>
          {(pending.lines||[]).map((l,i)=>(
            <div key={i} style={{ fontSize:11.5, color:"#334", padding:"2px 0" }}>
              • {l.index} — {l.name} — {l.cases} cases @ {fmt(l.rate)}/case
            </div>
          ))}
          <div style={{ fontSize:11.5, color:"#2a4a7a", fontWeight:700, marginTop:6 }}>
            {(pending.allocation||[]).length} depots in the allocation
          </div>
          <button onClick={confirmPO} style={{ width:"100%", marginTop:10, padding:"11px", borderRadius:10, border:"none", background:"#1a7a4a", color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>
            ✓ Save PO &amp; create depot board
          </button>
        </div>}
      </div>}

      {/* ---------- PAYMENTS ---------- */}
      {tab==="payments" && <CSDPayments orders={orders} onUpdateDepot={updDepot} onClose={()=>{}}/>}

      {/* ---------- PRODUCTS ---------- */}
      {tab==="products" && <div>
        <div style={{ fontSize:11.5, color:"#777", marginBottom:8 }}>The four CSD-exclusive products. COGS to be filled after the price revision.</div>
        {CSD_PRODUCTS.map(p=>(
          <div key={p.index} style={{ border:"1px solid #e0e6f0", borderRadius:8, padding:9, marginBottom:6 }}>
            <div style={{ fontSize:12.5, fontWeight:700, color:"#2a4a7a" }}>{p.index}{p.suffix} — {p.name}</div>
            <div style={{ fontSize:11, color:"#666", marginTop:2 }}>
              {p.casePack} per case · {fmt(p.rate)} per case
              {p.cogs>0
                ? <span style={{ color:"#1a7a3a", fontWeight:700 }}> · GP {fmt(p.rate-p.cogs)}</span>
                : <span style={{ color:"#b07a2a" }}> · COGS pending</span>}
            </div>
          </div>
        ))}
      </div>}

      {/* ---------- INTELLIGENCE ---------- */}
      {tab==="intel" && <div>
        <div style={{ fontSize:11.5, color:"#777", marginBottom:10 }}>
          Ask the data what it knows — dispatch risk, money, freight, what to do today.
        </div>

             osPct: sales?outstanding/sales*100:0, gpPct: sales?gp/sales*100:0 };

  const persistAlertFloor = async (f) => { setAlertFloor(f); try{ await sheetsAPI("savePortfolio",{key:"spectrum_alertcfg",user:"main",data:{floor:f}}); }catch(e){} };

  // ===== WATCHDOG: recomputes on every load; flags anything sliding into loss =====
  function computeWatch(){
    const brand=[], invoice=[]; let channel=null;
    // brand-level: any costed brand whose net/doz < 0
    costItems.forEach(it=>{
      const rm=(it.rawIncense||0)+(it.perfume||0)+(it.packaging||0)+(it.labour||0);
      if(!rm) return; // RM not yet entered — not judged
      const c=(it.real||0)-rm-(it.freight||0);
      if(c<0) brand.push({name:it.name, net:Math.round(c*100)/100, annual:Math.round(c*(it.vol||0))});
    });
    // master brands flagged loss (gp<0) — catches pushed net brands
    master.forEach(m=>{ if((m.gp||0)<0 && !costItems.some(c=>c.sku===m.sku)) brand.push({name:m.name, net:m.gp, annual:null}); });
    // invoice-level: orders (last 60) that net below zero using master gp
    const now=Date.now();
    orders.forEach(o=>{
      const dt=new Date(o.date); if(isNaN(dt)||(now-dt.getTime())>60*86400000) return;
      const net=(o.lines||[]).reduce((s,l)=>{ const m=master.find(x=>x.sku===l.sku); return s+(m?m.gp*(l.doz||0):0); },0);
      if(net<0) invoice.push({cust:o.customer||"—", off:o.officer, date:o.date, net:Math.round(net)});
    });
    invoice.sort((a,b)=>a.net-b.net);
    // channel-level: current-month spectrum contribution %
    const mk=d=>{const x=new Date(d);return isNaN(x)?null:(x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0"));};
    const cm=mk(new Date().toISOString());
    const mo=orders.filter(o=>mk(o.date)===cm);
    if(mo.length){
      const sales=mo.reduce((s,o)=>s+(Number(o.total)||0),0);
      const gp=mo.reduce((s,o)=>s+(Number(o.gpTotal)||0),0);
      const pct=sales?Math.round(gp/sales*1000)/10:0;
      if(pct<alertFloor) channel={pct, floor:alertFloor, sales:Math.round(sales), gp:Math.round(gp)};
    }
    return {brand, invoice:invoice.slice(0,8), channel, count:brand.length+invoice.length+(channel?1:0)};
  }

  // product rollups
  function productStats(){
    const map={};
    orders.forEach(o=>o.lines.forEach(l=>{ if(!map[l.name])map[l.name]={doz:0,gp:0}; map[l.name].doz+=l.doz||0; map[l.name].gp+=l.gp||0; }));
    return Object.entries(map).map(([name,v])=>({name,...v})).sort((a,b)=>b.gp-a.gp);
  }

  const inp={padding:"7px 8px",borderRadius:6,border:"1px solid #ccd",fontSize:12.5};

  return (
    <div style={{padding:4}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <span style={{fontSize:26}}>🌈</span>
        <div><h2 style={{margin:0,fontSize:18,color:"#3a2a6a"}}>Spectrum</h2>
        <div style={{fontSize:11,color:"#7a6a9a"}}>Salesperson profitability &mdash; tag orders, track who earns their keep</div></div>
      </div>

      {IS_OWNER && (()=>{
        const w=computeWatch();
        if(!w.count) return <div style={{background:"#eef7ef",border:"1px solid #bfe0c5",borderRadius:8,padding:"8px 11px",marginBottom:10,fontSize:11.5,color:"#2a6a3a",fontWeight:600}}>✓ Watchdog active — nothing in loss right now. I'll flag any brand, invoice, or month that slips.</div>;
        return <div onClick={()=>setTab("reports")} style={{background:"#fdeeee",border:"2px solid #e0a0a0",borderRadius:8,padding:"9px 11px",marginBottom:10,cursor:"pointer"}}>
          <div style={{fontSize:12.5,fontWeight:800,color:"#c33"}}>⚠ Watchdog: {w.count} thing{w.count>1?"s":""} in loss — tap for detail</div>
          <div style={{fontSize:10.5,color:"#a55",marginTop:2}}>
            {w.brand.length>0 && <span>{w.brand.length} brand{w.brand.length>1?"s":""} below zero ({w.brand.slice(0,2).map(b=>b.name.split("—")[0].trim()).join(", ")}{w.brand.length>2?"…":""}). </span>}
            {w.invoice.length>0 && <span>{w.invoice.length} recent invoice{w.invoice.length>1?"s":""} net-negative. </span>}
            {w.channel && <span>This month {w.channel.pct}% &lt; {w.channel.floor}% floor.</span>}
          </div>
        </div>;
      })()}

      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[["upload","📤 Upload"],["orders","📋 Orders"],["officers","👥 Officers"],["products","📦 Products"],["reports","📊 Reports"],["costing","💠 Costing"],["growth","🚀 Growth"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px",borderRadius:8,border:tab===k?"2px solid #5a3a9a":"1px solid #ccc",background:tab===k?"#f0eafa":"#fff",color:"#3a2a6a",fontWeight:700,cursor:"pointer",fontSize:12}}>{l}</button>
        ))}
      </div>

      {IS_OWNER && (() => {
        const totSales = orders.reduce((s,o)=>s+(o.total||0),0);
        const totGP = orders.reduce((s,o)=>s+(o.gpTotal||0),0);
        const pct = totSales? Math.round(totGP/totSales*10000)/100 : 0;
        return <div style={{background:"linear-gradient(135deg,#3a2a6a,#5a3a9a)",borderRadius:12,padding:"12px 14px",color:"#fff",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div><div style={{fontSize:10,opacity:.85,letterSpacing:".05em"}}>TOTAL SALES VALUE</div><div style={{fontSize:19,fontWeight:800}}>{fmt(totSales)}</div></div>
          <div><div style={{fontSize:10,opacity:.85,letterSpacing:".05em"}}>TOTAL PROFIT</div><div style={{fontSize:19,fontWeight:800}}>{fmt(totGP)}</div></div>
          <div><div style={{fontSize:10,opacity:.85,letterSpacing:".05em"}}>PROFIT %</div><div style={{fontSize:19,fontWeight:800}}>{pct}%</div></div>
        </div>;
      })()}
      {msg && <div style={{fontSize:12,color:msg[0]==="✓"?"#1a7a3a":"#a33",marginBottom:8}}>{msg}</div>}

      {tab==="upload" && <div>
        <input ref={fileRef} type="file" accept="image/*,application/pdf" onChange={onPick} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{width:"100%",padding:"11px",borderRadius:10,border:"1.5px dashed #7a5aba",background:"#f5f0fc",color:"#4a2a8a",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:10}}>📄 Upload / snap sales order (photo or PDF)</button>
        {photo && <div style={{textAlign:"center",marginBottom:10}}>
          {(photo.type||"").indexOf("pdf")>-1 ? <div style={{padding:"16px",background:"#f4f0fa",borderRadius:8,border:"1px solid #d8c8f0",fontSize:13,color:"#5a3a9a",fontWeight:700}}>📄 PDF ready — {photo.name||"sales order"}</div> : <img src={photo.dataUrl} alt="order" style={{maxWidth:"100%",maxHeight:160,borderRadius:8,border:"1px solid #ddd"}}/>}
          <button onClick={scanOrder} disabled={busy} className="bg" style={{width:"100%",marginTop:8}}>{busy?"⏳ Reading…":"🔍 Scan & match products"}</button>
        </div>}

        {pending && <div style={{background:"#faf8ff",border:"2px solid #7a5aba",borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{background:"#f0eafa",border:"1px solid #c8b0e8",borderRadius:8,padding:"8px 10px",marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:800,color:"#4a2a8a"}}>✋ STEP 1 · Confirm quantities before profit is calculated</div>
            <div style={{fontSize:10.5,color:"#6a5a8a",marginTop:2}}>OCR can misread (e.g. 810 instead of 81). Edit any dozen count below — profit recalculates live. Nothing is saved until you tag & save.</div>
          </div>
          <div style={{fontSize:13,fontWeight:700,color:"#3a2a6a"}}>{pending.customer||"Order"} {pending.orderNo?("· "+pending.orderNo):""}</div>
          <div style={{fontSize:11,color:"#777",marginBottom:8,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span>{pending.date} ·</span>
            <span>Order value ₹</span>
            <input type="number" value={pending.grandTotal||""} onChange={e=>setPending({...pending,grandTotal:Number(e.target.value)||0})} placeholder="0" style={{width:90,padding:"4px 6px",borderRadius:6,border:"1.5px solid #b8a0d8",fontSize:11.5,fontWeight:700,color:"#3a2a6a"}}/>
            <span>· Gross profit <b style={{color:"#1a7a3a"}}>{fmt(pending.gpTotal)}</b></span>
          </div>
          {pending.lines.map((l,i)=>{
            const big = (l.doz||0)>500;
            return (
            <div key={i} style={{border:"1px solid "+(big?"#e0a0a0":l.matched?"#e0d8f0":"#e8c8c8"),background:big?"#fdf3f3":"#fff",borderRadius:8,padding:"7px 8px",marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
                <span style={{fontSize:12,color:l.matched?"#233":"#a33",flex:1}}>{l.matched?"✓":"⚠"} {l.name}</span>
                <button onClick={()=>delPendingLine(i)} style={{border:"none",background:"none",color:"#c33",cursor:"pointer",fontSize:15,padding:"0 2px"}}>×</button>

              <div style={{display:"flex",gap:6,alignItems:"center",marginTop:5,flexWrap:"wrap"}}>
                <label style={{fontSize:10,color:"#666",fontWeight:700}}>QTY</label>
                <input type="number" step="0.5" value={l.doz||""} onChange={e=>updPendingDoz(i,e.target.value)}
                  style={{width:75,padding:"6px",borderRadius:6,border:"2px solid #c8a020",background:"#fffdf2",fontSize:13,fontWeight:800,textAlign:"center",color:"#2a1a00"}}/>
                <span style={{fontSize:10.5,color:"#888"}}>doz</span>
                <span style={{marginLeft:"auto",fontWeight:800,fontSize:12.5,color:l.matched?"#1a7a3a":"#a33"}}>{l.matched?fmt(l.gp)+" GP":"unmatched"}</span>
              </div>
              {big && <div style={{fontSize:10,color:"#c33",fontWeight:700,marginTop:4}}>⚠ {l.doz} dozen looks unusually large — double-check against the paper invoice.</div>}
              {!l.matched && <select defaultValue="" onChange={e=>rematchPendingLine(i,e.target.value)} style={{width:"100%",marginTop:5,padding:"6px",borderRadius:6,border:"1px solid #d0a0a0",fontSize:11,color:"#3a2a6a",background:"#fff8f8"}}>
                <option value="">🔗 Match to a product…</option>
                {master.map(m=><option key={m.sku} value={m.sku}>{m.name} — GP {fmt(m.gp)}/doz</option>)}
              </select>}
            </div>);
          })}
          {(()=>{
            const t = Number(beTransport)||0;
            const perDoz = l => { const m=master.find(x=>x.sku===l.sku); return m?m.gp:0; };
            const lossLines = pending.lines.filter(l=>l.matched && (l.doz||0)>0 && (perDoz(l)-t)<0);
            const profitLines = pending.lines.filter(l=>l.matched && (l.doz||0)>0 && (perDoz(l)-t)>0)
                                  .sort((a,b)=>(perDoz(b)-t)-(perDoz(a)-t));
            if(!lossLines.length) return null;
            const hole = lossLines.reduce((s,l)=>s+(l.doz||0)*(perDoz(l)-t),0); // negative
            const holeAbs = Math.abs(hole);
            const netInvoice = pending.lines.reduce((s,l)=> l.matched ? s+(l.doz||0)*(perDoz(l)-t) : s, 0);
            const covered = netInvoice>=0;
            const be={fontSize:11.5,padding:"4px 0",borderBottom:"1px solid #f0dcc8",display:"flex",justifyContent:"space-between",gap:8};
            return <div style={{background:"#fff6ef",border:"2px solid #e0a060",borderRadius:10,padding:"10px 11px",margin:"10px 0"}}>
              <div style={{fontSize:12.5,fontWeight:800,color:"#a34a00"}}>🎯 Loss-cover / break-even on this invoice</div>
              <div style={{fontSize:10.5,color:"#8a5a2a",marginTop:3,marginBottom:8}}>
                Loss item{lossLines.length>1?"s":""}: <b>{lossLines.map(l=>l.name+" ("+l.doz+"dz)").join(", ")}</b>. How much profitable product must sell to wipe this loss ↓
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
                <label style={{fontSize:10,color:"#8a5a2a",fontWeight:800}}>Transport & other ₹/doz</label>
                <input type="number" value={beTransport||""} onChange={e=>setBeTransport(Number(e.target.value)||0)} placeholder="0" style={{width:66,padding:"5px",borderRadius:6,border:"1.5px solid #e0a060",background:"#fffdf8",fontSize:12.5,fontWeight:800,textAlign:"center",color:"#a34a00"}}/>
                <span style={{fontSize:9.5,color:"#b89",fontStyle:"italic"}}>set from master tomorrow · applied to every dozen</span>
              </div>
              <div style={{background:"#fff",borderRadius:8,padding:"8px 10px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5}}>
                  <span style={{color:"#a34a00",fontWeight:700}}>Loss to cover</span>
                  <b style={{color:"#c33"}}>{fmt(holeAbs)}</b>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,marginTop:4,paddingTop:4,borderTop:"1px dashed #eee"}}>
                  <span style={{fontWeight:700,color:covered?"#1a7a3a":"#c33"}}>{covered?"✓ This invoice already covers it":"✗ This invoice is still short"}</span>
                  <b style={{color:covered?"#1a7a3a":"#c33"}}>{covered?"net +"+fmt(netInvoice):"−"+fmt(Math.abs(netInvoice))}</b>
                </div>
                <div style={{fontSize:9.5,color:"#999",marginTop:3}}>net = every line's (GP/doz − transport) × dozens, after transport ₹{t}/doz</div>
              </div>
              {profitLines.length>0 ? <div>
                <div style={{fontSize:10.5,color:"#8a5a2a",fontWeight:800,marginBottom:2}}>Dozens of each profit item needed to cover the whole {fmt(holeAbs)} loss on its own:</div>
                {profitLines.map((l,i)=>{
                  const g=perDoz(l)-t; const need=g>0?holeAbs/g:0; const have=l.doz||0; const ok=have>=need;
                  return <div key={i} style={be}>
                    <span>{ok?"✅":"➕"} {l.name} <span style={{color:"#999"}}>(₹{Math.round(g)}/doz net)</span></span>
                    <span style={{whiteSpace:"nowrap"}}><b>{need.toFixed(1)} dz</b> <span style={{color:ok?"#1a7a3a":"#c33"}}>· have {have}{ok?" ✓":" (add "+(need-have).toFixed(1)+")"}</span></span>
                  </div>;
                })}
              </div> : <div style={{fontSize:11.5,color:"#c33",fontWeight:700,background:"#fdeaea",borderRadius:8,padding:"8px 10px"}}>
                ⚠ No profitable item on this invoice to offset the loss. Don't ship {lossLines.map(l=>l.name).join(", ")} standalone — this invoice loses {fmt(holeAbs)}.
              </div>}
            </div>;
          })()}

          <div style={{background:"#f0eafa",border:"1px solid #c8b0e8",borderRadius:8,padding:"8px 10px",margin:"10px 0 8px"}}>
            <div style={{fontSize:12,fontWeight:800,color:"#4a2a8a"}}>✋ STEP 2 · Quantities correct? Tag the salesperson & save</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <select value={tagOfficer} onChange={e=>setTagOfficer(e.target.value)} style={inp}>
              <option value="">Tag salesperson…</option>
              {OFFICERS.map(o=><option key={o} value={o}>{o}</option>)}
            </select>
            <button onClick={confirmOrder} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#5a3a9a",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>✓ Confirm quantities · Save & tag</button>
            <button onClick={()=>{setPending(null);setMsg("");}} style={{padding:"8px 12px",borderRadius:8,border:"1px solid #ccc",background:"#fff",color:"#777",cursor:"pointer",fontSize:12}}>✕ Discard</button>
          </div>
          <div style={{fontSize:10,color:"#999",marginTop:6,fontStyle:"italic"}}>Unmatched (⚠) items: use the "Match to a product" dropdown above, or add the product in the Products tab. Matched lines count toward profit.</div>
        </div>}

        <div style={{fontSize:12,fontWeight:700,color:"#3a2a6a",marginTop:8,marginBottom:4}}>Recent tagged orders</div>
        {orders.length===0 && <div style={{fontSize:11,color:"#999",fontStyle:"italic"}}>No orders yet. Upload one above.</div>}
        {orders.slice(0,10).map(o=>(
          <div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,padding:"6px 8px",borderBottom:"1px solid #eee"}}>
            <span><b style={{color:"#5a3a9a"}}>{o.officer}</b> · {o.customer||"—"} · {o.date}</span>
            <span>{fmt(o.gpTotal)} GP <button onClick={()=>delOrder(o.id)} style={{border:"none",background:"none",color:"#c33",cursor:"pointer"}}>×</button></span>
          </div>
        ))}
      </div>}

      {tab==="orders" && <div>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          <input value={ordSearch} onChange={e=>setOrdSearch(e.target.value)} placeholder="Search customer / order no…" style={{flex:2,padding:"7px 8px",borderRadius:6,border:"1px solid #ccd",fontSize:12.5}}/>
          <select value={ordOfficer} onChange={e=>setOrdOfficer(e.target.value)} style={{flex:1,padding:"7px",borderRadius:6,border:"1px solid #ccd",fontSize:12}}>
            <option value="">All officers</option>
            {OFFICERS.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>
        {(() => {
          let list=orders.slice();
          if(ordOfficer) list=list.filter(o=>o.officer===ordOfficer);
          if(ordSearch){ const q=ordSearch.toLowerCase(); list=list.filter(o=>((o.customer||"")+" "+(o.orderNo||"")+" "+(o.officer||"")).toLowerCase().indexOf(q)>-1); }
          if(!list.length) return <div style={{fontSize:12,color:"#999",fontStyle:"italic",padding:12,textAlign:"center"}}>No matching orders.</div>;
          return <div style={{maxHeight:"58vh",overflowY:"auto"}}>
            <div style={{fontSize:11,color:"#777",marginBottom:6}}>{list.length} order{list.length===1?"":"s"}{IS_OWNER?(" · GP "+fmt(list.reduce((s,o)=>s+(o.gpTotal||0),0))):""}</div>
            {list.map(o=>{
              const STAGES=["invoiced","dispatched","delivered","paid"];
              const stage=o.stage||"invoiced";
              const total=Number(o.total)||0;
              const recd=Number(o.received)||0;
              const due=Math.max(0,total-recd);
              const transport=Number(o.transport)||0;
              const isAgent2=(o.officer===AGENT2);
              const commission=isAgent2?(total*AGENT2_RATE):0;
              const commissionDue=isAgent2 && recd>0;   // payable on realisation only
              const netProfit=(Number(o.gpTotal)||0)-transport-commission;
              return (
              <div key={o.id} style={{border:"1px solid "+(due<=0.5?"#cfe0cf":"#eee"),background:due<=0.5?"#f7fbf7":"#fff",borderRadius:8,padding:"9px 10px",marginBottom:7}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:700,color:"#3a2a6a",fontSize:13}}>{o.customer||"Customer"}</span>
                  <span style={{fontSize:11,color:"#777"}}>{o.date}</span>
                </div>
                <div style={{fontSize:11.5,color:"#555",marginTop:2}}>
                  <b style={{color:"#5a3a9a"}}>{o.officer}</b>{o.orderNo?(" · #"+o.orderNo):""} · Value {fmt(total)}{IS_OWNER?(" · GP "+fmt(o.gpTotal||0)):""}
                </div>

                {/* stage pipeline */}
                <div style={{display:"flex",gap:4,marginTop:7}}>
                  {STAGES.map(s=>{
                    const done=STAGES.indexOf(stage)>=STAGES.indexOf(s);
                    return <button key={s} onClick={()=>updOrder(o.id,{stage:s})}
                      style={{flex:1,padding:"5px 2px",borderRadius:6,fontSize:9.5,fontWeight:700,cursor:"pointer",
                        border:"1px solid "+(done?"#1a7a4a":"#ddd"),
                        background:done?"#1a7a4a":"#fff",color:done?"#fff":"#999"}}>
                      {s==="invoiced"?"📄 Invoiced":s==="dispatched"?"🚚 Dispatched":s==="delivered"?"📦 Delivered":"💰 Paid"}
                    </button>;
                  })}
                </div>

                {IS_OWNER && <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  <label style={{fontSize:10.5,color:"#666"}}>Transport ₹</label>
                  <input type="number" value={o.transport||""} onChange={e=>updOrder(o.id,{transport:Number(e.target.value)||0})}
                    placeholder="freight" style={{width:80,padding:"5px 6px",borderRadius:6,border:"1px solid #ccd",fontSize:11.5}}/>
                  <label style={{fontSize:10.5,color:"#666"}}>Received ₹</label>
                  <input type="number" value={o.received||""} onChange={e=>updOrder(o.id,{received:Number(e.target.value)||0})}
                    placeholder="0" style={{width:90,padding:"5px 6px",borderRadius:6,border:"1px solid #ccd",fontSize:11.5}}/>
                  <button onClick={()=>updOrder(o.id,{received:total,stage:"paid"})}
                    style={{fontSize:10,padding:"4px 9px",borderRadius:14,border:"1px solid #1a7a4a",background:"#fff",color:"#1a7a4a",cursor:"pointer"}}>Full</button>
                </div>}

                {IS_OWNER && <div style={{marginTop:6,fontSize:11,display:"flex",gap:10,flexWrap:"wrap"}}>
                  {due>0.5
                    ? <span style={{color:"#c33",fontWeight:700}}>Outstanding {fmt(due)}</span>
                    : <span style={{color:"#1a7a3a",fontWeight:700}}>✓ Fully received</span>}
                  {isAgent2 && <span style={{color:commissionDue?"#8a5a1a":"#999"}}>
                    Agent 2 commission 14% = {fmt(commission)}{commissionDue?" (due)":" (on realisation)"}
                  </span>}
                  <span style={{color:"#1a5a3a",fontWeight:700}}>Net after transport{isAgent2?" + commission":""}: {fmt(netProfit)}</span>

      {tab==="officers" && !IS_OWNER && <div style={{fontSize:12,color:"#777",background:"#f6f6f9",borderRadius:8,padding:14,textAlign:"center"}}>Officer performance is visible to management only.</div>}

      {tab==="reports" && IS_OWNER && (()=>{
        // ============ SAP-STYLE SALES INTELLIGENCE ============
        const mKey = d => { const dt=new Date(d); return isNaN(dt)?null:(dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")); };
        const mLabel = k => { if(!k) return "?"; const [y,m]=k.split("-"); return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1]+" "+y.slice(2); };
        const months = Array.from(new Set(orders.map(o=>mKey(o.date)).filter(Boolean))).sort().reverse();

        const F = orders.filter(inPeriod);

        // KPIs
        const kSales=F.reduce((s,o)=>s+(Number(o.total)||0),0);
        const kGP=F.reduce((s,o)=>s+(Number(o.gpTotal)||0),0);
