              if (n && p) { saveContact(n, p); document.getElementById("newContactName").value = ""; document.getElementById("newContactPhone").value = ""; }
            }} style={{ fontSize: 11, padding: "6px 12px", borderRadius: 6, border: "none", background: "#1a3a8a", color: "#fff", cursor: "pointer" }}>Add</button>
          </div>
        </div>
      </>}
    </div>
  );
}

// ── TallyUpload — upload Trial Balance, AI reads & asks, shows P&L ──────────
function TallyUpload({onClose}){
  const [step,setStep]=useState("upload"); // upload | questions | result
  const [tallyText,setTallyText]=useState("");
  const [month,setMonth]=useState(new Date().toLocaleString("default",{month:"long"}));
  const [year,setYear]=useState(new Date().getFullYear());
  const [loading,setLoading]=useState(false);
  const [statusMsg,setStatusMsg]=useState("");
  const [extracted,setExtracted]=useState(null);
  const [questions,setQuestions]=useState([]);
  const [answers,setAnswers]=useState({});
  const [result,setResult]=useState(null);
  const [ledgerMap,setLedgerMap]=useState([]);
  const fileRef=React.useRef();

  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

  const handleFile=async(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    // Read as text — Tally exports tab-separated or CSV
    const reader=new FileReader();
    reader.onload=(ev)=>setTallyText(ev.target.result);
    reader.readAsText(file);
  };

  const parseTally=async()=>{
    if(!tallyText.trim()){setStatusMsg("Please paste or upload your Tally Trial Balance first.");return;}
    setLoading(true);setStatusMsg("🔍 Reading your Tally data…");
    try{
      const res=await fetch("/.netlify/functions/tally",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"parse",tallyText,month,year})
      });
      const data=await res.json();
      if(!data.ok) throw new Error(data.error||"Parse failed");
      setExtracted(data.extracted);
      setLedgerMap(data.ledgerMap||[]);
      // Filter questions to only those with null values
      const qs=data.questions||[];
      setQuestions(qs);
      const initAnswers={};
      qs.forEach(q=>{initAnswers[q.id]="";});
      setAnswers(initAnswers);
      setStep("questions");
      setStatusMsg("");
    }catch(e){setStatusMsg("❌ Error: "+e.message);}
    setLoading(false);
  };

  const finalize=async()=>{
    setLoading(true);setStatusMsg("📊 Calculating your P&L…");
    try{
      const res=await fetch("/.netlify/functions/tally",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"finalize",extracted,answers,month,year})
      });
      const data=await res.json();
      if(!data.ok) throw new Error(data.error||"Finalize failed");
      setResult(data);
      setStep("result");
      setStatusMsg("");
    }catch(e){setStatusMsg("❌ Error: "+e.message);}
    setLoading(false);
  };

  const fmt=(n)=>n==null?"—":"₹"+Number(n).toLocaleString("en-IN");
  const fmtPct=(n)=>n==null?"—":n.toFixed(1)+"%";

  const ProfitRow=({label,value,highlight,indent})=>{
    const color=value>0?"#1a5a1a":value<0?"#8b0000":"#2a1a00";
    return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
      padding:"7px 10px",marginBottom:3,
      background:highlight?"#fffbe6":"#faf8f4",
      borderRadius:7,borderLeft:highlight?"3px solid #c8a060":"3px solid transparent",
      paddingLeft:indent?22:10}}>
      <span style={{fontSize:13,color:"#5a4a2a"}}>{label}</span>
      <span style={{fontSize:14,fontWeight:highlight?700:500,color:highlight?color:"#2a1a00"}}>{fmt(value)}</span>
    </div>;
  };

  const SectionHeader=({label,bg})=><div style={{background:bg||"#2a1800",color:"#fff",
    padding:"6px 10px",borderRadius:6,fontSize:12,fontWeight:700,marginTop:10,marginBottom:4}}>{label}</div>;

  return <div style={{padding:16,maxWidth:600,margin:"0 auto"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
      <span style={{fontSize:28}}>📊</span>
      <div>
        <h2 style={{margin:0,fontSize:17,color:"#5a3a1a"}}>Tally Trial Balance → P&L</h2>
        <div style={{fontSize:11,color:"#9a8a6a"}}>Upload your TallyPrime export — AI does the rest</div>
      </div>
    </div>

    {/* STEP INDICATOR */}
    <div style={{display:"flex",gap:6,marginBottom:16}}>
      {[["upload","1. Upload"],["questions","2. Questions"],["result","3. Results"]].map(([s,l])=>
        <div key={s} style={{flex:1,textAlign:"center",padding:"5px 4px",borderRadius:6,fontSize:10,fontWeight:700,
          background:step===s?"#c8860a":step==="result"&&s!=="result"?"#2a7a2a":step==="questions"&&s==="upload"?"#2a7a2a":"#e8d8c0",
          color:step===s||((step==="result"&&s!=="result")||(step==="questions"&&s==="upload"))?"#fff":"#7a5a2a"}}>{l}</div>
      )}
    </div>

    {/* ── STEP 1: UPLOAD ── */}
    {step==="upload"&&<div>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <div style={{flex:1}}>
          <div className="lbl">Month</div>
          <select value={month} onChange={e=>setMonth(e.target.value)} className="inp">
            {MONTHS.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div style={{flex:1}}>
          <div className="lbl">Year</div>
          <input type="number" value={year} onChange={e=>setYear(e.target.value)} className="inp"/>
        </div>
      </div>

      <div style={{background:"#f0f8ff",border:"1.5px dashed #a0c0e0",borderRadius:10,padding:14,marginBottom:10}}>
        <div style={{fontSize:12,color:"#2a4a6a",fontWeight:700,marginBottom:8}}>📁 Option A — Upload Tally Excel/CSV file</div>
        <input ref={fileRef} type="file" accept=".xls,.xlsx,.csv,.txt" onChange={handleFile} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current.click()} className="scan-btn" style={{width:"100%",marginBottom:6}}>
          📂 Choose Tally Export File (.xls / .csv)
        </button>
        {tallyText&&<div style={{fontSize:11,color:"#2a7a2a",marginTop:4}}>✅ File loaded — {tallyText.split("\n").length} rows</div>}
      </div>

      <div style={{background:"#fff8f0",border:"1.5px dashed #d0a060",borderRadius:10,padding:14,marginBottom:10}}>
        <div style={{fontSize:12,color:"#5a3a1a",fontWeight:700,marginBottom:6}}>📋 Option B — Paste directly from Tally</div>
        <div style={{fontSize:11,color:"#8a6a4a",marginBottom:6}}>
          In TallyPrime: Reports → Trial Balance → Set period → Ctrl+A → Ctrl+C → paste here
        </div>
        <textarea
          value={tallyText}
          onChange={e=>setTallyText(e.target.value)}
          placeholder="Paste your Trial Balance here…"
          style={{width:"100%",height:120,padding:8,borderRadius:8,border:"1.5px solid #d0c4a8",
            fontSize:12,fontFamily:"monospace",resize:"vertical",background:"#fffef9"}}
        />
      </div>

      {statusMsg&&<div style={{color:statusMsg.startsWith("❌")?"#8b0000":"#2a6a2a",fontSize:12,marginBottom:8,padding:8,background:"#f5f5f5",borderRadius:6}}>{statusMsg}</div>}

      <button onClick={parseTally} disabled={loading||!tallyText.trim()} className="bg" style={{width:"100%",marginTop:4}}>
        {loading?"⏳ Reading Tally data…":"🧠 Analyse with AI →"}
      </button>
    </div>}

    {/* ── STEP 2: QUESTIONS ── */}
    {step==="questions"&&<div>
      {ledgerMap.length>0&&<div style={{marginBottom:12,background:"#f0fff0",borderRadius:8,padding:10}}>
        <div style={{fontSize:11,fontWeight:700,color:"#1a5a1a",marginBottom:6}}>✅ Ledgers extracted from Tally ({ledgerMap.length} matched):</div>
        <div style={{maxHeight:100,overflowY:"auto"}}>
          {ledgerMap.slice(0,10).map((l,i)=><div key={i} style={{fontSize:10,color:"#3a5a3a",padding:"2px 0",borderBottom:"1px solid #d0e8d0"}}>
            <b>{l.tallyLedger}</b> → {l.mappedTo} · ₹{Number(l.amount).toLocaleString("en-IN")}
          </div>)}
          {ledgerMap.length>10&&<div style={{fontSize:10,color:"#7a9a7a"}}>…and {ledgerMap.length-10} more</div>}
        </div>
      </div>}

      {questions.length===0
        ? <div style={{background:"#d4edda",borderRadius:8,padding:12,marginBottom:12,fontSize:13,color:"#155724"}}>
            ✅ All data extracted from Tally — no questions needed!
          </div>
        : <div>
            <div style={{fontSize:12,color:"#5a3a1a",marginBottom:10,fontWeight:700}}>
              🙋 {questions.length} question{questions.length>1?"s":""} — please fill what Tally doesn't show:
            </div>
            {questions.map(q=><div key={q.id} style={{marginBottom:12,background:"#fffdf7",borderRadius:8,padding:10,border:"1.5px solid #e8d8b0"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#3a2a0a",marginBottom:3}}>{q.question}</div>
              <div style={{fontSize:10,color:"#8a7a5a",marginBottom:6,fontStyle:"italic"}}>{q.hint}</div>
              <input
                type="number"
                value={answers[q.id]||""}
                onChange={e=>setAnswers(prev=>({...prev,[q.id]:e.target.value}))}
                placeholder="Enter amount in ₹ (enter 0 if nil)"
                className="inp"
                style={{fontSize:13}}
              />
            </div>)}
          </div>
      }

      {statusMsg&&<div style={{color:"#8b0000",fontSize:12,marginBottom:8,padding:8,background:"#fff0f0",borderRadius:6}}>{statusMsg}</div>}

      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setStep("upload")} className="bgh" style={{flex:1}}>← Back</button>
        <button onClick={finalize} disabled={loading} className="bg" style={{flex:2}}>
          {loading?"⏳ Calculating…":"📊 Generate P&L Report →"}
        </button>
      </div>
    </div>}

    {/* ── STEP 3: RESULT ── */}
    {step==="result"&&result&&<div>
      <div style={{textAlign:"center",padding:"10px 0 14px",marginBottom:8}}>
        <div style={{fontSize:32}}>{result.status==="profit"?"✅":result.status==="loss"?"🔴":"⚖️"}</div>
        <div style={{fontSize:16,fontWeight:700,color:result.status==="profit"?"#1a5a1a":result.status==="loss"?"#8b0000":"#2a1800"}}>
          {result.status==="profit"?"Profitable Month":"loss"===result.status?"Loss This Month":"Break Even"}
        </div>
        <div style={{fontSize:12,color:"#7a6a52"}}>{month} {year} · Onam Agarbathi Pvt. Ltd.</div>
      </div>

      {/* P&L SUMMARY */}
      <SectionHeader label="INCOME" bg="#1a4a2a"/>
      <ProfitRow label="Wholesale / Dealer Sales" value={result.merged?.income?.wholesale}/>
      <ProfitRow label="Retail / Direct Sales" value={result.merged?.income?.retail}/>
      <ProfitRow label="Online Sales (onamagarbathi.com)" value={result.merged?.income?.online}/>
      <ProfitRow label="Other Income" value={result.merged?.income?.other}/>
      <ProfitRow label="TOTAL INCOME" value={result.summary?.totalIncome} highlight/>

      <SectionHeader label="COST OF GOODS SOLD" bg="#6a1a1a"/>
      <ProfitRow label="Raw Materials" value={result.merged?.cogs?.rawMaterials}/>
      <ProfitRow label="Packaging" value={result.merged?.cogs?.packaging}/>
      <ProfitRow label="Job Work" value={result.merged?.cogs?.jobWork}/>
      <ProfitRow label="Freight Inward" value={result.merged?.cogs?.freightIn}/>
      <ProfitRow label="TOTAL COGS" value={result.summary?.totalCOGS} highlight/>

      <ProfitRow label={`GROSS PROFIT  (${fmtPct(result.summary?.grossMarginPct)} margin)`} value={result.summary?.grossProfit} highlight/>

      <SectionHeader label="OPERATING EXPENSES" bg="#2c1a5a"/>
      <ProfitRow label="Your Salary / Remuneration" value={result.merged?.opex?.salary} indent/>
      <ProfitRow label="Staff Salaries" value={result.merged?.opex?.staffSalary} indent/>
      <ProfitRow label="Rent" value={result.merged?.opex?.rent} indent/>
      <ProfitRow label="Electricity" value={result.merged?.opex?.electricity} indent/>
      <ProfitRow label="Car Loan EMI" value={result.merged?.opex?.carLoanEMI} indent/>
      <ProfitRow label="Credit Card Payment" value={result.merged?.opex?.creditCard} indent/>
      <ProfitRow label="Marketing / Ads" value={result.merged?.opex?.marketing} indent/>
      <ProfitRow label="Vehicle / Transport" value={result.merged?.opex?.vehicle} indent/>
      <ProfitRow label="Bank Charges / Interest" value={result.merged?.opex?.bankCharges} indent/>
      <ProfitRow label="Professional Fees" value={result.merged?.opex?.professional} indent/>
      <ProfitRow label="Other Expenses" value={result.merged?.opex?.other} indent/>
      <ProfitRow label="TOTAL EXPENSES" value={result.summary?.totalOpex} highlight/>

      <div style={{background:result.status==="profit"?"#d4edda":result.status==="loss"?"#f8d7da":"#fff3cd",
        borderRadius:10,padding:12,margin:"10px 0",border:`2px solid ${result.status==="profit"?"#c3e6cb":result.status==="loss"?"#f5c6cb":"#ffeeba"}`}}>
        <div style={{fontSize:13,fontWeight:700,color:result.status==="profit"?"#155724":result.status==="loss"?"#721c24":"#856404"}}>
          OPERATING PROFIT  ({fmtPct(result.summary?.operatingMarginPct)} margin)
        </div>
        <div style={{fontSize:22,fontWeight:700,color:result.status==="profit"?"#1a5a1a":result.status==="loss"?"#8b0000":"#856404"}}>
          {fmt(result.summary?.operatingProfit)}
        </div>
      </div>

      {/* WHERE IS PROFIT STUCK */}
      {result.merged?.bs&&<div>
        <SectionHeader label="WHERE IS PROFIT STUCK?" bg="#8b6914"/>
        <ProfitRow label="Inventory / Closing Stock" value={result.merged.bs.inventory}/>
        <ProfitRow label="Debtors / Receivables" value={result.merged.bs.debtors}/>
        <ProfitRow label="Cash in Hand" value={result.merged.bs.cash}/>
        <ProfitRow label="Bank Balance" value={result.merged.bs.bank}/>
        <ProfitRow label="Creditors (suppliers owe)" value={result.merged.bs.creditors}/>
        <ProfitRow label="Credit Card Outstanding" value={result.merged.bs.creditCardOutstanding}/>
        <ProfitRow label="Car Loan Outstanding" value={result.merged.bs.carLoanOutstanding}/>
      </div>}

      {/* AI DIAGNOSIS */}
      {result.diagnosis&&result.diagnosis.length>0&&<div style={{marginTop:12,background:"#fffbe6",borderRadius:10,padding:12,border:"1.5px solid #e8d080"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#5a4a10",marginBottom:8}}>🧠 AI Diagnosis</div>
        {result.diagnosis.map((d,i)=><div key={i} style={{fontSize:12,color:"#3a2a00",marginBottom:5,paddingLeft:10,borderLeft:"3px solid #c8a060"}}>
          {d}
        </div>)}
      </div>}

      <div style={{display:"flex",gap:8,marginTop:14}}>
        <button onClick={()=>setStep("upload")} className="bgh" style={{flex:1}}>🔄 New Month</button>
        <button onClick={onClose} className="bg" style={{flex:1}}>✅ Done</button>
      </div>
    </div>}
  </div>;
}

// EmailScan — scan Gmail for emails tagged #trackerv2 and create entries
// ─────────────────────────────────────────────────────────────────────────────
function EmailScan({entries,onClose,onSaveEntry,onRefresh}){
  const [scanning,setScanning]=useState(false);
  const [emails,setEmails]=useState([]);
  const [statusMsg,setStatusMsg]=useState("");
  const [processing,setProcessing]=useState({});

  const scanGmail=async()=>{
    setScanning(true);setEmails([]);setStatusMsg("📡 Scanning Gmail for unread #Trackerv23 emails…");
    try{
      const res=await intelAPI("scanEmails");
      if(!res||res.error||res.ok===false){
        setStatusMsg("Error: Intel error: "+((res&&res.error)||"Could not reach Gmail"));
        setScanning(false);return;
      }
      const rows=res.emails||[];
      if(rows.length===0){
        setStatusMsg("✅ No new unread #Trackerv23 emails found.\nForward an invoice to Gmail with #Trackerv23 in subject to import it.");
        setScanning(false);return;
      }
      const imported=JSON.parse(localStorage.getItem("importedGmailIds")||"[]");
      const parsed=rows.map(m=>({
        gmailId:m.gmailId,
        subject:m.subject||"(no subject)",
        from:m.from||"",
        date:parseDate(m.date)||today(),
        body:(m.body||"").slice(0,800),
        attachments:m.attachments||[],
        driveLinks:m.driveLinks||[],
        isDup:imported.includes(m.gmailId)||entries.some(e=>e.notes&&e.notes.includes(m.gmailId)),
        skip:imported.includes(m.gmailId)||entries.some(e=>e.notes&&e.notes.includes(m.gmailId))
      }));
      setEmails(parsed);
      const fresh=parsed.filter(e=>!e.isDup).length;
      setStatusMsg(fresh===0?"✅ All emails already imported — nothing new.":`Found ${fresh} new email(s) — tap Import on each one`);
    }catch(err){setStatusMsg("Error: "+err.message);}
    setScanning(false);
  };

  const importOne=async(email)=>{
    setProcessing(p=>({...p,[email.gmailId]:"reading"}));
    try{
      // Attachments arrive as METADATA ONLY (no base64) from the fast scan — fetch each one now.
      const metaAtts=(email.attachments||[]).filter(a=>(a.type||"").match(/pdf|image/));
      const atts=[];
      for(const m of metaAtts.slice(0,3)){
        try{
          if(m.inlineData&&m.inlineData.length>100){
            atts.push({name:m.name,type:m.type,base64:m.inlineData});
            continue;
          }
          const ar=await intelAPI("getAttachment",{gmailId:m.gmailId,attachIndex:m.attachIndex,attachmentId:m.attachmentId||"",partId:m.partId||""});
          if(ar&&ar.base64) atts.push({name:m.name,type:ar.type||m.type,base64:ar.base64});
        }catch(e){}
      }
      const prompt="You are an expert Indian accountant parsing a business email for Onam Agarbathi Pvt. Ltd. (incense manufacturer, Bangalore).\n"+
"RULES:\n"+
"- Email FROM a supplier/vendor (Chemixil, raw material, chemical, packaging) = category Business - Purchase\n"+
"- Email about SALES order to dealer/customer = Sales - Order\n"+
"- Payment confirmation = Sales - Payment or Business - Purchase\n"+
"- Title must be SHORT: VendorName Invoice Rs.Amount for purchase, CustomerName Order for sales\n"+
"- NEVER use Onam Agarbathi as vendor — that is the buyer not seller\n"+
"- Extract EXACT rupee total (Grand Total / Amount Chargeable / Total)\n"+
"- Payment terms: 60 days credit = reminderDays 60, 30 days = 30, immediate = 0\n"+
"- Read ALL attached images/PDFs carefully\n"+
"Return ONLY valid JSON:\n"+
"{\"title\":\"Chemixil Invoice Rs.350528\",\"category\":\"Business - Purchase\",\"amount\":\"350528\",\"vendor\":\"Chemixil Corporation\",\"person\":\"\",\"invoiceNo\":\"26-27/453\",\"paymentTerms\":\"60 days\",\"reminderDays\":60,\"paymentStatus\":\"Payment Pending\",\"notes\":\"Product details | CGST | SGST | Total\",\"summary\":\"brief summary\"}\n"+
"\nEmail Subject: "+email.subject+"\nFrom: "+email.from+"\nDate: "+email.date+"\nBody: "+email.body;

      // Send first PDF, or first image, or text only
      let txt="";
      const pdfAtt=atts.find(a=>(a.type||"").includes("pdf"));
      const imgAtts=atts.filter(a=>(a.type||"").includes("image"));

      if(pdfAtt){
        txt=await claudeAPI(prompt,"Return ONLY valid JSON no markdown.","","",pdfAtt.base64);
      } else if(imgAtts.length>0){
        // Send ALL images — pass first as primary, rest in prompt
        txt=await claudeAPI(prompt,"Return ONLY valid JSON no markdown.",imgAtts[0].base64,imgAtts[0].type,"");
      } else {
        txt=await claudeAPI(prompt,"Return ONLY valid JSON no markdown.","","","");
      }

      // Parse AI response
      let obj=null;
      try{
        let c=String(txt||"").replace(/```json/g,"").replace(/```/g,"").trim();
        const s=c.indexOf("{"),e=c.lastIndexOf("}");
        if(s>=0&&e>s)c=c.substring(s,e+1);
        obj=JSON.parse(c);
      }catch(e){}

      // Build reminder date
      let reminderDate="",reminderNote="";
      if(obj&&obj.reminderDays&&obj.reminderDays>0){
        const rd=new Date(email.date);rd.setDate(rd.getDate()+parseInt(obj.reminderDays));
        reminderDate=rd.toISOString().slice(0,10);
        reminderNote="Pay by "+rd.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})+" ("+obj.reminderDays+" day credit)";
      }

      // Build attachments for entry — upload real files to Google Drive so a clickable link is always stored
      const driveAtts=(email.driveLinks||[]).map(l=>({name:"Invoice (Drive)",type:"drive",data:l}));
      const uploadedAtts=[];
      function _tmo(p,ms){return Promise.race([p,new Promise(function(res){setTimeout(function(){res(null);},ms);})]);}
      function _shrinkImg(dataUrl){return new Promise(function(res){
        try{
          var img=new Image();
          img.onload=function(){
            try{
              var MAX=1200,w=img.width,h=img.height;
              if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
              var c=document.createElement("canvas");c.width=w;c.height=h;
              c.getContext("2d").drawImage(img,0,0,w,h);
              res(c.toDataURL("image/jpeg",0.8));
            }catch(e){res(dataUrl);}
          };
          img.onerror=function(){res(dataUrl);};
          img.src=dataUrl;
        }catch(e){res(dataUrl);}
      });}
      for(const a of atts){
        if(a.base64&&a.base64.length>100){
          let dataUrl="data:"+(a.type||"application/octet-stream")+";base64,"+a.base64;
          let attType=a.type||"application/octet-stream";
          if(attType.indexOf("image")===0){dataUrl=await _shrinkImg(dataUrl);attType="image/jpeg";}
          let saved=null;
          try{
            const up=await _tmo(uploadToDrive({name:a.name||"attachment",type:attType,data:dataUrl}),25000);
            if(up&&up.type==="drive"&&up.data&&String(up.data).indexOf("http")===0)saved=up;
          }catch(e){}
          // Store ONLY the Drive link — never base64. Retry once if the first upload failed.
          if(!saved){
            try{
              const up2=await _tmo(uploadToDrive({name:a.name||"attachment",type:attType,data:dataUrl}),25000);
              if(up2&&up2.type==="drive"&&up2.data&&String(up2.data).indexOf("http")===0)saved=up2;
            }catch(e){}
          }
          if(saved) uploadedAtts.push(saved);
          // if still not saved, skip — a link-less heavy blob must never enter the tracker
        }
      }
      const allAtts=[...uploadedAtts,...driveAtts];
      const firstDriveUrl=allAtts.find(a=>a&&a.data&&String(a.data).indexOf("http")===0);

      const cleanTitle=obj&&obj.title?obj.title:(obj&&obj.vendor?(obj.vendor+(obj.amount?" Rs."+Number(obj.amount).toLocaleString("en-IN"):"")):(email.subject));

      const entry={
        id:genId(),
        title:cleanTitle,
        date:email.date,
        category:(obj&&obj.category)||"Business - Purchase",
        person:(obj&&obj.person)||"",
        vendor:(obj&&obj.vendor)||"",
        amount:(obj&&obj.amount)?String(obj.amount):"",
        paymentStatus:(obj&&obj.paymentStatus)||"Payment Pending",
        reminder:reminderDate,
        reminderNote:reminderNote,
        taskType:(obj&&obj.taskType)||"",
        link:(firstDriveUrl&&firstDriveUrl.data)||(email.driveLinks||[])[0]||"",
        linkLabel:(firstDriveUrl||(email.driveLinks||[]).length)?"📎 Invoice":atts.length?"📎 Attachment":"",
        notes:((obj&&obj.notes)||"")+
          ((obj&&obj.invoiceNo)?(" | Inv: "+obj.invoiceNo):"")+
          ((obj&&obj.paymentTerms)?(" | Terms: "+obj.paymentTerms):"")+
          (firstDriveUrl?(" | 📎 "+firstDriveUrl.data):"")+
          " [gmailId:"+email.gmailId+"]",
        attachments:allAtts,
        tags:["Payment Due"],
        createdAt:new Date().toISOString()
      };

      // Detect routing tag in subject: #Prakash/#staff1-4 -> that tracker; else -> main
      const subjLower=String(email.subject||"").toLowerCase();
      let routeUser="main";
      const routeMap={"#prakash":"prakash","#staff1":"staff1","#staff2":"staff2","#staff3":"staff3","#staff4":"staff4"};
      for(const tag in routeMap){ if(subjLower.indexOf(tag)>-1){ routeUser=routeMap[tag]; break; } }
      // Sales-officer tags: keep the order in the OWNER's tracker (do NOT push to the officer's tracker),
      // but stamp it as a sales order attributed to that officer so Spectrum can pick it up when you process it.
      const OFFICER_TAGS={"#sooraj":"Sooraj","#sunil":"Sunil","#biju":"Biju","#murugan":"Murugan","#sebi":"Sebi","#sugeesh":"Sugeesh","#satish":"Satish","#sadasivan":"Sadasivan","#vinod":"Vinod"};
      for(const tag in OFFICER_TAGS){
        if(subjLower.indexOf(tag)>-1){
          entry.category="Sales - Order";
          entry.tags=(entry.tags||[]).concat(["Sales Order","Officer: "+OFFICER_TAGS[tag]]);
          // routeUser stays "main" — owner keeps the order; share manually if desired
          break;
        }
      }
      // Light copy (links only) for the database
      const dbEntry=Object.assign({},entry,{attachments:allAtts.map(a=>({name:a.name,type:a.type,data:(a.data&&String(a.data).indexOf("http")===0)?a.data:""}))});
      await sheetsAPI("save",{entry:dbEntry,user:routeUser});
      auto60Reminder(entry);
    if(routeUser==="main"){ try{if(onSaveEntry)await onSaveEntry(Object.assign({},entry))}catch(e){} }
      try{await intelAPI("logIntel",{intel:{date:email.date,source:"email",title:entry.title,vendor:(obj&&obj.vendor)||"",customer:(obj&&obj.person)||"",amount:(obj&&obj.amount)||"",invoiceNo:(obj&&obj.invoiceNo)||"",category:entry.category,summary:(obj&&obj.summary)||email.subject,gmailId:email.gmailId}});}catch(e){}

      // Mark imported
      try{const s=JSON.parse(localStorage.getItem("importedGmailIds")||"[]");if(!s.includes(email.gmailId)){s.push(email.gmailId);localStorage.setItem("importedGmailIds",JSON.stringify(s.slice(-500)));}}catch(e){}

      setEmails(prev=>prev.map(e=>e.gmailId===email.gmailId?{...e,skip:true,imported:true,importedTitle:cleanTitle}:e));
      setProcessing(p=>({...p,[email.gmailId]:"done"}));
      try{if(onRefresh)await onRefresh();}catch(e){}
    }catch(err){
      setProcessing(p=>({...p,[email.gmailId]:"error:"+err.message}));
    }
  };

  const freshEmails=emails.filter(e=>!e.isDup);
  const newEmails=emails.filter(e=>!e.skip);

  return <div style={{padding:16,maxWidth:560,margin:"0 auto"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
      <span style={{fontSize:26}}>📧</span>
      <div>
        <h2 style={{margin:0,fontSize:16,color:"#5a3a1a"}}>Email → Entry</h2>
        <div style={{fontSize:11,color:"#9a8a6a"}}>Scan Gmail for unread #Trackerv23 emails</div>
      </div>
    </div>

    <div style={{background:"#f0f8ff",borderRadius:8,padding:10,marginBottom:12,fontSize:11,color:"#2a4a6a"}}>
      <b>How to use:</b> Forward any invoice/order email to yourself with <b>#Trackerv23</b> in the subject. Then tap Scan.
    </div>

    <button onClick={scanGmail} disabled={scanning} className="bg" style={{width:"100%",marginBottom:10}}>
      {scanning?"⏳ Scanning Gmail…":"📬 Scan Gmail for #Trackerv23 Emails"}
    </button>

    {statusMsg&&<div style={{fontSize:12,padding:"8px 12px",borderRadius:8,marginBottom:10,whiteSpace:"pre-line",
      background:statusMsg.startsWith("Error")?"#fff0f0":"#f0fff0",
      color:statusMsg.startsWith("Error")?"#8b0000":"#1a5a1a"}}>
      {statusMsg}
    </div>}

    {freshEmails.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
      {emails.map(email=>{
        const state=processing[email.gmailId];
        const isDone=email.imported||email.skip&&email.isDup;
        return <div key={email.gmailId} style={{background:isDone?"#f0fff0":email.isDup?"#f5f5f5":"#fffdf7",
          borderRadius:10,padding:12,border:"1.5px solid "+(isDone?"#c3e6cb":email.isDup?"#ddd":"#e8d8b0")}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,color:"#1a1a1a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {email.subject}
              </div>
              <div style={{fontSize:10,color:"#888",marginTop:2}}>
                {email.from} · {email.date}
                {(email.attachments||[]).length>0&&<span style={{marginLeft:6,color:"#2a6a2a"}}>📎 {email.attachments.length} attachment(s)</span>}
                {(email.driveLinks||[]).length>0&&<span style={{marginLeft:6,color:"#6a2a8a"}}>🔗 Drive link</span>}
              </div>
            </div>
          </div>

          {email.isDup&&!email.imported&&<div style={{fontSize:10,color:"#888",fontStyle:"italic"}}>Already imported</div>}
          {email.imported&&<div style={{fontSize:11,color:"#1a5a1a",fontWeight:700}}>✅ Imported: {email.importedTitle}</div>}
          {state&&state.startsWith("error")&&<div style={{fontSize:10,color:"#8b0000",marginTop:4}}>❌ {state.slice(6)}</div>}

          {!email.isDup&&!email.imported&&<button
            onClick={()=>importOne(email)}
            disabled={state==="reading"}
            className="bg"
            style={{width:"100%",marginTop:8,fontSize:12,padding:"8px"}}>
            {state==="reading"?"⏳ Reading invoice…":"🤖 Import with AI"}
          </button>}
        </div>;
      })}
    </div>}
  </div>;
}

function PinManager({ onClose }){
  const USERS=["main","prakash","sooraj","sunil","biju","murugan","sebi","sugeesh","satish","sadasivan","vinod","staff1","staff2","staff3","staff4"];
  const [pins,setPins]=useState({});
  const [drafts,setDrafts]=useState({});
  const [msg,setMsg]=useState("");
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{(async()=>{
    try{ const r=await sheetsAPI("getPortfolio",{key:"user_pins",user:"main"}); if(r&&r.data) setPins(r.data); }catch(e){}
    setLoaded(true);
  })()},[]);

  const setPin=async(user)=>{
    const d=(drafts[user]||"").trim();
    if(d && !/^[0-9]{4,8}$/.test(d)){ setMsg("PIN must be 4–8 digits"); return; }
    const np={...pins};
    if(d==="") delete np[user]; else np[user]=await _pinHash(d);
    setPins(np); setDrafts({...drafts,[user]:""});
    try{ await sheetsAPI("savePortfolio",{key:"user_pins",user:"main",data:np}); setMsg(d===""?("Removed PIN for "+user):("✓ PIN set for "+user)); }
    catch(e){ setMsg("Save failed"); }

async function _pinHash(pin){
  try{
    const enc=new TextEncoder().encode("rkpin:"+pin);
    const buf=await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(e){ return "plain:"+pin; }  // fallback (older browsers)
}

function PinGate({ children }){
  const me=(typeof URL_USER!=="undefined"?URL_USER:"main");
  const DEVICE_KEY="rkpin_ok_"+me;
  const [state,setState]=useState("checking"); // checking | locked | open | setup
  const [pins,setPins]=useState({});           // user -> hash
  const [entry,setEntry]=useState("");
  const [err,setErr]=useState("");

  useEffect(()=>{(async()=>{
    // Never lock out on error — fail OPEN
    try{
      // already unlocked on this device?
      if(localStorage.getItem(DEVICE_KEY)==="1"){ setState("open"); return; }
      const r=await sheetsAPI("getPortfolio",{key:"user_pins",user:"main"});
      const map=(r&&r.data)||{};
      setPins(map);
      if(!map[me]){ setState("open"); }   // no PIN set for this user yet -> allow
      else setState("locked");
    }catch(e){ setState("open"); }        // any failure -> allow (do not lock owner out)
  })()},[]);

  const submit=async()=>{
    setErr("");
    const h=await _pinHash(entry.trim());
    if(h===pins[me]){ localStorage.setItem(DEVICE_KEY,"1"); setState("open"); }
    else setErr("Wrong PIN. Try again.");
  };

  if(state==="checking") return <div style={{padding:40,textAlign:"center",color:"#889",fontFamily:"system-ui"}}>…</div>;
  if(state==="open") return children;

  // locked screen
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#1a3a2a,#0a2a1a)",fontFamily:"system-ui",padding:20}}>
      <div style={{background:"#fff",borderRadius:16,padding:"28px 24px",maxWidth:320,width:"100%",boxShadow:"0 10px 40px rgba(0,0,0,.3)",textAlign:"center"}}>
        <div style={{fontSize:34,marginBottom:6}}>🔒</div>
        <div style={{fontSize:18,fontWeight:700,color:"#1a3a2a"}}>RK Tracker</div>
        <div style={{fontSize:12,color:"#889",marginBottom:18}}>Enter your PIN — {me.charAt(0).toUpperCase()+me.slice(1)}</div>
        <input value={entry} onChange={e=>setEntry(e.target.value.replace(/[^0-9]/g,""))} onKeyDown={e=>{if(e.key==="Enter")submit();}}
          type="password" inputMode="numeric" autoFocus placeholder="••••"
          style={{width:"100%",padding:"14px",fontSize:22,textAlign:"center",letterSpacing:"8px",borderRadius:10,border:"2px solid #cfe0cf",marginBottom:12}}/>
        {err && <div style={{color:"#c33",fontSize:12,marginBottom:10}}>{err}</div>}
        <button onClick={submit} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#1a7a4a,#0a5a2a)",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>Unlock</button>
        <div style={{fontSize:10,color:"#aab",marginTop:12}}>Entered once per device.</div>
      </div>
    </div>
  );
}

        const toAdd=r.entries.filter(e=>e&&e.id&&!localIds.has(e.id)&&_tombs.indexOf(e.id)===-1).map(sanitizeEntry).filter(Boolean);
        let base = toAdd.length>0 ? cached.concat(toAdd) : cached.slice();

    sheetsAPI("getDropdowns").then(r=>{if(r.dropdowns)setDropdowns(p=>{

    setEntries(p=>{const ex=p.find(x=>x.id===finalEntry.id);const updated=ex?p.map(x=>x.id===finalEntry.id?finalEntry:x):[finalEntry,...p];saveCache(updated);return updated;});
    setSaving(false);
    if(!opts||!opts.silent){setShowForm(false);setEditE(null);}

    // STEP 2: Upload attachments to Drive in background (non-blocking)
    var uploadPromise=Promise.resolve(finalEntry);
    if(entry.attachments&&entry.attachments.length>0&&url){
      uploadPromise=Promise.all(entry.attachments.map(function(a){
        if(a&&a.data&&a.data.length>100&&a.type!=="drive"){return uploadToDrive(a);}
        return Promise.resolve(a);

        return withDrive;

      const r=await sheetsAPI("getAll");

        try{await Promise.all(cached.map(e=>sheetsAPI("save",{entry:lightForSheet(e)}).catch(()=>{})));}catch(e){}

        r.entries=r2.entries;r.error=null;

      // add Sheets-only entries locally (sanitized), never replacing existing
      // Recovery mode: if local is nearly empty but the Sheet has many, bring EVERYTHING back (ignore tombstones).
      const recovery = cached.length < 10 && r.entries.length > cached.length + 5;
      const tombs = recovery ? [] : loadTombstones();
      const toAdd=r.entries.filter(e=>e&&e.id&&!localIds.has(e.id)&&tombs.indexOf(e.id)===-1).map(sanitizeEntry).filter(Boolean);
      let base = toAdd.length>0 ? cached.concat(toAdd) : cached.slice();
      // Staff: also pull entries the owner shared with them (live, from main sheet)
      if(URL_USER!=="main"){
        try{
          const sr=await sheetsAPI("getShared",{shareUser:URL_USER});
          if(sr&&sr.entries&&sr.entries.length){
            const have=new Set(base.map(e=>e.id));
            const shared=sr.entries.map(sanitizeEntry).filter(Boolean).map(e=>({...e,_shared:true}));

      }
      base.sort((a,b)=>String(b.createdAt||b.date||"").localeCompare(String(a.createdAt||a.date||"")));
      setEntries(base);saveCache(base);
      const sc=base.filter(e=>e._shared).length;
      setSyncStatus((recovery?"🆘 Recovered ":"✅ ")+base.length+" entries"+(sc>0?(" · "+sc+" shared to you"):"")+(toAdd.length>0?" · ↓"+toAdd.length:"")+" · ↑"+toPush.length+" · "+new Date().toLocaleTimeString("en-IN"));
    }catch(e){
      setSyncStatus("📴 Offline — "+cached.length+" entries safe locally");
    }
    setLoading(false);
  };

  const allPersons=[...new Set([...dropdowns.persons,...entries.map(e=>e.person).filter(Boolean)])];
  const allAccounts=[...new Set([...dropdowns.accounts,...entries.map(e=>e.account).filter(Boolean)])];
  const allVendors=[...new Set([...dropdowns.vendors,...entries.map(e=>e.vendor).filter(Boolean)])];

  const filtered=useMemo(()=>entries.filter(e=>{
    if(e.hidden&&!showHidden)return false;
    if(hideDone&&e.tags?.includes("Done"))return false;
    if(filterCat!=="All"&&e.category!==filterCat)return false;
    if(filterTag&&!e.tags?.includes(filterTag))return false;
    if(filterPerson&&e.person!==filterPerson)return false;
    if(filterAccount&&e.account!==filterAccount)return false;
    if(filterVendor&&e.vendor!==filterVendor)return false;
    if(filterStatus&&e.paymentStatus!==filterStatus)return false;
    if(search){const q=search.toLowerCase();return["title","notes","person","vendor","amount","taskType","chemical","account","financialType","property"].some(k=>(e[k]||"").toLowerCase().includes(q));}
    return true;
  }).sort((a,b)=>{
    if(sort==="date_desc")return(b.date||"").localeCompare(a.date||"");
    if(sort==="date_asc") return(a.date||"").localeCompare(b.date||"");
    return(a.title||"").localeCompare(b.title||"");
  }),[entries,hideDone,filterCat,filterTag,filterPerson,filterAccount,filterVendor,filterStatus,search,sort]);

  const overdueN=entries.filter(e=>reminderActive(e)&&!e.tags?.includes("Done")).length;
  const superN=entries.filter(e=>e.tags?.includes("Super Pending")).length;
  const dupeN=useMemo(()=>{const s={};entries.forEach(e=>{const k=(e.title||"").toLowerCase().trim();if(k)s[k]=(s[k]||0)+1;});return Object.values(s).filter(n=>n>1).length;},[entries]);

  const getRowBg=e=>{
    const t=e.tags||[];
    if(t.includes("Done"))return"#f4fbf4";
    if(t.includes("Super Pending"))return"#ffe8e8";
    if(t.includes("Overdue")||isOverdue(e.reminder))return"#fff6f6";
    if(t.includes("Urgent"))return"#fff8f0";
    if(t.includes("GOVT"))return"#f0f4ff";
    if(t.includes("Paid"))return"#f4fbf4";
    if(t.includes("Payment Due"))return"#fffbf0";
    return"#fffdf7";
  };

  const fSel={padding:"6px 10px",borderRadius:8,border:"1px solid #7a5a20",background:"rgba(255,255,255,.12)",color:"#f5e8c0",fontSize:12,cursor:"pointer",outline:"none"};
  const ALL_CATS=["All",...dropdowns.categories];

  // Share panel
  const SharePanel=()=>{
    const [copied,setCopied]=useState("");
    const base=window.location.origin+window.location.pathname;
    const persons=[...new Set(entries.map(e=>e.person).filter(Boolean))];
    const accounts=[...new Set(entries.map(e=>e.account).filter(Boolean))];
    const tags=[...new Set(entries.flatMap(e=>e.tags||[]).filter(t=>t!=="Done"))];
    const copy=(url,key)=>{navigator.clipboard.writeText(url).then(()=>{setCopied(key);setTimeout(()=>setCopied(""),2000);});};
    const Row=({label,url,k})=><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",background:"#fffdf5",borderRadius:8,marginBottom:5,gap:8}}>
      <div><div style={{fontSize:13,fontWeight:600,color:"#3a2800"}}>{label}</div><div style={{fontSize:10,color:"#9a8060",wordBreak:"break-all"}}>{url}</div></div>
      <button onClick={()=>copy(url,k)} style={{padding:"5px 12px",borderRadius:7,border:"none",background:copied===k?"#2a7a2a":"linear-gradient(135deg,#c8860a,#a06010)",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}>{copied===k?"✓ Copied":"Copy"}</button>
    </div>;
    return<div>
      <h2 style={{margin:"0 0 4px",fontSize:18}}>🔗 Share View Links</h2>
      <p style={{fontSize:12,color:"#9a8060",marginBottom:12}}>Read-only filtered view — recipient can't edit</p>
      {persons.length>0&&<div style={{marginBottom:12}}><div className="lbl" style={{marginBottom:6}}>👤 By Person</div>{persons.map(p=><Row key={p} label={p} url={`${base}?person=${encodeURIComponent(p)}`} k={p}/>)}</div>}
      {tags.length>0&&<div style={{marginBottom:12}}><div className="lbl" style={{marginBottom:6}}>🏷 By Tag</div>{tags.slice(0,6).map(t=><Row key={t} label={t} url={`${base}?tag=${encodeURIComponent(t)}`} k={t}/>)}</div>}
      {accounts.length>0&&<div style={{marginBottom:12}}><div className="lbl" style={{marginBottom:6}}>🏦 By Account</div>{accounts.slice(0,5).map(a=><Row key={a} label={a} url={`${base}?account=${encodeURIComponent(a)}`} k={a}/>)}</div>}
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}><button className="bgh" onClick={()=>setShowShare(false)}>Close</button></div>
    </div>;
  };

  return<div style={{minHeight:"100vh",background:"linear-gradient(160deg,#fdf8ef,#f8f2e4 50%,#fdf5e6)",paddingBottom:52}}>

    {/* SYNC BAR */}
    <div style={{background:syncStatus.includes("✅")?"#1a5a1a":syncStatus.includes("⚠️")?"#7a5800":"#1a3a5a",padding:"4px 14px",fontSize:11,color:"#c8f0c8",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
      <span style={{flex:1}}>{syncStatus||"📊 Google Sheets connected"}</span>
      <button onClick={async()=>{
        // CLOUD recovery — pull everything back from Google Sheets (works on mobile, no console)
        setLoading(true);
        setSyncStatus("🆘 Recovering from Google Sheets…");
        try{
          const cached=loadCache();
          let r=await sheetsAPI("getAll");
          if(r.error||!r.entries){
            // A bloated row can jam getAll — re-push light copies of whatever we have, then retry
            setSyncStatus("🧹 Repairing, then recovering…");
            try{await Promise.all(cached.map(e=>sheetsAPI("save",{entry:lightForSheet(e)}).catch(()=>{})));}catch(e){}
            r=await sheetsAPI("getAll");
          }
          if(r&&r.entries&&r.entries.length>0){
            // Bring back EVERYTHING from the Sheet — ignore tombstones, merge with anything local
            const byId={};
            cached.forEach(e=>{if(e&&e.id)byId[e.id]=e;});
            r.entries.map(sanitizeEntry).filter(Boolean).forEach(e=>{if(!byId[e.id])byId[e.id]=e;});
            const merged=Object.values(byId);
            merged.sort((a,b)=>String(b.createdAt||b.date||"").localeCompare(String(a.createdAt||a.date||"")));
            setEntries(merged);saveCache(merged);
            setSyncStatus("🆘 Recovered "+merged.length+" entries from Google Sheets");
          } else {
            // Cloud unreachable — fall back to any local backup
            const backup=JSON.parse(localStorage.getItem(LS_CACHE+"_backup")||"null");
            if(backup&&backup.entries&&backup.entries.length>0){
              setEntries(backup.entries);saveCache(backup.entries);
              setSyncStatus("✅ Restored "+backup.entries.length+" from local backup ("+(backup.savedAt?backup.savedAt.slice(0,10):"")+")");
            } else {
              setSyncStatus("⚠️ Couldn't reach Sheets"+(r&&r.error?(" — "+r.error):"")+". Try again in a moment.");
            }
          }
        }catch(e){setSyncStatus("⚠️ Recovery failed: "+e.message);}
        setLoading(false);
      }} style={{background:"rgba(255,150,50,.3)",border:"1px solid rgba(255,150,50,.5)",color:"#ffcc88",borderRadius:6,padding:"2px 10px",cursor:"pointer",fontSize:10,whiteSpace:"nowrap"}}>🔄 Recover</button>
      <button onClick={refresh} disabled={loading} style={{background:"transparent",border:"1px solid rgba(255,255,255,.3)",color:"inherit",borderRadius:6,padding:"2px 10px",cursor:"pointer",fontSize:10}}>{loading?"…":"↻ Sync"}</button>
    </div>

    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,#2a1800,#5a3800 50%,#3a2000)",padding:"12px 12px 10px",boxShadow:"0 4px 24px rgba(0,0,0,.3)",position:"sticky",top:0,zIndex:50}}>

            {dupeN>0&&<span onClick={()=>setShowDupes(true)} style={{background:"#7a5800",color:"#fff",borderRadius:20,padding:"1px 7px",fontSize:9,fontWeight:700,cursor:"pointer"}}>🔍 {dupeN} dupes</span>}
          </div>
        </div>
        <div className="rk-navbar" style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>

            {navMenuOpen&&<div style={{position:"absolute",top:"112%",left:0,zIndex:950,background:"#2a2318",border:"1px solid #c8a060",borderRadius:10,padding:5,minWidth:180,boxShadow:"0 8px 22px rgba(0,0,0,.5)"}}>
              {[
                {l:"📈 CFO Brief",fn:()=>setShowCFO(true), ownerOnly:true},
                {l:"💰 Receivables",fn:()=>setShowRecv(true), ownerOnly:true},
                {l:"🌈 Spectrum",fn:()=>setShowSpectrum(true), ownerOnly:true},
                {l:"🛡️ CSD",fn:()=>setShowCSD(true), ownerOnly:true},
                {l:"🪔 Kerala",fn:()=>setShowKerala(true), ownerOnly:true},
                {l:"⚖️ Rules",fn:()=>setShowRules(true), ownerOnly:true},
                {l:"✈️ Telegram",fn:()=>setShowTelegram(true), ownerOnly:true},
                {l:"📝 Field Report",fn:()=>setShowFieldReport(true)},
                {l:"🔒 PIN Access",fn:()=>setShowPins(true), ownerOnly:true},
                {l:"📊 Tally",fn:()=>setShowTally(true), ownerOnly:true},

                {l:"📒 Day Book",fn:()=>setShowDayBook(true)},

                {l:"👨‍👩‍👧 Family",fn:()=>setShowFamily(true), personalOnly:true},
                {l:"💬 Remind",fn:()=>setShowPaymentReminders(true), ownerOnly:true},
                {l:"🚚 Logistics",fn:()=>setShowLogistics(true), ownerOnly:true},
                {l:"📧 Email Scan",fn:()=>setShowEmailScan(true), ownerOnly:true},
                {l:"🔗 Share",fn:()=>setShowShare(true)},

            </div>}
          </div>
          <button onClick={()=>setHideDone(h=>!h)} style={{...fSel,background:hideDone?"rgba(200,255,200,.15)":"rgba(255,255,255,.08)",color:hideDone?"#90f090":"#f0cc80",border:"1.5px solid "+(hideDone?"#4a9a4a":"#c8a060"),fontSize:11,fontWeight:600}}>{hideDone?"All":"Hide✅"}</button>
          
          
          
          
          
          {IS_FAMILY&&[
            {l:"💍",c:"Personal",t:"Wedding Planning"},
            {l:"💰",c:"Personal",t:"Expense"},
            {l:"💭",c:"Family",t:"Thoughts"},

            {l:"🧾",c:"Sales - Expense",t:"Expense - Travel"},
            {l:"😟",c:"Sales - Complaint",t:"Complaint Received"},
            {l:"🏷",c:"Intelligence",t:"Competitor Spotted"},
          ].map(q=><button key={q.l} onClick={()=>{setEditE({category:q.c,taskType:q.t});setShowForm(true);}} style={{padding:"7px 10px",borderRadius:8,border:"none",background:"rgba(255,255,255,.15)",color:"#f5d890",cursor:"pointer",fontSize:16}}>{q.l}</button>)}
          <button onClick={()=>{setEditE(null);setShowForm(true);}} style={{padding:"7px 14px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#e8a020,#c07010)",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,boxShadow:"0 4px 14px rgba(200,120,0,.35)"}}>+ New</button>
          <button onClick={()=>setCapMode("purchase")} title="Snap or upload a purchase bill" style={{padding:"7px 14px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#c0392b,#922b21)",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>📷 Purchase</button>
          <button onClick={()=>setCapMode("sales")} title="Snap or upload a sales bill/order" style={{padding:"7px 14px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#1a7a4a,#0a5a2a)",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>📷 Sales</button>
          <button onClick={()=>setQuickOpen(o=>!o)} title="Type a note in plain English and it becomes an entry" style={{padding:"7px 14px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#7a4ac0,#5a2a9a)",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>✍️ Quick Add</button>
          
        </div>
      </div>
      {quickOpen&&<div style={{margin:"6px 0 10px",padding:12,borderRadius:10,border:"1.5px solid #9a6ad0",background:"rgba(120,74,192,.12)"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#c8a8f0",marginBottom:6}}>✍️ Type it naturally — e.g. "paid Prakash 5000 for voucher 264 today" or "Amar Trading invoice 12000 pending"</div>
        <textarea value={quickText} onChange={e=>setQuickText(e.target.value)} placeholder="Type your entry in plain English…" style={{width:"100%",height:56,padding:9,borderRadius:8,border:"1px solid #9a6ad0",fontSize:13,resize:"vertical"}}/>
        <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
          <button onClick={quickAdd} disabled={quickBusy||!quickText.trim()} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#5a2a9a",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>{quickBusy?"⏳ Reading…":"✨ Create entry"}</button>
          <button onClick={()=>{setQuickOpen(false);setQuickText("");setQuickParsed(null);}} style={{padding:"8px 14px",borderRadius:8,border:"1px solid #b090e0",background:"#fff",color:"#5a2a9a",cursor:"pointer",fontSize:13}}>Cancel</button>
        </div>
        {quickParsed&&!quickParsed.error&&<div style={{marginTop:10,padding:10,borderRadius:8,background:"#fff",border:"1px solid #d0b8f0"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#3a1a6a"}}>{quickParsed.title}</div>

        <select value={filterTag} onChange={e=>setFilterTag(e.target.value)} style={fSel}><option value="" style={{background:"#3a2000"}}>All Tags</option>{STATUS_TAGS.map(t=><option key={t} value={t} style={{background:"#3a2000"}}>{t}</option>)}</select>
        <select value={filterPerson} onChange={e=>setFilterPerson(e.target.value)} style={fSel}><option value="" style={{background:"#3a2000"}}>All People</option>{allPersons.map(p=><option key={p} value={p} style={{background:"#3a2000"}}>{p}</option>)}</select>
        <select value={filterVendor} onChange={e=>setFilterVendor(e.target.value)} style={fSel}><option value="" style={{background:"#3a2000"}}>All Vendors</option>{allVendors.map(v=><option key={v} value={v} style={{background:"#3a2000"}}>{v}</option>)}</select>
        <select value={filterAccount} onChange={e=>setFilterAccount(e.target.value)} style={fSel}><option value="" style={{background:"#3a2000"}}>All Accounts</option>{allAccounts.map(a=><option key={a} value={a} style={{background:"#3a2000"}}>{a}</option>)}</select>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={fSel}><option value="" style={{background:"#3a2000"}}>All Status</option>{dropdowns.paymentStatuses.map(s=><option key={s} value={s} style={{background:"#3a2000"}}>{s}</option>)}</select>
        <select value={sort} onChange={e=>setSort(e.target.value)} style={fSel}><option value="date_desc" style={{background:"#3a2000"}}>Newest</option><option value="date_asc" style={{background:"#3a2000"}}>Oldest</option><option value="title" style={{background:"#3a2000"}}>A–Z</option></select>
        {(filterCat!=="All"||filterTag||filterPerson||filterAccount||filterVendor||filterStatus||search)&&<button onClick={()=>{setFilterCat("All");setFilterTag("");setFilterPerson("");setFilterAccount("");setFilterVendor("");setFilterStatus("");setSearch("");}} style={{...fSel,background:"rgba(255,100,100,.2)",color:"#ffb0b0",border:"1px solid #ff8888",fontSize:11}}>✕ Clear</button>}
      </div>
    </div>

    {/* TABLE */}
    <div style={{padding:"10px 8px 40px",overflowX:"auto"}}>
      {loading&&entries.length===0?<div style={{textAlign:"center",padding:"50px",color:"#b0966a"}}><div style={{fontSize:30,marginBottom:10}}>⏳</div><div>Loading from Google Sheets…</div></div>:
      filtered.length===0?<div style={{textAlign:"center",padding:"50px",color:"#b0966a"}}>
        <div style={{fontSize:40,marginBottom:10}}>📋</div>
        <div style={{fontSize:15,fontWeight:700}}>{entries.length===0?"No entries yet":"No matches"}</div>
        <div style={{fontSize:12,marginTop:5,color:"#c0a880"}}>{entries.length===0?"Tap + New or 🎤 Speak to start":"Try clearing filters"}</div>
      </div>:(

                </td>

                <td style={{padding:"7px 8px",minWidth:90}}><div style={{display:"flex",flexWrap:"wrap",gap:2}}>{e.tags?.map(t=><TagBadge key={t} tag={t}/>)}</div></td>
                <td style={{padding:"7px 8px",fontSize:10,whiteSpace:"nowrap"}}>
                  {e.reminder?<span style={{color:ov?"#c00":"#006aaa",fontWeight:ov?700:500}}>{ov?"🔴":"📲"} {fmtDate(e.reminder.slice(0,10))}{e.isRecurring&&<span style={{display:"block",color:"#5a8a30",fontSize:9}}>🔁</span>}</span>:<span style={{color:"#d0c0a0"}}>—</span>}
                </td>
                <td style={{padding:"7px 8px"}}>{(e.attachments||[]).length>0?<div style={{display:"flex",gap:2}}>{e.attachments.slice(0,2).map((a,i)=><Thumb key={i} att={a} small/>)}{e.attachments.length>2&&<span style={{fontSize:9,color:"#9a8060",alignSelf:"center"}}>+{e.attachments.length-2}</span>}</div>:<span style={{color:"#d0c0a0",fontSize:10}}>—</span>}</td>
                <td style={{padding:"7px 6px",whiteSpace:"nowrap"}}>
                  <button className="rk-sel-btn" onClick={()=>toggleSel(e.id)} style={{padding:"3px 7px",borderRadius:6,border:selIds.indexOf(e.id)>-1?"2px solid #c01818":"1px solid #ccc",background:selIds.indexOf(e.id)>-1?"#ffe5e5":"#fff",cursor:"pointer",fontSize:11,marginRight:3}}>{selIds.indexOf(e.id)>-1?"☑️":"⬜"}</button><button className="rk-view-btn" onClick={()=>setViewE(e)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #d0b880",background:"#fff8ee",color:"#8a5800",cursor:"pointer",fontSize:10,marginRight:3}}>View</button>
                  <span className="row-extra-actions"><button onClick={()=>shareEntry(e)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #0088cc",background:"#e8f4fb",color:"#006aaa",cursor:"pointer",fontSize:10,marginRight:3}}>📤</button>
                  {!isDone&&<button onClick={()=>markDone(e.id)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #88cc88",background:"#edfaed",color:"#1a5a1a",cursor:"pointer",fontSize:10,marginRight:3}}>✅</button>}
                  {!e.hidden&&<button onClick={()=>hideEntry(e.id)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #ccc",background:"#f5f5f5",color:"#666",cursor:"pointer",fontSize:10}}>Hide</button>}
                  {e.hidden&&<button onClick={()=>unhideEntry(e.id)} style={{padding:"3px 8px",borderRadius:6,border:"1px solid #c8a060",background:"#fff8ee",color:"#8a5800",cursor:"pointer",fontSize:10}}>Show</button>}</span>
                </td>
              </tr>;
            })}
          </tbody>
        </table>
      )}
    </div>

    {/* BOTTOM BAR */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"linear-gradient(135deg,#2a1800,#4a2e00)",borderTop:"1px solid #7a5020",padding:"5px 12px",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",zIndex:100}}>
      {STATUS_TAGS.slice(0,5).map(t=>{const n=entries.filter(e=>e.tags?.includes(t)).length;return n>0?<span key={t} onClick={()=>setFilterTag(filterTag===t?"":t)} style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}><TagBadge tag={t}/><span style={{fontSize:10,color:"#d0a060"}}>{n}</span></span>:null;})}
      <span style={{fontSize:9,color:"#9a7040",marginLeft:"auto"}}>📊 Google Sheets</span>
    </div>

    {/* TEAM VIEW MODAL (owner-only, read-only) */}
    <Modal open={!!teamView} onClose={()=>setTeamView(null)} wide={true}>
      {teamView&&<div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{fontWeight:800,fontSize:18,color:"#1a5a8a"}}>👁 {teamView.label}'s Tracker <span style={{fontSize:12,fontWeight:600,color:"#888"}}>(read-only)</span></div>
          <button onClick={()=>setTeamView(null)} style={{border:"none",background:"transparent",fontSize:20,cursor:"pointer",color:"#888"}}>✕</button>
        </div>
        {teamView.loading&&<div style={{padding:20,textAlign:"center",color:"#888"}}>Loading {teamView.label}'s entries…</div>}
        {(!teamView.loading&&teamView.error)&&<div style={{padding:16,background:"#fff3f3",border:"1px solid #f0c0c0",borderRadius:8,color:"#a33"}}>Couldn't load: {teamView.error}</div>}
        {(!teamView.loading&&!teamView.error&&teamView.entries.length===0)&&<div style={{padding:20,textAlign:"center",color:"#888"}}>No entries yet in {teamView.label}'s tracker.</div>}
        {(!teamView.loading&&teamView.entries.length>0)&&<div>
          <div style={{fontSize:12,color:"#666",marginBottom:8}}>{teamView.entries.length} entries · you can view but not edit these</div>
          <div style={{maxHeight:"60vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
            {teamView.entries.map((e,idx)=><div key={e.id||idx} style={{border:"1px solid #e0d8c8",borderRadius:8,padding:"8px 10px",background:"#fffdf8"}}>
              <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                <div style={{fontWeight:700,fontSize:13,color:"#3a2a10"}}>{e.title||"(untitled)"}</div>
                <div style={{fontSize:12,color:"#888",whiteSpace:"nowrap"}}>{e.date||""}</div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:4,fontSize:12,color:"#666"}}>
                {e.vendor&&<span>🏭 {e.vendor}</span>}
                {e.person&&<span>👤 {e.person}</span>}
                {e.amount&&<span>💰 {e.amount}</span>}
                {e.paymentStatus&&<span>· {e.paymentStatus}</span>}
              </div>
              {(e.link&&String(e.link).indexOf("http")===0)&&<a href={e.link} target="_blank" rel="noopener" style={{fontSize:12,color:"#2a7a2a",fontWeight:600,textDecoration:"none"}}>🔗 Open attachment</a>}
            </div>)}
          </div>
        </div>}
      </div>}
    </Modal>

    {/* VIEW MODAL */}
    <Modal open={!!viewE} onClose={()=>setViewE(null)}>
      {viewE&&<div>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          <div><div style={{fontSize:11,color:"#9a8060",fontWeight:600,marginBottom:3}}>{fmtDate(viewE.date)}{viewE.month?" · "+viewE.month:""}</div>
            <h2 style={{margin:0,fontSize:18,color:"#2a1a00"}}>{viewE.title}</h2></div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {!viewE.tags?.includes("Done")&&<button onClick={()=>markDone(viewE.id)} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #88cc88",background:"#edfaed",color:"#1a5a1a",cursor:"pointer",fontSize:12,fontWeight:700}}>✅ Done</button>}
            <button onClick={()=>shareEntry(viewE)} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #0088cc",background:"#e8f4fb",color:"#006aaa",cursor:"pointer",fontSize:12,fontWeight:700}}>📤 Share</button>
            <button onClick={()=>setTgShareEntry(viewE)} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #0088cc",background:"#d8eefb",color:"#005f8f",cursor:"pointer",fontSize:12,fontWeight:700}}>✈️ Telegram</button>
            <button onClick={()=>shareEntryHTML(viewE)} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #5a3a8a",background:"#f5eeff",color:"#5a1a8a",cursor:"pointer",fontSize:12}}>🖼 Card</button>
            <button onClick={()=>{setEditE(viewE);setViewE(null);setShowForm(true);}} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #c8a060",background:"#fff8ee",color:"#8a5a00",cursor:"pointer",fontSize:12}}>✏️</button>
            <button onClick={()=>hideEntry(viewE.id)} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #ccc",background:"#f5f5f5",color:"#555",cursor:"pointer",fontSize:12}}>👁 Hide</button>
            <button onClick={()=>delEntry(viewE.id)} style={{padding:"6px 12px",borderRadius:7,border:"1.5px solid #f5a8ab",background:"#fff5f5",color:"#c00",cursor:"pointer",fontSize:12}}>🗑</button>
          </div>
        </div>
        {viewE.tags?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>{viewE.tags.map(t=><TagBadge key={t} tag={t}/>)}</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
          {[["taskType","Task"],["person","Person"],["vendor","Vendor"],["account","Account"],["financialType","Financial"],["paymentStatus","Status"],["property","Property"],["chemical","Chemical"],["amount","Amount"],["month","Month"]].filter(([k])=>viewE[k]).map(([k,l])=><span key={k} style={{background:"#f9f3e8",border:"1px solid #e8dcc0",borderRadius:8,padding:"3px 11px",fontSize:12,color:"#5a3800"}}><span style={{color:"#9a7040",fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:.4,marginRight:4}}>{l}</span>{viewE[k]}</span>)}
        </div>
        {viewE.notes&&<div style={{marginBottom:12}}><div className="lbl" style={{marginBottom:5}}>Notes</div><div style={{background:"#fffdf5",border:"1px solid #e8dcc8",borderRadius:8,padding:"9px 13px",fontSize:13,whiteSpace:"pre-wrap",lineHeight:1.6}}>{viewE.notes}</div></div>}
        {viewE.link&&<div style={{marginBottom:12}}><div className="lbl" style={{marginBottom:4}}>Link</div><a href={viewE.link} target="_blank" rel="noreferrer" style={{color:"#0057b0",fontSize:13,wordBreak:"break-all"}}>{viewE.linkLabel||viewE.link}</a></div>}
        {viewE.reminder&&<div style={{background:isOverdue(viewE.reminder)?"#fff0f0":"#e8f4fb",border:`1.5px solid ${isOverdue(viewE.reminder)?"#f5a8ab":"#b0d8f0"}`,borderRadius:9,padding:"9px 13px",marginBottom:12}}>
          <span style={{fontSize:13,fontWeight:700,color:isOverdue(viewE.reminder)?"#c00":"#006aaa"}}>📲 {isOverdue(viewE.reminder)?"OVERDUE · ":""}{fmtDT(viewE.reminder)}{viewE.isRecurring&&<span style={{marginLeft:8,fontSize:11,color:"#5a8a30"}}>🔁 Monthly</span>}</span>
          {viewE.reminderNote&&<div style={{fontSize:12,color:"#005a8a",marginTop:3}}>{viewE.reminderNote}</div>}
          {viewE.remindDays&&<div style={{fontSize:11,color:"#5a7a30",marginTop:3}}>🔁 Repeats daily for {viewE.remindDays} days until done</div>}
          {viewE.remindDone&&<div style={{fontSize:11,color:"#1a7a3a",marginTop:3,fontWeight:700}}>✅ Reminder completed</div>}
          <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
            {!viewE.remindDone&&<button onClick={()=>{
              const upd={...viewE,remindDone:true};
              setViewE(upd);
              setEntries(p=>{const a=p.map(x=>x.id===upd.id?upd:x);saveCache(a);return a;});
              sheetsAPI("save",{entry:lightForSheet(upd)}).catch(()=>{});
            }} style={{padding:"6px 12px",borderRadius:7,border:"none",background:"#1a7a3a",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>✓ Mark reminder done</button>}
            {!viewE.remindDone&&<button onClick={()=>{
              const next=new Date(); next.setDate(next.getDate()+1); next.setHours(9,0,0,0);
              const upd={...viewE,reminder:next.toISOString().slice(0,16)};
              setViewE(upd);
              setEntries(p=>{const a=p.map(x=>x.id===upd.id?upd:x);saveCache(a);return a;});
              sheetsAPI("save",{entry:lightForSheet(upd)}).catch(()=>{});
            }} style={{padding:"6px 12px",borderRadius:7,border:"1px solid #c8a060",background:"#fff8ee",color:"#8a5800",fontWeight:600,fontSize:12,cursor:"pointer"}}>😴 Snooze 1 day</button>}
          </div>
        </div>}
        {URL_USER==="main"&&<div style={{marginBottom:10,padding:"8px 10px",background:"#f2f8ff",border:"1px solid #cfe0f0",borderRadius:8}}>
          <div style={{fontSize:12,fontWeight:700,color:"#1a5a8a",marginBottom:6}}>🔗 Share this entry (live) with:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {TEAM_MEMBERS.map(m=>{
              const cur=Array.isArray(viewE.sharedWith)?viewE.sharedWith:(viewE.sharedWith?String(viewE.sharedWith).split(",").map(x=>x.trim()).filter(Boolean):[]);
              const on=cur.indexOf(m.u)>-1;
              return <button key={"sh_"+m.u} onClick={()=>{
                const next=on?cur.filter(x=>x!==m.u):cur.concat([m.u]);
                const upd={...viewE,sharedWith:next};
                setViewE(upd);
                setEntries(p=>{const arr=p.map(x=>x.id===upd.id?upd:x);saveCache(arr);return arr;});
                sheetsAPI("save",{entry:lightForSheet(upd)}).catch(()=>{});
              }} style={{padding:"5px 12px",borderRadius:20,border:on?"none":"1px solid #9bbdd8",background:on?"#1a5a8a":"#fff",color:on?"#fff":"#1a5a8a",cursor:"pointer",fontSize:12,fontWeight:700}}>{on?"✓ ":""}{m.label}</button>;
            })}
          </div>
        </div>}
        {(viewE.link&&String(viewE.link).indexOf("http")===0)&&<div style={{marginBottom:10}}><a href={viewE.link} target="_blank" rel="noopener" style={{display:"inline-flex",alignItems:"center",gap:6,background:"#eef7ee",color:"#2a7a2a",fontWeight:700,padding:"8px 14px",borderRadius:10,textDecoration:"none",border:"1px solid #cfe6cf"}}>🔗 Open Invoice in Drive</a></div>}
        {viewE.attachments?.length>0&&<div><div className="lbl" style={{marginBottom:6}}>Attachments</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{viewE.attachments.map((a,i)=><Thumb key={i} att={a}/>)}</div></div>}
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:14}}><button className="bgh" onClick={()=>setViewE(null)}>Close</button></div>
      </div>}
    </Modal>

    {/* MODALS */}
    <Modal open={showForm} onClose={()=>{setShowForm(false);setEditE(null);}} wide>
      <EntryForm initial={editE} onSave={saveEntry} onClose={()=>{setShowForm(false);setEditE(null);}} dropdowns={dropdowns} onAddToDropdown={addToDropdown} saving={saving}/>
    </Modal>
    {selIds.length>0&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:"#7a1010",padding:"10px 14px",zIndex:999,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 -2px 12px rgba(0,0,0,.3)"}}>
      <span style={{color:"#fff",fontWeight:700,fontSize:14}}>{selIds.length} selected</span>
      <div>
        <button onClick={()=>setSelIds(filtered.map(e=>e.id))} style={{padding:"8px 10px",borderRadius:8,border:"1px solid #fff",background:"transparent",color:"#fff",marginRight:8,fontSize:13,cursor:"pointer"}}>☑️ All Shown</button><button onClick={()=>setSelIds([])} style={{padding:"8px 14px",borderRadius:8,border:"1px solid #fff",background:"transparent",color:"#fff",marginRight:8,fontSize:13,cursor:"pointer"}}>Clear</button>
        <button onClick={bulkDelete} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#fff",color:"#7a1010",fontWeight:800,fontSize:13,cursor:"pointer"}}>🗑 Delete All</button>
      </div>
    </div>}
    <Modal open={showDupes} onClose={()=>setShowDupes(false)}><DupeFinder entries={entries} onDelete={delEntry} onClose={()=>setShowDupes(false)}/></Modal>
    <Modal open={showAI} onClose={()=>setShowAI(false)} wide><AIPanel entries={entries} onClose={()=>setShowAI(false)} onShowAgeing={()=>setShowAgeing(true)} onShowMatcher={()=>setShowMatcher(true)} onShowLogistics={()=>setShowLogistics(true)} onShowLedger={()=>setShowLedger(true)}/></Modal>
    <Modal open={showAgeing} onClose={()=>setShowAgeing(false)} wide><AgeingReport entries={entries} onClose={()=>setShowAgeing(false)} onMarkPaid={markPaid}/></Modal>
    <Modal open={showMatcher} onClose={()=>setShowMatcher(false)} wide><PaymentMatcher entries={entries} onClose={()=>setShowMatcher(false)} onMarkPaid={markPaid}/></Modal>
    <Modal open={showLogistics && IS_OWNER} onClose={()=>setShowLogistics(false)} wide><LogisticsTracker entries={entries} onClose={()=>setShowLogistics(false)} onUpdateEntry={(e)=>saveEntry(e,{silent:true})} onNewSalesOrder={()=>{setEditE({category:"Sales - Order",paymentStatus:"Payment Pending"});setShowForm(true);}}/></Modal>
    <Modal open={showLedger} onClose={()=>setShowLedger(false)} wide><LedgerUpload entries={entries} onClose={()=>setShowLedger(false)} onSaveEntry={(e)=>saveEntry(e,{silent:true})}/></Modal>
    <Modal open={showLocation && IS_OWNER} onClose={()=>setShowLocation(false)} wide><LocationTracker onClose={()=>setShowLocation(false)} onSaveEntry={saveEntry} entries={entries}/></Modal>
    <Modal open={showDayBook} onClose={()=>setShowDayBook(false)} wide><DayBook onClose={()=>setShowDayBook(false)} onSaveEntry={saveEntry} entries={entries}/></Modal>
    <Modal open={showHealth} onClose={()=>setShowHealth(false)}><HealthFamilyQuick onClose={()=>setShowHealth(false)} onSaveEntry={saveEntry} mode="health" entries={entries}/></Modal>
    <Modal open={showCFO && IS_OWNER} onClose={()=>setShowCFO(false)}><CFOBrief entries={entries} onClose={()=>setShowCFO(false)}/></Modal>
    <Modal open={showSpectrum && IS_OWNER} onClose={()=>setShowSpectrum(false)}><Spectrum onClose={()=>setShowSpectrum(false)} onSaveEntry={saveEntry}/></Modal>
    <Modal open={showCSD && IS_OWNER} onClose={()=>setShowCSD(false)} wide><CSD onClose={()=>setShowCSD(false)} onSaveEntry={saveEntry}/></Modal>
    <Modal open={showKerala && IS_OWNER} onClose={()=>setShowKerala(false)} wide><Kerala onClose={()=>setShowKerala(false)} onSaveEntry={saveEntry}/></Modal>
    <Modal open={showRules && IS_OWNER} onClose={()=>setShowRules(false)} wide><RulesEngine entries={entries} onSaveEntry={saveEntry} onClose={()=>setShowRules(false)}/></Modal>
    
    <Modal open={showTelegram && IS_OWNER} onClose={()=>setShowTelegram(false)}><TelegramTeam onClose={()=>setShowTelegram(false)}/></Modal>
    <Modal open={showGym} onClose={()=>setShowGym(false)}><GymLog entries={entries} onSaveEntry={saveEntry} onClose={()=>setShowGym(false)}/></Modal>
    <Modal open={showRecv && IS_OWNER} onClose={()=>setShowRecv(false)}><Receivables entries={entries} onSaveEntry={saveEntry} onClose={()=>setShowRecv(false)}/></Modal>
    <Modal open={!!tgShareEntry} onClose={()=>setTgShareEntry(null)}><TelegramShare entry={tgShareEntry} onClose={()=>setTgShareEntry(null)}/></Modal>
    <Modal open={!!capMode} onClose={()=>setCapMode(null)}><PurchaseSalesCapture mode={capMode} onSaveEntry={saveEntry} onClose={()=>setCapMode(null)}/></Modal>
    <Modal open={showFieldReport} onClose={()=>setShowFieldReport(false)}><FieldReport onClose={()=>setShowFieldReport(false)}/></Modal>
    <Modal open={showPins && IS_OWNER} onClose={()=>setShowPins(false)}><PinManager onClose={()=>setShowPins(false)}/></Modal>
    <Modal open={showFamily} onClose={()=>setShowFamily(false)}><HealthFamilyQuick onClose={()=>setShowFamily(false)} onSaveEntry={saveEntry} mode="family"/></Modal>
    <Modal open={showPaymentReminders && IS_OWNER} onClose={()=>setShowPaymentReminders(false)} wide><PaymentReminders onClose={()=>setShowPaymentReminders(false)} entries={entries} onSaveEntry={saveEntry} onFocusDealer={(nm)=>{ setSearch(nm); setShowPaymentReminders(false); setTimeout(()=>{ try{ window.scrollTo({top:0,behavior:"smooth"}); }catch(e){} }, 100); }}/></Modal>
    <Modal open={showTally && IS_OWNER} onClose={()=>setShowTally(false)} wide><TallyUpload onClose={()=>setShowTally(false)}/></Modal>
    <Modal open={showEmailScan && IS_OWNER} onClose={()=>setShowEmailScan(false)} wide><EmailScan entries={entries} onClose={()=>setShowEmailScan(false)} onSaveEntry={(e)=>saveEntry(e,{silent:true})} onRefresh={refresh}/></Modal>
    <Modal open={showDD} onClose={()=>setShowDD(false)} wide><DropdownManager dropdowns={dropdowns} onSave={saveDropdowns} onClose={()=>setShowDD(false)}/></Modal>
    <Modal open={showShare} onClose={()=>setShowShare(false)} wide><SharePanel/></Modal>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<PinGate><App/></PinGate>);
</script>
</body>
</html>
