    if (!when) { setMsg("Pick a date & time."); return; }
    const item = { id: "tg_" + Date.now(), text, chatIds: [...selected], when: new Date(when).toISOString(), repeat, created: new Date().toISOString() };
    await saveScheduled([...scheduled, item]);
    setText(""); setWhen(""); setRepeat("once");
    setMsg("✓ Scheduled");
    setTimeout(() => setMsg(""), 2500);
  };

  const delScheduled = async (id) => { await saveScheduled(scheduled.filter(s => s.id !== id)); };
  const toggle = (id) => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const renameContact = async (chatId, label) => { await saveContacts(contacts.map(c => c.chatId === chatId ? { ...c, label } : c)); };
  const delContact = async (chatId) => { await saveContacts(contacts.filter(c => c.chatId !== chatId)); setSelected(s => s.filter(x => x !== chatId)); };

  return (

        <div><h2 style={{ margin: 0, fontSize: 18, color: "#0088cc" }}>Telegram Team</h2>
        <div style={{ fontSize: 11, color: "#6a8a9a" }}>Message your team — now or scheduled</div></div>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        {[["send", "📤 Send"], ["scheduled", "⏰ Scheduled"], ["team", "👥 Team"]].map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)} style={{ flex: 1, padding: "8px", borderRadius: 8, border: tab === k ? "2px solid #0088cc" : "1px solid #ccc", background: tab === k ? "#e8f5fc" : "#fff", color: "#0a5a7a", fontWeight: 700, cursor: "pointer", fontSize: 12 }}>{l}</button>

          <label style={{ fontSize: 12, fontWeight: 700, color: "#0a5a7a" }}>Send to ({selected.length} selected)</label>
          <div style={{ maxHeight: 130, overflowY: "auto", border: "1px solid #dde", borderRadius: 8, padding: 6, marginBottom: 8 }}>
            {contacts.length === 0 && <div style={{ fontSize: 11, color: "#999", fontStyle: "italic", padding: 4 }}>No contacts yet — go to 👥 Team and tap Sync.</div>}

            {busy ? "Working…" : (tab === "send" ? "📤 Send now" : "⏰ Schedule it")}

          {tab === "scheduled" && scheduled.length > 0 && (
            <div style={{ marginTop: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#0a5a7a", marginBottom: 6 }}>Upcoming ({scheduled.length})</div>

function RulesEngine({ entries, onSaveEntry, onClose }) {
  const [rules, setRules] = useState([]);
  const [newRule, setNewRule] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [running, setRunning] = useState(false);
  const [proposals, setProposals] = useState(null); // [{id,title,current,change,ruleApplied,accept}]
  const [msg, setMsg] = useState("");
  const [editIdx, setEditIdx] = useState(-1);
  const [editText, setEditText] = useState("");

  useEffect(() => { (async () => {
    try { const r = await sheetsAPI("getPortfolio", { key: "rules" }); if (r && r.data && Array.isArray(r.data.rules)) setRules(r.data.rules); } catch(e) {}
    setLoaded(true);
  })(); }, []);
  const persist = async (rs) => { try { await sheetsAPI("savePortfolio", { key: "rules", data: { rules: rs } }); } catch(e) {} };

  const addRule = async () => {
    const t = newRule.trim(); if (!t) return;
    const rs = [...rules, { id: "rule_" + Date.now(), text: t, active: true }];
    setRules(rs); setNewRule(""); await persist(rs);
  };
  const delRule = async (id) => { const rs = rules.filter(r => r.id !== id); setRules(rs); await persist(rs); };
  const toggleRule = async (id) => { const rs = rules.map(r => r.id===id?{...r,active:!r.active}:r); setRules(rs); await persist(rs); };
  const saveEdit = async (id) => { const rs = rules.map(r => r.id===id?{...r,text:editText}:r); setRules(rs); setEditIdx(-1); await persist(rs); };

  const runRules = async () => {
    const active = rules.filter(r => r.active);
    if (!active.length) { setMsg("Add at least one active rule first."); return; }
    setRunning(true); setMsg("⚖️ Applying your rules to entries…"); setProposals(null);
    try {
      // Send a compact view of entries (only fields that matter) to keep it light
      const slim = entries.slice(0, 400).map(e => ({
        id: e.id, title: e.title, category: e.category, person: e.person, vendor: e.vendor,
        amount: e.amount, date: e.date, paymentStatus: e.paymentStatus, tags: e.tags, notes: (e.notes||"").slice(0,120)
      }));
      const prompt =
"You are a rules engine for a business tracker. The owner has written rules in plain English. Apply them to the entries and propose changes.\\n\\n" +
"RULES:\\n" + active.map((r,i)=>((i+1)+". "+r.text)).join("\\n") + "\\n\\n" +
"ENTRIES (JSON):\\n" + JSON.stringify(slim) + "\\n\\n" +
"For each entry that a rule applies to, propose a change. Possible changes: add a tag, set a reminder in N days (reminderDays), set paymentStatus, or set a due note. " +
"Return ONLY JSON: {\\\"proposals\\\":[{\\\"id\\\":\\\"<entry id>\\\",\\\"title\\\":\\\"<entry title>\\\",\\\"rule\\\":\\\"<which rule, short>\\\",\\\"addTag\\\":\\\"<tag or empty>\\\",\\\"reminderDays\\\":<number or 0>,\\\"note\\\":\\\"<short note or empty>\\\"}]}. " +
"Only include entries that genuinely match a rule. Be precise, don't over-match. If nothing matches, return {\\\"proposals\\\":[]}.";
      const txt = await claudeAPI(prompt, "You are a precise rules engine. Return ONLY valid JSON, no prose.", "", "", "");
      const clean = String(txt||"").replace(/```json/g,"").replace(/```/g,"").trim();
      const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
      const obj = JSON.parse(s>=0 ? clean.substring(s,e+1) : clean);
      const props = (obj.proposals||[]).map(p => ({ ...p, accept: true }));
      if (!props.length) { setMsg("No entries matched your rules right now."); setRunning(false); return; }
      setProposals(props); setMsg("");
    } catch(e) { setMsg("Couldn't apply rules: " + (e.message||e)); }
    setRunning(false);
  };

  const applyAccepted = async () => {
    const accepted = (proposals||[]).filter(p => p.accept);
    if (!accepted.length) { setMsg("Nothing selected to apply."); return; }
    setRunning(true); setMsg("Saving changes…");
    let done = 0;
    for (const p of accepted) {
      const e = entries.find(x => x.id === p.id); if (!e) continue;
      const upd = { ...e };
      if (p.addTag) upd.tags = Array.from(new Set([...(e.tags||[]), p.addTag]));
      if (p.reminderDays && p.reminderDays > 0) { upd.reminderDays = p.reminderDays; upd.reminderActive = true; }
      if (p.note) upd.notes = (e.notes ? e.notes + " | " : "") + p.note;
      try { await onSaveEntry(upd); done++; } catch(err) {}
    }
    setMsg("✓ Applied to " + done + " entr" + (done===1?"y":"ies") + "."); setProposals(null); setRunning(false);
    setTimeout(()=>setMsg(""), 3000);
  };

  const inp = { width:"100%", padding:"9px", borderRadius:8, border:"1px solid #ccd", fontSize:13 };
  if (!loaded) return <div style={{padding:20,textAlign:"center",color:"#888"}}>Loading rules…</div>;

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
        <span style={{ fontSize:26 }}>⚖️</span>
        <div><h2 style={{ margin:0, fontSize:18, color:"#3a2a6a" }}>Rules</h2>
        <div style={{ fontSize:11, color:"#7a6a9a" }}>Write rules in plain English. AI applies them — you confirm.</div></div>
      </div>

      {/* Add a rule */}
      <div style={{ background:"#f7f5fc", borderRadius:10, padding:10, marginBottom:12 }}>
        <textarea value={newRule} onChange={e=>setNewRule(e.target.value)} rows={2}
          placeholder='e.g. "Customers given a cash discount — remind me to collect in 7 days" or "Institutional orders (CRPF, KPKB, CPC) are 120-day payment"'
          style={{...inp, resize:"vertical"}}/>
        <button onClick={addRule} style={{ marginTop:8, padding:"8px 16px", borderRadius:8, border:"none", background:"#5a3a9a", color:"#fff", fontWeight:700, cursor:"pointer", fontSize:13 }}>➕ Add rule</button>
      </div>

      {/* Rules list */}
      <div style={{ marginBottom:12 }}>
        <div style={{ fontSize:12, fontWeight:700, color:"#3a2a6a", marginBottom:6 }}>My rules ({rules.length})</div>
        {rules.length===0 && <div style={{ fontSize:11, color:"#999", fontStyle:"italic" }}>No rules yet. Add one above.</div>}
        {rules.map((r, i) => (
          <div key={r.id} style={{ display:"flex", alignItems:"flex-start", gap:8, padding:"8px", borderBottom:"1px solid #eee", background: r.active?"#fff":"#f6f6f6", borderRadius:6, marginBottom:4 }}>
            <input type="checkbox" checked={r.active} onChange={()=>toggleRule(r.id)} title="active" style={{ marginTop:3 }}/>
            {editIdx===i
              ? <div style={{ flex:1 }}>
                  <textarea value={editText} onChange={e=>setEditText(e.target.value)} rows={2} style={inp}/>
                  <button onClick={()=>saveEdit(r.id)} style={{ marginTop:4, fontSize:11, padding:"4px 10px", borderRadius:6, border:"none", background:"#1a7a4a", color:"#fff", cursor:"pointer" }}>Save</button>
                </div>
              : <div style={{ flex:1, fontSize:12.5, color: r.active?"#233":"#999" }}>{r.text}</div>}
            <button onClick={()=>{ setEditIdx(i); setEditText(r.text); }} style={{ border:"none", background:"none", cursor:"pointer", fontSize:13 }}>✏️</button>

    try {
      const b64 = String(photo.dataUrl).split(",")[1];
      const fshape = '{"period":"Aug-26","rows":[{"depot":"CHENNAI","cases":{"13094":29,"13095":9,"13130":16,"13132":12}}]}';
      const fprompt =

"3. TRANSPORT — anything unusual in freight cost per depot.\\n" +
"4. WHAT TO DO TODAY — 3 concrete actions.\\n\\n" +
"Be blunt. Use ₹. If data is thin, say so rather than inventing.";
      const txt = await claudeAPI(prompt, "You are a sharp operations analyst. Be concise and specific.", "", "", "");
      setIntel(txt || "No briefing generated.");

          <button key={k} onClick={()=>setTab(k)} style={{ flex:1, padding:"8px 4px", borderRadius:8, border: tab===k?"2px solid #2a4a7a":"1px solid #ccc", background: tab===k?"#e8eefa":"#fff", color:"#2a4a7a", fontWeight:700, cursor:"pointer", fontSize:11.5 }}>{l}</button>

      </div>

      {msg && <div style={{ fontSize:12, color: msg[0]==="✓"?"#1a7a3a":"#a33", marginBottom:8 }}>{msg}</div>}

          paymentStatus:"", 
          notes:"Spectrum order"+(o.orderNo?(" #"+o.orderNo):"")+" · Officer: "+o.officer+" · Value ₹"+(o.total||0)+" · Gross Profit ₹"+(o.gpTotal||0)+" · Items: "+itemsTxt,
          tags:["Sales Order","Spectrum","Officer: "+o.officer],
          spectrumId:o.id, createdAt:new Date().toISOString() };
        await onSaveEntry(entry);
      }
    }catch(e){}
    setTimeout(()=>setMsg(""),2500);
  };
  const updOrder = async (id, patch) => {
    const no = orders.map(o => o.id===id ? {...o, ...patch} : o);
    setOrders(no);
    await persist(no, expenses);
  };
  const delOrder = async id => { const no=orders.filter(o=>o.id!==id); setOrders(no); await persist(no,expenses); };
  const setExp = async (off,val) => { const ne={...expenses,[off]:val}; setExpenses(ne); await persist(orders,ne); };

  // officer rollups
  function officerStats(off){
    const os=orders.filter(o=>o.officer===off);
    const sales=os.reduce((s,o)=>s+(o.total||0),0);
    const gp=os.reduce((s,o)=>s+(o.gpTotal||0),0);
    const exp=parseFloat(String(expenses[off]||"").replace(/[^0-9.]/g,""))||0;
    const net=gp-exp;
    return { orders:os.length, sales, gp, exp, net };
  }
  // product rollups
  function productStats(){
    const map={};
    orders.forEach(o=>o.lines.forEach(l=>{ if(!map[l.name])map[l.name]={doz:0,gp:0}; map[l.name].doz+=l.doz||0; map[l.name].gp+=l.gp||0; }));
    return Object.entries(map).map(([name,v])=>({name,...v})).sort((a,b)=>b.gp-a.gp);
  }

  const inp={padding:"7px 8px",borderRadius:6,border:"1px solid #ccd",fontSize:12.5};

  return (
    <div style={{padding:4}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <span style={{fontSize:26}}>🌈</span>
        <div><h2 style={{margin:0,fontSize:18,color:"#3a2a6a"}}>Spectrum</h2>
        <div style={{fontSize:11,color:"#7a6a9a"}}>Salesperson profitability &mdash; tag orders, track who earns their keep</div></div>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[["upload","📤 Upload"],["orders","📋 Orders"],["officers","👥 Officers"],["products","📦 Products"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"8px",borderRadius:8,border:tab===k?"2px solid #5a3a9a":"1px solid #ccc",background:tab===k?"#f0eafa":"#fff",color:"#3a2a6a",fontWeight:700,cursor:"pointer",fontSize:12}}>{l}</button>
        ))}
      </div>

      {IS_OWNER && (() => {
        const totSales = orders.reduce((s,o)=>s+(o.total||0),0);
        const totGP = orders.reduce((s,o)=>s+(o.gpTotal||0),0);
        const pct = totSales? Math.round(totGP/totSales*10000)/100 : 0;
        return <div style={{background:"linear-gradient(135deg,#3a2a6a,#5a3a9a)",borderRadius:12,padding:"12px 14px",color:"#fff",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div><div style={{fontSize:10,opacity:.85,letterSpacing:".05em"}}>TOTAL SALES VALUE</div><div style={{fontSize:19,fontWeight:800}}>{fmt(totSales)}</div></div>
          <div><div style={{fontSize:10,opacity:.85,letterSpacing:".05em"}}>TOTAL PROFIT</div><div style={{fontSize:19,fontWeight:800}}>{fmt(totGP)}</div></div>
          <div><div style={{fontSize:10,opacity:.85,letterSpacing:".05em"}}>PROFIT %</div><div style={{fontSize:19,fontWeight:800}}>{pct}%</div></div>
        </div>;
      })()}
      {msg && <div style={{fontSize:12,color:msg[0]==="✓"?"#1a7a3a":"#a33",marginBottom:8}}>{msg}</div>}

      {tab==="upload" && <div>
        <input ref={fileRef} type="file" accept="image/*" onChange={onPick} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{width:"100%",padding:"11px",borderRadius:10,border:"1.5px dashed #7a5aba",background:"#f5f0fc",color:"#4a2a8a",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:10}}>📄 Upload / snap the sales order</button>
        {photo && <div style={{textAlign:"center",marginBottom:10}}>
          <img src={photo.dataUrl} alt="order" style={{maxWidth:"100%",maxHeight:160,borderRadius:8,border:"1px solid #ddd"}}/>
          <button onClick={scanOrder} disabled={busy} className="bg" style={{width:"100%",marginTop:8}}>{busy?"⏳ Reading…":"🔍 Scan & match products"}</button>
        </div>}

        {pending && <div style={{background:"#faf8ff",border:"1px solid #d8c8f0",borderRadius:10,padding:12,marginBottom:10}}>
          <div style={{fontSize:13,fontWeight:700,color:"#3a2a6a"}}>{pending.customer||"Order"} {pending.orderNo?("· "+pending.orderNo):""}</div>
          <div style={{fontSize:11,color:"#777",marginBottom:8}}>{pending.date} · Order value {fmt(pending.total)} · Gross profit {fmt(pending.gpTotal)}</div>
          {pending.lines.map((l,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"3px 0",color:l.matched?"#233":"#a33"}}>
              <span>{l.matched?"✓":"⚠"} {l.name} {l.doz?("· "+l.doz+" doz"):""}</span>
              <span style={{fontWeight:700}}>{l.matched?fmt(l.gp):"unmatched"}</span>
            </div>
          ))}
          <div style={{marginTop:10,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <select value={tagOfficer} onChange={e=>setTagOfficer(e.target.value)} style={inp}>
              <option value="">Tag salesperson…</option>
              {OFFICERS.map(o=><option key={o} value={o}>{o}</option>)}
            </select>
            <button onClick={confirmOrder} style={{padding:"8px 16px",borderRadius:8,border:"none",background:"#5a3a9a",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>✓ Save & tag</button>
          </div>
          <div style={{fontSize:10,color:"#999",marginTop:6,fontStyle:"italic"}}>Unmatched (⚠) items usually mean a SKU still marked UPDATE_LATER, or a new product. You can still save; matched lines count toward profit.</div>
        </div>}

        <div style={{fontSize:12,fontWeight:700,color:"#3a2a6a",marginTop:8,marginBottom:4}}>Recent tagged orders</div>
        {orders.length===0 && <div style={{fontSize:11,color:"#999",fontStyle:"italic"}}>No orders yet. Upload one above.</div>}
        {orders.slice(0,10).map(o=>(
          <div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,padding:"6px 8px",borderBottom:"1px solid #eee"}}>
            <span><b style={{color:"#5a3a9a"}}>{o.officer}</b> · {o.customer||"—"} · {o.date}</span>
            <span>{fmt(o.gpTotal)} GP <button onClick={()=>delOrder(o.id)} style={{border:"none",background:"none",color:"#c33",cursor:"pointer"}}>×</button></span>
          </div>
        ))}
      </div>}

      {tab==="orders" && <div>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          <input value={ordSearch} onChange={e=>setOrdSearch(e.target.value)} placeholder="Search customer / order no…" style={{flex:2,padding:"7px 8px",borderRadius:6,border:"1px solid #ccd",fontSize:12.5}}/>
          <select value={ordOfficer} onChange={e=>setOrdOfficer(e.target.value)} style={{flex:1,padding:"7px",borderRadius:6,border:"1px solid #ccd",fontSize:12}}>
            <option value="">All officers</option>
            {OFFICERS.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        </div>
        {(() => {
          let list=orders.slice();
          if(ordOfficer) list=list.filter(o=>o.officer===ordOfficer);
          if(ordSearch){ const q=ordSearch.toLowerCase(); list=list.filter(o=>((o.customer||"")+" "+(o.orderNo||"")+" "+(o.officer||"")).toLowerCase().indexOf(q)>-1); }
          if(!list.length) return <div style={{fontSize:12,color:"#999",fontStyle:"italic",padding:12,textAlign:"center"}}>No matching orders.</div>;
          return <div style={{maxHeight:"58vh",overflowY:"auto"}}>
            <div style={{fontSize:11,color:"#777",marginBottom:6}}>{list.length} order{list.length===1?"":"s"}{IS_OWNER?(" · GP "+fmt(list.reduce((s,o)=>s+(o.gpTotal||0),0))):""}</div>
            {list.map(o=>{
              const STAGES=["invoiced","dispatched","delivered","paid"];
              const stage=o.stage||"invoiced";
              const total=Number(o.total)||0;
              const recd=Number(o.received)||0;
              const due=Math.max(0,total-recd);
              const transport=Number(o.transport)||0;
              const isAgent2=(o.officer===AGENT2);
              const commission=isAgent2?(total*AGENT2_RATE):0;
              const commissionDue=isAgent2 && recd>0;   // payable on realisation only
              const netProfit=(Number(o.gpTotal)||0)-transport-commission;
              return (
              <div key={o.id} style={{border:"1px solid "+(due<=0.5?"#cfe0cf":"#eee"),background:due<=0.5?"#f7fbf7":"#fff",borderRadius:8,padding:"9px 10px",marginBottom:7}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:700,color:"#3a2a6a",fontSize:13}}>{o.customer||"Customer"}</span>
                  <span style={{fontSize:11,color:"#777"}}>{o.date}</span>
                </div>
                <div style={{fontSize:11.5,color:"#555",marginTop:2}}>
                  <b style={{color:"#5a3a9a"}}>{o.officer}</b>{o.orderNo?(" · #"+o.orderNo):""} · Value {fmt(total)}{IS_OWNER?(" · GP "+fmt(o.gpTotal||0)):""}
                </div>

                {/* stage pipeline */}
                <div style={{display:"flex",gap:4,marginTop:7}}>
                  {STAGES.map(s=>{
                    const done=STAGES.indexOf(stage)>=STAGES.indexOf(s);
                    return <button key={s} onClick={()=>updOrder(o.id,{stage:s})}
                      style={{flex:1,padding:"5px 2px",borderRadius:6,fontSize:9.5,fontWeight:700,cursor:"pointer",
                        border:"1px solid "+(done?"#1a7a4a":"#ddd"),
                        background:done?"#1a7a4a":"#fff",color:done?"#fff":"#999"}}>
                      {s==="invoiced"?"📄 Invoiced":s==="dispatched"?"🚚 Dispatched":s==="delivered"?"📦 Delivered":"💰 Paid"}
                    </button>;
                  })}
                </div>

                {IS_OWNER && <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  <label style={{fontSize:10.5,color:"#666"}}>Transport ₹</label>
                  <input type="number" value={o.transport||""} onChange={e=>updOrder(o.id,{transport:Number(e.target.value)||0})}
                    placeholder="freight" style={{width:80,padding:"5px 6px",borderRadius:6,border:"1px solid #ccd",fontSize:11.5}}/>
                  <label style={{fontSize:10.5,color:"#666"}}>Received ₹</label>
                  <input type="number" value={o.received||""} onChange={e=>updOrder(o.id,{received:Number(e.target.value)||0})}
                    placeholder="0" style={{width:90,padding:"5px 6px",borderRadius:6,border:"1px solid #ccd",fontSize:11.5}}/>
                  <button onClick={()=>updOrder(o.id,{received:total,stage:"paid"})}
                    style={{fontSize:10,padding:"4px 9px",borderRadius:14,border:"1px solid #1a7a4a",background:"#fff",color:"#1a7a4a",cursor:"pointer"}}>Full</button>
                </div>}

                {IS_OWNER && <div style={{marginTop:6,fontSize:11,display:"flex",gap:10,flexWrap:"wrap"}}>
                  {due>0.5
                    ? <span style={{color:"#c33",fontWeight:700}}>Outstanding {fmt(due)}</span>
                    : <span style={{color:"#1a7a3a",fontWeight:700}}>✓ Fully received</span>}
                  {isAgent2 && <span style={{color:commissionDue?"#8a5a1a":"#999"}}>
                    Agent 2 commission 14% = {fmt(commission)}{commissionDue?" (due)":" (on realisation)"}
                  </span>}
                  <span style={{color:"#1a5a3a",fontWeight:700}}>Net after transport{isAgent2?" + commission":""}: {fmt(netProfit)}</span>
                </div>}

                <div style={{fontSize:10.5,color:"#888",marginTop:5}}>{(o.lines||[]).map(l=>l.name+(l.doz?(" "+l.doz+"dz"):"")).join(", ")}</div>
                <button onClick={()=>delOrder(o.id)} style={{marginTop:4,fontSize:10.5,border:"none",background:"none",color:"#c33",cursor:"pointer",padding:0}}>Delete</button>
              </div>);
            })}
          </div>;
        })()}
      </div>}

      {tab==="officers" && !IS_OWNER && <div style={{fontSize:12,color:"#777",background:"#f6f6f9",borderRadius:8,padding:14,textAlign:"center"}}>Officer performance is visible to management only.</div>}
      {tab==="officers" && IS_OWNER && <div>
        <div style={{fontSize:11,color:"#777",marginBottom:8}}>Enter each salesperson's monthly expense/salary. Net = Gross Profit from their tagged orders − their cost.</div>
        {OFFICERS.map(off=>{ const s=officerStats(off); return (
          <div key={off} style={{border:"1px solid #e5e0f0",borderRadius:10,padding:10,marginBottom:8,background:s.net>=0?"#f5fbf5":"#fdf3f3"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:700,color:"#3a2a6a",fontSize:14}}>{off}</span>
              <span style={{fontWeight:800,fontSize:15,color:s.net>=0?"#1a7a3a":"#c33"}}>{s.net>=0?"+":""}{fmt(s.net)}</span>
            </div>
            <div style={{fontSize:11,color:"#666",marginTop:3}}>{s.orders} orders · Sales {fmt(s.sales)} · Gross profit {fmt(s.gp)}</div>
            <div style={{display:"flex",gap:6,alignItems:"center",marginTop:6}}>
              <label style={{fontSize:11,color:"#555"}}>Monthly cost ₹</label>
              <input value={expenses[off]||""} onChange={e=>setExp(off,e.target.value)} placeholder="salary+expenses" style={{...inp,flex:1}}/>
            </div>
            <div style={{fontSize:10,marginTop:4,color:s.net>=0?"#1a7a3a":"#c33",fontWeight:600}}>
              {s.net>=0 ? "✓ Covering their cost (verified orders)" : "⚠ Not yet covering cost — needs more/higher-margin orders"}
            </div>
            {(() => {
              const frs = fieldReports.filter(f => (f.officer||"").toLowerCase()===off.toLowerCase()).slice(0,3);
              if(!frs.length) return null;
              return <div style={{marginTop:8,paddingTop:8,borderTop:"1px dashed #d8d0e8"}}>
                <div style={{fontSize:10,color:"#8a6a2a",fontWeight:700,marginBottom:3}}>📝 Field-reported (UNVERIFIED)</div>
                {frs.map((f,i)=>(
                  <div key={i} style={{fontSize:10.5,color:"#775",padding:"2px 0"}}>
                    {f.date}: Sales ₹{f.sales||0} · Exp ₹{f.expenses||0} · Coll ₹{f.collections||0}{f.location?" · 📍":""}
                  </div>
                ))}
              </div>;
            })()}
          </div>
        );})}
      </div>}

      {tab==="products" && <div>
        {!IS_OWNER && <div style={{fontSize:12,color:"#777",background:"#f6f6f9",borderRadius:8,padding:10}}>
          Product list. Volume moving through the channel:
          {productStats().length===0 && <div style={{fontSize:11,color:"#999",fontStyle:"italic",marginTop:6}}>No orders tagged yet.</div>}
          {productStats().map((p,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12.5,padding:"5px 2px",borderBottom:"1px solid #eee"}}>
              <span>{p.name}</span><span style={{color:"#999"}}>{Math.round(p.doz)} doz</span>
            </div>
          ))}
        </div>}

        {IS_OWNER && <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:12,color:"#777"}}>Products moving through channel + profit</span>
            <button onClick={()=>setEditingProducts(v=>!v)} style={{fontSize:11,padding:"4px 12px",borderRadius:6,border:"1px solid #5a3a9a",background:editingProducts?"#5a3a9a":"#f0eafa",color:editingProducts?"#fff":"#3a2a6a",cursor:"pointer",fontWeight:700}}>{editingProducts?"✓ Done":"✎ Edit products"}</button>
          </div>

          {!editingProducts && <div>
            {productStats().map((p,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12.5,padding:"6px 4px",borderBottom:"1px solid #eee"}}>
                <span>{p.name} <span style={{color:"#999"}}>({Math.round(p.doz)} doz)</span></span>
                <span style={{fontWeight:700,color:"#1a7a3a"}}>{fmt(p.gp)}</span>
              </div>
            ))}
            <div style={{marginTop:12,fontSize:11,fontWeight:700,color:"#3a2a6a"}}>Profit per dozen (top earners)</div>
            {master.slice().sort((a,b)=>b.gp-a.gp).slice(0,8).map((m,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11.5,padding:"3px 4px",color:"#555"}}>
                <span>{m.name}</span><span>{fmt(m.gp)}/doz · {m.gpp}%</span>
              </div>
            ))}
          </div>}

          {editingProducts && <div>
            <div style={{fontSize:10.5,color:"#888",marginBottom:8,fontStyle:"italic"}}>Add/edit products, SKU, SP & COGS per dozen. Gross profit auto-calculates. Costs change often — keep this current.</div>
            {master.map((m,idx)=>(
              <div key={idx} style={{border:"1px solid #e5e0f0",borderRadius:8,padding:8,marginBottom:8}}>
                <input value={m.name} onChange={e=>updProduct(idx,"name",e.target.value)} placeholder="product name" style={{width:"100%",padding:"6px",borderRadius:6,border:"1px solid #ccd",fontSize:12.5,marginBottom:5,fontWeight:600}}/>
                <div style={{display:"flex",gap:5}}>
                  <input value={m.sku} onChange={e=>updProduct(idx,"sku",e.target.value)} placeholder="SKU (ONAONA…)" style={{flex:2,padding:"6px",borderRadius:6,border:"1px solid #ccd",fontSize:11}}/>
                  <input value={m.sp} onChange={e=>updProduct(idx,"sp",e.target.value)} placeholder="SP/doz" type="number" style={{flex:1,padding:"6px",borderRadius:6,border:"1px solid #ccd",fontSize:11}}/>
                  <input value={m.cogs} onChange={e=>updProduct(idx,"cogs",e.target.value)} placeholder="COGS/doz" type="number" style={{flex:1,padding:"6px",borderRadius:6,border:"1px solid #ccd",fontSize:11}}/>
                  <button onClick={()=>delProduct(idx)} style={{border:"none",background:"none",color:"#c33",cursor:"pointer",fontSize:16,padding:"0 4px"}}>×</button>
                </div>
                <div style={{fontSize:10.5,color:"#1a7a3a",marginTop:4}}>GP: {fmt(m.gp)}/doz · {m.gpp}%</div>
              </div>
            ))}
            <button onClick={addProduct} style={{width:"100%",padding:"9px",borderRadius:8,border:"1.5px dashed #5a3a9a",background:"#f5f0fc",color:"#4a2a8a",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Add product</button>
          </div>}
        </div>}
      </div>}

      <div style={{fontSize:10,color:"#999",marginTop:12,fontStyle:"italic"}}>
        Data stays in your own database. Profit = (SP − COGS) per dozen × dozens ordered. Update the 5 pending SKUs to improve auto-matching.
      </div>
    </div>
  );
}


function AvailableFunds() {
  const [data, setData] = useState({ bankBalance:"", asOf:"", cheques:[], payments:[] });
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [savedMsg, setSavedMsg] = useState("");

  useEffect(() => {
    (async () => {
      try {
        const r = await sheetsAPI("getPortfolio", { key: "available_funds" });
        if (r && r.data) setData(Object.assign({ bankBalance:"", asOf:"", cheques:[], payments:[] }, r.data));
      } catch(e) {}
      setLoaded(true);
    })();
  }, []);

  const num = v => { const n = parseFloat(String(v).replace(/[^0-9.-]/g,"")); return isNaN(n)?0:n; };
  const bank = num(data.bankBalance);
  const unclearedTotal = (data.cheques||[]).reduce((s,c)=> s + (c.cleared?0:num(c.amount)), 0);
  const paymentsTotal = (data.payments||[]).reduce((s,p)=> s + num(p.amount), 0);
  const available = bank - unclearedTotal - paymentsTotal;

  const save = async () => {
    setSaving(true); setSavedMsg("");
    try { await sheetsAPI("savePortfolio", { key: "available_funds", data }); setSavedMsg("✓ Saved"); }
    catch(e) { setSavedMsg("Save failed"); }
    setSaving(false);
    setTimeout(()=>setSavedMsg(""), 2500);
  };

  const addCheque = () => setData(d => ({...d, cheques:[...(d.cheques||[]), {no:"",payee:"",amount:"",date:"",cleared:false}]}));
  const addPayment = () => setData(d => ({...d, payments:[...(d.payments||[]), {what:"",amount:""}]}));
  const upCheque = (i,k,v) => setData(d => { const c=[...d.cheques]; c[i]={...c[i],[k]:v}; return {...d,cheques:c}; });
  const upPayment = (i,k,v) => setData(d => { const p=[...d.payments]; p[i]={...p[i],[k]:v}; return {...d,payments:p}; });
  const delCheque = i => setData(d => ({...d, cheques:d.cheques.filter((_,x)=>x!==i)}));
  const delPayment = i => setData(d => ({...d, payments:d.payments.filter((_,x)=>x!==i)}));

  const fmt = n => "₹" + Math.round(n).toLocaleString("en-IN");
  const inp = {padding:"7px 8px",borderRadius:6,border:"1px solid #cfc",fontSize:12.5,width:"100%"};

  if (!loaded) return <div style={{padding:20,textAlign:"center",color:"#6a7a6a"}}>Loading…</div>;

  return (
    <div style={{ marginBottom:14 }}>
      {/* The headline number */}
      <div style={{ background: available>=0?"linear-gradient(135deg,#1a7a4a,#0a5a2a)":"linear-gradient(135deg,#a33,#822)", borderRadius:12, padding:"14px 16px", color:"#fff", marginBottom:12 }}>
        <div style={{ fontSize:11, opacity:.9, letterSpacing:".05em" }}>TRUE AVAILABLE FUNDS</div>
        <div style={{ fontSize:28, fontWeight:800, lineHeight:1.1 }}>{fmt(available)}</div>
        <div style={{ fontSize:10.5, opacity:.85, marginTop:3 }}>
          Bank {fmt(bank)} − Uncleared cheques {fmt(unclearedTotal)} − Payments due {fmt(paymentsTotal)}
        </div>
      </div>

      {/* Bank balance input */}
      <div style={{ display:"flex", gap:8, marginBottom:10, alignItems:"center" }}>
        <label style={{ fontSize:12.5, fontWeight:700, color:"#1a5a3a", minWidth:100 }}>Bank balance</label>
        <input value={data.bankBalance} onChange={e=>setData(d=>({...d,bankBalance:e.target.value}))} placeholder="from statement" style={inp}/>
        <input value={data.asOf} onChange={e=>setData(d=>({...d,asOf:e.target.value}))} placeholder="as of date" style={{...inp,maxWidth:110}}/>
      </div>

      {/* Uncleared cheques */}
      <div style={{ marginBottom:10 }}>

function CFOBrief({ entries, onClose }) {
  const [loading, setLoading] = useState(false);
  const [brief, setBrief] = useState(null);
  const [mode, setMode] = useState("weekly"); // weekly | daily
  const [err, setErr] = useState("");

  // Build a compact financial snapshot from tracker entries (no heavy data sent)
  function buildSnapshot() {
    const money = e => { const n = parseFloat(String(e.amount||"").replace(/[^0-9.]/g,"")); return isNaN(n)?0:n; };
    const isPending = e => /pending|due|asked|partial|overdue/i.test(e.paymentStatus||"") || (e.tags||[]).some(t=>/pending|due/i.test(t));
    const isPaid = e => /paid|completed|received/i.test(e.paymentStatus||"");
    const today = new Date();
    const daysAgo = d => { const t=Date.parse(d); return isNaN(t)?9999:Math.floor((today-t)/86400000); };

    const fin = entries.filter(e => money(e) > 0 || /purchase|sales|payment|finance|receipt/i.test(e.category||""));
    let receivablesTotal=0, payablesTotal=0, pendingCount=0;
    const overdue=[]; const recentSales=[]; const recentPurch=[];
    entries.forEach(e => {
      const amt = money(e);
      const cat = (e.category||"").toLowerCase();
      const pend = isPending(e);
      if (pend && amt>0) { pendingCount++;
        if (/sales|receiv/i.test(cat) || /sales/i.test(e.taskType||"")) receivablesTotal += amt;
        else payablesTotal += amt;
        const age = daysAgo(e.date);
        if (age>0 && age<9999) overdue.push({ who:e.vendor||e.person||e.title||"?", amt, age, status:e.paymentStatus||"", cat });
      }
      if (/sales/i.test(cat) && amt>0) recentSales.push({who:e.vendor||e.person||e.title,amt,date:e.date});
      if (/purchase/i.test(cat) && amt>0) recentPurch.push({who:e.vendor||e.person||e.title,amt,date:e.date});
    });
    overdue.sort((a,b)=>b.amt-a.amt);
    return {
      totalEntries: entries.length,
      receivablesTotal: Math.round(receivablesTotal),
      payablesTotal: Math.round(payablesTotal),
      pendingCount,
      topOverdue: overdue.slice(0,12),
      salesCount: recentSales.length,
      purchaseCount: recentPurch.length,
    };
  }

  const run = async () => {
    setLoading(true); setErr(""); setBrief(null);
    try {
      const snap = buildSnapshot();
      const period = mode==="daily" ? "today / this working day" : "this week";
      const prompt =
"You are an experienced Chief Financial Officer preparing a concise "+(mode)+" executive brief for the business owner of Onam Agarbathi (a century-old incense manufacturer, ~Rs 10 crore turnover, exports + domestic). "+
"You are NOT doing bookkeeping or recalculating figures. You interpret the financial snapshot below into executive insight and clear ACTIONS the owner can take on the go.\n\n"+
"FINANCIAL SNAPSHOT (from the owner's tracker, "+period+"):\n"+
JSON.stringify(snap, null, 2)+"\n\n"+
"Write a brief with these sections, short and punchy (owner reads on phone):\n"+
"1. HEADLINE - one line on overall financial health right now.\n"+
"2. CASH & RECEIVABLES - what's owed to the business, what it owes, and the risk.\n"+
"3. TOP ATTENTION - the 3-5 specific accounts/items to chase or act on first (name them, with amounts and how overdue).\n"+
"4. RISKS - any concerning patterns (concentration, ageing, cash gaps).\n"+
"5. CFO ACTIONS - a numbered list of 3-6 concrete actions the owner should take this "+(mode==='daily'?'day':'week')+".\n\n"+
"Be direct and practical, like a seasoned CFO. Use Rs for amounts. If data is thin, say so honestly and note what to track better. Do not invent numbers not in the snapshot.";
      const txt = await claudeAPI(prompt, "You are a sharp, honest CFO. Be concise and action-oriented. Plain text with clear section headers.", "", "", "");
      setBrief(txt || "No brief generated.");
    } catch(e) { setErr("Couldn't generate the brief: "+(e.message||e)); }
    setLoading(false);
  };

  // Click-to-chat: opens WhatsApp with the reminder pre-filled (works today, uses your own WhatsApp)
  const chatReminder = (name, entryList) => {
    const phone = contacts[name.trim().toLowerCase()];
    const total = entryList.reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.]/g, "")) || 0), 0);
    const isSales = payType==="sales";
    // Build itemized invoice reference lines
    const itemLines = entryList.map(e=>{
      const amt = fmt(parseFloat(String(e.amount).replace(/[^\d.]/g,""))||0);
      const inv = e.orderNo || e.invoiceNo || (e.title||"").replace(/\s+/g," ").slice(0,40) || "Invoice";
      const dt = e.date ? (" ("+e.date+")") : "";
      return "• "+inv+dt+" — "+amt;
    }).join("\n");
    const msg = isSales
      ? ("Dear "+name+",\n\nThis is a gentle reminder regarding the following pending payment(s) with Onam Agarbathi Pvt. Ltd.:\n\n"+itemLines+"\n\nTotal: "+fmt(total)+"\n\nKindly arrange payment at your earliest convenience. Thank you.")
      : ("Dear "+name+",\n\nRegarding the following pending payable(s):\n\n"+itemLines+"\n\nTotal: "+fmt(total)+"\n\nWe will arrange payment shortly. Thank you.");
    const num = phone ? phone.replace(/[^\d]/g,"") : "";
    const waNum = num ? ((num.length===10?"91":"")+num) : "";
    // If a number is saved, go straight to that chat; otherwise open WhatsApp with the message
    // pre-filled so you can PICK the contact yourself (your preferred flow).
    const url = waNum
      ? ("https://wa.me/"+waNum+"?text="+encodeURIComponent(msg))
      : ("https://api.whatsapp.com/send?text="+encodeURIComponent(msg));
    let win=null;
    try{ win = window.open(url, "_blank"); }catch(e){}
    if(!win || win.closed || typeof win.closed==="undefined"){
      // popup blocked (common on desktop) — copy message + navigate so nothing is lost
      try{ if(navigator.clipboard) navigator.clipboard.writeText(msg); }catch(e){}
      window.location.href = url;
    }
    const updated = { ...sentIds, [name]: new Date().toISOString() };
    setSentIds(updated); localStorage.setItem("waReminderSent", JSON.stringify(updated));
  };

  // Build the full filled-in reminder message (invoice details + amounts + total)
  const buildMessage = (name, entryList) => {
    const total = entryList.reduce((s,e)=>s+(parseFloat(String(e.amount).replace(/[^\d.]/g,""))||0),0);
    const isSales = payType==="sales";
    const itemLines = entryList.map(e=>{
      const amt = fmt(parseFloat(String(e.amount).replace(/[^\d.]/g,""))||0);
      const inv = e.orderNo || e.invoiceNo || (e.title||"").replace(/\s+/g," ").slice(0,40) || "Invoice";
      const dt = e.date ? (" ("+e.date+")") : "";
      return "• "+inv+dt+" — "+amt;
    }).join("\n");
    return isSales
      ? ("Dear "+name+",\n\nThis is a gentle reminder regarding your pending payment(s) with Onam Agarbathi Pvt. Ltd.:\n\n"+itemLines+"\n\nTotal: "+fmt(total)+"\n\nKindly arrange payment at your earliest convenience. Thank you.")
      : ("Dear "+name+",\n\nRegarding our pending payable(s):\n\n"+itemLines+"\n\nTotal: "+fmt(total)+"\n\nWe will arrange payment shortly. Thank you.");
  };

  const copyMessage = async (name, entryList) => {
    const text = buildMessage(name, entryList);
    setStatusMsg("Copying "+name+"…");
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(text); }
      else{ const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); }
      setCopiedName(name); setTimeout(()=>setCopiedName(""),2500);
    }catch(e){
      // Fallback: show it so they can select manually
      setPreviewText(text); setPreviewName(name);
    }
  };


  // Mark a dealer's pending items as Paid/Settled — removes them from the list
  const markPaid = async (name, entryList) => {
    setStatusMsg("Mark Paid clicked for "+name+"…");
    if(!onSaveEntry){ setStatusMsg("⚠️ Can't update — save function unavailable. Reload the app."); return; }
    if(!window.confirm("Mark all "+entryList.length+" pending item(s) for "+name+" as PAID/settled?")) return;
    setBusyPaid(name);
    let done=0, failed=0;
    for(const e of entryList){
      try{
        const upd=Object.assign({},e,{ paymentStatus: (payType==="sales"?"Paid":"Settled"),
          tags:(e.tags||[]).filter(t=>t!=="Payment Due").concat([payType==="sales"?"Payment Received":"Paid Out"]) });
        await onSaveEntry(upd);
        done++;
      }catch(err){ failed++; console.error("markPaid error:", err); }
    }
    if(failed===0) setStatusMsg("✓ Marked "+done+" item(s) as "+(payType==="sales"?"paid":"settled")+" for "+name);
    else setStatusMsg("Marked "+done+", but "+failed+" failed. "+(failed?"Check console / try again.":""));
    setBusyPaid("");
    setTimeout(()=>setStatusMsg(""),3000);
  };

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
        <span style={{ fontSize:28 }}>📈</span>
        <div>
          <h2 style={{ margin:0, fontSize:18, color:"#1a3a2a" }}>CFO Brief</h2>
          <div style={{ fontSize:11, color:"#6a7a6a" }}>Your finances, read like a CFO &mdash; with actions to take now</div>
        </div>
      </div>

      <AvailableFunds />

      <div style={{ display:"flex", gap:8, marginBottom:12 }}>
        <button onClick={()=>setMode("daily")} style={{ flex:1, padding:"9px", borderRadius:8, border: mode==="daily"?"2px solid #1a7a4a":"1px solid #ccc", background: mode==="daily"?"#eafaf0":"#fff", color:"#1a5a3a", fontWeight:700, cursor:"pointer", fontSize:13 }}>Daily</button>
        <button onClick={()=>setMode("weekly")} style={{ flex:1, padding:"9px", borderRadius:8, border: mode==="weekly"?"2px solid #1a7a4a":"1px solid #ccc", background: mode==="weekly"?"#eafaf0":"#fff", color:"#1a5a3a", fontWeight:700, cursor:"pointer", fontSize:13 }}>Weekly</button>
      </div>

      <button onClick={run} disabled={loading} style={{ width:"100%", padding:"12px", borderRadius:10, border:"none", background:"linear-gradient(135deg,#1a7a4a,#0a5a2a)", color:"#fff", fontWeight:700, fontSize:15, cursor:"pointer", marginBottom:12 }}>
        {loading ? "⏳ Analyzing your finances…" : "📈 Generate "+(mode==="daily"?"Daily":"Weekly")+" CFO Brief"}
      </button>

      {err && <div style={{ color:"#a33", fontSize:12, marginBottom:10 }}>{err}</div>}

      {brief && (
        <div style={{ background:"#f7faf7", border:"1px solid #cfe0cf", borderRadius:10, padding:14, whiteSpace:"pre-wrap", fontSize:13.5, lineHeight:1.6, color:"#233", maxHeight:"55vh", overflowY:"auto" }}>
          {brief}
        </div>
      )}

      <div style={{ fontSize:10, color:"#8a9a8a", marginTop:10, fontStyle:"italic" }}>
        Based on the financial entries in your tracker. Once Tally is connected, this brief will read directly from your live accounts. This is an executive interpretation, not a substitute for your auditor.
      </div>
    </div>
  );
}

function GymLog({ entries, onSaveEntry, onClose }) {

  const [parsed, setParsed] = useState(null);
  const [msg, setMsg] = useState("");

  const analyze = async () => {
    if (!text.trim()) return;
    setBusy(true); setMsg("");
    try {
      const prompt =
"Parse this gym/workout note into structured data. Estimate calories burned roughly if possible.\n\n\"" + text + "\"\n\n" +
"Return ONLY valid JSON: {\"summary\":\"short workout name\",\"exercises\":[{\"name\":\"\",\"sets\":<number or 0>,\"reps\":<number or 0>,\"weightKg\":<number or 0>}],\"durationMin\":<number or 0>,\"caloriesBurned\":<rough number or 0>,\"note\":\"one-line caveat that estimates are approximate\"}";
      const txt = await claudeAPI(prompt, "You log workouts. Estimates are rough. Return ONLY valid JSON.", "", "", "");
      const clean = String(txt||"").replace(/```json/g,"").replace(/```/g,"").trim();
      const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
      setParsed(JSON.parse(s>=0?clean.substring(s,e+1):clean));
    } catch(e) { setMsg("Couldn't read that — try simpler wording."); }
    setBusy(false);
  };

  const save = async () => {
    if (!parsed) return;
    setBusy(true);
    const ex = (parsed.exercises||[]).map(x =>
      x.name + (x.sets?(" "+x.sets+"x"+(x.reps||"")):"") + (x.weightKg?(" @"+x.weightKg+"kg"):"")
    ).join(", ");
    const entry = {
      id: genId(),
      title: "Gym — " + (parsed.summary || "Workout"),
      date: new Date().toISOString().slice(0,10),
      category: "Health",
      taskType: "Gym",
      notes: ex + (parsed.durationMin?(" | "+parsed.durationMin+" min"):"") + (parsed.caloriesBurned?(" | ≈"+parsed.caloriesBurned+" kcal burned"):"") + " | " + (parsed.note||"approximate"),
      caloriesBurned: parsed.caloriesBurned || 0,
      durationMin: parsed.durationMin || 0,
      tags: ["Gym"],
      createdAt: new Date().toISOString()
    };
    try { await onSaveEntry(entry); setMsg("✓ Workout logged"); setText(""); setParsed(null); setTimeout(()=>onClose&&onClose(), 900); }
    catch(e) { setMsg("Save failed."); }
    setBusy(false);
  };

  const inp = { width:"100%", padding:"10px", borderRadius:8, border:"1.5px solid #cfd8cf", fontSize:14, marginBottom:10 };

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
        <span style={{ fontSize:26 }}>🏋️</span>
        <div><h2 style={{ margin:0, fontSize:18, color:"#2a5a8a" }}>Gym Log</h2>
        <div style={{ fontSize:11, color:"#6a7a8a" }}>Just type your workout naturally</div></div>
      </div>

      <textarea value={text} onChange={e=>setText(e.target.value)} rows={3}
        placeholder='e.g. "Bench press 3 sets of 10 at 60kg, squats 4x8 80kg, 20 min treadmill"'
        style={{...inp, resize:"vertical"}}/>

      {!parsed && <button onClick={analyze} disabled={busy||!text.trim()} style={{ width:"100%", padding:"12px", borderRadius:10, border:"none", background:"linear-gradient(135deg,#2a5a8a,#1a3a6a)", color:"#fff", fontWeight:700, fontSize:15, cursor:"pointer" }}>
        {busy ? "⏳ Reading…" : "🧠 Analyze & Review"}
      </button>}

      {msg && <div style={{ fontSize:12.5, color: msg[0]==="✓"?"#1a7a3a":"#a33", marginTop:8, textAlign:"center" }}>{msg}</div>}

      {parsed && <div style={{ background:"#f5f8fc", border:"1.5px solid #a8c8e0", borderRadius:10, padding:12, marginTop:10 }}>
        <div style={{ fontSize:13, fontWeight:700, color:"#2a5a8a", marginBottom:6 }}>{parsed.summary || "Workout"}</div>
        {(parsed.exercises||[]).map((x,i)=>(
          <div key={i} style={{ fontSize:12.5, color:"#334", padding:"2px 0" }}>
            • {x.name}{x.sets?(" — "+x.sets+" x "+(x.reps||"?")):""}{x.weightKg?(" @ "+x.weightKg+" kg"):""}
          </div>
        ))}
        <div style={{ marginTop:8, display:"flex", gap:8, flexWrap:"wrap" }}>
          {parsed.durationMin>0 && <span style={{ background:"#e8f0fa", border:"1px solid #a8c8e0", borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:700, color:"#2a5a8a" }}>⏱ {parsed.durationMin} min</span>}
          {parsed.caloriesBurned>0 && <span style={{ background:"#fff4e8", border:"1px solid #d09a4a", borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:700, color:"#8a5a1a" }}>🔥 ≈ {parsed.caloriesBurned} kcal burned</span>}
        </div>
        <div style={{ display:"flex", gap:8, marginTop:12 }}>
          <button onClick={()=>{setParsed(null);}} style={{ flex:1, padding:"10px", borderRadius:8, border:"1px solid #ccc", background:"#fff", cursor:"pointer", fontSize:13 }}>✕ Redo</button>
          <button onClick={save} disabled={busy} style={{ flex:2, padding:"10px", borderRadius:8, border:"none", background:"#2a5a8a", color:"#fff", fontWeight:700, cursor:"pointer", fontSize:14 }}>✅ Save workout</button>
        </div>
      </div>}

      <div style={{ fontSize:10, color:"#8a9a9a", marginTop:10, fontStyle:"italic" }}>
        Calories burned are a rough estimate — for your own pattern-tracking, not medical use.
      </div>
    </div>
  );
}

function FastingTimer({ entries }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 30000); return () => clearInterval(t); }, []);

  // Find the most recent saved meal (by createdAt)
  const meals = (entries || []).filter(e => e && e.category === "Health" && (e.tags || []).indexOf("Meal") > -1 && e.createdAt);
  meals.sort((a, b) => Date.parse(b.createdAt) - Date.parse(a.createdAt));
  const last = meals[0];

  if (!last) return (
    <div style={{ background:"#f6f6f6", border:"1px solid #ddd", borderRadius:10, padding:"10px 12px", marginBottom:12, fontSize:12, color:"#777" }}>
      ⏱ Fasting timer — starts once you log a meal
    </div>
  );

  const ms = now - Date.parse(last.createdAt);
  const hrs = ms / 3600000;
  const h = Math.floor(hrs);
  const m = Math.floor((hrs - h) * 60);
  const under2 = hrs < 2;

  return (
    <div style={{
      background: under2 ? "#fff4f0" : "#eef8ee",
      border: "1.5px solid " + (under2 ? "#d08a70" : "#4a9a5a"),
      borderRadius: 10, padding: "10px 12px", marginBottom: 12
    }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: under2 ? "#8a3a1a" : "#0a5a2a" }}>
        ⏱ {h}h {m}m since last meal
      </div>
      <div style={{ fontSize: 11, color: under2 ? "#8a5a4a" : "#4a7a5a", marginTop: 2 }}>
        {under2
          ? "Under 2 hours — hold off if you're spacing meals"
          : "2+ hours since eating"}
      </div>
    </div>
  );
}

Return ONLY valid JSON:
{"type":"Meal","summary":"short meal name","foods":["item1","item2"],"proteinGrams":<number, your best rough estimate>,"note":"one-line caveat that this is approximate"}`;

    if (!text.trim()) { setStatusMsg("Type something first."); return; }
    if (!isHealth) {
      // Family — no AI needed, just save directly
      await saveDirect();
      return;
    }
    setLoading(true); setStatusMsg("🧠 Understanding entry…");
    try {
      const prompt = `Parse this casual health log entry. Do NOT diagnose or give medical advice — just structure it. If it is a MEAL/food, give a ROUGH protein estimate in grams (use standard nutrition knowledge, e.g. 2 egg whites ≈ 7g, 1 whole egg ≈ 6g, 100g dal cooked ≈ 5g, 1 cup milk ≈ 8g, 100g paneer ≈ 18g, 100g chicken ≈ 27g). Estimate conservatively.

Entry: "${text}"

Return ONLY valid JSON:
{"type":"Meal"|"Symptom"|"Medication"|"Vitals"|"Other","summary":"short title","details":"key details","proteinGrams":<number if food, else 0>,"severity":"mild"|"moderate"|"severe"|null,"time":"morning"|"afternoon"|"evening"|"night"|null}`;
      const txt = await claudeAPI(prompt, "Return ONLY valid JSON, no markdown.", "", "", "");
      const clean = String(txt||"").replace(/```json/g,"").replace(/```/g,"").trim();
      const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
      const obj = JSON.parse(s>=0 ? clean.substring(s,e+1) : clean);
      setParsed(obj);
      setStatusMsg("");
    } catch(e) {
      setParsed({ type:"Other", summary: text.slice(0,60), details: text });
      setStatusMsg("");
    }
    setLoading(false);
  };

  const saveDirect = async () => {
    setLoading(true);
    const entry = {
      id: genId(),
      title: text.slice(0, 80),
      date: new Date().toISOString().slice(0,10),
      category: "Family",
      notes: text,
      tags: [],
      createdAt: new Date().toISOString()
    };
    try {
      if (onSaveEntry) await onSaveEntry(entry);
      setStatusMsg("✅ Saved!");
      setText("");
    } catch(e) {
      setStatusMsg("❌ " + e.message);
    }
    setLoading(false);
  };

  const saveHealth = async () => {
    if (!parsed) return;
    setLoading(true);
    const entry = {
      id: genId(),
      title: parsed.summary || text.slice(0,80),
      date: new Date().toISOString().slice(0,10),
      category: "Health",
      notes: (parsed.details||text) + (parsed.severity?(" | Severity: "+parsed.severity):"") + (parsed.time?(" | Time: "+parsed.time):"") + (parsed.proteinGrams?(" | protein≈"+parsed.proteinGrams+"g"):"") + (parsed.calories?(" | ≈"+parsed.calories+" kcal"):""),
      amount: parsed.proteinGrams ? String(parsed.proteinGrams) : "",
      calories: parsed.calories || 0,
      tags: parsed.type ? [parsed.type] : [],
      createdAt: new Date().toISOString()
    };
    try {
      if (onSaveEntry) await onSaveEntry(entry);
      setStatusMsg("✅ Saved!");
      setText(""); setParsed(null);
    } catch(e) {
      setStatusMsg("❌ " + e.message);
    }
    setLoading(false);
  };

  return (
    <div style={{ padding:16, maxWidth:520, margin:"0 auto" }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
        <span style={{ fontSize:28 }}>{isHealth ? "🏥" : "👨‍👩‍👧"}</span>
        <div>
          <h2 style={{ margin:0, fontSize:17, color:"#2a1800" }}>{isHealth ? "Health Log" : "Family"}</h2>
          <div style={{ fontSize:11, color:"#8a6a4a" }}>
            {isHealth ? "Meals, symptoms, vitals — just type naturally" : "Thoughts, moments, events — casual journal"}
          </div>
        </div>
      </div>

      {isHealth && (()=>{
        const today = new Date().toISOString().slice(0,10);
        const meals = (entries||[]).filter(e => e && e.category==="Health" && e.date===today && (e.tags||[]).indexOf("Meal")>-1);
        let total = 0; meals.forEach(m => { const p = parseFloat(m.amount); if(!isNaN(p)) total += p; });
        let kcal = 0; meals.forEach(m => { const c = parseFloat(m.calories); if(!isNaN(c)) kcal += c; });
        return (
          <div style={{ background:"#eefafa", border:"1.5px solid #4a9a9a", borderRadius:10, padding:"10px 12px", marginBottom:12 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#0a5a5a" }}>🍽 Today ≈ {Math.round(total)}g protein <span style={{fontWeight:400,fontSize:11,color:"#5a8a8a"}}>(rough, from {meals.length} meal{meals.length===1?"":"s"})</span></div>
            {kcal>0 && <div style={{ fontSize:13, fontWeight:700, color:"#8a5a1a", marginTop:3 }}>🔥 Today ≈ {Math.round(kcal)} kcal <span style={{fontWeight:400,fontSize:11,color:"#a08050"}}>(approx)</span></div>}
          </div>
        );
      })()}

      {isHealth && <FastingTimer entries={entries} />}

      {isHealth && (
        <div style={{ marginBottom:10 }}>
          <input ref={photoInputRef} type="file" accept="image/*" onChange={onPickPhoto} style={{ display:"none" }} />
          <button onClick={()=>photoInputRef.current&&photoInputRef.current.click()} style={{ width:"100%", padding:"11px", borderRadius:10, border:"1.5px dashed #4a9a9a", background:"#eefafa", color:"#0a5a5a", fontWeight:700, fontSize:14, cursor:"pointer" }}>
            📷 Snap / upload a meal photo → estimate protein
          </button>
          {mealPhoto && (
            <div style={{ marginTop:8, textAlign:"center" }}>
              <img src={mealPhoto.dataUrl} alt="meal" style={{ maxWidth:"100%", maxHeight:180, borderRadius:10, border:"1px solid #d0c4a8" }} />
              <button onClick={analyzePhoto} disabled={loading} className="bg" style={{ width:"100%", marginTop:8 }}>
                {loading ? "⏳ Reading meal…" : "🍽 Analyze meal & estimate protein"}
              </button>
              <button onClick={()=>setMealPhoto(null)} className="bgh" style={{ width:"100%", marginTop:6 }}>✕ Remove photo</button>
              <div style={{ fontSize:10, color:"#8a6a4a", marginTop:6, fontStyle:"italic" }}>Protein figures are rough estimates from the photo — not exact measurements.</div>
            </div>
          )}
          <div style={{ textAlign:"center", fontSize:11, color:"#8a6a4a", margin:"8px 0" }}>— or type it below —</div>
        </div>
      )}

      <textarea
        value={text}
        onChange={e=>setText(e.target.value)}
        placeholder={isHealth ? "e.g. Had idli for breakfast, felt bloated after lunch…" : "e.g. Took the kids to the temple today, lovely evening…"}
        style={{ width:"100%", height:100, padding:10, borderRadius:10, border:"1.5px solid #d0c4a8", fontSize:13, resize:"vertical", marginBottom:10 }}
      />

      {statusMsg && <div style={{ fontSize:12, padding:"8px 12px", borderRadius:8, marginBottom:10,
        background: statusMsg.startsWith("❌") ? "#fff0f0" : "#f0fff0",
        color: statusMsg.startsWith("❌") ? "#8b0000" : "#1a5a1a" }}>{statusMsg}</div>}

      {isHealth && parsed && (
        <div style={{ background:"#f8f5f0", borderRadius:10, border:"1.5px solid #e0c87a", padding:12, marginBottom:12 }}>
          <div style={{ fontSize:12, fontWeight:700, marginBottom:6 }}>{parsed.type}: {parsed.summary}</div>
          <div style={{ fontSize:11, color:"#5a4a2a" }}>{parsed.details}</div>
          {(parsed.proteinGrams>0) && <div style={{ marginTop:6, display:"inline-block", background:"#eefafa", border:"1px solid #4a9a9a", borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:700, color:"#0a5a5a" }}>
            🍽 ≈ {parsed.proteinGrams}g protein <span style={{fontWeight:400,fontSize:10,color:"#5a8a8a"}}>(approx)</span>
          </div>}
          {(parsed.calories>0) && <span style={{ marginTop:6, marginLeft:6, display:"inline-block", background:"#fff4e8", border:"1px solid #d09a4a", borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:700, color:"#8a5a1a" }}>
            🔥 ≈ {parsed.calories} kcal
          </span>}
          {(parsed.calories>0) && <div style={{ marginTop:6, marginLeft:6, display:"inline-block", background:"#fff4e8", border:"1px solid #d09a4a", borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:700, color:"#8a5a1a" }}>
            🔥 ≈ {parsed.calories} kcal <span style={{fontWeight:400,fontSize:10,color:"#a08050"}}>(approx)</span>
          </div>}
          {parsed.severity && <div style={{ fontSize:10, color:"#8a6a2a", marginTop:4 }}>Severity: {parsed.severity}</div>}
        </div>
      )}

      {isHealth ? (
        !parsed ? (
          <button onClick={analyze} disabled={loading||!text.trim()} className="bg" style={{ width:"100%" }}>
            {loading ? "⏳ Analyzing…" : "🧠 Analyze & Review"}
          </button>
        ) : (
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={()=>setParsed(null)} className="bgh" style={{ flex:1 }}>✕ Redo</button>
            <button onClick={saveHealth} disabled={loading} className="bg" style={{ flex:2 }}>
              {loading ? "⏳ Saving…" : "✅ Save Entry"}
            </button>
          </div>
        )
      ) : (
        <button onClick={saveDirect} disabled={loading||!text.trim()} className="bg" style={{ width:"100%" }}>
          {loading ? "⏳ Saving…" : "✅ Save to Family Log"}
        </button>
      )}

      <div style={{ fontSize:10, color:"#aaa", marginTop:14, textAlign:"center" }}>
        {isHealth && "This logs patterns for your own awareness — not medical advice. Consult a doctor for any health concerns."}
      </div>
    </div>
  );
}



// ── PaymentReminders — dealer contact book + WhatsApp payment reminders ──
function PaymentReminders({ onClose, entries, onSaveEntry, onFocusDealer }) {
  const [view, setView] = useState("pending"); // pending | contacts
  const [payType, setPayType] = useState("sales"); // sales(receivable) | purchase(payable)
  const [busyPaid,setBusyPaid]=useState("");
  const [copiedName,setCopiedName]=useState("");
  const [previewText,setPreviewText]=useState("");
  const [previewName,setPreviewName]=useState("");
  const [contacts, setContacts] = useState({}); // name(lower) -> phone
  const [loading, setLoading] = useState(false);
  const [statusMsg, setStatusMsg] = useState("");
  const [sentIds, setSentIds] = useState(() => {
    try { return JSON.parse(localStorage.getItem("waReminderSent") || "{}"); } catch(e) { return {}; }
  });
  const [editingContact, setEditingContact] = useState(null);
  const [newPhone, setNewPhone] = useState("");

  // Load saved contacts from localStorage on mount
  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("dealerContacts") || "{}");
      setContacts(saved);
    } catch(e) {}
    // durable load from Supabase (overrides cache if present)
    (async()=>{ try{ const r=await sheetsAPI("getPortfolio",{key:"dealer_contacts",user:"main"}); if(r&&r.data&&typeof r.data==="object"){ setContacts(r.data); localStorage.setItem("dealerContacts", JSON.stringify(r.data)); } }catch(e){} })();
  }, []);

  const saveContact = async (name, phone) => {
    const key = name.trim().toLowerCase();
    const updated = { ...contacts, [key]: phone.replace(/[^\d]/g, "") };
    setContacts(updated);
    localStorage.setItem("dealerContacts", JSON.stringify(updated));   // fast cache
    try{ await sheetsAPI("savePortfolio",{key:"dealer_contacts",user:"main",data:updated}); }catch(e){}  // durable
    setEditingContact(null);
    setNewPhone("");
  };

  // Sales officers are staff, not dealers — never show them as pending payments
  const SALES_OFFICERS_EXCL = ["sooraj","sunil","biju","murugan","sebi","sugeesh","satish","sadasivan","vinod","prakash","staff1","staff2","staff3","staff4"];
  const isOfficer = (e) => {
    const nm = (e.person||e.vendor||"").trim().toLowerCase();
    if(SALES_OFFICERS_EXCL.indexOf(nm)>-1) return true;
    const tags=(e.tags||[]).join(" ").toLowerCase();
    if(/field report|officer:/.test(tags)) return true;
    if(/field report|sales - visit/i.test((e.category||"")+" "+(e.title||""))) return true;
    return false;
  };
  // Pending payment entries — overdue or payment due (excluding staff/officers)
  const pendingEntries = (entries || []).filter(e =>
    (e.paymentStatus === "Payment Pending" || e.paymentStatus === "Asked Payment" ||
     e.paymentStatus === "Overdue" || (e.tags || []).includes("Payment Due")) &&
    e.amount && parseFloat(String(e.amount).replace(/[^\d.]/g, "")) > 0 &&
    !isOfficer(e)
  ).slice(0, 100);

  // Classify each entry: SALES (they owe us) vs PURCHASE (we owe them)
  const daysOld = (d) => { const t=Date.parse(d); return isNaN(t)?0:Math.floor((Date.now()-t)/86400000); };
  const classify = (e) => {
    const cat=(e.category||"").toLowerCase();
    const tags=(e.tags||[]).join(" ").toLowerCase();
    if(/purchase|payable|vendor bill|buy/.test(cat)||/payable/.test(tags)) return "purchase";
    if(/sales|receiv|invoice|order/.test(cat)||/receivable|sales/.test(tags)) return "sales";
    // default: money we asked for = sales(receivable)
    return "sales";
  };
  // Group by person/vendor within the selected payType
  const grouped = {};
  pendingEntries.filter(e=>classify(e)===payType).forEach(e => {
    const name = e.person || e.vendor || "Unknown";
    if (!grouped[name]) grouped[name] = [];
    grouped[name].push(e);
  });

  const fmt = n => !n ? "—" : "₹" + Number(String(n).replace(/[^\d.]/g, "")).toLocaleString("en-IN");

  const sendReminder = async (name, entryList) => {
    // Open WhatsApp with the full reminder pre-filled — you pick the chat and hit send.
    // (No Business API / template needed — always works, no Meta approval required.)
    const phone = contacts[name.trim().toLowerCase()];
    const msg = buildMessage(name, entryList);
    const total = entryList.reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.]/g, "")) || 0), 0);
    const num = phone ? String(phone).replace(/[^\d]/g,"") : "";
    const waNum = num ? ((num.length===10?"91":"")+num) : "";
    const url = waNum
      ? ("https://wa.me/"+waNum+"?text="+encodeURIComponent(msg))
      : ("https://api.whatsapp.com/send?text="+encodeURIComponent(msg));
    let win=null;
    try{ win = window.open(url, "_blank"); }catch(e){}
    if(!win || win.closed || typeof win.closed==="undefined"){
      try{ if(navigator.clipboard) navigator.clipboard.writeText(msg); }catch(e){}
      window.location.href = url;
    }
    const updated = { ...sentIds, [name]: new Date().toISOString() };
    setSentIds(updated);
    localStorage.setItem("waReminderSent", JSON.stringify(updated));
    setStatusMsg("✅ WhatsApp opened for " + name + " (" + fmt(total) + ") — pick the chat and press send.");
  };

  return (
    <div style={{ padding: 16, maxWidth: 600, margin: "0 auto" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
        <span style={{ fontSize: 28 }}>💬</span>
        <div>
          <h2 style={{ margin: 0, fontSize: 17, color: "#1a1a2a" }}>Payment Reminders</h2>
          <div style={{ fontSize: 11, color: "#6a6a8a" }}>Copy a reminder message, or mark payments as received</div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {[["pending", "💰 Pending (" + Object.keys(grouped).length + ")"], ["contacts", "📇 Contacts"]].map(([v, l]) =>
          <button key={v} onClick={() => setView(v)} style={{
            flex: 1, padding: "8px 4px", borderRadius: 8, border: "none", fontSize: 12, fontWeight: 700,
            background: view === v ? "#1a1a4a" : "#e8e8f0", color: view === v ? "#fff" : "#1a1a4a", cursor: "pointer"
          }}>{l}</button>
        )}
      </div>

      {previewText && <div style={{ background:"#fff", border:"2px solid #5a3a9a", borderRadius:10, padding:12, marginBottom:12 }}>
        <div style={{ fontSize:12, fontWeight:700, color:"#3a2a6a", marginBottom:6 }}>Message for {previewName} — select all & copy:</div>
        <textarea readOnly value={previewText} onClick={e=>e.target.select()} style={{ width:"100%", height:130, fontSize:12, padding:8, borderRadius:6, border:"1px solid #ccd" }}/>
        <button onClick={()=>{setPreviewText("");setPreviewName("");}} style={{ marginTop:6, fontSize:11, padding:"5px 12px", borderRadius:6, border:"none", background:"#eee", cursor:"pointer" }}>Close</button>
      </div>}
      {view === "pending" && <div style={{ display:"flex", gap:6, marginBottom:12 }}>
        <button onClick={()=>setPayType("sales")} style={{ flex:1, padding:"7px", borderRadius:8, border:payType==="sales"?"2px solid #1a7a4a":"1px solid #ccc", background:payType==="sales"?"#eafaf0":"#fff", color:"#1a5a3a", fontWeight:700, fontSize:12, cursor:"pointer" }}>📥 Sales (they owe me)</button>
        <button onClick={()=>setPayType("purchase")} style={{ flex:1, padding:"7px", borderRadius:8, border:payType==="purchase"?"2px solid #a35a1a":"1px solid #ccc", background:payType==="purchase"?"#fdf2e8":"#fff", color:"#8a4a1a", fontWeight:700, fontSize:12, cursor:"pointer" }}>📤 Purchases (I owe)</button>
      </div>}

      {statusMsg && <div style={{
        fontSize: 12, padding: "8px 12px", borderRadius: 8, marginBottom: 10,
        background: statusMsg.startsWith("❌") ? "#fff0f0" : statusMsg.startsWith("⚠️") ? "#fff8e7" : "#f0fff0",
        color: statusMsg.startsWith("❌") ? "#8b0000" : statusMsg.startsWith("⚠️") ? "#8a6a00" : "#1a5a1a"
      }}>{statusMsg}</div>}

      {view === "pending" && <>
        

        {Object.keys(grouped).length === 0 && (
          <div style={{ textAlign: "center", padding: "24px 16px", color: "#999", fontSize: 12, background: "#fafafa", borderRadius: 10 }}>
            No pending payments found. 🎉
          </div>
        )}

        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {Object.entries(grouped).map(([name, list]) => {
            const total = list.reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.]/g, "")) || 0), 0);
            const hasPhone = !!contacts[name.trim().toLowerCase()];
            const lastSent = sentIds[name];
            return (
              <div key={name} style={{ background: "#f8f8fc", borderRadius: 10, border: "1px solid #e0e0f0", padding: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div onClick={()=>{ if(onFocusDealer) onFocusDealer(name); }} style={{ fontSize: 13, fontWeight: 700, color: "#1a3a7a", cursor:"pointer", textDecoration:"underline" }}>{name} ›</div>
                    <div style={{ fontSize: 11, color: "#888" }}>{list.length} invoice(s) · {fmt(total)} pending</div>
                    {(() => { const oldest=Math.max(...list.map(e=>daysOld(e.date))); return oldest>=60
                      ? <div style={{ fontSize:10, color:"#fff", background:"#c33", display:"inline-block", padding:"1px 7px", borderRadius:10, marginTop:3, fontWeight:700 }}>⚠ {oldest} days overdue</div>
                      : <div style={{ fontSize:10, color:"#888", marginTop:2 }}>{oldest} days old</div>; })()}
                    {lastSent && <div style={{ fontSize: 10, color: "#2a8a2a", marginTop: 2 }}>✅ Reminded {new Date(lastSent).toLocaleDateString("en-IN")}</div>}
                    {!hasPhone && <div style={{ fontSize: 10, color: "#c08a00", marginTop: 2 }}>⚠️ No phone number saved</div>}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                    <button
                      type="button"
                      onClick={()=>{ if(onFocusDealer) onFocusDealer(name); }}
                      style={{ fontSize: 10.5, padding: "8px 14px", borderRadius: 8, border: "1px solid #2a5a9a",
                        background: "#e8f0fc", color: "#1a3a7a", fontWeight: 700,
                        cursor: "pointer", whiteSpace: "nowrap" }}
                    >📂 View in list ›</button>
                    <button
                      type="button"
                      onClick={()=>{ markPaid(name, list); }}
                      style={{ fontSize: 10.5, padding: "8px 14px", borderRadius: 8, border: "1px solid #1a7a4a",
                        background: busyPaid===name?"#cfe8d8":"#eafaf0", color: "#1a5a3a", fontWeight: 700,
                        cursor: "pointer", whiteSpace: "nowrap", pointerEvents:"auto" }}
                    >{busyPaid===name?"…":"✓ Mark Paid"}</button>
                    <button
                      type="button"
                      onClick={()=>{ setPreviewText(buildMessage(name, list)); setPreviewName(name); }}
                      style={{ fontSize: 10.5, padding: "8px 14px", borderRadius: 8, border: "1px solid #5a3a9a",
                        background: "#f0eafa", color: "#3a2a6a", fontWeight: 700,
                        cursor: "pointer", whiteSpace: "nowrap", pointerEvents:"auto" }}
                    >📋 Copy message</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </>}

      {view === "contacts" && <>
        <div style={{ background: "#f0f8ff", borderRadius: 10, padding: 10, marginBottom: 12, fontSize: 11, color: "#2a4a6a" }}>
          Save dealer/vendor WhatsApp numbers here once — they're reused for all future reminders.
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {Object.keys(grouped).length === 0 && Object.keys(contacts).length === 0 && (
            <div style={{ textAlign: "center", padding: "20px", color: "#999", fontSize: 12 }}>No contacts yet.</div>
          )}
          {Array.from(new Set([...Object.keys(grouped), ...Object.keys(contacts).map(k => k)])).map(name => {
            const displayName = grouped[name] ? name : name; // best effort
            const key = displayName.trim().toLowerCase();
            const phone = contacts[key] || "";
            const isEditing = editingContact === displayName;
            return (
              <div key={displayName} style={{ display: "flex", alignItems: "center", gap: 8, background: "#f8f8fc", borderRadius: 8, padding: "8px 10px" }}>
                <div style={{ flex: 1, fontSize: 12, fontWeight: 600, color: "#1a1a2a" }}>{displayName}</div>
                {isEditing ? (
                  <>
                    <input
                      type="tel"
                      value={newPhone}
                      onChange={e => setNewPhone(e.target.value)}
                      placeholder="10-digit number"
                      style={{ width: 140, padding: "5px 8px", borderRadius: 6, border: "1px solid #ccc", fontSize: 12 }}
                    />
                    <button onClick={() => saveContact(displayName, newPhone)} style={{ fontSize: 11, padding: "5px 10px", borderRadius: 6, border: "none", background: "#1a8a4a", color: "#fff", cursor: "pointer" }}>Save</button>
                  </>
                ) : (
                  <>
                    <span style={{ fontSize: 12, color: phone ? "#1a5a1a" : "#999" }}>{phone ? "+91 " + phone : "no number"}</span>
                    <button onClick={() => { setEditingContact(displayName); setNewPhone(phone); }} style={{ fontSize: 11, padding: "5px 10px", borderRadius: 6, border: "1px solid #ccc", background: "#fff", cursor: "pointer" }}>Edit</button>
                  </>
                )}
              </div>
            );
          })}
        </div>

        <div style={{ marginTop: 14, padding: 10, background: "#f8f5f0", borderRadius: 8 }}>
          <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 6 }}>+ Add new contact manually</div>
          <div style={{ display: "flex", gap: 6 }}>
            <input id="newContactName" placeholder="Name" style={{ flex: 1, padding: "6px 8px", borderRadius: 6, border: "1px solid #ccc", fontSize: 12 }} />
            <input id="newContactPhone" placeholder="Phone" style={{ width: 120, padding: "6px 8px", borderRadius: 6, border: "1px solid #ccc", fontSize: 12 }} />
            <button onClick={() => {
              const n = document.getElementById("newContactName").value;
              const p = document.getElementById("newContactPhone").value;
              if (n && p) { saveContact(n, p); document.getElementById("newContactName").value = ""; document.getElementById("newContactPhone").value = ""; }
            }} style={{ fontSize: 11, padding: "6px 12px", borderRadius: 6, border: "none", background: "#1a3a8a", color: "#fff", cursor: "pointer" }}>Add</button>
          </div>
        </div>
      </>}
    </div>
  );
}

// ── TallyUpload — upload Trial Balance, AI reads & asks, shows P&L ──────────
function TallyUpload({onClose}){
  const [step,setStep]=useState("upload"); // upload | questions | result
  const [tallyText,setTallyText]=useState("");
  const [month,setMonth]=useState(new Date().toLocaleString("default",{month:"long"}));
  const [year,setYear]=useState(new Date().getFullYear());
  const [loading,setLoading]=useState(false);
  const [statusMsg,setStatusMsg]=useState("");
  const [extracted,setExtracted]=useState(null);
  const [questions,setQuestions]=useState([]);
  const [answers,setAnswers]=useState({});
  const [result,setResult]=useState(null);
  const [ledgerMap,setLedgerMap]=useState([]);
  const fileRef=React.useRef();

  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

  const handleFile=async(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    // Read as text — Tally exports tab-separated or CSV
    const reader=new FileReader();
    reader.onload=(ev)=>setTallyText(ev.target.result);
    reader.readAsText(file);
  };

  const parseTally=async()=>{
    if(!tallyText.trim()){setStatusMsg("Please paste or upload your Tally Trial Balance first.");return;}
    setLoading(true);setStatusMsg("🔍 Reading your Tally data…");
    try{
      const res=await fetch("/.netlify/functions/tally",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"parse",tallyText,month,year})
      });
      const data=await res.json();
      if(!data.ok) throw new Error(data.error||"Parse failed");
      setExtracted(data.extracted);
      setLedgerMap(data.ledgerMap||[]);
      // Filter questions to only those with null values
      const qs=data.questions||[];
      setQuestions(qs);
      const initAnswers={};
      qs.forEach(q=>{initAnswers[q.id]="";});
      setAnswers(initAnswers);
      setStep("questions");
      setStatusMsg("");
    }catch(e){setStatusMsg("❌ Error: "+e.message);}
    setLoading(false);
  };

  const finalize=async()=>{
    setLoading(true);setStatusMsg("📊 Calculating your P&L…");
    try{
      const res=await fetch("/.netlify/functions/tally",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"finalize",extracted,answers,month,year})
      });
      const data=await res.json();
      if(!data.ok) throw new Error(data.error||"Finalize failed");
      setResult(data);
      setStep("result");
      setStatusMsg("");
    }catch(e){setStatusMsg("❌ Error: "+e.message);}
    setLoading(false);

  const fmt=(n)=>n==null?"—":"₹"+Number(n).toLocaleString("en-IN");

      <span style={{fontSize:13,color:"#5a4a2a"}}>{label}</span>
      <span style={{fontSize:14,fontWeight:highlight?700:500,color:highlight?color:"#2a1a00"}}>{fmt(value)}</span>
    </div>;

  const SectionHeader=({label,bg})=><div style={{background:bg||"#2a1800",color:"#fff",
    padding:"6px 10px",borderRadius:6,fontSize:12,fontWeight:700,marginTop:10,marginBottom:4}}>{label}</div>;

  return <div style={{padding:16,maxWidth:600,margin:"0 auto"}}>

        <h2 style={{margin:0,fontSize:17,color:"#5a3a1a"}}>Tally Trial Balance → P&L</h2>

        <div key={s} style={{flex:1,textAlign:"center",padding:"5px 4px",borderRadius:6,fontSize:10,fontWeight:700,
          background:step===s?"#c8860a":step==="result"&&s!=="result"?"#2a7a2a":step==="questions"&&s==="upload"?"#2a7a2a":"#e8d8c0",
          color:step===s||((step==="result"&&s!=="result")||(step==="questions"&&s==="upload"))?"#fff":"#7a5a2a"}}>{l}</div>
