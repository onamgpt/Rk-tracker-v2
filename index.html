function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function parseDate(d){
  if(!d)return null;
  d=String(d).trim();
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(d))return d;
  // DD-MM-YYYY or DD/MM/YYYY
  const m=d.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
  if(m)return m[3]+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0");
  // DD-MMM-YYYY (e.g. 15-Jun-2025)
  const months={jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
  const m2=d.match(/^(\d{1,2})[-\s]([A-Za-z]{3})[-\s](\d{4})$/);
  if(m2&&months[m2[2].toLowerCase()])return m2[3]+"-"+months[m2[2].toLowerCase()]+"-"+m2[1].padStart(2,"0");
  // Try native parse as last resort
  const dt=new Date(d);
  if(!isNaN(dt.getTime()))return dt.toISOString().slice(0,10);
  return null;
}
function fmtDate(d){if(!d)return"—";const p=parseDate(d);if(!p)return String(d);return new Date(p+"T00:00:00").toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});}
function fmtDT(d){if(!d)return"—";return new Date(d).toLocaleString("en-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});}
function isOverdue(r){return r&&new Date(r)<new Date();}
// A reminder is ACTIVE (should nag) if now >= reminder time, not marked done,
// and within its repeat window (remindDays). "Once" = still shows until done.
function reminderActive(e){
  if(!e||!e.reminder||e.remindDone)return false;
  const now=new Date(), start=new Date(e.reminder);
  if(now<start)return false; // not yet due
  const days=parseInt(e.remindDays||"0",10);
  if(days>0){ const end=new Date(start); end.setDate(end.getDate()+days); return now<=end; }
  return true; // "Once" but not done -> keep showing until done
}

function _normKeys(e){
  if(!e||typeof e!=="object")return e;
  // Map Sheet header labels (any casing / spaces) to the app's field names.
  var map={
    "id":"id","title":"title","date":"date","month":"month","category":"category",
    "tasktype":"taskType","task type":"taskType","person":"person","vendor":"vendor",
    "account":"account","financialtype":"financialType","financial type":"financialType",
    "paymentstatus":"paymentStatus","payment status":"paymentStatus","property":"property",
    "chemical":"chemical","amount":"amount","notes":"notes","reminder":"reminder",
    "remindernote":"reminderNote","reminder note":"reminderNote","link":"link",
    "linklabel":"linkLabel","link label":"linkLabel",
    "createdat":"createdAt","created at":"createdAt","updatedat":"updatedAt","updated at":"updatedAt",
    "loggedby":"loggedBy","logged by":"loggedBy","loggedbyname":"loggedByName","logged by name":"loggedByName",
    "tags":"tags","attachments":"attachments","hidden":"hidden","recurring":"recurring",
    "sharedwith":"sharedWith","shared with":"sharedWith"
  };
  var out={};
  var blankVal="";
  Object.keys(e).forEach(function(k){
    var kk=String(k).trim();
    if(kk===""){ if(e[k]) blankVal=e[k]; return; } // capture stray empty-header column value
    var norm=map[kk.toLowerCase()];
    if(norm){ if(out[norm]===undefined||out[norm]==="") out[norm]=e[k]; }
    else out[k]=e[k];
  });
  // --- Recover the known column-shift pattern (dates that slid into the wrong field) ---
  function isISO(v){return typeof v==="string"&&/^\d{4}-\d{2}-\d{2}T/.test(v);}
  function looksDate(v){return typeof v==="string"&&/^\d{4}-\d{2}-\d{2}/.test(v);}
  // If `date` isn't a date but `month` is, use month as the date; move stray text into title.
  if(!looksDate(out.date)){
    if(looksDate(out.month)){
      if(out.date && !out.title){ out.title=out.date; } // the text sitting in date is really the title
      out.date=out.month;
    }
  }
  // createdAt often ended up as "[]"; recover from blank column or recurring timestamp
  if(!isISO(out.createdAt)){
    if(isISO(blankVal)) out.createdAt=blankVal;
    else if(isISO(out.recurring)) out.createdAt=out.recurring;
    else if(looksDate(out.date)) out.createdAt=out.date;
  }
  // recurring got a timestamp instead of a boolean — normalise back to false
  if(isISO(out.recurring)) out.recurring=false;
  // attachments/createdAt showing "[]" -> clear
  if(out.createdAt==="[]"||out.createdAt==="[ ]") out.createdAt="";
  return out;
}
function sanitizeEntry(e){
  e=_normKeys(e);
  if(!e||typeof e!=="object"||!e.id)return null;
  var out={};
  ["id","title","date","month","category","taskType","person","vendor","account",
   "financialType","paymentStatus","property","chemical","amount","notes",
   "reminder","reminderNote","link","createdAt","loggedBy","loggedByName"].forEach(function(k){
    out[k]=(e[k]===null||e[k]===undefined)?"":String(e[k]);
  });
  if(Array.isArray(e.tags))out.tags=e.tags;
  else if(typeof e.tags==="string"&&e.tags)out.tags=e.tags.split(",").map(function(t){return t.trim();}).filter(Boolean);
  else out.tags=[];
  out.attachments=Array.isArray(e.attachments)?e.attachments:[];
  if(Array.isArray(e.sharedWith))out.sharedWith=e.sharedWith;
  else if(typeof e.sharedWith==="string"&&e.sharedWith)out.sharedWith=e.sharedWith.split(",").map(function(t){return t.trim();}).filter(Boolean);
  else out.sharedWith=[];
  out.hidden=!!e.hidden;
  out.recurring=!!e.recurring;
  out.remindDays=(e.remindDays===null||e.remindDays===undefined)?"":String(e.remindDays);
  out.remindDone=!!e.remindDone;
  if(e._shared)out._shared=true;
  if(!out.title){
    // Never discard a real entry just because Title cell is empty/shifted — synthesize a label.
    var noteFirst = out.notes ? String(out.notes).split(/[\n|]/)[0].trim().slice(0,60) : "";
    out.title = noteFirst || out.vendor || out.person || out.category || out.taskType ||
      (out.date && String(out.date).length>2 ? String(out.date) : "") || "(entry)";
  }
  return out;
}

// ── AUTO 60-DAY REMINDER (Purchase, Sales invoice, CSD, KPKB) ─────────────────
function qualifiesFor60(cat, title, vendor, taskType){
  var s=((cat||"")+" "+(title||"")+" "+(vendor||"")+" "+(taskType||"")).toLowerCase();
  // Purchases and sales invoices
  if(s.indexOf("purchase")>-1) return true;
  if(s.indexOf("sales")>-1 && (s.indexOf("invoice")>-1||s.indexOf("bill")>-1)) return true;
  // Canteen Stores Dept & Central Police Canteen (KPKB)
  if(s.indexOf("csd")>-1||s.indexOf("canteen stores")>-1) return true;
  if(s.indexOf("kpkb")>-1||s.indexOf("kpk b")>-1||s.indexOf("police canteen")>-1) return true;
  return false;
}
function auto60Reminder(entry){
  // If it qualifies and has no reminder yet, set reminder = date + 60 days.
  try{
    if(entry.reminder) return entry;
    if(!qualifiesFor60(entry.category, entry.title, entry.vendor, entry.taskType)) return entry;
    var base=entry.date && /^\d{4}-\d{2}-\d{2}/.test(String(entry.date)) ? new Date(entry.date) : new Date();
    if(isNaN(base.getTime())) base=new Date();
    var rd=new Date(base); rd.setDate(rd.getDate()+60);
    entry.reminder=rd.toISOString().slice(0,10);
    if(!entry.reminderNote){
      entry.reminderNote="Payment due (60-day terms) — "+rd.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
    }
  }catch(e){}
  return entry;
}

// ── GOOGLE SHEETS API ─────────────────────────────────────────────────────────
function lightForSheet(entry){
  // Never send heavy base64 image data to Google Sheets (cell limit 50k chars).
  // Keep only http/drive links; the full image stays in localStorage.
  if(!entry) return entry;
  var e=Object.assign({},entry);
  if(Array.isArray(e.sharedWith))e.sharedWith=e.sharedWith.join(",");
  if(Array.isArray(e.attachments)){
    e.attachments=e.attachments.map(function(a){
      if(!a) return a;
      var keep=(a.data&&String(a.data).indexOf("http")===0);
      return {name:a.name,type:a.type,data:keep?a.data:""};
    });
  }
  return e;
}
async function sheetsAPI(action,data={}){
  try{
    const r=await fetch("/.netlify/functions/db",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action,user:URL_USER,...data})
    });
    if(!r.ok) throw new Error("Sheets error: "+r.status);
    const text=await r.text();
    try{return JSON.parse(text);}
    catch(e){return {error:"Invalid response"};}
  }catch(e){
    console.error("Sheets:",e);
    return {error:e.message};
  }
}

async function intelAPI(action,data={}){
  try{
    const r=await fetch("/.netlify/functions/intel",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action,user:URL_USER,...data})
    });
    if(!r.ok) throw new Error("Intel error: "+r.status);
    const text=await r.text();
    try{return JSON.parse(text);}
    catch(e){return {ok:false,error:"Invalid response"};}
  }catch(e){
    console.error("Intel:",e);
    return {ok:false,error:e.message};
  }
}

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function claudeAPI(prompt,system,imageBase64,imageType,pdfBase64){
  // Route through Netlify function to avoid CORS on iPhone Safari
  try{
    const r=await fetch("/.netlify/functions/claude",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt,system,imageBase64,imageType,pdfBase64})
    });
    if(!r.ok) throw new Error("Server error: "+r.status);
    const d=await r.json();
    if(d.error) throw new Error(d.error);
    return d.text||"";
  }catch(e){
    throw new Error(e.message);
  }
}

function uploadToDrive(att){
  // Upload a single attachment to Drive via Apps Script, return Drive URL
  return sheetsAPI("uploadFile",{file:{name:att.name,type:att.type,data:att.data}}).then(function(r){
    var u=r&&(r.url||r.link||(r.data&&String(r.data).indexOf("http")===0?r.data:null));
    if(u)return {name:att.name,type:"drive",data:u,driveId:(r.id||r.driveId||"")};
    return att; // fallback: keep original if upload fails
  }).catch(function(){return att;});
}

function fileToB64(f){
  return new Promise((res,rej)=>{
    if(f.type.startsWith("image/")){
      const r=new FileReader();
      r.onload=e=>{
        const img=new Image();
        img.onload=()=>{
          const MAX=1200;let w=img.width,h=img.height;
          if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
          const c=document.createElement("canvas");c.width=w;c.height=h;
          c.getContext("2d").drawImage(img,0,0,w,h);
          const data=c.toDataURL("image/jpeg",.85);
          res({name:f.name,type:"image/jpeg",data,base64:data.split(",")[1]});
        };
        img.onerror=rej;img.src=e.target.result;
      };r.onerror=rej;r.readAsDataURL(f);
    }else{
      const r=new FileReader();
      r.onload=()=>{
        const result=r.result;
        res({name:f.name,type:f.type,data:result,base64:result.split(",")[1]});
      };
      r.onerror=rej;r.readAsDataURL(f);
    }
  });
}

Available categories: ${dropdowns.categories.join(", ")}
Available persons: ${dropdowns.persons.join(", ")}

let _intelCache=null,_intelCacheTime=0;
async function getIntelLog(force){
  // Cache the Intelligence sheet for 5 min to avoid refetching every question.
  const now=Date.now();
  if(!force&&_intelCache&&(now-_intelCacheTime)<300000)return _intelCache;
  try{
    const res=await intelAPI("getIntel");
    if(res&&res.ok&&Array.isArray(res.rows)){_intelCache=res.rows;_intelCacheTime=now;return res.rows;}
  }catch(e){/* non-fatal — AI still works on entries alone */}
  return _intelCache||[];
}

async function getAIInsights(entries,question){
  const system=`You are a personal and business intelligence assistant for Ravikiran, who runs Onam Agarbathi Pvt. Ltd., a 100+ year old Bangalore incense manufacturer (Vaishak brand). 
You know: CSD/CPC orders, raw materials (Jasmine ASP, Sandal, Rose, bamboo sticks, jigat), compliance (GST, ESI, EPF, PT, TDS 194), 
accounts (Kotak, IDBI, ICICI, Zerodha, HDFC), people (Prakash, Satish auditor, Maadhu, Virupaksha, Gopal Reddy).
This tracker also logs personal Health entries (meals, symptoms, medication, vitals) and Family entries (casual journal of thoughts/events),
alongside Day Book vouchers imported from Tally (Sales/Purchase/Payment/Receipt). 
Analyse ALL data deeply including document contents in notes AND the Intelligence Log (extracted from emails/invoices). Be specific with amounts, dates, names.
For Health questions: identify patterns and correlations only (e.g. "bloating reported after dairy 4 times") — NEVER diagnose or give medical advice, always suggest consulting a doctor for any real concern.
Flag risks, overdue items, action items. Use ₹ formatting with lakhs/crores notation.`;

  // Include full notes (which may contain extracted document text)
  const summary=entries.slice(0,150).map(e=>{
    const notesFull=(e.notes||"").slice(0,200); // More notes for deeper analysis
    const hasAtt=(e.attachments||[]).length>0?"[HAS ATTACHMENTS]":"";
    return `[${e.date}] ${e.title}|Cat:${e.category||"-"}|Type:${e.taskType||"-"}|Person:${e.person||"-"}|Vendor:${e.vendor||"-"}|Account:${e.account||"-"}|Amount:${e.amount||"-"}|Status:${e.paymentStatus||"-"}|Tags:${(e.tags||[]).join(",")}|Notes:${notesFull}${hasAtt}`;
  }).join("\n");

  // Fold in the Intelligence Log (email/invoice-extracted records).
  let intelBlock="";
  try{
    const intel=await getIntelLog(false);
    if(intel&&intel.length){
      const rows=intel.slice(-60).map(r=>
        `[${r.Date||r.date||"-"}] ${r.Title||r.title||""}|Src:${r.Source||r.source||"email"}|Vendor:${r.Vendor||r.vendor||"-"}|Customer:${r.Customer||r.customer||"-"}|Amt:${r.Amount||r.amount||"-"}|Inv:${r.InvoiceNo||r.invoiceNo||"-"}|Cat:${r.Category||r.category||"-"}|${r.Summary||r.summary||""}`
      ).join("\n");
      intelBlock=`\n\nINTELLIGENCE LOG (${intel.length} records extracted from emails/invoices):\n${rows}`;
    }
  }catch(e){/* non-fatal */}

  return await claudeAPI(
    `Business tracker data (${entries.length} total entries):\n${summary}${intelBlock}\n\nQuestion: ${question||"Give comprehensive business insights: urgent items, overdue payments, cash flow, compliance due, production status."}`,
    system
  );
}

function Thumb({att,small}){
  const s=small?30:50;
  const b={width:s,height:s,borderRadius:6,border:"1.5px solid #e2d9c8",cursor:"pointer",flexShrink:0,objectFit:"cover",display:"block"};
  const openAtt=()=>{
    if(!att.data)return;
    if(att.type==="drive"||String(att.data).indexOf("http")===0){window.open(att.data,"_blank");return;}
    // Create blob URL and open
    try{
      const byteStr=atob(att.data.split(",")[1]||att.data);
      const ab=new ArrayBuffer(byteStr.length);
      const ia=new Uint8Array(ab);
      for(let i=0;i<byteStr.length;i++)ia[i]=byteStr.charCodeAt(i);
      const blob=new Blob([ab],{type:att.type||"application/octet-stream"});
      const url=URL.createObjectURL(blob);
      window.open(url,"_blank");
    }catch(e){
      // Fallback: open data URL directly
      const w=window.open("","_blank");
      if(w){w.document.write(`<img src="${att.data}" style="max-width:100%" />`);w.document.close();}
    }
  };
  if(att.type==="drive"||(att.data&&String(att.data).indexOf("http")===0&&!att.type?.startsWith("image/")))return<div onClick={openAtt} style={{...b,background:"#eef7ee",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:small?9:11,color:"#2a7a2a",fontWeight:700,flexDirection:"column",gap:1}}>
    <span style={{fontSize:small?14:18}}>🔗</span>
    <span>DRIVE</span>
  </div>;
  if(att.type?.startsWith("image/"))return<div onClick={openAtt} style={{...b,overflow:"hidden",cursor:"zoom-in"}}><img src={att.data} alt={att.name||"image"} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>;
  const p=att.type==="application/pdf";
  return<div onClick={openAtt} style={{...b,background:p?"#fff0f0":"#f0f4ff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:small?9:11,color:p?"#b00":"#339",fontWeight:700,flexDirection:"column",gap:1}}>
    <span style={{fontSize:small?14:18}}>{p?"📄":"📎"}</span>
    <span>{p?"PDF":"FILE"}</span>
  </div>;
}

function Combo({label,value,onChange,options,placeholder,onAddNew}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState(value||"");
  const ref=useRef();
  const filtered=useMemo(()=>q?options.filter(o=>o.toLowerCase().includes(q.toLowerCase())):options,[q,options]);
  useEffect(()=>{setQ(value||"");},[value]);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  const canAdd=q&&!options.find(o=>o.toLowerCase()===q.toLowerCase());
  return<div ref={ref} style={{position:"relative"}}>
    {label&&<label className="lbl">{label}</label>}
    <input className="inp" value={q} placeholder={placeholder||"Type or select…"}
      onChange={e=>{setQ(e.target.value);onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}/>
    {open&&(filtered.length>0||canAdd)&&<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:300,background:"#fffdf5",border:"1.5px solid #e0d8cc",borderRadius:10,boxShadow:"0 8px 32px rgba(0,0,0,.18)",maxHeight:180,overflowY:"auto",marginTop:2}}>
      {filtered.map(o=><div key={o} onClick={()=>{onChange(o);setQ(o);setOpen(false);}} style={{padding:"8px 13px",cursor:"pointer",fontSize:13,color:"#2a1a00",borderBottom:"1px solid #f0e8d8"}} onMouseEnter={e=>e.currentTarget.style.background="#fff8ee"} onMouseLeave={e=>e.currentTarget.style.background=""}>{o}</div>)}
      {canAdd&&onAddNew&&<div onClick={()=>{onAddNew(q);onChange(q);setOpen(false);}} style={{padding:"8px 13px",cursor:"pointer",fontSize:13,color:"#2a7a2a",borderTop:"1.5px solid #c8e8c8",fontWeight:700,background:"#f0faf0"}}>＋ Add "{q}"</div>}
    </div>}
  </div>;
}

// ── VOICE INPUT COMPONENT ─────────────────────────────────────────────────────
function VoiceInput({onResult,dropdowns}){
  const [listening,setListening]=useState(false);
  const [transcript,setTranscript]=useState("");
  const [processing,setProcessing]=useState(false);
  const recognRef=useRef(null);

  const start=()=>{
    if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
      alert("Voice input not supported in this browser. Use Chrome or Safari.");return;
    }
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR();
    r.lang="en-IN";r.continuous=false;r.interimResults=true;
    r.onstart=()=>setListening(true);
    r.onresult=e=>{
      const t=Array.from(e.results).map(r=>r[0].transcript).join("");
      setTranscript(t);
    };
    r.onend=async()=>{
      setListening(false);
      if(transcript){
        setProcessing(true);
        const data=await processVoice(transcript,dropdowns);
        onResult(data);
        setProcessing(false);
        setTranscript("");
      }
    };
    r.onerror=()=>setListening(false);
    recognRef.current=r;
    r.start();
  };

  const stop=()=>{if(recognRef.current)recognRef.current.stop();};

  return<div style={{background:"#e8f4fb",border:"1.5px solid #b0d8f0",borderRadius:10,padding:13,marginBottom:12}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
      <button onClick={listening?stop:start} disabled={processing}
        className={listening?"voice-btn listening":"voice-btn"}
        style={{fontSize:18,padding:"10px 16px"}}>
        {processing?"⏳":listening?"⏹ Stop":"🎤 Speak"}
      </button>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:700,color:"#006aaa"}}>
          {processing?"AI processing…":listening?"Listening…":"Voice Input"}
        </div>
        <div style={{fontSize:11,color:"#5a8aaa"}}>
          {listening?"Speak naturally — title, amount, person, reminder…":"Tap and speak your entry"}
        </div>
      </div>
    </div>
    {transcript&&<div style={{background:"rgba(0,0,0,.06)",borderRadius:7,padding:"7px 11px",fontSize:12,color:"#003a5a",fontStyle:"italic"}}>"{transcript}"</div>}
    <div style={{fontSize:10,color:"#7a9ab0",marginTop:6}}>
      Example: "Prakash payment pending fifty thousand remind me tomorrow 10am"
    </div>
  </div>;
}

// ── SCAN BILL COMPONENT ───────────────────────────────────────────────────────
function ScanBill({onResult,onMultiResult}){
  const [scanning,setScanning]=useState(false);
  const [scanMsg,setScanMsg]=useState("");
  const [progress,setProgress]=useState({current:0,total:0});

  const processFile=async(file)=>{
    if(!file)return;
    setScanning(true);setScanMsg("Reading bill...");
    try{
      const att=await fileToB64(file);
      setScanMsg("Analysing with AI...");
      const txt=await claudeAPI(
        "Extract all data from this bill/invoice. Return ONLY valid JSON: {title, date (YYYY-MM-DD), vendor, amount (with ₹), invoiceNo, gstin, category, paymentStatus, notes, tags (array)}",
        "You are an OCR assistant for Onam Agarbathi. Return only valid JSON, no markdown backticks.",
        att.base64, att.type
      );
      let parsed={title:"Scanned bill",date:today(),tags:["Pending"],category:"Business - Purchase",paymentStatus:"Payment Pending"};
      try{parsed={...parsed,...JSON.parse(txt.replace(/```json|```/g,"").trim())};}
      catch(ex){parsed.notes=txt.slice(0,300);}
      onResult({...parsed,attachments:[att],id:genId(),createdAt:new Date().toISOString()});
      setScanMsg("✅ Done!");
    }catch(e){alert("Scan error: "+e.message);}
    setScanning(false);
    setTimeout(()=>setScanMsg(""),2000);
  };

  const processMultiple=async(files)=>{
    if(!files||files.length===0)return;
    const arr=Array.from(files);
    setScanning(true);
    setProgress({current:0,total:arr.length});
    const results=[];
    for(let i=0;i<arr.length;i++){
      setScanMsg(`Scanning ${i+1} of ${arr.length}...`);
      setProgress({current:i+1,total:arr.length});
      try{
        const att=await fileToB64(arr[i]);
        const txt=await claudeAPI(
          "Extract all data from this bill/invoice. Return ONLY valid JSON: {title, date (YYYY-MM-DD), vendor, amount (with ₹), invoiceNo, gstin, category, paymentStatus, notes, tags (array)}",
          "You are an OCR assistant for Onam Agarbathi. Return only valid JSON, no markdown.",
          att.base64, att.type
        );
        let parsed={title:`Bill ${i+1}`,date:today(),tags:["Pending"],category:"Business - Purchase",paymentStatus:"Payment Pending"};
        try{parsed={...parsed,...JSON.parse(txt.replace(/```json|```/g,"").trim())};}
        catch(ex){parsed.notes=txt.slice(0,300);}
        results.push({...parsed,attachments:[att],id:genId(),createdAt:new Date().toISOString()});
      }catch(e){
        results.push({title:`Bill ${i+1} (scan failed)`,date:today(),tags:["Pending"],notes:e.message,id:genId(),createdAt:new Date().toISOString()});
      }
    }
    setScanMsg(`✅ ${results.length} bills scanned!`);
    setScanning(false);
    setProgress({current:0,total:0});
    if(onMultiResult) onMultiResult(results);
    else results.forEach(r=>onResult(r));
    setTimeout(()=>setScanMsg(""),3000);
  };

  const openCamera=()=>{
    const i=document.createElement("input");
    i.type="file";i.accept="image/*";
    i.onchange=e=>{if(e.target.files[0])processFile(e.target.files[0]);};
    i.click();
  };
  const openGallery=()=>{
    const i=document.createElement("input");
    i.type="file";i.accept="image/*,application/pdf,.pdf";
    i.onchange=e=>{if(e.target.files[0])processFile(e.target.files[0]);};
    i.click();
  };
  const openMulti=()=>{
    const i=document.createElement("input");
    i.type="file";i.accept="image/*,application/pdf,.pdf";
    i.multiple=true;
    i.onchange=e=>{if(e.target.files.length>0)processMultiple(e.target.files);};
    i.click();
  };

  return<div style={{background:"#edfaed",border:"1.5px solid #a8d8a8",borderRadius:10,padding:13,marginBottom:12}}>
    <div style={{fontWeight:700,fontSize:12,color:"#1a5a1a",marginBottom:8}}>📸 Scan Bill / Invoice → Auto-fill</div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:6}}>
      <button onClick={openCamera} disabled={scanning} className="scan-btn" style={{fontSize:12,padding:"8px 12px"}}>
        {scanning?"⏳":"📷"} Camera
      </button>
      <button onClick={openGallery} disabled={scanning} className="scan-btn" style={{background:"linear-gradient(135deg,#5a6a2a,#3a4a1a)",fontSize:12,padding:"8px 12px"}}>
        {scanning?"⏳":"🖼"} Gallery
      </button>
      <button onClick={openMulti} disabled={scanning} className="scan-btn" style={{background:"linear-gradient(135deg,#1a5a7a,#0a3a5a)",fontSize:12,padding:"8px 12px"}}>
        {scanning?"⏳":"📚"} Multi Bills
      </button>
    </div>
    {scanMsg&&<div style={{fontSize:12,color:"#1a5a1a",fontWeight:600,marginBottom:4}}>{scanMsg}</div>}
    {progress.total>0&&<div style={{background:"#c8e8c8",borderRadius:20,height:6,marginBottom:6}}>
      <div style={{background:"#1a7a1a",borderRadius:20,height:6,width:`${(progress.current/progress.total)*100}%`,transition:"width .3s"}}/>
    </div>}
    <div style={{fontSize:10,color:"#5a8a5a"}}>📚 Multi Bills: select up to 10 photos at once → all auto-filled</div>
  </div>;
}

// ── AGEING REPORT ────────────────────────────────────────────────────────────
function AgeingReport({entries,onClose,onMarkPaid}){
  const [localPaid,setLocalPaid]=useState(new Set());
  const today=new Date();
  const daysSince=(dateStr)=>{
    if(!dateStr)return null;
    const p=parseDate(dateStr);if(!p)return null;
    const d=new Date(p+"T00:00:00");
    if(isNaN(d.getTime()))return null;
    return Math.round((today.setHours(0,0,0,0)-new Date(p+"T00:00:00").setHours(0,0,0,0))/86400000);
  };

  const unpaid=entries.filter(e=>(e.category==="Sales - Payment"||e.category==="Sales - Order")&&e.paymentStatus!=="Paid"&&e.date&&!localPaid.has(e.id));
  const buckets=[
    {label:"0–30 days",min:0,max:30,color:"#2a8a2a"},
    {label:"31–45 days",min:31,max:45,color:"#7a8a2a"},
    {label:"46–60 days",min:46,max:60,color:"#c89a2a"},
    {label:"61–90 days",min:61,max:90,color:"#c86a2a"},
    {label:"90+ days",min:91,max:999999,color:"#c82a2a"},
  ];

  const parseAmt=(a)=>{
    if(!a)return 0;
    const n=parseFloat(String(a).replace(/[₹,\s]/g,""));
    return isNaN(n)?0:n;
  };

  const grouped=buckets.map(b=>{
    const items=unpaid.filter(e=>{
      const age=daysSince(e.date);
      return age!==null&&age>=b.min&&age<=b.max;
    }).map(e=>({...e,_age:daysSince(e.date)})).sort((a,b)=>b._age-a._age);
    const total=items.reduce((s,e)=>s+parseAmt(e.amount),0);
    return {...b,items,total};
  });

  const grandTotal=grouped.reduce((s,b)=>s+b.total,0);

  // Group by customer for the summary at top
  const byCustomer={};
  unpaid.forEach(e=>{
    const name=e.person||e.vendor||"Unknown";
    if(!byCustomer[name])byCustomer[name]={total:0,count:0,oldest:0};
    byCustomer[name].total+=parseAmt(e.amount);
    byCustomer[name].count+=1;
    const age=daysSince(e.date)||0;
    if(age>byCustomer[name].oldest)byCustomer[name].oldest=age;
  });
  const customerRows=Object.entries(byCustomer).sort((a,b)=>b[1].total-a[1].total);

  return<div>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
      <span style={{fontSize:26}}>📊</span>
      <div><h2 style={{margin:0,fontSize:18,color:"#7a1a1a"}}>Ageing Report</h2>
        <div style={{fontSize:11,color:"#aa5a5a"}}>Unpaid customer invoices · Sales - Payment</div></div>
    </div>

    <div style={{background:"linear-gradient(135deg,#fff0f0,#ffe8e8)",border:"1.5px solid #e8a8a8",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontSize:12,color:"#7a1a1a",fontWeight:600}}>TOTAL OUTSTANDING</div>
      <div style={{fontSize:22,color:"#7a1a1a",fontWeight:800}}>₹{grandTotal.toLocaleString("en-IN")}</div>
    </div>

    {/* Bucket breakdown */}
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
      {grouped.map(b=>b.items.length>0&&<div key={b.label} style={{border:`1.5px solid ${b.color}33`,borderRadius:9,overflow:"hidden"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 13px",background:`${b.color}15`}}>
          <span style={{fontSize:12,fontWeight:700,color:b.color}}>{b.label} ({b.items.length})</span>
          <span style={{fontSize:13,fontWeight:700,color:b.color}}>₹{b.total.toLocaleString("en-IN")}</span>
        </div>
        <div style={{padding:"6px 0"}}>
          {b.items.map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 13px",borderTop:"1px solid #f0f0f0"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:"#333",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.title||"Invoice"}</div>
              <div style={{fontSize:10,color:"#999"}}>{e.person||e.vendor||"—"} · {e._age}d ago · {e.date}</div>
            </div>
            <div style={{textAlign:"right",marginLeft:8}}>
              <div style={{fontSize:12,fontWeight:700,color:"#444"}}>{e.amount?(String(e.amount).includes("₹")?e.amount:"₹"+e.amount):"—"}</div>
              {onMarkPaid&&<button onClick={()=>{onMarkPaid(e);setLocalPaid(p=>new Set([...p,e.id]));}} style={{fontSize:9,padding:"2px 8px",marginTop:2,borderRadius:10,border:"1px solid #2a8a2a",background:"#eaffea",color:"#1a6a1a",cursor:"pointer",fontWeight:600}}>✅ Mark Paid</button>}
            </div>
          </div>)}
        </div>
      </div>)}
      {unpaid.length===0&&<div style={{textAlign:"center",padding:"30px",color:"#999",fontSize:13}}>🎉 No unpaid invoices — all caught up!</div>}
    </div>

    {/* By customer summary */}
    {customerRows.length>0&&<div>
      <div style={{fontSize:11,fontWeight:700,color:"#7a1a1a",marginBottom:8,letterSpacing:0.5}}>BY CUSTOMER</div>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {customerRows.map(([name,d])=><div key={name} style={{display:"flex",justifyContent:"space-between",padding:"7px 12px",background:d.oldest>60?"#fff0f0":"#f8f8f8",borderRadius:7,fontSize:12}}>
          <span style={{fontWeight:600,color:"#333"}}>{name} {d.oldest>60&&<span style={{color:"#c82a2a"}}>⚠️</span>}</span>
          <span style={{color:"#666"}}>{d.count} invoice{d.count>1?"s":""} · oldest {d.oldest}d</span>
          <span style={{fontWeight:700,color:"#7a1a1a"}}>₹{d.total.toLocaleString("en-IN")}</span>
        </div>)}
      </div>
    </div>}

    <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}><button className="bgh" onClick={onClose}>Close</button></div>
  </div>;
}

// ── PAYMENT MATCHER ───────────────────────────────────────────────────────────
function PaymentMatcher({entries,onClose,onMarkPaid}){
  const [smsText,setSmsText]=useState("");
  const [scanning,setScanning]=useState(false);
  const [matches,setMatches]=useState([]); // [{payment, candidates:[...], autoMatched}]
  const [statusMsg,setStatusMsg]=useState("");

  const parseAmt=(a)=>{
    if(!a)return 0;
    const n=parseFloat(String(a).replace(/[₹,\s]/g,""));
    return isNaN(n)?0:n;
  };

  const unpaid=entries.filter(e=>(e.category==="Sales - Payment"||e.category==="Sales - Order")&&e.paymentStatus!=="Paid");

  const findCandidates=(payment)=>{
    // payment: {amount:number, name:string}
    const amtTol=Math.max(1,payment.amount*0.01); // 1% tolerance for rounding
    return unpaid.filter(e=>{
      const eAmt=parseAmt(e.amount);
      const amtClose=Math.abs(eAmt-payment.amount)<=amtTol;
      if(!amtClose)return false;
      if(!payment.name)return true;
      const eName=(e.person||e.vendor||"").toLowerCase();
      const pName=payment.name.toLowerCase();
      return eName.includes(pName)||pName.includes(eName)||eName.split(" ").some(w=>w.length>2&&pName.includes(w));
    }).map(e=>{
      const eAmt=parseAmt(e.amount);
      const exact=Math.abs(eAmt-payment.amount)<0.01;
      const eName=(e.person||e.vendor||"").toLowerCase().trim();
      const pName=(payment.name||"").toLowerCase().trim();
      // For AUTO-marking paid, require a genuinely exact name match (not just substring overlap) -
      // a bank SMS saying just "STK" should NOT auto-confirm "STK Fragrances Pvt Ltd" was paid.
      // Substring/fuzzy matches still show up as candidates for manual confirmation (see findCandidates above),
      // but only count as "exact" here if the full normalized names truly match.
      const nameExact=!!(pName&&eName&&eName===pName);
      return {entry:e,exact:!!(exact&&nameExact)};
    });
  };

  const processSMS=async()=>{
    if(!smsText.trim()){setStatusMsg("Paste a bank SMS or payment text first");return;}
    setScanning(true);setStatusMsg("Reading payment details…");
    try{
      const txt=await claudeAPI(
        "Extract payment confirmation details from this bank SMS/text. Return ONLY valid JSON array (even for one payment): "+
        "[{\"amount\": number, \"name\": \"payer name if mentioned, else empty string\", \"date\": \"YYYY-MM-DD if mentioned else empty\", \"reference\": \"UTR/ref number if any\"}]. "+
        "If multiple payments are mentioned, return multiple objects. Text: \"\"\""+smsText+"\"\"\"",
        "You are a financial text parser for Onam Agarbathi. Return ONLY valid JSON, no markdown, no explanation."
      );
      let parsed=[];
      try{parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());}catch(ex){
        setStatusMsg("Could not parse: "+txt.slice(0,150));setScanning(false);return;
      }
      if(!Array.isArray(parsed))parsed=[parsed];
      const built=parsed.map(p=>{
        const candidates=findCandidates(p);
        const autoMatched=candidates.length===1&&candidates[0].exact;
        return {payment:p,candidates,autoMatched};
      });
      setMatches(built);
      const autoCount=built.filter(b=>b.autoMatched).length;
      setStatusMsg(autoCount>0?`✅ ${autoCount} payment(s) auto-matched exactly. Review below.`:"Review matches below — none were exact enough to auto-confirm.");
    }catch(e){
      setStatusMsg("Error: "+e.message);
    }
    setScanning(false);
  };

  const processPDF=async(file)=>{
    setScanning(true);setStatusMsg("Reading payment PDF…");
    try{
      const att=await fileToB64(file);
      const txt=await claudeAPI(
        "Extract every payment confirmation from this PDF/image. Return ONLY valid JSON array: "+
        "[{\"amount\": number, \"name\": \"payer name if mentioned, else empty string\", \"date\": \"YYYY-MM-DD if mentioned else empty\", \"reference\": \"ref/UTR if any\"}]",
        "You are a financial document parser for Onam Agarbathi. Return ONLY valid JSON, no markdown, no explanation.",
        att.base64,att.type
      );
      let parsed=[];
      try{parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());}catch(ex){
        setStatusMsg("Could not parse PDF: "+txt.slice(0,150));setScanning(false);return;
      }
      if(!Array.isArray(parsed))parsed=[parsed];
      const built=parsed.map(p=>{
        const candidates=findCandidates(p);
        const autoMatched=candidates.length===1&&candidates[0].exact;
        return {payment:p,candidates,autoMatched};
      });
      setMatches(built);
      const autoCount=built.filter(b=>b.autoMatched).length;
      setStatusMsg(autoCount>0?`✅ ${autoCount} payment(s) auto-matched exactly. Review below.`:"Review matches below.");
    }catch(e){
      setStatusMsg("Error: "+e.message);
    }
    setScanning(false);
  };

  const openPDFUpload=()=>{
    const i=document.createElement("input");
    i.type="file";i.accept="image/*,application/pdf,.pdf";
    i.onchange=e=>{if(e.target.files[0])processPDF(e.target.files[0]);};
    i.click();
  };

  const confirmMatch=(matchIdx,entry)=>{
    onMarkPaid(entry);
    setMatches(prev=>prev.map((m,i)=>i===matchIdx?{...m,confirmed:true,confirmedEntry:entry.id}:m));
  };

  // Auto-mark on load if exact match found
  React.useEffect(()=>{
    matches.forEach((m,i)=>{
      if(m.autoMatched&&!m.confirmed){
        onMarkPaid(m.candidates[0].entry);
        setMatches(prev=>prev.map((mm,ii)=>ii===i?{...mm,confirmed:true,confirmedEntry:m.candidates[0].entry.id}:mm));
      }
    });
  },[matches.length]);

  return<div>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
      <span style={{fontSize:26}}>💳</span>
      <div><h2 style={{margin:0,fontSize:18,color:"#1a5a3a"}}>Payment Matcher</h2>
        <div style={{fontSize:11,color:"#5aaa7a"}}>Match bank SMS or payment PDFs to unpaid invoices</div></div>
    </div>

    <div style={{background:"#f0fff4",border:"1.5px solid #a8d8b8",borderRadius:10,padding:13,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:12,color:"#1a5a3a",marginBottom:8}}>📱 Paste Bank SMS / Payment Text</div>
      <textarea className="inp" value={smsText} rows={3} placeholder="e.g. Rs.5500 credited to your a/c from PRAKASH ENTERPRISES on 12-Jun..." onChange={e=>setSmsText(e.target.value)} style={{resize:"none",marginBottom:8}}/>
      <div style={{display:"flex",gap:8}}>
        <button onClick={processSMS} disabled={scanning} className="scan-btn" style={{fontSize:12,padding:"8px 14px"}}>{scanning?"⏳":"🔍"} Match SMS</button>
        <button onClick={openPDFUpload} disabled={scanning} className="scan-btn" style={{background:"linear-gradient(135deg,#1a5a7a,#0a3a5a)",fontSize:12,padding:"8px 14px"}}>{scanning?"⏳":"📄"} Upload PDF/Image</button>
      </div>
    </div>

    {statusMsg&&<div style={{fontSize:12,color:"#1a5a3a",fontWeight:600,marginBottom:12,padding:"8px 12px",background:"#f0fff4",borderRadius:7}}>{statusMsg}</div>}

    {matches.length>0&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
      {matches.map((m,i)=><div key={i} style={{border:"1.5px solid "+(m.confirmed?"#a8d8b8":"#e8d8a8"),borderRadius:9,padding:12,background:m.confirmed?"#f0fff4":"#fffdf0"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:13,fontWeight:700,color:"#333"}}>₹{m.payment.amount?.toLocaleString("en-IN")} {m.payment.name&&"· "+m.payment.name}</span>
          {m.confirmed&&<span style={{fontSize:11,color:"#1a8a3a",fontWeight:700}}>✅ Marked Paid</span>}
        </div>
        {!m.confirmed&&m.candidates.length===0&&<div style={{fontSize:12,color:"#999"}}>No matching unpaid invoice found. Check manually.</div>}
        {!m.confirmed&&m.candidates.length>0&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
          {m.candidates.map((c,ci)=><div key={ci} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"#fff",borderRadius:6,border:"1px solid #eee"}}>
            <div style={{fontSize:12}}>
              <div style={{fontWeight:600,color:"#333"}}>{c.entry.title} {c.exact&&<span style={{color:"#1a8a3a"}}>(exact match)</span>}</div>
              <div style={{color:"#999",fontSize:10}}>{c.entry.person||c.entry.vendor} · {c.entry.amount} · {c.entry.date}</div>
            </div>
            <button onClick={()=>confirmMatch(i,c.entry)} style={{fontSize:11,padding:"5px 12px",borderRadius:14,border:"1px solid #2a8a2a",background:"#eaffea",color:"#1a6a1a",cursor:"pointer",fontWeight:600}}>Confirm Paid</button>
          </div>)}
        </div>}
      </div>)}
    </div>}

    <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}><button className="bgh" onClick={onClose}>Close</button></div>
  </div>;
}

// ── LOGISTICS TRACKER ─────────────────────────────────────────────────────────
const LOGISTICS_STAGES=["Despatched","In Transit","Delivered","Payment Received"];
const LOGISTICS_DOCS={
  "Despatched":{label:"LR Copy",icon:"📄"},
  "In Transit":{label:"Paid LR Copy",icon:"💵"},
  "Delivered":{label:"Delivery Proof / POD",icon:"✅"},
  "Payment Received":{label:"Payment Proof",icon:"💳"}
};

function getLogisticsStageIdx(entry){
  // Highest stage reached, based on tags like "Stage: Despatched"
  let idx=-1;
  LOGISTICS_STAGES.forEach((s,i)=>{
    if(entry.tags&&entry.tags.includes("Stage: "+s))idx=Math.max(idx,i);
  });
  return idx; // -1 means not yet despatched
}

function LogisticsTracker({entries,onClose,onUpdateEntry,onNewSalesOrder}){
  const [selectedId,setSelectedId]=useState(null);
  const [uploading,setUploading]=useState(false);

  const JUNK_PATTERNS=[/^\s*to:\s*\[/i,/^\s*from:\s*onam/i,/^\s*incomplete/i,/^\s*\[customer/i,/^\s*scanned_/i,/customer details/i,/customer name\]/i,/not specified/i,/^#trackerv2/i];
  const isJunk=(e)=>!e.title||JUNK_PATTERNS.some(p=>p.test(e.title));
  // Only genuine sales orders belong in logistics: must have a logistics tag/stage OR be an explicit Sales-Order with a monetary value.
  const hasStage=(e)=>e.tags&&(e.tags.includes("Logistics")||LOGISTICS_STAGES.some(s=>e.tags.includes("Stage: "+s)));
  const hasValue=(e)=>{const a=parseFloat(String(e.amount||"").replace(/[^0-9.]/g,""));return !isNaN(a)&&a>0;};
  const shipments=entries.filter(e=>!isJunk(e) && (hasStage(e) || (e.category==="Sales - Order"&&hasValue(e))));
  const junkCount=entries.filter(e=>(e.category==="Sales - Payment"||e.category==="Sales - Order")&&isJunk(e)).length;
  const selected=shipments.find(e=>e.id===selectedId);

  const setStage=async(entry,stageIdx)=>{
    // Add tags for this stage and all prior stages (so progress is cumulative/visual)
    let newTags=(entry.tags||[]).filter(t=>!t.startsWith("Stage: "));
    for(let i=0;i<=stageIdx;i++)newTags.push("Stage: "+LOGISTICS_STAGES[i]);
    const updated={...entry,tags:newTags};
    if(stageIdx>=3&&entry.paymentStatus!=="Paid")updated.paymentStatus="Paid"; // Payment Received also closes payment status
    await onUpdateEntry(updated);
  };

  const uploadDoc=(entry,stageName)=>{
    const i=document.createElement("input");
    i.type="file";i.accept="image/*,application/pdf,.pdf";
    i.onchange=async(e)=>{
      if(!e.target.files[0])return;
      setUploading(true);
      try{
        const att=await fileToB64(e.target.files[0]);
        att.docType=LOGISTICS_DOCS[stageName].label;
        const updated={...entry,attachments:[...(entry.attachments||[]),att]};
        await onUpdateEntry(updated);
      }catch(err){alert("Upload failed: "+err.message);}
      setUploading(false);
    };
    i.click();
  };

  const docsForStage=(entry,stageName)=>{
    return (entry.attachments||[]).filter(a=>a.docType===LOGISTICS_DOCS[stageName].label);
  };

  if(selected){
    const curStage=getLogisticsStageIdx(selected);
    return<div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={()=>setSelectedId(null)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#666"}}>←</button>
        <div>
          <h2 style={{margin:0,fontSize:16,color:"#1a3a6a"}}>{selected.title||"Shipment"}</h2>
          <div style={{fontSize:11,color:"#888"}}>{selected.person||selected.vendor||"—"} · {selected.amount?(String(selected.amount).includes("₹")?selected.amount:"₹"+selected.amount):"—"}</div>
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:18}}>
        {LOGISTICS_STAGES.map((stage,i)=>{
          const reached=i<=curStage;
          const isCurrent=i===curStage;
          const docs=docsForStage(selected,stage);
          return<div key={stage} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:reached?"#2a8a4a":"#e8e8e8",color:reached?"#fff":"#999",fontSize:13,fontWeight:700}}>{reached?"✓":i+1}</div>
              {i<LOGISTICS_STAGES.length-1&&<div style={{width:2,flex:1,minHeight:24,background:reached&&i<curStage?"#2a8a4a":"#e8e8e8",marginTop:2}}/>}
            </div>
            <div style={{flex:1,paddingBottom:18}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:13,fontWeight:reached?700:500,color:reached?"#1a3a6a":"#999"}}>{stage}</span>
                {!reached&&<button onClick={()=>setStage(selected,i)} style={{fontSize:10,padding:"4px 10px",borderRadius:14,border:"1px solid #2a8a4a",background:"#eaffea",color:"#1a6a2a",cursor:"pointer",fontWeight:600}}>Mark reached</button>}
                {reached&&i===curStage&&i>0&&<button onClick={()=>setStage(selected,i-1)} style={{fontSize:9,padding:"3px 8px",borderRadius:14,border:"1px solid #ccc",background:"#f5f5f5",color:"#888",cursor:"pointer"}}>Undo</button>}
              </div>
              <div style={{marginTop:6,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                {docs.map((d,di)=><Thumb key={di} att={d}/>)}
                <button onClick={()=>uploadDoc(selected,stage)} disabled={uploading} style={{fontSize:10,padding:"5px 10px",borderRadius:7,border:"1.5px dashed #aaa",background:"#fafafa",color:"#666",cursor:"pointer"}}>{LOGISTICS_DOCS[stage].icon} Upload {LOGISTICS_DOCS[stage].label}</button>
              </div>
            </div>
          </div>;
        })}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end"}}><button className="bgh" onClick={()=>setSelectedId(null)}>Back to list</button></div>
    </div>;
  }

  return<div>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
      <span style={{fontSize:26}}>🚚</span>
      <div><h2 style={{margin:0,fontSize:18,color:"#1a3a6a"}}>Logistics Tracker</h2>
        <div style={{fontSize:11,color:"#6a8aaa"}}>Despatch → Transit → Delivered → Payment</div></div>
    </div>
    <button onClick={()=>{onClose&&onClose();onNewSalesOrder&&onNewSalesOrder();}} style={{width:"100%",padding:"11px",marginBottom:10,borderRadius:10,border:"none",background:"#1a5a8a",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ New Sales Order to Track</button>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {junkCount>0&&<div style={{fontSize:11,color:"#8a6a2a",background:"#fff8e7",padding:"7px 12px",borderRadius:8,marginBottom:8,border:"1px solid #e8d080"}}>⚠️ {junkCount} entr{junkCount===1?"y":"ies"} hidden — fix their titles to show here</div>}
      {junkCount>0&&<div style={{fontSize:11,color:"#8a6a2a",background:"#fff8e7",padding:"7px 12px",borderRadius:8,marginBottom:8,border:"1px solid #e8d080"}}>⚠️ {junkCount} entr{junkCount===1?"y":"ies"} hidden — fix their titles to show here</div>}
      {shipments.length===0&&<div style={{textAlign:"center",padding:"24px 16px",color:"#999",fontSize:12,lineHeight:1.6,background:"#fafafa",borderRadius:10}}>
        <div style={{fontSize:30,marginBottom:8}}>🚚</div>
        <b style={{color:"#666"}}>Nothing to track yet</b><br/>
        Logistics tracks each sale from <b>despatch → payment</b>.<br/>
        Tap <b>+ New Sales Order</b> above (or create any entry with category <b>Sales - Order</b> / <b>Sales - Payment</b>), and it appears here with stage buttons.
      </div>}
      {shipments.map(e=>{
        const stageIdx=getLogisticsStageIdx(e);
        const stageName=stageIdx>=0?LOGISTICS_STAGES[stageIdx]:"Not despatched";
        const stageColor=stageIdx>=3?"#2a8a4a":stageIdx>=2?"#2a6a8a":stageIdx>=0?"#8a6a2a":"#999";
        const nextStage=stageIdx<LOGISTICS_STAGES.length-1?LOGISTICS_STAGES[stageIdx+1]:null;
        const STAGE_ICONS=["🚛","🛣️","📦","💰"];
        return<div key={e.id} style={{background:"#f8f8f8",borderRadius:10,border:"1px solid #eee",marginBottom:4,overflow:"hidden"}}>
          <div onClick={()=>setSelectedId(e.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 13px",cursor:"pointer"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:700,color:"#1a3a6a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.person||e.vendor||e.title||"Invoice"}{e.amount?<span style={{marginLeft:8,color:"#2a6a2a"}}> {"₹"+(String(e.amount).replace(/[^\d]/g,""))}</span>:null}</div>
              <div style={{fontSize:10,color:"#999",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.title} · {e.date}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:10,fontWeight:700,color:stageColor,padding:"3px 9px",borderRadius:12,background:stageColor+"15"}}>{STAGE_ICONS[stageIdx]||"📋"} {stageName}</span>
              <span style={{color:"#bbb",fontSize:12}}>›</span>
            </div>
          </div>
          {stageIdx<3&&<div style={{display:"flex",gap:4,padding:"0 13px 9px",flexWrap:"wrap"}}>
            {LOGISTICS_STAGES.map((s,i)=>{
              if(i<=stageIdx)return null;
              const isNext=i===stageIdx+1;
              return<button key={s} onClick={async(ev)=>{ev.stopPropagation();await setStage(e,i);}} style={{fontSize:10,padding:"4px 10px",borderRadius:14,border:isNext?"1.5px solid #2a8a4a":"1px solid #ccc",background:isNext?"#eaffea":"#f5f5f5",color:isNext?"#1a6a2a":"#888",cursor:"pointer",fontWeight:isNext?700:500}}>
                {STAGE_ICONS[i]} Mark: {s}
              </button>;
            })}
          </div>}
          {stageIdx===3&&<div style={{fontSize:10,color:"#2a8a4a",padding:"0 13px 9px",fontWeight:700}}>✅ Complete — Payment Received</div>}
        </div>;
      })}
    </div>
    <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}><button className="bgh" onClick={onClose}>Close</button></div>
  </div>;
}

// ── LEDGER UPLOAD (bulk import from Tally/Excel PDF export) ──────────────────
function LedgerUpload({entries,onClose,onSaveEntry}){
  const [ledgerType,setLedgerType]=useState("sales"); // sales | purchase
  const [scanning,setScanning]=useState(false);
  const [statusMsg,setStatusMsg]=useState("");
  const [preview,setPreview]=useState(null); // {found, created, skipped, items}

  const parseAmt=(a)=>{
    if(!a)return 0;
    const n=parseFloat(String(a).replace(/[₹,\s]/g,""));
    return isNaN(n)?0:n;
  };

  const isDuplicate=(row)=>{
    // Match by invoice number first (most reliable), then by date+amount+name
    return entries.some(e=>{
      // Require invoice number to be at least 5 chars before trusting a substring match alone
      // (a short number like "101" could coincidentally appear inside an unrelated longer invoice number).
      // Also require the amount to match as a sanity check even when matching by invoice number.
      if(row.invoiceNo&&row.invoiceNo.length>=5&&e.notes&&String(e.notes).includes(row.invoiceNo)){
        const eAmtCheck=parseAmt(e.amount), rAmtCheck=parseAmt(row.amount);
        if(Math.abs(eAmtCheck-rAmtCheck)<1)return true;
      }
      const eAmt=parseAmt(e.amount), rAmt=parseAmt(row.amount);
      const sameAmt=Math.abs(eAmt-rAmt)<1;
      const sameDate=e.date===row.date;
      const eName=(e.person||e.vendor||"").toLowerCase();
      const rName=(row.name||"").toLowerCase();
      const sameName=rName&&eName&&(eName.includes(rName)||rName.includes(eName));
      return sameAmt&&sameDate&&sameName;
    });
  };

  const processLedger=async(file)=>{
    setScanning(true);setStatusMsg("Reading ledger…");setPreview(null);
    try{
      const att=await fileToB64(file);
      const isSales=ledgerType==="sales";
      const prompt=`Extract every row from this ${isSales?"sales":"purchase"} ledger PDF (exported from Tally/Excel). `+
        `Return ONLY a valid JSON array, one object per transaction row: `+
        `[{"date":"YYYY-MM-DD","name":"${isSales?"customer":"vendor"} name","amount":number,"invoiceNo":"invoice/voucher number if present","notes":"any other relevant detail"}]. `+
        `Skip header rows, subtotal rows, and blank rows. Include every real transaction row found.`;
      const isPDF=(att.type||"").indexOf("pdf")>-1;
      const txt=await claudeAPI(prompt,
        "You are a ledger data extraction assistant for Onam Agarbathi Pvt. Ltd. Return ONLY valid JSON, no markdown, no explanation.",
        isPDF?"":att.base64, isPDF?"":att.type, isPDF?att.base64:"");
      let rows=[];
      try{
        let clean=txt.replace(/```json/g,"").replace(/```/g,"").trim();
        const s=clean.indexOf("["),e2=clean.lastIndexOf("]");
        if(s>=0&&e2>s)clean=clean.substring(s,e2+1);
        rows=JSON.parse(clean);
      }catch(ex){
        setStatusMsg("Could not parse ledger: "+txt.slice(0,150));setScanning(false);return;
      }
      if(!Array.isArray(rows))rows=[rows];

      setStatusMsg(`Found ${rows.length} rows. Auto-tagging and checking for duplicates…`);
      const items=[];
      for(const row of rows){
        const dup=isDuplicate(row);
        items.push({row,dup,willCreate:!dup});
      }
      setPreview({found:rows.length,items,createdCount:0,skippedCount:items.filter(i=>i.dup).length});
      setScanning(false);
    }catch(e){
      setStatusMsg("Error: "+e.message);setScanning(false);
    }
  };

  const confirmImport=async()=>{
    if(!preview)return;
    setScanning(true);
    let created=0;
    for(const item of preview.items){
      if(!item.willCreate)continue;
      const row=item.row;
      const entry={
        id:genId(),
        title:(ledgerType==="sales"?"Sale: ":"Purchase: ")+(row.name||"Unknown")+(row.invoiceNo?" ("+row.invoiceNo+")":""),
        date:parseDate(row.date)||today(),
        category:ledgerType==="sales"?"Sales - Payment":"Business - Purchase",
        person:ledgerType==="sales"?(row.name||""):"",
        vendor:ledgerType==="purchase"?(row.name||""):"",
        amount:row.amount?String(row.amount):"",
        paymentStatus:"Payment Pending",
        notes:(row.invoiceNo?"Invoice/Voucher: "+row.invoiceNo+". ":"")+(row.notes||"")+" [Imported from ledger]",
        createdAt:new Date().toISOString(),
        tags:[]
      };
      const autoTags=await suggestTags(entry);
      if(autoTags.length>0)entry.tags=autoTags;
      await onSaveEntry(entry);
      created++;
    }
    setStatusMsg(`✅ Imported ${created} new ${ledgerType} entries. ${preview.skippedCount} duplicate(s) skipped.`);
    setPreview(null);
    setScanning(false);
  };

  const openUpload=()=>{
    const i=document.createElement("input");
    i.type="file";i.accept="application/pdf,.pdf,image/*";
    i.onchange=e=>{if(e.target.files[0])processLedger(e.target.files[0]);};
    i.click();
  };

  return<div>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
      <span style={{fontSize:26}}>📑</span>
      <div><h2 style={{margin:0,fontSize:18,color:"#5a3a1a"}}>Ledger Upload</h2>
        <div style={{fontSize:11,color:"#aa8a5a"}}>Bulk import from weekly/monthly Tally or Excel PDF export</div></div>
    </div>

    <div style={{display:"flex",gap:8,marginBottom:14}}>
      <button onClick={()=>setLedgerType("sales")} style={{flex:1,padding:"10px",borderRadius:8,border:ledgerType==="sales"?"2px solid #1a5a3a":"1.5px solid #ddd",background:ledgerType==="sales"?"#f0fff4":"#fafafa",color:ledgerType==="sales"?"#1a5a3a":"#999",cursor:"pointer",fontWeight:700,fontSize:13}}>📈 Sales Ledger</button>
      <button onClick={()=>setLedgerType("purchase")} style={{flex:1,padding:"10px",borderRadius:8,border:ledgerType==="purchase"?"2px solid #1a3a6a":"1.5px solid #ddd",background:ledgerType==="purchase"?"#f0f6ff":"#fafafa",color:ledgerType==="purchase"?"#1a3a6a":"#999",cursor:"pointer",fontWeight:700,fontSize:13}}>📉 Purchase Ledger</button>
    </div>

    {!preview&&<button onClick={openUpload} disabled={scanning} className="scan-btn" style={{width:"100%",padding:"14px",fontSize:13}}>{scanning?"⏳ Reading…":"📄 Upload "+(ledgerType==="sales"?"Sales":"Purchase")+" Ledger PDF"}</button>}

    {statusMsg&&<div style={{fontSize:12,color:"#5a3a1a",fontWeight:600,marginTop:12,padding:"8px 12px",background:"#fffaf0",borderRadius:7}}>{statusMsg}</div>}

    {preview&&<div style={{marginTop:14}}>
      <div style={{display:"flex",gap:10,marginBottom:12}}>
        <div style={{flex:1,textAlign:"center",padding:10,background:"#f0fff4",borderRadius:8}}>
          <div style={{fontSize:20,fontWeight:800,color:"#1a5a3a"}}>{preview.items.filter(i=>i.willCreate).length}</div>
          <div style={{fontSize:10,color:"#5a8a6a"}}>New entries</div>
        </div>
        <div style={{flex:1,textAlign:"center",padding:10,background:"#fff8f0",borderRadius:8}}>
          <div style={{fontSize:20,fontWeight:800,color:"#8a5a1a"}}>{preview.skippedCount}</div>
          <div style={{fontSize:10,color:"#aa8a5a"}}>Duplicates skipped</div>
        </div>
      </div>
      <div style={{maxHeight:280,overflowY:"auto",display:"flex",flexDirection:"column",gap:5,marginBottom:14}}>
        {preview.items.map((item,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 11px",background:item.dup?"#fdf5f5":"#f8f8f8",borderRadius:6,fontSize:11,opacity:item.dup?0.6:1}}>
          <span>{item.row.name||"—"} {item.dup&&"(duplicate)"}</span>
          <span style={{fontWeight:700}}>₹{item.row.amount}</span>
        </div>)}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={confirmImport} disabled={scanning} className="bg" style={{flex:1}}>{scanning?"Importing…":`Import ${preview.items.filter(i=>i.willCreate).length} Entries`}</button>
        <button onClick={()=>setPreview(null)} className="bgh">Cancel</button>
      </div>
    </div>}

    <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}><button className="bgh" onClick={onClose}>Close</button></div>
  </div>;
}

// ── DROPDOWN MANAGER ──────────────────────────────────────────────────────────
function DropdownManager({dropdowns,onSave,onClose}){
  const [dd,setDd]=useState(JSON.parse(JSON.stringify(dropdowns)));
  const [active,setActive]=useState("taskTypes");
  const [newVal,setNewVal]=useState("");
  const KEYS={taskTypes:"Task Types",persons:"People",accounts:"Accounts",financials:"Financial",vendors:"Vendors",properties:"Properties",paymentStatuses:"Payment Status",chemicals:"Chemicals",categories:"Categories"};
  const addItem=()=>{const v=newVal.trim();if(!v)return;if(!dd[active].includes(v))setDd(p=>({...p,[active]:[...p[active],v]}));setNewVal("");};
  const removeItem=i=>setDd(p=>({...p,[active]:p[active].filter((_,j)=>j!==i)}));
  return<div>
    <h2 style={{margin:"0 0 12px",fontSize:18}}>⚙️ Manage Dropdowns</h2>
    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
      {Object.entries(KEYS).map(([k,l])=><button key={k} onClick={()=>setActive(k)} style={{padding:"4px 11px",borderRadius:20,border:`1.5px solid ${active===k?"#c8a060":"#e0d0b8"}`,background:active===k?"#fff3d8":"#fffdf7",color:active===k?"#7a4800":"#7a6a52",cursor:"pointer",fontSize:12,fontWeight:active===k?700:400}}>{l}</button>)}
    </div>
    <div style={{background:"#fffdf5",border:"1px solid #e8dcc8",borderRadius:10,padding:10,marginBottom:10,maxHeight:200,overflowY:"auto"}}>
      {dd[active].map((item,i)=><div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 8px",borderBottom:"1px solid #f0e8d8"}}>
        <span style={{fontSize:13}}>{item}</span>
        <button onClick={()=>removeItem(i)} style={{background:"none",border:"none",color:"#c00",cursor:"pointer",fontSize:16}}>×</button>
      </div>)}
    </div>
    <div style={{display:"flex",gap:8,marginBottom:12}}>
      <input className="inp" value={newVal} placeholder={`Add to ${KEYS[active]}…`} onChange={e=>setNewVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()}/>
      <button onClick={addItem} style={{padding:"8px 14px",borderRadius:8,border:"none",background:"#2a7a2a",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,whiteSpace:"nowrap"}}>＋</button>
    </div>
    <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
      <button className="bgh" onClick={onClose}>Cancel</button>
      <button className="bg" onClick={()=>{onSave(dd);onClose();}}>Save All</button>
    </div>
  </div>;
}

// ── DUPLICATE FINDER ──────────────────────────────────────────────────────────
function DupeFinder({entries,onDelete,onClose}){
  const dupes=useMemo(()=>{const s={};entries.forEach(e=>{const k=(e.title||"").toLowerCase().trim();if(k){if(!s[k])s[k]=[];s[k].push(e);}});return Object.values(s).filter(g=>g.length>1);},[entries]);
  if(!dupes.length)return<div style={{textAlign:"center",padding:"30px"}}><div style={{fontSize:36,marginBottom:10}}>✅</div><div style={{fontSize:16,fontWeight:700,color:"#2a5a2a"}}>No duplicates!</div><button className="bgh" onClick={onClose} style={{marginTop:16}}>Close</button></div>;
  return<div>
    <h2 style={{margin:"0 0 12px",fontSize:18}}>🔍 Duplicates ({dupes.length} groups)</h2>
    {dupes.map((g,i)=><div key={i} style={{background:"#fff8ee",border:"1.5px solid #f0ddb0",borderRadius:10,padding:12,marginBottom:10}}>
      <div style={{fontWeight:700,fontSize:13,color:"#5a3800",marginBottom:8}}>"{g[0].title}" — {g.length} entries</div>
      {g.map((e,j)=><div key={e.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 10px",background:j%2?"#fff8ee":"#fffdf5",borderRadius:7,marginBottom:3,gap:8}}>
        <div style={{fontSize:12}}><strong>{fmtDate(e.date)}</strong>{e.person&&<span style={{marginLeft:8,color:"#7a5800"}}>{e.person}</span>}{e.amount&&<span style={{marginLeft:8,color:"#3a6000",fontWeight:700}}>{e.amount}</span>}</div>
        <button onClick={()=>onDelete(e.id)} style={{padding:"3px 10px",borderRadius:6,border:"1px solid #f5a8ab",background:"#fff5f5",color:"#c00",cursor:"pointer",fontSize:11}}>Delete</button>
      </div>)}
    </div>)}

  </div>;
}


// ── SHARE INDIVIDUAL ENTRY ────────────────────────────────────────────────────
function shareEntry(entry){
  const lines=[];
  lines.push("📋 *"+entry.title+"*");
  lines.push("📅 "+fmtDate(entry.date)+(entry.month?" · "+entry.month:""));
  if(entry.taskType) lines.push("📌 "+entry.taskType);
  if(entry.person)   lines.push("👤 "+entry.person);
  if(entry.vendor)   lines.push("🏭 "+entry.vendor);
  if(entry.account)  lines.push("🏦 "+entry.account);
  if(entry.amount)   lines.push("💰 "+entry.amount);
  if(entry.paymentStatus) lines.push("💳 "+entry.paymentStatus);
  if(entry.property) lines.push("🏠 "+entry.property);
  if(entry.chemical) lines.push("🧪 "+entry.chemical);
  if(entry.tags?.length) lines.push("🏷 "+entry.tags.join(", "));
  if(entry.notes)    lines.push("\n📝 "+entry.notes);
  if(entry.reminder) lines.push("⏰ "+fmtDT(entry.reminder)+(entry.reminderNote?" — "+entry.reminderNote:""));
  if(entry.link)     lines.push("🔗 "+(entry.linkLabel||entry.link)+": "+entry.link);
  lines.push("\n🌿 Onam Agarbathi · RK Life Tracker");
  const text=lines.join("\n");

  // Try native share API first (works on iPhone)
  if(navigator.share){
    navigator.share({
      title:entry.title,
      text:text,
      url:entry.link||window.location.href
    }).catch(()=>{});
  } else {
    // Fallback: copy to clipboard
    navigator.clipboard.writeText(text).then(()=>{
      alert("Entry copied to clipboard! Paste in WhatsApp or Gmail.");
    }).catch(()=>{
      // Last resort: show in prompt
      prompt("Copy this and share:",text);
    });
  }
}

function exportCSV(entries){
  const h=["ID","Date","Month","Title","Category","Task Type","Person","Vendor","Account","Financial","Payment Status","Property","Chemical","Amount","Tags","Notes","Reminder","Recurring","Link","Created At"];
  const rows=entries.map(e=>[e.id,e.date,e.month,e.title,e.category,e.taskType,e.person,e.vendor,e.account,e.financialType,e.paymentStatus,e.property,e.chemical,e.amount,(e.tags||[]).join("; "),e.notes,e.reminder,e.isRecurring?"Yes":"",e.link,e.createdAt].map(v=>`"${String(v||"").replace(/"/g,'""')}"`));
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([[h,...rows].map(r=>r.join(",")).join("\n")],{type:"text/csv"}));
  a.download=`rk-tracker-${today()}.csv`;a.click();
}

// Haversine straight-line distance in km
function haversineKm(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Road distance estimate = straight line x 1.20
function roadDistanceKm(lat1, lng1, lat2, lng2) {
  return haversineKm(lat1, lng1, lat2, lng2) * 1.20;
}

function classifyDistance(km) {
  for (var i = 0; i < SALES_CONFIG.bands.length; i++) {
    if (km <= SALES_CONFIG.bands[i].maxKm) return SALES_CONFIG.bands[i];
  }
  return SALES_CONFIG.bands[SALES_CONFIG.bands.length - 1];
}

// Extract GPS coordinates from various Google Maps link formats
function extractCoords(text) {
  if (!text) return null;
  // Format: @lat,lng or ?q=lat,lng or ll=lat,lng or /place/.../@lat,lng
  var patterns = [
    /@(-?\d+\.\d+),(-?\d+\.\d+)/,
    /[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/,
    /ll=(-?\d+\.\d+),(-?\d+\.\d+)/,
    /maps\?.*q=(-?\d+\.\d+)%2C(-?\d+\.\d+)/,
    /\/(-?\d+\.\d{4,}),(-?\d+\.\d{4,})/,
  ];
  for (var i = 0; i < patterns.length; i++) {
    var m = text.match(patterns[i]);
    if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  }
  return null;
}

        {emails.filter(e => !e.skip).length > 0 && <>

function PurchaseSalesCapture({ mode, onSaveEntry, onClose }) {
  const isPurchase = mode === "purchase";

  const camRef = useRef(null);
  const galRef = useRef(null);

  const onPick = ev => {
    const f = ev.target.files && ev.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => setPhoto({ dataUrl: r.result, type: f.type || "image/jpeg", name: f.name || "" });
    r.readAsDataURL(f);
    setParsed(null); setMsg("");
  };

  const scan = async () => {
    if (!photo) return;
    setBusy(true); setMsg("📄 Reading the " + label.toLowerCase() + " bill…");
    try {
      const b64 = String(photo.dataUrl).split(",")[1];
      const who = isPurchase ? "supplier/vendor you are buying from" : "customer you are selling to";
      const prompt =
"Read this " + label + " bill/invoice/order image. Extract the key details for a business ledger entry.\\n" +
"Return ONLY JSON: {\\\"party\\\":\\\"<" + who + ">\\\",\\\"date\\\":\\\"<YYYY-MM-DD or blank>\\\",\\\"invoiceNo\\\":\\\"<number or blank>\\\",\\\"amount\\\":<total amount as number>,\\\"items\\\":\\\"<short summary of items>\\\",\\\"notes\\\":\\\"<anything useful like GST, terms>\\\"}. Use numbers only for amount (no currency symbol). If unclear, leave blank/0.";
      const isPdf = (photo.type||"").indexOf("pdf") > -1;
      const txt = await claudeAPI(prompt, "Return ONLY valid JSON. Extract accurately from the bill.", isPdf ? "" : b64, isPdf ? "" : photo.type, isPdf ? b64 : "");
      const clean = String(txt || "").replace(/```json/g, "").replace(/```/g, "").trim();
      const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
      const obj = JSON.parse(s >= 0 ? clean.substring(s, e + 1) : clean);
      setParsed({
        party: obj.party || "", date: obj.date || new Date().toISOString().slice(0, 10),
        invoiceNo: obj.invoiceNo || "", amount: obj.amount || "", items: obj.items || "", notes: obj.notes || ""
      });

    } catch (e) { setMsg("❌ Couldn't read it clearly. Try a sharper photo, or edit the fields below."); setParsed({ party: "", date: new Date().toISOString().slice(0,10), invoiceNo: "", amount: "", items: "", notes: "" }); }

      amount: parsed.amount || "",
      paymentStatus: "Pending",
      notes: (parsed.items ? parsed.items : "") + (parsed.notes ? " | " + parsed.notes : ""),
      tags: [label],
      createdAt: new Date().toISOString()
    };
    try { await onSaveEntry(entry); setMsg("✓ " + label + " entry saved"); setTimeout(() => { onClose && onClose(); }, 1000); }
    catch (e) { setMsg("Save failed — try again."); }
    setBusy(false);
  };

  const inp = { width: "100%", padding: "9px", borderRadius: 8, border: "1px solid #ccd", fontSize: 13, marginBottom: 8 };
  const bigBtn = (bg) => ({ flex: 1, padding: "14px 8px", borderRadius: 10, border: "none", background: bg, color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" });

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
        <span style={{ fontSize: 26 }}>📷</span>
        <div><h2 style={{ margin: 0, fontSize: 18, color: accent }}>{label} Entry</h2>
        <div style={{ fontSize: 11, color: "#777" }}>Snap or upload the {label.toLowerCase()} bill — details filled automatically</div></div>
      </div>

      {/* Hidden inputs: camera + gallery/file */}

      <input ref={galRef} type="file" accept="image/*,application/pdf" onChange={onPick} style={{ display: "none" }} />

      {!photo && (
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          <button onClick={() => camRef.current && camRef.current.click()} style={bigBtn("linear-gradient(135deg," + accent + ",#333)")}>📸 Camera</button>
          <button onClick={() => galRef.current && galRef.current.click()} style={bigBtn("linear-gradient(135deg,#555,#333)")}>🖼️ Gallery / 📄 PDF / File</button>

        <div style={{ textAlign: "center", marginBottom: 12 }}>
          {(photo.type||"").indexOf("pdf")>-1

            : <img src={photo.dataUrl} alt="bill" style={{ maxWidth: "100%", maxHeight: 180, borderRadius: 8, border: "1px solid #ddd" }} />}
          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>

  );
}


function Receivables({ entries, onSaveEntry, onClose }) {
  const [payFor, setPayFor] = useState(null);   // entry being paid
  const [payAmt, setPayAmt] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");

  const num = v => { const n = parseFloat(String(v ?? "").replace(/[^0-9.]/g, "")); return isNaN(n) ? 0 : n; };
  const fmt = n => "₹" + Math.round(n).toLocaleString("en-IN");
  const daysOld = d => { const t = Date.parse(d); return isNaN(t) ? 0 : Math.floor((Date.now() - t) / 86400000); };

  // Sales entries that still have money outstanding
  const open = (entries || []).filter(e => {
    if (!e) return false;
    const cat = String(e.category || "");
    const tt  = String(e.taskType || "");
    const tags = (e.tags || []).map(t => String(t).toLowerCase());
    // Only true customer sales invoices — money owed TO us
    const isSale = /^\s*sales\s*$/i.test(cat) || /^\s*sales\s*$/i.test(tt);
    if (!isSale) return false;
    // Exclude officer visits / travel allowance / field reports — money we PAY OUT
    const notInvoice =
      /visit|allowance|travel|field|expense|report|salary/i.test(cat) ||
      /visit|allowance|travel|field|expense|report|salary/i.test(tt) ||
      tags.some(t => /visit|allowance|travel|field report|expense/.test(t));
    if (notInvoice) return false;
    const total = num(e.amount);
    if (total <= 0) return false;
    const paid = num(e.amountPaid);
    return paid < total - 0.5;   // still something owed
  });

  const withCalc = open.map(e => {
    const total = num(e.amount), paid = num(e.amountPaid);
    return { e, total, paid, due: total - paid, age: daysOld(e.date) };
  }).sort((a, b) => b.age - a.age);   // oldest first

  const totalDue = withCalc.reduce((s, x) => s + x.due, 0);
  const overdue60 = withCalc.filter(x => x.age >= 60);
  const overdueDue = overdue60.reduce((s, x) => s + x.due, 0);

  const openPay = (x) => { setPayFor(x); setPayAmt(String(Math.round(x.due))); setMsg(""); };

  const record = async (full) => {
    if (!payFor) return;
    const amt = full ? payFor.due : num(payAmt);
    if (amt <= 0) { setMsg("Enter an amount."); return; }
    if (amt > payFor.due + 0.5) { setMsg("That's more than the outstanding amount."); return; }
    setBusy(true);
    const newPaid = payFor.paid + amt;
    const settled = newPaid >= payFor.total - 0.5;
    const upd = {
      ...payFor.e,
      amountPaid: newPaid,
      paymentStatus: settled ? "Paid" : "Partially Paid",
      notes: (payFor.e.notes ? payFor.e.notes + " | " : "") +
             "Received " + fmt(amt) + " on " + new Date().toISOString().slice(0, 10) +
             (settled ? " — settled in full" : (" — " + fmt(payFor.total - newPaid) + " still due")),
      tags: Array.from(new Set([...(payFor.e.tags || []).filter(t => t !== "Payment Due"),
                                settled ? "Payment Received" : "Partially Paid"]))
    };
    try {
      await onSaveEntry(upd);
      setMsg("✓ Recorded " + fmt(amt) + (settled ? " — fully settled" : " — " + fmt(payFor.total - newPaid) + " still due"));
      setPayFor(null); setPayAmt("");
      setTimeout(() => setMsg(""), 3000);
    } catch (err) { setMsg("Couldn't save — try again."); }
    setBusy(false);
  };

  const inp = { width: "100%", padding: "10px", borderRadius: 8, border: "1.5px solid #cfd8cf", fontSize: 15, marginBottom: 10 };

  return (
    <div style={{ padding: 4 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
        <span style={{ fontSize: 26 }}>📥</span>
        <div><h2 style={{ margin: 0, fontSize: 18, color: "#1a5a3a" }}>Receivables</h2>
        <div style={{ fontSize: 11, color: "#6a7a6a" }}>Who owes you, how much, how long</div></div>
      </div>

      {/* Headline */}
      <div style={{ background: totalDue > 0 ? "linear-gradient(135deg,#1a7a4a,#0a5a2a)" : "#888", borderRadius: 12, padding: "14px 16px", color: "#fff", marginBottom: 12 }}>
        <div style={{ fontSize: 11, opacity: .9, letterSpacing: ".05em" }}>TOTAL OUTSTANDING</div>
        <div style={{ fontSize: 28, fontWeight: 800, lineHeight: 1.1 }}>{fmt(totalDue)}</div>
        <div style={{ fontSize: 10.5, opacity: .85, marginTop: 3 }}>
          {withCalc.length} invoice{withCalc.length === 1 ? "" : "s"}
          {overdue60.length > 0 && <span> · <b>{fmt(overdueDue)} over 60 days</b></span>}
        </div>
      </div>

      {msg && <div style={{ fontSize: 12.5, color: msg[0] === "✓" ? "#1a7a3a" : "#a33", marginBottom: 10 }}>{msg}</div>}

      {/* Payment entry */}
      {payFor && (
        <div style={{ background: "#f2f9f2", border: "2px solid #1a7a4a", borderRadius: 10, padding: 12, marginBottom: 12 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#1a5a3a" }}>{payFor.e.person || payFor.e.title}</div>
          <div style={{ fontSize: 11, color: "#666", marginBottom: 8 }}>
            Invoice {fmt(payFor.total)} · already paid {fmt(payFor.paid)} · <b>{fmt(payFor.due)} due</b>
          </div>
          <label style={{ fontSize: 12, fontWeight: 700, color: "#1a5a3a" }}>Amount received ₹</label>
          <input type="number" value={payAmt} onChange={e => setPayAmt(e.target.value)} style={inp} autoFocus />
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { setPayFor(null); setMsg(""); }} style={{ flex: 1, padding: "10px", borderRadius: 8, border: "1px solid #ccc", background: "#fff", cursor: "pointer", fontSize: 13 }}>Cancel</button>
            <button onClick={() => record(false)} disabled={busy} style={{ flex: 1, padding: "10px", borderRadius: 8, border: "1px solid #1a7a4a", background: "#eafaf0", color: "#1a5a3a", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>Record part</button>
            <button onClick={() => record(true)} disabled={busy} style={{ flex: 1.2, padding: "10px", borderRadius: 8, border: "none", background: "#1a7a4a", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>✓ Paid in full</button>
          </div>
        </div>
      )}

      {/* List */}
      {withCalc.length === 0 && <div style={{ fontSize: 12.5, color: "#777", fontStyle: "italic", textAlign: "center", padding: 20 }}>
        Nothing outstanding. Every sales invoice is settled.
      </div>}

      {withCalc.map((x, i) => {
        const red = x.age >= 60, amber = x.age >= 30 && x.age < 60;
        return (
          <div key={i} style={{
            border: "1px solid " + (red ? "#e0a0a0" : amber ? "#e0c890" : "#dde0dd"),
            background: red ? "#fdf5f5" : amber ? "#fdfaf2" : "#fafafa",
            borderRadius: 10, padding: 10, marginBottom: 8
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#1a1a2a" }}>{x.e.person || x.e.title || "—"}</div>
                <div style={{ fontSize: 10.5, color: "#777", marginTop: 2 }}>
                  {x.e.date} · {x.age} days old
                  {x.paid > 0 && <span style={{ color: "#1a7a4a" }}> · part-paid {fmt(x.paid)} of {fmt(x.total)}</span>}
                </div>
                {red && <div style={{ display: "inline-block", marginTop: 4, fontSize: 9.5, color: "#fff", background: "#c33", padding: "1px 7px", borderRadius: 10 }}>60+ DAYS</div>}
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 15, fontWeight: 800, color: red ? "#c33" : "#1a5a3a" }}>{fmt(x.due)}</div>
                <button onClick={() => openPay(x)} style={{ marginTop: 4, fontSize: 11, padding: "5px 12px", borderRadius: 7, border: "1px solid #1a7a4a", background: "#eafaf0", color: "#1a5a3a", fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>₹ Received</button>
              </div>
            </div>
          </div>
        );
      })}

      <div style={{ fontSize: 10, color: "#999", marginTop: 12, fontStyle: "italic" }}>
        Part-payments are supported — record what came in, and the balance stays outstanding until settled.
      </div>
    </div>
  );
}

    if (entry.vendor) L.push("🏭 " + entry.vendor);
